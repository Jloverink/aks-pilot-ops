                </span>}
                {c.noGoMs&&c.noGoMs>Date.now()&&<span style={{fontSize:14,fontWeight:700,padding:"1px 5px",borderRadius:3,
                  background:"rgba(255,71,87,0.15)",color:SC.red,border:"1px solid rgba(255,71,87,0.4)"}}>
                  🚫 NO-GO {msToLocalHHMM(c.noGoMs)}
                </span>}
                {c.noGoMs&&c.noGoMs<=Date.now()&&c.rolling<480&&<span style={{fontSize:14,fontWeight:700,padding:"1px 5px",borderRadius:3,
                  background:"rgba(255,71,87,0.15)",color:SC.red,border:"1px solid rgba(255,71,87,0.4)"}}>
                  🚫 NO-GO NOW
                </span>}
                {cwDot&&(()=>{
                  const allItems=[...cw.expired,...cw.expiring,...cw.warning,...cw.watch];
                  const tipLines=allItems.map(i=>{
                    const dayStr=i.days==null?'no date':i.days<0?`EXPIRED ${Math.abs(i.days)}d ago`:i.days===0?'expires TODAY':`${i.days}d`;
                    const icon=i.days<0?'🔴':i.days<=30?'🟠':i.days<=60?'🟡':'🟢';
                    return `${icon} ${i.label||'?'} — ${dayStr}`;
                  });
                  return <Tip text={tipLines.length?tipLines.join("\n"):"No items"} width={300}>
                  <span style={{fontSize:14,fontWeight:700,padding:"1px 5px",borderRadius:3,cursor:"help",
                    background:`${cwDot}22`,color:cwDot,border:`1px solid ${cwDot}44`}}>
                    🪪 {cw.expired.length>0?`${cw.expired.length} EXP`:cw.expiring.length>0?`${cw.expiring.length} ≤30d`:`${cw.warning.length} ≤60d`}
                  </span></Tip>;
                })()}
                {/* Mini 8-in-24 strip — live countup/countdown */}
                {!isOpen&&(()=>{
                  const now2=clockMs;
                  const win2=now2-24*3600000;
                  const wallSec2=Math.floor(now2/1000)%60;
                  const downSec2=(60-wallSec2)%60;

                  // Yesterday: live intersection countdown
                  let yMins2=0, windowInYest2=false;
                  for(const f of (c.yesterdayFlights||[])){
                    if(!f.startTaxi||!f.totalMinutes) continue;
                    const offMs=new Date(f.date+'T'+f.startTaxi+':00').getTime();
                    const onMs=offMs+f.totalMinutes*60000;
                    yMins2+=Math.max(0,Math.min(onMs,now2)-Math.max(offMs,win2))/60000;
                    if(win2>=offMs&&win2<onMs) windowInYest2=true;
                  }
                  yMins2=Math.floor(yMins2);

                  // Today: completed + live elapsed on active en-route
                  let activeElapsed2=0, inTodayBlock2=false;
                  for(const f of (c.enrouteFlights||[])){
                    const off=f.startTaxi||f.schedOff; if(!off||!f.date) continue;
                    const offMs=new Date(f.date+'T'+off+':00').getTime();
                    const cap=f.totalMinutes||f._schedDurMins||120;
                    const etaMs=offMs+cap*60000;
                    if(now2>=offMs&&now2<etaMs){inTodayBlock2=true;activeElapsed2+=(now2-offMs)/60000;}
                    else if(now2>=etaMs){activeElapsed2+=cap;}
                  }
                  if(!inTodayBlock2){
                    const todayStr2=new Date(now2).toISOString().slice(0,10);
                    for(const f of (c.todayFlights||[])){
                      if(f._status!=='scheduled'||!f.schedOff||!f._schedDurMins) continue;
                      const offMs=new Date(todayStr2+'T'+f.schedOff+':00').getTime();
                      const etaMs=offMs+f._schedDurMins*60000;
                      if(now2>=offMs&&now2<etaMs){inTodayBlock2=true;activeElapsed2+=(now2-offMs)/60000;}
                    }
                  }
                  const tMins2=Math.floor((c.todayMins||0)+activeElapsed2);
                  const tot2=tMins2+yMins2;
                  const rem2=Math.max(0,480-tot2);
                  const totCol=tot2>=480?SC.red:tot2>=390?SC.orange:tot2>=300?"#ffd740":SC.green;
                  const fmtSec=(mins,up)=>{const h=Math.floor(mins/60),m=mins%60,s=up?wallSec2:downSec2;return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;};
                  const sortedY2=[...(c.yesterdayFlights||[])].filter(f=>f.startTaxi&&f.totalMinutes>0).sort((a,b)=>a.startTaxi.localeCompare(b.startTaxi));
                  const nextAge=sortedY2.find(f=>(new Date(f.date+'T'+f.startTaxi+':00').getTime()+86400000)>now2);
                  const nextAgeMs=nextAge?(new Date(nextAge.date+'T'+nextAge.startTaxi+':00').getTime()+86400000):null;
                  const nextAgeStr=nextAgeMs?(()=>{const d=new Date(nextAgeMs);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');})():null;
                  const tipLines=[`TODAY: ${fmtMin(tMins2)}`,`YEST LEFT: ${fmtMin(yMins2)}`,`8-IN-24: ${fmtMin(tot2)} of 8:00`,`REMAINING: ${fmtMin(rem2)}`,nextAgeStr?`Next clears: ${nextAgeStr} · ${nextAge?.origin||'?'}→${nextAge?.destination||'?'}`:null].filter(Boolean).join('\n');
                  return <Tip text={tipLines} width={260}>
                  <div style={{display:"flex",alignItems:"center",gap:4,cursor:"help",
                    background:"rgba(8,14,22,0.8)",borderRadius:4,padding:"3px 8px",
                    border:`1px solid ${totCol}44`}}>
                    <span style={{fontSize:11,color:"#5a7a8a",fontFamily:"monospace"}}>TODAY</span>
                    <span style={{fontSize:14,color:"#4a9eff",fontFamily:"monospace",fontWeight:700}}>
                      {inTodayBlock2?fmtSec(tMins2,true):fmtMin(tMins2)}{inTodayBlock2&&<span style={{fontSize:9,color:"#ffd740"}}>&#9654;</span>}
                    </span>
                    <span style={{fontSize:12,color:"#2a3a4a"}}>+</span>
                    <span style={{fontSize:11,color:"#5a7a8a",fontFamily:"monospace"}}>YEST</span>
                    <span style={{fontSize:14,color:yMins2>0?"#ff9944":"#2a3a4a",fontFamily:"monospace",fontWeight:700}}>
                      {yMins2>0?(windowInYest2?fmtSec(yMins2,false):fmtMin(yMins2)):"—"}{windowInYest2&&yMins2>0&&<span style={{fontSize:9,color:"#ff9944"}}>&#9660;</span>}
                    </span>
                    <span style={{fontSize:12,color:"#2a3a4a"}}>=</span>
                    <span style={{fontSize:15,color:totCol,fontFamily:"monospace",fontWeight:700}}>{fmtMin(tot2)}</span>
                    <span style={{fontSize:12,color:"#2a3a4a"}}>→</span>
                    <span style={{fontSize:14,color:rem2<=0?SC.red:rem2<=60?SC.orange:SC.green,fontFamily:"monospace",fontWeight:700}}>{fmtMin(rem2)}</span>
                    {nextAgeStr&&<span style={{fontSize:11,color:"#ffd740",fontFamily:"monospace",marginLeft:2}}>⏳{nextAgeStr}</span>}
                  </div></Tip>;
                })()}              </div>
            </div>
            {/* Dual progress bars: actual (solid) + projected (faded) */}
            <div style={{height:4,background:"#1e2730",borderRadius:2,overflow:"hidden",marginBottom:2}}>
              <div style={{height:"100%",width:`${Math.min(c.rolling/480,1)*100}%`,background:actualCol,borderRadius:2}}/>
            </div>
            <div style={{height:4,background:"#1e2730",borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.min(c.rollingProjected/480,1)*100}%`,background:col,borderRadius:2,opacity:0.4}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#7a9ab8",marginTop:2}}>
              <span>■ 8-in-24 actual &nbsp; <span style={{opacity:0.5}}>■ +projected</span></span>
              <span>8:00 limit</span>
            </div>
          </div>

          {/* ── EXPANDED DETAIL ── */}
          {isOpen&&<div style={{...S.card,borderColor:col,background:"#080b0f",marginTop:2,padding:"12px 14px"}}>

            {/* Row A: Live rolling window */}
                {(()=>{
                  const now = clockMs;
                  const wallSec = Math.floor(now/1000)%60;
                  const nowHHMM = String(new Date(now).getHours()).padStart(2,'0')+':'+String(new Date(now).getMinutes()).padStart(2,'0');

                  // ── Recompute 24h window live against clockMs ──────────────────
                  const windowStartMs = now - 24*3600000;
                  const allCompleted = c.inWindowFlights||[];

                  // ── YEST LEFT: live partial-intersection countdown ──────────────
                  // Use c.yesterdayFlights (ALL yesterday completed, no window pre-filter)
                  // so flights that STARTED before windowStartMs but END after it are included.
                  // inWindowFlights misses those because it filters by startTaxi >= windowStartMs.
                  const yesterdayFlightsAll = (c.yesterdayFlights||[]).filter(f=>f.startTaxi&&f.totalMinutes>0);
                  let yesterdayMins = 0;
                  let windowInsideYestBlock = false; // true = actively erasing right now (seconds ticking)
                  for(const f of yesterdayFlightsAll){
                    const offMs = new Date(f.date+'T'+f.startTaxi+':00').getTime();
                    const onMs  = offMs + (f.totalMinutes||0)*60000;
                    // Clip to window: only count the slice [windowStartMs, onMs] ∩ [offMs, now]
                    const sliceStart = Math.max(offMs, windowStartMs);
                    const sliceEnd   = Math.min(onMs, now);
                    const inWindowMs = Math.max(0, sliceEnd - sliceStart);
                    yesterdayMins += inWindowMs / 60000;
                    // Are we currently mid-erasure on this flight?
                    if(windowStartMs >= offMs && windowStartMs < onMs) windowInsideYestBlock = true;
                  }
                  yesterdayMins = Math.floor(yesterdayMins); // floor to whole minutes — fractions cause float bleed in fmtMin
                  // Show seconds on YEST LEFT when windowStart is inside a yesterday block
                  // Use wallSec for seconds — yesterdayMins is whole-minute floored,
                  // so deriving seconds from it always gives 0. Both TODAY and YEST LEFT
                  // tick at 1s/s so they share the same wallSec.
                  const yestH = Math.floor(yesterdayMins/60);
                  const yestM = yesterdayMins%60;
                  const downSec = (60 - wallSec) % 60; // YEST LEFT counts DOWN, syncs at :00
                  const yesterdayDisplay = windowInsideYestBlock
                    ? `${yestH>0?yestH+':':''}${String(yestM).padStart(yestH>0?2:1,'0')}:${String(downSec).padStart(2,'0')}`
                    : fmtMin(yesterdayMins);

                  // Today completed flights in window
                  const todayCompleted = allCompleted.filter(f=>f.date===todayStr&&f.totalMinutes>0);
                  const todayCompMins  = todayCompleted.reduce((s,f)=>s+(f.totalMinutes||0),0);

                  // ── Is NOW inside any today block? ─────────────────────────────
                  // Check completed (startTaxi–stopTaxi) and en-route (startTaxi–ETA)
                  // This drives whether TODAY ticks up and STATUS = ACCRUING.
                  let nowInsideTodayBlock = false;
                  let activeElapsedMins   = 0; // live elapsed on the current active flight

                  // En-route flights: actual takeoff + scheduled duration = ETA cap
                  for(const f of (c.enrouteFlights||[])){
                    const offTime = f.startTaxi||f.schedOff;
                    if(!offTime||!f.date) continue;
                    const offMs  = new Date(f.date+'T'+offTime+':00').getTime();
                    const cap    = f.totalMinutes||f._schedDurMins||120;
                    const etaMs  = offMs + cap*60000;
                    if(now >= offMs && now < etaMs){
                      nowInsideTodayBlock = true;
                      activeElapsedMins  += (now - offMs)/60000;
                    } else if(now >= etaMs){
                      // Past ETA — count full cap, don't tick
                      activeElapsedMins += cap;
                    }
                  }

                  // Scheduled flights: two cases handled separately
                  // Case 1: schedOff <= now < ETA — currently "in block", tick live
                  // Case 2: ETA already passed — count full scheduled duration (no log yet)
                  // Both cases only apply when no actual en-route data exists for that leg
                  let pastSchedMins = 0; // completed scheduled legs with no actual data
                  for(const f of (c.todayFlights||[])){
                    if(f._status!=='scheduled'||!f.schedOff||!f._schedDurMins) continue;
                    const offMs = new Date(todayStr+'T'+f.schedOff+':00').getTime();
                    const etaMs = offMs + f._schedDurMins*60000;
                    if(now >= offMs && now < etaMs){
                      // Currently in this block — tick live (only if not already tracking an enroute)
                      if(!nowInsideTodayBlock){
                        nowInsideTodayBlock = true;
                        activeElapsedMins  += (now - offMs)/60000;
                      }
                    } else if(now >= etaMs){
                      // Leg window has fully passed — count full scheduled duration
                      // This is the "should have landed by now" estimate
                      pastSchedMins += f._schedDurMins;
                    }
                  }

                  // TODAY = completed actual + past-scheduled estimates + live elapsed on active
                  const todayFlyingMins = Math.floor(todayCompMins + pastSchedMins + activeElapsedMins);

                  // ── Is NOW inside a yesterday-window erasure period? ───────────
                  // Erasing = the windowStartMs is currently sweeping through yesterday flights
                  // i.e. any yesterday flight's startTaxi+24h is within the next ~30 min or past
                  // isErasing = windowStart is currently sweeping through a yesterday block
                  const isErasing = windowInsideYestBlock;

                  // ── ERASES IN countdown ────────────────────────────────────────
                  let msLeft=null,hLeft=0,mLeft=0,sLeft=0,eraseLabel="ERASES IN",eraseAtTime=null,eraseFlightRoute=null;
                  if(yesterdayFlightsAll.length){
                    const sortedYest=[...yesterdayFlightsAll].sort((a,b)=>
                      new Date(a.date+'T'+a.startTaxi+':00').getTime()-new Date(b.date+'T'+b.startTaxi+':00').getTime()
                    );
                    const anyAgedOut = sortedYest.some(f=>(new Date(f.date+'T'+f.startTaxi+':00').getTime()+24*3600000)<=now);
                    const nextToAge  = sortedYest.find(f=>(new Date(f.date+'T'+f.startTaxi+':00').getTime()+24*3600000)>now);
                    if(nextToAge){
                      const agesOutMs = new Date(nextToAge.date+'T'+nextToAge.startTaxi+':00').getTime()+24*3600000;
                      msLeft = agesOutMs - now;
                      const ts = Math.floor(msLeft/1000);
                      hLeft=Math.floor(ts/3600); mLeft=Math.floor((ts%3600)/60); sLeft=(60-wallSec)%60;
                      eraseLabel = anyAgedOut ? "NEXT CLEARS" : "ERASES IN";
                      // Clock time when this flight ages out (= block start + 24h)
                      const agesOutDate = new Date(agesOutMs);
                      eraseAtTime = String(agesOutDate.getHours()).padStart(2,'0')+':'+String(agesOutDate.getMinutes()).padStart(2,'0');
                      eraseFlightRoute = `${nextToAge.origin||'?'}→${nextToAge.destination||'?'}`;
                    }
                  }

                  // ── Totals and display ─────────────────────────────────────────
                  const totalLive  = todayFlyingMins + yesterdayMins;
                  const barCol     = totalLive>=480?SC.red:totalLive>=390?SC.orange:totalLive>=300?"#ffd740":SC.green;

                  // Remaining scheduled legs not yet started (pure future)
                  const schedRemaining = (c.todayFlights||[])
                    .filter(f=>f._status==='scheduled'&&f.schedOff&&f.schedOff>nowHHMM&&(f._schedDurMins||f.totalMinutes)>0)
                    .reduce((s,f)=>s+(f._schedDurMins||f.totalMinutes||0),0);

                  const liveProjected = totalLive + schedRemaining;
                  const liveCol   = totalLive>=480?SC.red:totalLive>=390?SC.orange:totalLive>=300?"#ffd740":SC.green;
                  const projCol   = liveProjected>=480?SC.red:liveProjected>=390?SC.orange:SC.green;

                  // STATUS
                  const isAccruing = nowInsideTodayBlock;
                  let statusVal, statusCol;
                  if(isAccruing&&isErasing){statusVal="≈ STEADY";statusCol="#ffd740";}
                  else if(isAccruing)      {statusVal="↑ ACCRUING";statusCol="#4a9eff";}
                  else if(isErasing)       {statusVal="↓ ERASING";statusCol="#ff9944";}
                  else                     {statusVal="NEUTRAL";statusCol="#3a5a6a";}

                  // TODAY display — tick seconds only while inside a block
                  const showSecs  = isAccruing && activeElapsedMins>0;
                  const liveH=Math.floor(todayFlyingMins/60), liveM=Math.floor(todayFlyingMins%60);
                  const todayDisplay = showSecs
                    ? `${liveH}:${String(liveM).padStart(2,'0')}:${String(wallSec).padStart(2,'0')}`
                    : (fmtMin(todayFlyingMins)||"—");

                  const erasesDisplay = msLeft
                    ? `${hLeft>0?hLeft+'h ':''}${String(mLeft).padStart(2,'0')}:${String(sLeft).padStart(2,'0')}`
                    : "—";

                  return <div style={{background:"rgba(8,14,22,0.9)",border:`1px solid ${barCol}33`,borderRadius:6,padding:"8px 10px",marginBottom:6}}>
                    <div style={{fontSize:12,color:"#5a7a8a",fontWeight:700,letterSpacing:"0.08em",marginBottom:5}}>ROLLING 8-IN-24</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr auto 1fr auto 1fr auto 1fr auto 1fr auto 1fr",gap:0,alignItems:"center",marginBottom:5}}>

                      {/* TODAY */}
                      <Tip text={"Today's block time — completed flights plus live elapsed on any active flight.\nOnly counts while NOW is inside a scheduled or actual flight block.\nFreezes between blocks."} width={220}>
                      <div style={{textAlign:"center",cursor:"help"}}>
                        <div style={{fontSize:12,color:"#7a9ab8",marginBottom:1}}>TODAY</div>
                        <div style={{fontSize:20,fontWeight:700,color:"#4a9eff",fontFamily:"monospace"}}>
                          {todayDisplay}{isAccruing&&<span style={{fontSize:12,color:"#ffd740"}}>▶</span>}
                        </div>
                      </div></Tip>
                      <div style={{color:"#2a3a4a",fontSize:24,fontWeight:300,textAlign:"center",padding:"0 3px"}}>+</div>

                      {/* YEST LEFT */}
                      <Tip text={"Yesterday's block time still inside the rolling 24-hour window.\nCounts down in real time as the window sweeps through yesterday's flights.\nOnly ticks while the 24h boundary is inside a confirmed flight block — flat between blocks."} width={240}>
                      <div style={{textAlign:"center",cursor:"help"}}>
                        <div style={{fontSize:12,color:"#7a9ab8",marginBottom:1}}>YEST LEFT</div>
                        <div style={{fontSize:20,fontWeight:700,color:yesterdayMins>0?"#ff9944":"#2a3a4a",fontFamily:"monospace"}}>
                          {yesterdayMins>0?yesterdayDisplay:"—"}
                          {windowInsideYestBlock&&yesterdayMins>0&&<span style={{fontSize:12,color:"#ff9944"}}>▼</span>}
                        </div>
                      </div></Tip>
                      <div style={{color:"#2a3a4a",fontSize:24,fontWeight:300,textAlign:"center",padding:"0 3px"}}>=</div>

                      {/* 8-IN-24 */}
                      <Tip text={"FAR 135.265 rolling limit: no more than 8 hours of block time in any 24-hour period.\nThis number = TODAY + YEST LEFT — your live total right now.\nHits 8:00 = no-fly until the oldest flight rolls off the window."} width={260}>
                      <div style={{textAlign:"center",cursor:"help"}}>
                        <div style={{fontSize:12,color:"#7a9ab8",marginBottom:1}}>8-IN-24</div>
                        <div style={{fontSize:20,fontWeight:700,color:liveCol,fontFamily:"monospace"}}>
                          {(()=>{
                              const totalMins = todayFlyingMins + yesterdayMins;
                              const tH=Math.floor(totalMins/60),tM=totalMins%60;
                              const netSec = isAccruing&&!windowInsideYestBlock ? wallSec  // net up
                                           : !isAccruing&&windowInsideYestBlock ? downSec // net down
                                           : null; // steady — suppress seconds (near-zero net)
                              return (showSecs||windowInsideYestBlock)&&netSec!==null
                                ? `${tH>0?tH+':':''}${String(tM).padStart(tH>0?2:1,'0')}:${String(netSec).padStart(2,'0')}`
                                : fmtMin(totalLive)||"—";
                            })()}
                          {(isAccruing||windowInsideYestBlock)&&<span style={{fontSize:12,color:isAccruing?"#ffd740":"#ff9944"}}>{isAccruing?"▶":"▼"}</span>}
                        </div>
                      </div></Tip>
                      <div style={{color:"#2a3a4a",fontSize:24,fontWeight:300,textAlign:"center",padding:"0 3px"}}>+</div>

                      {/* SCHED LEFT — remaining future legs */}
                      <Tip text={"Scheduled block time for flights that haven't departed yet today.\nAdded to 8-IN-24 to show where you'll land if the rest of the day goes as planned."} width={230}>
                      <div style={{textAlign:"center",cursor:"help"}}>
                        <div style={{fontSize:12,color:"#7a9ab8",marginBottom:1}}>SCHED LEFT</div>
                        <div style={{fontSize:20,fontWeight:700,color:projCol,fontFamily:"monospace"}}>{schedRemaining>0?fmtMin(schedRemaining):"—"}</div>
                      </div></Tip>
                      <div style={{color:"#2a3a4a",fontSize:21,fontWeight:300,textAlign:"center",padding:"0 3px"}}>→</div>

                      {/* REMAINING */}
                      <Tip text={"How much block time is left before hitting the 8-hour FAR 135.265 limit.\n8:00 minus (8-IN-24 + SCHED LEFT).\nThis is your worst-case remaining capacity if all scheduled legs fly as planned."} width={250}>
                      <div style={{textAlign:"center",cursor:"help"}}>
                        <div style={{fontSize:12,color:"#7a9ab8",marginBottom:1}}>REMAINING</div>
                        <div style={{fontSize:20,fontWeight:700,color:projCol,fontFamily:"monospace"}}>{fmtMin(Math.max(0,480-liveProjected))}</div>
                      </div></Tip>
                      <div style={{color:"#2a3a4a",fontSize:18,fontWeight:300,textAlign:"center",padding:"0 3px"}}>⏳</div>

                      {/* STATUS */}
                      <Tip text={"↑ ACCRUING — NOW is inside an active flight block. TODAY is counting up.\n↓ ERASING — The 24h window is sweeping through a yesterday block. YEST LEFT counting down.\n≈ STEADY — Both happening simultaneously. Net change near zero.\nNEUTRAL — Between all blocks. No change to 8-IN-24."} width={270}>
                      <div style={{textAlign:"center",cursor:"help"}}>
                        <div style={{fontSize:12,color:"#7a9ab8",marginBottom:1}}>STATUS</div>
                        <div style={{fontSize:14,fontWeight:700,color:statusCol,fontFamily:"monospace",letterSpacing:"0.04em"}}>{statusVal}</div>
                      </div></Tip>
                      <div style={{color:"#2a3a4a",fontSize:14,fontWeight:300,textAlign:"center",padding:"0 3px"}}></div>

                      {/* ERASES IN / NEXT CLEARS */}
                      <div style={{textAlign:"center"}}>
                        <div style={{fontSize:12,color:msLeft&&eraseLabel==="NEXT CLEARS"?"#ff9944":"#7a9ab8",marginBottom:1}}>{eraseLabel}</div>
                        <div style={{fontSize:msLeft&&hLeft===0?20:17,fontWeight:700,color:eraseLabel==="NEXT CLEARS"?"#ff9944":"#ffd740",fontFamily:"monospace"}}>{erasesDisplay}</div>
                        {eraseAtTime&&<div style={{fontSize:11,color:"#5a7a8a",fontFamily:"monospace",marginTop:1}}>@ {eraseAtTime}{eraseFlightRoute?` · ${eraseFlightRoute}`:""}</div>}
                      </div>

                    </div>
                    {/* Combined bar: today blue, yesterday orange */}
                    <div style={{height:3,background:"#1e2730",borderRadius:2,overflow:"hidden"}}>
                      <div style={{height:"100%",display:"flex"}}>
                        <div style={{width:`${Math.min(todayFlyingMins/480*100,100)}%`,background:"#4a9eff"}}/>
                        <div style={{width:`${Math.min(yesterdayMins/480*100,100)}%`,background:"#ff9944"}}/>
                      </div>
                    </div>
                  </div>;
                })()}

                {/* ── 3-DAY STACKED TIMELINE ── */}
                {(()=>{
                  // Zoom-aware timeline bounds — always centered on Alaska NOW
                  const ZOOM_SPANS = [20*60, 12*60, 6*60, 3*60, 90];
                  const ZOOM_TICKS  = [60, 30, 15, 5, 1];
                  const ZOOM_MAJORS = [60, 60, 30, 15, 5];
                  const ZOOM_LABELS = ['20h','12h','6h','3h','90m'];
                  const tlSpan = ZOOM_SPANS[tlZoom];
                  const tlTickMin  = ZOOM_TICKS[tlZoom];
                  const tlMajorMin = ZOOM_MAJORS[tlZoom];
                  const _akOffTL = (new Date(clockMs).getUTCMonth()>=2&&new Date(clockMs).getUTCMonth()<=10)?-8:-9;
                  const _akNowMs = clockMs + _akOffTL*3600000;
                  const _akNowD  = new Date(_akNowMs);
                  const _akNowMins = _akNowD.getUTCHours()*60 + _akNowD.getUTCMinutes();
                  const tlStart = tlZoom===0 ? 4*60 : Math.max(0, Math.round(_akNowMins - tlSpan/2));
                  const tlEnd   = tlZoom===0 ? 24*60 : tlStart + tlSpan;
                  const tlSpanW  = tlEnd - tlStart;
                  const toPct=t=>{if(!t)return null;const[h,m]=t.split(':').map(Number);return Math.max(0,Math.min(100,((h*60+m)-tlStart)/tlSpanW*100));};
                  const toTime=pct=>{const m=Math.round(pct/100*tlSpanW+tlStart);return `${String(Math.floor(m/60)%24).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;};
                  const utcToLocalPct=utcH=>{
                    const mo=new Date(todayStr+'T12:00:00Z').getUTCMonth();
                    const ak=utcH+((mo>=2&&mo<=10)?-8:-9);
                    return toPct(`${String(Math.floor(ak)%24).padStart(2,'0')}:${String(Math.round((ak%1)*60)).padStart(2,'0')}`);
                  };

                  // Sun times for each day (Juneau coords)
                  const JNU={lat:58.355,lon:-134.576};
                  const sunTimes={};
                  [yesterdayStr,todayStr,tomorrowStr].forEach(ds=>{
                    const st=calcSunTimes(JNU.lat,JNU.lon,ds);
                    const mo=new Date(ds+'T12:00:00Z').getUTCMonth();
                    const off=(mo>=2&&mo<=10)?-8:-9;
                    const toLocal=h=>{
                      if(h==null) return null;
                      const local=h+off;
                      const hh=Math.floor(((local%24)+24)%24);
                      const mm=Math.round((local-Math.floor(local))*60);
                      return `${String(hh).padStart(2,'0')}:${String(mm<60?mm:59).padStart(2,'0')}`;
                    };
                    sunTimes[ds]={
                      civilDawn:toLocal(st.civilDawn), sunrise:toLocal(st.sunrise),
                      sunset:toLocal(st.sunset), civilDusk:toLocal(st.civilDusk),
                    };
                  });

                  // NOW line
                  const nowPct=(()=>{
                    const now=new Date(clockMs); // use clockMs so NOW line ticks with clock
                    const ak=new Date(now.getTime()+((now.getUTCMonth()>=2&&now.getUTCMonth()<=10)?-8:-9)*3600000);
                    const p=((ak.getUTCHours()*60+ak.getUTCMinutes())-tlStart)/tlSpanW*100;
                    return p>=0&&p<=100?p:null;
                  })();

                  const allYestFlights=(c.yesterdayFlights||[]).sort((a,b)=>(a.startTaxi||'').localeCompare(b.startTaxi||''));
                  const todayAll=[...c.todayFlights].sort((a,b)=>(a.startTaxi||a.schedOff||'').localeCompare(b.startTaxi||b.schedOff||''));
                  const tmrwAll=[...c.tomorrowFlights].sort((a,b)=>(a.schedOff||a.startTaxi||'').localeCompare(b.schedOff||b.startTaxi||''));

                  // For timeline: use actual duty if available, else projected
                  // For past days without duty data, compute from flight times (first -1hr, last +30min)
                  const todayBlanket = c.projectedDutyDays[todayStr]?.blanket;
                  const yestBlanket  = c.projectedDutyDays[yesterdayStr]?.blanket;
                  const todayDutyForTL = todayBlanket ? c.projectedDutyDays[todayStr] : (todayActDuty||todayProjDuty);
                  const yestDutyFromFlights = allYestFlights.length ? (()=>{
                    const starts = allYestFlights.map(f=>f.startTaxi).filter(Boolean).sort();
                    const ends   = allYestFlights.map(f=>f.stopTaxi).filter(Boolean).sort();
                    if(!starts.length) return null;
                    const ds = addMinToTime(starts[0], -60);
                    const lastEnd = ends[ends.length-1];
                    const de = lastEnd ? addMinToTime(lastEnd, 30) : addMinToTime(ds, 14*60);
                    return {dutyStart:ds, dutyEnd:de, dutyMins:calcMin(ds,de)};
                  })() : null;
                  const yestDutyForTL = yestBlanket ? c.projectedDutyDays[yesterdayStr] : (yestActDuty||yestDutyFromFlights);
                  // Get wx for each flight's destination in this pilot's schedule
                  const flightWx = (f) => {
                    if(!wx) return null;
                    const dest = f.destination||f.dest||'';
                    // Match by short code (JNU, SIT etc) or ICAO
                    return Object.values(wx).find(s=>s.name===dest||s.icao===dest)||null;
                  };

                  // Compute duty start reasons for tooltip
                  const dutyReason = (duty, date, flights) => {
                    if(!duty) return null;
                    if(duty.blanket) return "Blanket duty · 06:00–20:00";
                    if(duty.assigned) return "Manually assigned";
                    // Auto mode — figure out why
                    const isPast = date < todayStr;
                    const starts = flights.map(f=>f.startTaxi).filter(Boolean).sort();
                    const ends   = flights.map(f=>f.stopTaxi).filter(Boolean).sort();
                    const startReason = starts.length ? `1hr before first flight (${starts[0]})` : "No flights";
                    const endReason   = isPast && ends.length
                      ? `+30m after last landing (${ends[ends.length-1]})`
                      : "Start + 14hrs (max duty)";
                    return `Start: ${startReason}
End: ${endReason}`;
                  };
                  const DAYS=[
                    {label:"YESTERDAY", date:yesterdayStr, flights:allYestFlights, duty:yestDutyForTL,  color:"#5aaa8a",
                      dutyReason:dutyReason(yestDutyForTL, yesterdayStr, allYestFlights)},
                    {label:"TODAY",     date:todayStr,     flights:todayAll,       duty:todayDutyForTL, color:"#4a9eff",
                      dutyReason:dutyReason(todayDutyForTL, todayStr, todayAll)},
                    {label:"TOMORROW",  date:tomorrowStr,  flights:tmrwAll,        duty:tmrwProjDuty,   color:"#aa7adf", isTmrw:true,
                      dutyReason:dutyReason(tmrwProjDuty, tomorrowStr, tmrwAll)},
                  ];

                  const ROW_H=32; // taller rows so duty band is clearly visible below flights
                  const DUTY_H=8;  // duty band height at bottom of each row
                  const FLIGHT_H=20; // flight block height at top of each row
                  // Dynamic ticks based on zoom level
                  const allTicks=[];
                  for(let m=0;m<=24*60;m+=tlTickMin){
                    const h=Math.floor(m/60), mm=m%60;
                    allTicks.push(`${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`);
                  }
                  const isMajorTick = (hhmm) => {
                    const [h,m]=hhmm.split(':').map(Number);
                    return (h*60+m) % tlMajorMin === 0;
                  };
                  // Keep old names for compatibility
                  const allHourTicks = allTicks;
                  const majorTicks = allTicks.filter(isMajorTick);

                  const LABEL_W=64;

                  return <div style={{background:"#080c12",borderRadius:6,padding:"10px 10px 8px",
                    marginBottom:10,border:"1px solid #1e2a38"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{fontSize:15,color:"#8aaabb",fontWeight:700,letterSpacing:"0.1em"}}>
                          3-DAY DUTY OVERVIEW
                        </div>
                        {tlZoom>0&&<div style={{fontSize:14,color:"#4aff8a",fontWeight:700,
                          background:"rgba(74,255,138,0.1)",border:"1px solid rgba(74,255,138,0.3)",
                          padding:"1px 6px",borderRadius:3,letterSpacing:"0.05em"}}>
                          {ZOOM_LABELS[tlZoom]} · scroll ← →
                        </div>}
                      </div>
                      {/* Zoom controls */}
                      <div style={{display:"flex",alignItems:"center",gap:4}}>
                        <span style={{fontSize:12,color:"#3a5a6a",marginRight:2}}>{ZOOM_LABELS[tlZoom]}</span>
                        <button onClick={()=>setTlZoom(z=>Math.min(4,z+1))}
                          style={{background:"rgba(74,158,255,0.1)",border:"1px solid rgba(74,158,255,0.3)",
                            borderRadius:4,color:"#4a9eff",fontSize:21,fontWeight:700,
                            width:22,height:22,cursor:"pointer",lineHeight:1,
                            display:"flex",alignItems:"center",justifyContent:"center",
                            fontFamily:"monospace"}}>+</button>
                        <button onClick={()=>setTlZoom(z=>Math.max(0,z-1))}
                          style={{background:"rgba(74,158,255,0.1)",border:"1px solid rgba(74,158,255,0.3)",
                            borderRadius:4,color:"#4a9eff",fontSize:21,fontWeight:700,
                            width:22,height:22,cursor:"pointer",lineHeight:1,
                            display:"flex",alignItems:"center",justifyContent:"center",
                            fontFamily:"monospace"}}>−</button>
                      </div>
                    </div>

                    {/* AXIS — scrollable when zoomed */}
                    <div style={{overflowX:tlZoom>0?"auto":"visible",overflowY:"visible"}}
                      ref={tlScrollRef}>
                    <div style={{width:tlZoom>0?`${100*Math.pow(2,tlZoom)}%`:"100%",minWidth:"100%"}}>
                    <div style={{display:"flex",gap:6,marginBottom:2}}>
                      <div style={{width:LABEL_W,flexShrink:0}}/>
                      <div style={{flex:1,position:"relative",height:18}}>
                        {allHourTicks.map((hhmm,i)=>{
                          const [hh,mm]=hhmm.split(':').map(Number);
                          const pct=((hh*60+mm)-tlStart)/tlSpanW*100;
                          if(pct<0||pct>100) return null;
                          const isMaj=isMajorTick(hhmm);
                          if(!isMaj && tlZoom<=1) return null; // show sub-ticks only when zoomed
                          const dispH = String(hh%24).padStart(2,'0');
                          const dispM = String(mm).padStart(2,'0');
                          // Always show full HH:MM so it's clear where you are
                          const label = mm===0 ? dispH+':00' : dispH+':'+dispM;
                          return <div key={i} style={{position:"absolute",left:`${pct}%`,
                            transform:"translateX(-50%)",
                            fontSize:isMaj?10:8,
                            color:isMaj?"#2aaa5a":"#1a7040",
                            fontWeight:isMaj?700:500,
                            userSelect:"none",
                            textShadow:isMaj?"0 0 8px rgba(74,255,138,0.3)":null}}>
                            {label}
                          </div>;
                        })}
                      </div>
                    </div>

                    {/* ROWS — wrapped in a container for unified hover crosshair */}
                    <div style={{position:"relative",touchAction:"none"}}
                      onMouseMove={e=>{
                        const r=e.currentTarget.getBoundingClientRect();
                        const scrollEl=tlScrollRef.current;
                        const scrollLeft=scrollEl?scrollEl.scrollLeft:0;
                        const innerW=scrollEl?scrollEl.scrollWidth:r.width;
                        const trackLeft=LABEL_W+6;
                        // rawX in inner (scrolled) coordinates
                        const rawX=(e.clientX-r.left-trackLeft) + scrollLeft * (r.width-trackLeft)/innerW * (tlZoom>0?(100*Math.pow(2,tlZoom)/100):1);
                        const trackWidthInner=innerW-trackLeft;
                        // Simpler: compute pct from visible position + scroll offset
                        const visibleTrackW=r.width-trackLeft;
                        const visRawX=e.clientX-r.left-trackLeft;
                        if(visRawX<0||visRawX>visibleTrackW){setHoverInfo(null);return;}
                        // scrollLeft as fraction of total inner width
                        const scrollFrac=scrollEl?(scrollEl.scrollLeft/Math.max(1,scrollEl.scrollWidth-scrollEl.clientWidth)):0;
                        const visiblePct=visRawX/visibleTrackW*100;
                        // map visible pct to actual timeline pct accounting for zoom
                        const zoomScale=tlZoom>0?Math.pow(2,tlZoom):1;
                        const pct=scrollFrac*100*(1-1/zoomScale)+visiblePct/zoomScale;
                        setHoverInfo({pct,timeStr:toTime(pct),global:true});
                      }}
                      onMouseLeave={()=>setHoverInfo(null)}
                      onTouchStart={e=>{
                        e.preventDefault();
                        const t=e.touches[0];
                        const r=e.currentTarget.getBoundingClientRect();
                        const scrollEl=tlScrollRef.current;
                        const visibleTrackW=r.width-LABEL_W-6;
                        const visRawX=t.clientX-r.left-LABEL_W-6;
                        if(visRawX<0||visRawX>visibleTrackW) return;
                        const scrollFrac=scrollEl?(scrollEl.scrollLeft/Math.max(1,scrollEl.scrollWidth-scrollEl.clientWidth)):0;
                        const zoomScale=tlZoom>0?Math.pow(2,tlZoom):1;
                        const pct=scrollFrac*100*(1-1/zoomScale)+visRawX/visibleTrackW*100/zoomScale;
                        setHoverInfo({pct,timeStr:toTime(pct),global:true});
                      }}
                      onTouchMove={e=>{
                        e.preventDefault();
                        const t=e.touches[0];
                        const r=e.currentTarget.getBoundingClientRect();
                        const scrollEl=tlScrollRef.current;
                        const visibleTrackW=r.width-LABEL_W-6;
                        const visRawX=t.clientX-r.left-LABEL_W-6;
                        if(visRawX<0||visRawX>visibleTrackW){setHoverInfo(null);return;}
                        const scrollFrac=scrollEl?(scrollEl.scrollLeft/Math.max(1,scrollEl.scrollWidth-scrollEl.clientWidth)):0;
                        const zoomScale=tlZoom>0?Math.pow(2,tlZoom):1;
                        const pct=scrollFrac*100*(1-1/zoomScale)+visRawX/visibleTrackW*100/zoomScale;
                        setHoverInfo({pct,timeStr:toTime(pct),global:true});
                      }}
                      onTouchEnd={()=>setTimeout(()=>setHoverInfo(null),1500)}>

                    {/* Global crosshair line — spans all rows */}
                    {hoverInfo?.global&&<div style={{
                      position:"absolute",top:0,bottom:0,
                      left:`calc(${LABEL_W}px + 6px + (100% - ${LABEL_W}px - 6px) * ${hoverInfo.pct} / 100)`,
                      width:1,background:"rgba(255,71,87,0.6)",
                      zIndex:20,pointerEvents:"none",
                      boxShadow:"0 0 4px rgba(255,71,87,0.4)"}}>
                      {/* Time label at top */}
                      <div style={{position:"absolute",top:-18,left:"50%",transform:"translateX(-50%)",
                        fontSize:12,color:"#ff4757",fontWeight:700,background:"#0c1520",
                        padding:"2px 6px",borderRadius:3,border:"1px solid #ff475744",
                        whiteSpace:"nowrap",pointerEvents:"none"}}>
                        {hoverInfo.timeStr}
                      </div>
                    </div>}

                    {DAYS.map((day,di)=>{
                      const dsp=toPct(day.duty?.dutyStart);
                      const dep=toPct(day.duty?.dutyEnd);
                      const sun=sunTimes[day.date]||{};
                      const hasTooltip=hoveredFlight?.di===di;

                      return <div key={di} style={{display:"flex",gap:6,marginBottom:di<2?4:0}}>
                        {/* Label */}
                        <div style={{width:LABEL_W,flexShrink:0,display:"flex",flexDirection:"column",
                          justifyContent:"center",alignItems:"flex-end",paddingRight:2}}>
                          <div style={{fontSize:15,color:day.color,fontWeight:700}}>{day.label}</div>
                          <div style={{fontSize:14,color:"#7a9ab0"}}>{day.date?.slice(5)}</div>
                        </div>

                        {/* Track */}
                        <div style={{flex:1,position:"relative",height:ROW_H,borderRadius:3,
                          background:"#0a0e14",overflow:"visible",cursor:"crosshair"}}>

                          {/* Full-height grid lines — dynamic based on zoom */}
                          {allHourTicks.map((hhmm,i)=>{
                            const [hh,mm]=hhmm.split(':').map(Number);
                            const pct=((hh*60+mm)-tlStart)/tlSpanW*100;
                            if(pct<0||pct>100) return null;
                            const isMaj=isMajorTick(hhmm);
                            return <div key={i} style={{position:"absolute",top:0,left:`${pct}%`,
                              width:1,height:"100%",background:isMaj?"#1a2a3a":"#0f1820",zIndex:0}}/>;
                          })}

                          {/* TWILIGHT bands — nautical=very dark, civil=medium */}
                          {(()=>{
                            const bands=[];
                            // Civil twilight before sunrise (civil dawn → sunrise)
                            const cdP=toPct(sun.civilDawn), srP=toPct(sun.sunrise);
                            const ssP=toPct(sun.sunset), cdkP=toPct(sun.civilDusk);
                            if(cdP!=null&&srP!=null) bands.push(
                              <div key="dawn" style={{position:"absolute",top:0,height:"100%",
                                left:`${cdP}%`,width:`${srP-cdP}%`,
                                background:"rgba(255,160,50,0.06)",zIndex:1}}/>
                            );
                            // Civil dusk (sunset → civil dusk)
                            if(ssP!=null&&cdkP!=null) bands.push(
                              <div key="dusk" style={{position:"absolute",top:0,height:"100%",
                                left:`${ssP}%`,width:`${cdkP-ssP}%`,
                                background:"rgba(255,120,30,0.06)",zIndex:1}}/>
                            );
                            // Night before civil dawn (left edge → civil dawn)
                            if(cdP!=null) bands.push(
                              <div key="night-l" style={{position:"absolute",top:0,height:"100%",
                                left:0,width:`${cdP}%`,
                                background:"rgba(0,0,30,0.25)",zIndex:1}}/>
                            );
                            // Night after civil dusk (civil dusk → right edge)
                            if(cdkP!=null) bands.push(
                              <div key="night-r" style={{position:"absolute",top:0,height:"100%",
                                left:`${cdkP}%`,width:`${100-cdkP}%`,
                                background:"rgba(0,0,30,0.25)",zIndex:1}}/>
                            );
                            return bands;
                          })()}

                          {/* SUNRISE line */}
                          {toPct(sun.sunrise)!=null&&<div style={{position:"absolute",top:0,
                            left:`${toPct(sun.sunrise)}%`,width:1,height:"100%",
                            background:"rgba(255,180,50,0.5)",zIndex:3}}>
                            <div style={{position:"absolute",bottom:"100%",left:2,fontSize:15,
                              color:"#ffcc33",fontWeight:700,whiteSpace:"nowrap",
                              background:"rgba(8,12,18,0.9)",padding:"1px 4px",
                              borderRadius:2,lineHeight:"14px",marginBottom:2}}>☀ {sun.sunrise}</div>
                          </div>}

                          {/* SUNSET line */}
                          {toPct(sun.sunset)!=null&&<div style={{position:"absolute",top:0,
                            left:`${toPct(sun.sunset)}%`,width:1,height:"100%",
                            background:"rgba(255,100,30,0.5)",zIndex:3}}>
                            <div style={{position:"absolute",bottom:"100%",right:2,fontSize:15,
                              color:"#ff9944",fontWeight:700,whiteSpace:"nowrap",
                              background:"rgba(8,12,18,0.9)",padding:"1px 4px",
                              borderRadius:2,lineHeight:"14px",marginBottom:2,
                              transform:"translateX(100%)"}}>☽ {sun.sunset}</div>
                          </div>}

                          {/* Duty window — color zones: 0-8h green, 8-12h yellow, 12-14h orange */}
                          {dsp!=null&&dep!=null&&(()=>{
                            const toMin=t=>{if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;};
                            const dsMin=toMin(day.duty?.dutyStart);
                            const deMin=toMin(day.duty?.dutyEnd);
                            const total=deMin-dsMin||1;
                            // Zone boundaries as % of duty width
                            const p8h  = Math.min(100, 480/total*100);  // 8h mark
                            const p12h = Math.min(100, 720/total*100);  // 12h mark
                            const p14h = 100;
                            const grad = `linear-gradient(to right,
                              rgba(50,210,100,0.25) 0%,
                              rgba(50,210,100,0.25) ${p8h.toFixed(1)}%,
                              rgba(255,215,64,0.28) ${p8h.toFixed(1)}%,
                              rgba(255,215,64,0.28) ${p12h.toFixed(1)}%,
                              rgba(255,109,0,0.32) ${p12h.toFixed(1)}%,
                              rgba(255,109,0,0.32) 100%)`;

                            // Compute last scheduled/actual flight end to check duty end proximity
                            const lastFlight = [...day.flights].filter(f=>f.startTaxi||f.schedOff)
                              .sort((a,b)=>(b.stopTaxi||b.schedOn||b.startTaxi||'').localeCompare(a.stopTaxi||a.schedOn||a.startTaxi||''))[0];
                            const lastEndStr = lastFlight?.stopTaxi||lastFlight?.schedOn||
                              (lastFlight?.startTaxi?addMinToTime(lastFlight.startTaxi,lastFlight.totalMinutes||0):null);
                            const lastEndMin = toMin(lastEndStr);
                            // Use signed diff capped to ±720 min to avoid midnight wraparound false alarms
                            const rawDiff = lastEndMin>0 ? deMin - lastEndMin : null;
                            const minsToEnd = rawDiff===null ? null
                              : rawDiff > 720  ? rawDiff - 1440   // last flight wrapped past midnight, treat as earlier
                              : rawDiff < -720 ? rawDiff + 1440   // duty end wrapped past midnight
                              : rawDiff;
                            // Only flag if within the same operational day (diff within ±6hrs is meaningful)
                            const minsToEndSane = minsToEnd!==null && Math.abs(minsToEnd)<=360 ? minsToEnd : null;
                            // Don't warn if duty end = last_landing+30 (that's just how we compute it — not a real constraint)
                            // Only warn when duty end is a hard limit: blanket (20:00) or start+14hrs
                            const dutyIsHardLimit = day.duty?.blanket || (!day.duty?.assigned && minsToEndSane > 25);
                            const nearDutyEnd = dutyIsHardLimit && minsToEndSane!=null && minsToEndSane>=0 && minsToEndSane<=60;
                            const overDutyEnd = dutyIsHardLimit && minsToEndSane!=null && minsToEndSane<0 && minsToEndSane>=-60;

                            // Full-height zone backgrounds
                            const dutyW = dep - dsp;
                            const green8W  = dutyW * (p8h/100);
                            const yellow4W = dutyW * ((p12h-p8h)/100);
                            const orange2W = dutyW * ((100-p12h)/100);

                            return <>
                              {/* Full duty window outline — clear bright border */}
                              <div style={{position:"absolute",top:1,bottom:1,
                                left:`${dsp}%`,width:`${dep-dsp}%`,
                                border:`1.5px solid ${day.color}88`,
                                borderRadius:3,zIndex:2,pointerEvents:"none"}}/>

                              {/* ZONE 1: Green 0-8hrs */}
                              <div style={{position:"absolute",top:1,bottom:1,
                                left:`${dsp}%`,width:`${green8W}%`,
                                background:"rgba(50,210,100,0.15)",borderRadius:"3px 0 0 3px",zIndex:1}}/>
                              {/* ZONE 2: Yellow 8-12hrs */}
                              {p8h<100&&<div style={{position:"absolute",top:1,bottom:1,
                                left:`${dsp + dutyW*(p8h/100)}%`,width:`${yellow4W}%`,
                                background:"rgba(255,215,64,0.16)",zIndex:1}}/>}
                              {/* ZONE 3: Orange 12-14hrs */}
                              {p12h<100&&<div style={{position:"absolute",top:1,bottom:1,
                                left:`${dsp + dutyW*(p12h/100)}%`,width:`${orange2W}%`,
                                background:"rgba(255,109,0,0.18)",zIndex:1}}/>}

                              {/* Zone divider lines at 8hr and 12hr marks */}
                              {p8h<100&&<div style={{position:"absolute",top:1,bottom:1,
                                left:`${dsp + dutyW*(p8h/100)}%`,
                                width:1,background:"rgba(255,215,64,0.5)",zIndex:3}}/>}
                              {p12h<100&&<div style={{position:"absolute",top:1,bottom:1,
                                left:`${dsp + dutyW*(p12h/100)}%`,
                                width:1,background:"rgba(255,109,0,0.6)",zIndex:3}}/>}

                              {/* DUTY START — bright left edge */}
                              <div style={{position:"absolute",top:0,bottom:0,left:`${dsp}%`,
                                width:2,background:day.color,zIndex:6,
                                boxShadow:`0 0 6px ${day.color}99`}}/>
                              {/* Duty start label below row with reason */}
                              <div style={{position:"absolute",top:"calc(100% + 2px)",left:`${dsp}%`,
                                transform:"translateX(-2px)",zIndex:7}}>
                                <Tip text={day.dutyReason} width={220}>
                                  <div style={{fontSize:12,color:day.color,fontWeight:700,
                                    background:"#080c12",padding:"2px 5px",borderRadius:2,
                                    whiteSpace:"nowrap",border:`1px solid ${day.color}55`,
                                    cursor:"default",display:"inline-flex",alignItems:"center",gap:3}}>
                                    <span style={{fontSize:10,opacity:0.7}}>DUTY</span>
                                    <span>{day.duty?.dutyStart}</span>
                                  </div>
                                </Tip>
                              </div>

                              {/* DUTY END — right edge */}
                              <div style={{position:"absolute",top:0,bottom:0,left:`${dep}%`,
                                width:2,background:`${day.color}bb`,zIndex:6}}/>
                              {/* Duty end label below row */}
                              <div style={{position:"absolute",top:"calc(100% + 2px)",left:`${dep}%`,
                                transform:"translateX(calc(-100% + 2px))",zIndex:7,
                                display:"flex",justifyContent:"flex-end"}}>
                                <div style={{fontSize:12,color:`${day.color}cc`,fontWeight:700,
                                  background:"#080c12",padding:"2px 5px",borderRadius:2,
                                  whiteSpace:"nowrap",border:`1px solid ${day.color}33`,
                                  display:"inline-flex",alignItems:"center",gap:3}}>
                                  <span>{day.duty?.dutyEnd}</span>
                                  <span style={{fontSize:10,opacity:0.7}}>END</span>
                                </div>
                              </div>

                              {/* NEAR/OVER DUTY END warning flag */}
                              {(nearDutyEnd||overDutyEnd)&&<div style={{
                                position:"absolute",top:"calc(100% + 3px)",
                                left:`${dep}%`,transform:"translateX(-50%)",
                                fontSize:12,fontWeight:700,whiteSpace:"nowrap",zIndex:7,
                                color:overDutyEnd?"#ff4757":"#ffd740",
                                background:overDutyEnd?"rgba(255,71,87,0.15)":"rgba(255,215,64,0.12)",
                                padding:"2px 6px",borderRadius:3,
                                border:`1px solid ${overDutyEnd?"#ff475766":"#ffd74066"}`}}>
                                {overDutyEnd?`⚠ OVER DUTY by ${Math.abs(minsToEndSane)}m`:`⚠ ${minsToEndSane}m to duty end`}
                              </div>}
                            </>;
                          })()}

                          {/* Flight blocks */}
                          {day.flights.map((f,fi)=>{
                            const off=f.startTaxi||f.schedOff||'';
                            const on=f.stopTaxi||f.schedOn||addMinToTime(off,f.totalMinutes||20);
                            const op=toPct(off),onp=toPct(on);
                            if(op==null||onp==null) return null;
                            const w=Math.max(onp-op,0.8);
                            const isComp=f._status==="completed";
                            const isEnR=f._status==="enroute";
                            const isSch=!isComp&&!isEnR;
                            const fc=isEnR?"#ffd740":isComp?day.color:day.isTmrw?"#8a5abf":"#3a6a9a";
                            const fHov=hoveredFlight?.di===di&&hoveredFlight?.fi===fi;
                            return <div key={fi}
                              onMouseEnter={e=>setHoveredFlight({di,fi,f,fc,off,on,sun,mx:e.clientX,my:e.clientY})}
                              onMouseLeave={()=>setHoveredFlight(null)}
                              style={{position:"absolute",
                                top:isSch?6:3,height:isSch?ROW_H-12:ROW_H-6,
                                left:`${op}%`,width:`${w}%`,
                                background:fc,borderRadius:2,
                                opacity:fHov?1:isSch?0.5:0.88,zIndex:fHov?8:4,
                                cursor:"pointer",
                                boxShadow:fHov?`0 0 6px ${fc}88`:
                                  (flightWx(f)?.cat==='IFR'||flightWx(f)?.cat==='LIFR')?`inset 0 0 0 1px #ff475799`:"none",
                                outline:(flightWx(f)?.cat==='MVFR')?"1px solid #4a9eff66":"none",
                                transition:"all 0.1s"}}/>;
                          })}

                          {/* Flight tooltip */}
                          {hasTooltip&&(()=>{
                            const {f,fc,off,on,sun:fs}=hoveredFlight;
                            const isComp=f._status==="completed",isEnR=f._status==="enroute";
                            const diff=f.schedOff&&f.startTaxi?signedDiff(f.schedOff,f.startTaxi):null;
                            const offPct=toPct(off)||50;
                            // Check if landing is after sunset
                            const landSunInfo=fs?.sunset&&on?signedDiff(fs.sunset,on):null;
                            // Clamp tooltip to visible scroll area
                            const scrollEl2=tlScrollRef.current;
                            const scrollPct=scrollEl2?(scrollEl2.scrollLeft/(scrollEl2.scrollWidth||1)*100):0;
                            const visWidthPct=scrollEl2?(scrollEl2.clientWidth/(scrollEl2.scrollWidth||1)*100):100;
                            const visMin=scrollPct, visMax=scrollPct+visWidthPct;
                            const clampedPct=Math.min(Math.max(offPct, visMin+2), visMax-2);
                            const tx = hoveredFlight.mx||0;
                            const ty = (hoveredFlight.my||0) - 12; // 12px above cursor
                            // Clamp horizontally so it doesn't bleed off screen
                            const tipW = 220;
                            const fixedLeft = Math.min(Math.max(tx - tipW/2, 8), window.innerWidth - tipW - 8);
                            return <div style={{position:"fixed",
                              top:"auto",bottom:`${window.innerHeight - ty}px`,
                              left:`${fixedLeft}px`,
                              background:"#0c1520",border:`1px solid ${fc}55`,
                              borderRadius:6,padding:"8px 11px",fontSize:14,
                              color:"#c0d4e8",whiteSpace:"nowrap",zIndex:9999,
                              boxShadow:"0 4px 20px rgba(0,0,0,0.95)",
                              pointerEvents:"none",minWidth:160}}>
                              <div style={{fontWeight:700,color:fc,fontSize:16,marginBottom:3}}>
                                {f.origin}→{f.destination}
                                <span style={{fontSize:12,color:"#6a8aaa",fontWeight:400,marginLeft:6}}>
                                  {isEnR?"✈":isComp?"✓":"sched"}
                                </span>
                              </div>
                              <div style={{color:"#9abacb",marginBottom:2}}>
                                {off||"—"} → {on||"—"}
                                <span style={{color:"#7a9ab0",marginLeft:6}}>{fmtMin(f.totalMinutes)}</span>
                              </div>
                              {f.tailNumber&&<div style={{color:"#7a9ab0"}}>
                                {f.tailNumber}{f.pax&&parseInt(f.pax)>0?` · ${f.pax} pax`:""}{f.fuelUplift>0?(f.fuelUplift<4?` · ${f.fuelUplift}h fuel (avgas)`:` · ${f.fuelUplift} lbs`):""}{f._isCoPilot&&<span style={{marginLeft:4,fontSize:11,color:"#a29bfe",fontWeight:700}}>CP</span>}
                              </div>}
                              {f.delayCode&&<div style={{marginTop:2,color:SC.orange,fontSize:12,fontWeight:700}}>
                                ⚠ Delay: {f.delayCode}
                              </div>}
                              {(()=>{
                                const depDiff2 = f.schedOff&&f.startTaxi?calcMin(f.schedOff,f.startTaxi):null;
                                const arrDiff2 = f.schedOn&&f.stopTaxi&&f._status==="completed"?calcMin(f.schedOn,f.stopTaxi):null;
                                if((depDiff2===null||Math.abs(depDiff2)<=1)&&(arrDiff2===null||Math.abs(arrDiff2)<=1)) return null;
                                return <div style={{fontSize:12,marginTop:1,display:"flex",flexDirection:"column",gap:1}}>
                                  {depDiff2!==null&&Math.abs(depDiff2)>1&&<span style={{color:depDiff2>0?SC.orange:"#6aaa8a"}}>
                                    dep {depDiff2>0?`+${depDiff2}m late`:`${Math.abs(depDiff2)}m early`} vs sched {f.schedOff}
                                  </span>}
                                  {arrDiff2!==null&&Math.abs(arrDiff2)>1&&<span style={{color:arrDiff2>0?SC.orange:"#6aaa8a"}}>
                                    arr {arrDiff2>0?`+${arrDiff2}m late`:`${Math.abs(arrDiff2)}m early`} vs sched {f.schedOn}
                                  </span>}
                                </div>;
                              })()}
                              {(()=>{const w=flightWx(f);return w?<div style={{marginTop:2,display:"flex",gap:4,alignItems:"center"}}>
                                <WxBadge cat={w.cat} size={8}/>
                                {w.ceiling&&<span style={{fontSize:12,color:"#7a9ab0"}}>{w.ceiling}ft</span>}
                                {w.vis!=null&&w.vis<=5&&<span style={{fontSize:12,color:SC.orange}}>{w.vis}sm vis</span>}
                              </div>:null;})()}
                              {isComp&&diff!=null&&Math.abs(diff)>1&&<div style={{
                                color:diff>0?SC.orange:SC.green,fontWeight:700,marginTop:2}}>
                                dep {diff>0?`+${diff}m`:`${diff}m`} vs sched
                              </div>}
                              {landSunInfo!=null&&landSunInfo>0&&<div style={{
                                color:"#ff8844",fontWeight:700,marginTop:2}}>
                                ☽ lands {landSunInfo}m after sunset
                              </div>}
                            </div>;
                          })()}

                          {/* Per-row red tint on hover */}
                          {hoverInfo?.global&&<div style={{
                            position:"absolute",top:0,
                            left:`${hoverInfo.pct}%`,
                            height:"100%",width:1,
                            background:"rgba(255,71,87,0.25)",
                            zIndex:9,pointerEvents:"none"}}/>}

                          {/* NOW line per row — no labels, just the line */}
                          {nowPct!=null&&<div style={{position:"absolute",top:0,left:`${nowPct}%`,
                            width:2,height:"100%",background:"#ff4757cc",zIndex:7,
                            pointerEvents:"none",borderRadius:1,
                            boxShadow:"0 0 4px #ff475788"}}/>}
                        </div>
                      </div>;
                    })}

                    {/* NOW label overlay — spans entire rows area, top and bottom only */}
                    {nowPct!=null&&<div style={{
                      position:"absolute",top:0,bottom:0,
                      left:`calc(${LABEL_W}px + 6px + (100% - ${LABEL_W}px - 6px) * ${nowPct} / 100)`,
                      width:0,zIndex:20,pointerEvents:"none"}}>
                      {/* Top NOW label */}
                      <div style={{position:"absolute",top:-16,left:"50%",transform:"translateX(-50%)",
                        fontSize:12,color:"#ff4757",fontWeight:700,background:"#080c12",
                        padding:"1px 5px",borderRadius:3,border:"1px solid #ff475744",
                        whiteSpace:"nowrap"}}>NOW</div>
                      {/* Bottom NOW label */}
                      <div style={{position:"absolute",bottom:-16,left:"50%",transform:"translateX(-50%)",
                        fontSize:12,color:"#ff4757",fontWeight:700,background:"#080c12",
                        padding:"1px 5px",borderRadius:3,border:"1px solid #ff475744",
                        whiteSpace:"nowrap"}}>NOW</div>
                    </div>}
                    </div>{/* end rows wrapper */}



                    </div>{/* end scrollable inner */}
                    </div>{/* end scroll container */}
                    {/* Legend */}
                    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:4,fontSize:12}}>
                      <span style={{color:"#5aaa8a"}}>■ yesterday</span>
                      <span style={{color:"#4a9eff"}}>■ today</span>
                      <span style={{color:"#ffd740"}}>■ en-route</span>
                      <span style={{color:"#8a5abf"}}>■ tomorrow</span>
                      <span style={{color:"rgba(255,180,50,0.7)"}}>│ sunrise</span>
                      <span style={{color:"rgba(255,100,30,0.7)"}}>│ sunset</span>
                      <span style={{marginLeft:"auto",color:"#3a5060"}}>hover for details · │ = duty start/end</span>
                    </div>
                  </div>;

                {/* Collapsible leg details */}
                {[
                  { key:'yesterday', label:'YESTERDAY', date:yesterdayStr, flights:yf, dim:true,
                    compFlights:yf, activeFlights:[], isTmrw:false, defaultOpen:false,
                    dutyBar:yestActDuty?{...yestActDuty,label:"ACTUAL"}:null },
                  { key:'today', label:'TODAY', date:todayStr, defaultOpen:false, isTmrw:false, dim:false,
                    compFlights:todayComp, activeFlights:todayActive,
                    dutyBar:todayActDuty?{...todayActDuty,label:"ACTUAL"}:null,
                    projBar:todayProjDuty?{...todayProjDuty,label:"PROJECTED"}:null },
                  { key:'tomorrow', label:'TOMORROW', date:tomorrowStr, defaultOpen:false, isTmrw:true, dim:false,
                    compFlights:[], activeFlights:tmrwSorted,
                    dutyBar:null,
                    projBar:tmrwProjDuty?{...tmrwProjDuty,label:tmrwProjDuty.blanket?"BLANKET":tmrwProjDuty.assigned?"ASSIGNED":"AUTO-EST"}:null },
                ].map(day=>(
                  <div key={day.key} style={{marginBottom:6}}>
                    <div onClick={e=>{e.stopPropagation();toggleSection(pd.username,day.key);}}
                      style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                        padding:"5px 0",cursor:"pointer",

                      letterSpacing:"0.08em",marginBottom:5}}>⚠ TIGHT TURNS</div>

                })()}

                                {/* ── YESTERDAY / TODAY / TOMORROW — collapsible ── */}

{/* ── QUICK STATS GRID ── */}
            {(()=>{

Part 135 limit: 100 hours per month."/>
