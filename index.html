}


// ── STATS SCREEN ──────────────────────────────────────────────────────────────
function computeStats(fleetData, routeAvgs) {
  // Flatten all completed flights across all pilots
  const all = [];
  Object.values(fleetData||{}).forEach(pd=>{
    (pd.flights||[]).filter(f=>f._status==="completed"&&f.totalMinutes>3&&f.totalMinutes<300&&f.startTaxi&&f.stopTaxi).forEach(f=>{
      all.push({...f, pilotName:pd.fullName||pd.username});
    });
  });
  if(!all.length) return null;

  const avg = arr => arr.length ? Math.round(arr.reduce((s,n)=>s+n,0)/arr.length) : 0;
  const med = arr => { const s=[...arr].sort((a,b)=>a-b); return s[Math.floor(s.length/2)]||0; };
  const toMins = t => { if(!t) return null; const[h,m]=t.split(':').map(Number); return h*60+m; };
  const fmtMins = m => m==null?"—":`${Math.floor(m/60)?Math.floor(m/60)+'h ':''}${m%60}m`;

  // ── On-time performance ──────────────────────────────────────────────────────
  const withSched = all.filter(f=>f.startTaxi);
  // schedDepart is stored as startTaxi on scheduled flights — for completed,
  // we'd need the original sched time. Use notes or compare to route avg.
  // We can compute delay as actual start vs median start for that route
  const routeStartTimes = {};
  all.forEach(f=>{
    const k=`${f.origin}→${f.destination}`;
    if(!routeStartTimes[k]) routeStartTimes[k]=[];
    const m=toMins(f.startTaxi);
    if(m) routeStartTimes[k].push(m);
  });

  // ── Turn times by location ───────────────────────────────────────────────────
  // Group by tail+date, sort by start, find consecutive same-dest→orig pairs
  const byTailDate = {};
  all.forEach(f=>{
    const k=`${f.tailNumber}|${f.date}`;
    if(!byTailDate[k]) byTailDate[k]=[];
    byTailDate[k].push(f);
  });
  Object.values(byTailDate).forEach(legs=>legs.sort((a,b)=>(toMins(a.startTaxi)||0)-(toMins(b.startTaxi)||0)));

  const ISLAND_AIR_TAILS = new Set(['N1229C','N1229Z','N1245X','N754KP','N726KP','N32009']);
  const JNU_NAMES = new Set(['Juneau']);
  const KTN_KLW  = new Set(['Ketchikan','Klawock']);

  const turnByLoc = {};
  const turnByLocAKS = {}; // AKS outstation turns only
  const turnEvents = [];
  Object.entries(byTailDate).forEach(([key, legs])=>{
    for(let i=0;i<legs.length-1;i++){
      const a=legs[i], b=legs[i+1];
      if(a.destination===b.origin){
        const landMin=toMins(a.stopTaxi), depMin=toMins(b.startTaxi);
        if(landMin!=null&&depMin!=null){
          const turn=depMin-landMin;
          if(turn>=0&&turn<=180){
            const isIslandAirTail = ISLAND_AIR_TAILS.has(a.tailNumber);
            const isJNU  = JNU_NAMES.has(a.destination);
            const isHub  = KTN_KLW.has(a.destination);
            const isAKSOutstation = !isIslandAirTail && !isJNU && !isHub;

            if(!turnByLoc[a.destination]) turnByLoc[a.destination]=[];
            turnByLoc[a.destination].push(turn);

            if(isAKSOutstation) {
              if(!turnByLocAKS[a.destination]) turnByLocAKS[a.destination]=[];
              turnByLocAKS[a.destination].push(turn);
            }

            let category = isIslandAirTail ? 'island_air_hub'
              : isJNU  ? 'jnu'
              : isHub  ? 'hub_layover'
              : 'aks_outstation';

            turnEvents.push({
              date:a.date, tail:a.tailNumber, location:a.destination,
              arrivedFrom:a.origin, departedTo:b.destination,
              landTime:a.stopTaxi, deptTime:b.startTaxi,
              turnMins:turn, pilot:a.pilotName, category,
            });
          }
        }
      }
    }
  });

  // ── Aircraft type classifier ─────────────────────────────────────────────────
  const getAcType = tail => {
    if(!tail) return null;
    if(['N721KP','N722KP','N726KP'].includes(tail))             return 'PC-12';
    if(['N754KP','N753KP','N755KP'].includes(tail))             return 'Garret TT';
    if(['N450KP','N438JP','N336JP'].includes(tail))             return 'EX Caravan';
    if(['N264KP','N265KP'].includes(tail))                      return 'Amphib Caravan';
    if(['N748KP','N749KP'].includes(tail))                      return 'C206 Amphib';
    if(['N777DH','N4794C','N743KP'].includes(tail))     return 'Beaver';
    return null; // unknown/other tail - skip from type breakdown
  };

  // ── Route block time stats ────────────────────────────────────────────────────
  const byRoute = {};
  all.forEach(f=>{
    if(!f.origin||!f.destination||f.origin===f.destination) return;
    const k=`${f.origin}→${f.destination}`;
    if(!byRoute[k]) byRoute[k]={orig:f.origin,dest:f.destination,times:[],sched:[],pax:[],byType:{}};
    byRoute[k].times.push(f.totalMinutes);
    byRoute[k].pax.push(parseInt(f.pax)||0);
    // Sched: prefer direct Takeflite sched times over estimate
    const sm = (f.schedOff&&f.schedOn) ? calcMin(f.schedOff,f.schedOn) : f._schedDurMins;
    if(sm&&sm>5&&sm<300) byRoute[k].sched.push(sm);
    // Per-type breakdown (only known AKS aircraft)
    const type = getAcType(f.tailNumber);
    if(type) {
      if(!byRoute[k].byType[type]) byRoute[k].byType[type]=[];
      byRoute[k].byType[type].push(f.totalMinutes);
    }
  });

  // ── Daily utilization ─────────────────────────────────────────────────────────
  const byDate = {};
  all.forEach(f=>{
    if(!byDate[f.date]) byDate[f.date]={legs:0,mins:0,pax:0,tails:new Set(),pilots:new Set()};
    byDate[f.date].legs++;
    byDate[f.date].mins+=f.totalMinutes;
    byDate[f.date].pax+=parseInt(f.pax)||0;
    byDate[f.date].tails.add(f.tailNumber);
    byDate[f.date].pilots.add(f.pilotName);
  });
  const days = Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0]));
  const dayVals = Object.values(byDate);

  // ── Delay analysis ───────────────────────────────────────────────────────────
  const delayEvents = []; // all legs with a delay code or measurable departure delay
  const byDelayCode = {}; // code → {count, pilots:Set, routes:Set, legs:[]}
  const byPilotDelay = {}; // pilot → {onTime, late, early, totalDelayMins, codes:{}}

  all.forEach(f=>{
    const depDelay = (f.schedOff&&f.startTaxi) ? calcMin(f.schedOff,f.startTaxi) : null;
    const hasCode  = f.delayCode && f.delayCode.trim();
    if(depDelay===null&&!hasCode) return; // no delay info on this leg

    const pilot = f.pilotName||'?';
    const route = `${f.origin}→${f.destination}`;

    // Delay events table
    if(hasCode||depDelay>2) {
      delayEvents.push({
        date:f.date, pilot, route, tail:f.tailNumber,
        schedOff:f.schedOff, actualOff:f.startTaxi,
        depDelay, code:f.delayCode||'', month:f.date?.slice(0,7),
      });
    }

    // By delay code
    if(hasCode) {
      const code = f.delayCode.trim().toUpperCase();
      if(!byDelayCode[code]) byDelayCode[code]={count:0,pilots:new Set(),routes:new Set(),totalDelayMins:0,legs:[]};
      byDelayCode[code].count++;
      byDelayCode[code].pilots.add(pilot);
      byDelayCode[code].routes.add(route);
      if(depDelay>0) byDelayCode[code].totalDelayMins+=depDelay;
      byDelayCode[code].legs.push({date:f.date,pilot,route,depDelay});
    }

    // By pilot
    if(!byPilotDelay[pilot]) byPilotDelay[pilot]={legs:0,onTime:0,late:0,early:0,totalDelayMins:0,codes:{}};
    byPilotDelay[pilot].legs++;
    if(depDelay===null||Math.abs(depDelay)<=2) byPilotDelay[pilot].onTime++;
    else if(depDelay>2) { byPilotDelay[pilot].late++; byPilotDelay[pilot].totalDelayMins+=depDelay; }
    else byPilotDelay[pilot].early++;
    if(hasCode){
      const code=f.delayCode.trim().toUpperCase();
      byPilotDelay[pilot].codes[code]=(byPilotDelay[pilot].codes[code]||0)+1;
    }
  });

  // ── Pilot stats ───────────────────────────────────────────────────────────────
  const byPilot = {};
  all.forEach(f=>{
    const p=f.pilotName||'?';
    if(!byPilot[p]) byPilot[p]={legs:0,mins:0,pax:0,routes:new Set(),tails:new Set()};
    byPilot[p].legs++;
    byPilot[p].mins+=f.totalMinutes;
    byPilot[p].pax+=parseInt(f.pax)||0;
    byPilot[p].routes.add(`${f.origin}→${f.destination}`);
    byPilot[p].tails.add(f.tailNumber);
  });

  // ── Tail stats ────────────────────────────────────────────────────────────────
  const byTail = {};
  all.forEach(f=>{
    const t=f.tailNumber||'?';
    if(!byTail[t]) byTail[t]={legs:0,mins:0,routes:new Set()};
    byTail[t].legs++;
    byTail[t].mins+=f.totalMinutes;
    byTail[t].routes.add(`${f.origin}→${f.destination}`);
  });

  return {
    totalLegs: all.length,
    totalMins: all.reduce((s,f)=>s+f.totalMinutes,0),
    totalPax: all.reduce((s,f)=>s+(parseInt(f.pax)||0),0),
    dateRange: {start:days[0]?.[0], end:days[days.length-1]?.[0]},
    avgLegsPerDay: avg(dayVals.map(d=>d.legs)),
    avgHrsPerDay:  avg(dayVals.map(d=>d.mins))/60,
    busiestDay: days.sort((a,b)=>b[1].legs-a[1].legs)[0],
    turnEvents,
    turnByLoc: Object.entries(turnByLoc),
    turnByLocAKS: Object.entries(turnByLocAKS)
      .filter(([,t])=>t.length>=3),
    byRoute: Object.entries(byRoute)
      .filter(([,d])=>d.times.length>=3)
      .map(([k,d])=>({route:k,orig:d.orig,dest:d.dest,
        avg:avg(d.times),med:med(d.times),min:Math.min(...d.times),max:Math.max(...d.times),
        n:d.times.length, avgPax:parseFloat((d.pax.reduce((s,n)=>s+n,0)/d.pax.length).toFixed(1)),
        totalPax:d.pax.reduce((s,n)=>s+n,0),
        schedAvg: d.sched.length>=1 ? (()=>{
            const s=[...d.sched].sort((a,b)=>a-b);
            return s[Math.floor(s.length/2)];
          })() : (routeAvgs?.byRoute?.[k]?.schedAvg||null),
        byType: d.byType||{},
        schedN:   routeAvgs?.byRoute?.[k]?.schedN || d.sched.length}))
      .sort((a,b)=>b.n-a.n),
    byPilot: Object.entries(byPilot)
      .map(([name,d])=>({name,legs:d.legs,mins:d.mins,pax:d.pax,
        routes:d.routes.size,tails:d.tails.size,avgLegMins:Math.round(d.mins/d.legs)}))
      .sort((a,b)=>b.mins-a.mins),
    byTail: Object.entries(byTail)
      .map(([tail,d])=>({tail,legs:d.legs,mins:d.mins,routes:d.routes.size,avgLegMins:Math.round(d.mins/d.legs)}))
      .sort((a,b)=>b.mins-a.mins),
    dailyLegs: days.map(([date,d])=>({date,legs:d.legs,mins:d.mins,pax:d.pax,tails:[...d.tails].length})),
    delayEvents: delayEvents.sort((a,b)=>b.date.localeCompare(a.date)),
    byDelayCode: Object.entries(byDelayCode)
      .map(([code,d])=>({code,count:d.count,pilots:d.pilots.size,routes:d.routes.size,
        avgDelay:d.totalDelayMins>0?Math.round(d.totalDelayMins/d.count):0,legs:d.legs}))
      .sort((a,b)=>b.count-a.count),
    byPilotDelay: Object.entries(byPilotDelay)
      .map(([name,d])=>({name, legs:d.legs, onTime:d.onTime, late:d.late, early:d.early,
        onTimePct:d.legs?Math.round(d.onTime/d.legs*100):100,
        avgDelay:d.late>0?Math.round(d.totalDelayMins/d.late):0,
        codes:d.codes}))
      .filter(d=>d.legs>=2)
      .sort((a,b)=>b.late-a.late),
  };
}

function StatsScreen({ fleetData, routeAvgs }) {
  const [tab, setTab]       = useState("overview");
  const [routeFilter, setRouteFilter] = useState("");
  const [routeSort, setRouteSort] = useState({col:"n",dir:-1}); // default: most flights first
  const [expandedRoute, setExpandedRoute] = useState(null);
  const [colWidths, setColWidths] = useState({route:150,avg:52,sched:52,diff:48,med:48,min:44,max:48,n:50,avgPax:44});
  const dragRef = useRef(null);
  const [locFilter, setLocFilter] = useState("all");

  const noData = !fleetData||!Object.keys(fleetData).length;
  if(noData) return (
    <div>
      <div style={S.ct}>OPERATIONS STATS</div>
      <div style={{...S.card,textAlign:"center",padding:40,color:"#7a9ab8"}}>
        <div style={{fontSize:48,marginBottom:12}}>📊</div>
        <div style={{fontSize:20,fontWeight:700,marginBottom:6}}>No Data</div>
        <div style={{fontSize:16,lineHeight:1.6}}>Import fleet data first on the IMPORT tab</div>
      </div>
    </div>
  );

  const stats = useMemo(()=>computeStats(fleetData, routeAvgs), [fleetData, routeAvgs]);
  if(!stats) return null;

  const fmtMins = m => m==null?"—":`${Math.floor(m/60)?Math.floor(m/60)+'h ':''}${m%60}m`;
  const pct = (n,t) => t ? `${(n/t*100).toFixed(0)}%` : "—";

  const TABS = [["overview","OVERVIEW"],["routes","ROUTES"],["turns","TURN TIMES"],["pilots","PILOTS"],["delays","DELAYS"],["tails","TAILS"],["daily","DAILY"]];

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{fontSize:20,fontWeight:700,letterSpacing:"0.1em",color:"#e0e8f0"}}>OPERATIONS STATS</div>
      <div style={{fontSize:14,color:"#6a8aa8"}}>{stats.dateRange.start} → {stats.dateRange.end}</div>
    </div>

    {/* Tab bar */}
    <div style={{display:"flex",gap:3,marginBottom:14,flexWrap:"wrap"}}>
      {TABS.map(([k,l])=>(
        <button key={k} onClick={()=>setTab(k)} style={{padding:"5px 10px",borderRadius:4,
          border:`1px solid ${tab===k?"#4a9eff":"#1e2730"}`,
          background:tab===k?"rgba(74,158,255,0.1)":"transparent",
          color:tab===k?"#4a9eff":"#7a9ab8",fontSize:14,fontWeight:700,cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.08em"}}>
          {l}
        </button>
      ))}
    </div>

    {/* ── OVERVIEW ── */}
    {tab==="overview"&&<div>
      {/* Fleet totals */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
        {[
          ["TOTAL LEGS",   stats.totalLegs.toLocaleString(),         "#e0e8f0"],
          ["TOTAL BLOCK",  `${(stats.totalMins/60).toFixed(0)}h`,    "#4a9eff"],
          ["TOTAL PAX",    stats.totalPax.toLocaleString(),           SC.green],
          ["AVG LEGS/DAY", stats.avgLegsPerDay,                       "#b8c8d8"],
          ["AVG HRS/DAY",  `${stats.avgHrsPerDay.toFixed(1)}h`,       "#b8c8d8"],
          ["AVG PAX/DAY",  Math.round(stats.totalPax/(stats.dailyLegs.length||1)), "#b8c8d8"],
        ].map(([l,v,c])=>(
          <div key={l} style={{background:"#0a1118",borderRadius:8,padding:"12px 10px",textAlign:"center",border:"1px solid #1e2730"}}>
            <div style={{fontSize:30,fontWeight:700,color:c}}>{v}</div>
            <div style={{fontSize:12,color:"#7a9ab8",marginTop:3,letterSpacing:"0.08em"}}>{l}</div>
          </div>
        ))}
      </div>

      {/* Busiest day */}
      {stats.busiestDay&&<div style={{...S.card,marginBottom:14,padding:"12px 14px"}}>
        <div style={{fontSize:14,fontWeight:700,color:"#7a9ab8",letterSpacing:"0.1em",marginBottom:6}}>BUSIEST DAY</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:20,fontWeight:700,color:"#e0e8f0"}}>{stats.busiestDay[0]}</div>
          <div style={{display:"flex",gap:16,fontSize:16}}>
            <span><span style={{color:"#4a9eff",fontWeight:700}}>{stats.busiestDay[1].legs}</span> <span style={{color:"#7a9ab8"}}>legs</span></span>
            <span><span style={{color:SC.green,fontWeight:700}}>{(stats.busiestDay[1].mins/60).toFixed(1)}h</span> <span style={{color:"#7a9ab8"}}>block</span></span>
            <span><span style={{color:"#ffd740",fontWeight:700}}>{stats.busiestDay[1].pax}</span> <span style={{color:"#7a9ab8"}}>pax</span></span>
          </div>
        </div>
      </div>}

      {/* Top routes quick view */}
      <div style={{fontSize:14,fontWeight:700,color:"#7a9ab8",letterSpacing:"0.1em",marginBottom:6}}>TOP ROUTES BY FREQUENCY</div>
      <div style={{background:"#0a0e14",borderRadius:6,border:"1px solid #1e2730",overflow:"hidden",marginBottom:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 50px 50px 50px 45px",gap:4,
          padding:"5px 10px",borderBottom:"1px solid #1e2730",fontSize:12,fontWeight:700,color:"#7a9ab8"}}>
          <span>ROUTE</span><span style={{textAlign:"right"}}>AVG</span><span style={{textAlign:"right"}}>AVG PAX</span><span style={{textAlign:"right"}}>TOTAL PAX</span><span style={{textAlign:"right"}}>N</span>
        </div>
        {stats.byRoute.slice(0,10).map((r,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 50px 50px 50px 45px",gap:4,
            padding:"5px 10px",borderBottom:i<9?"1px solid #0d1117":"none",fontSize:15,
            background:i%2===0?"#08101e":"#122030",cursor:"default"}} onMouseEnter={e=>e.currentTarget.style.background="#1a3048"} onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"#08101e":"#122030"}>
            <span style={{color:"#b8c8d8"}}>{r.route}</span>
            <span style={{color:SC.green,fontWeight:700,textAlign:"right"}}>{r.avg}m</span>
            <span style={{color:"#7a9ab8",textAlign:"right"}}>{r.avgPax}</span>
            <span style={{color:"#7a9ab8",textAlign:"right"}}>{r.totalPax}</span>
            <span style={{color:"#6a8aa8",textAlign:"right"}}>{r.n}</span>
          </div>
        ))}
      </div>

      {/* Top turn times quick view */}
      <div style={{fontSize:14,fontWeight:700,color:"#7a9ab8",letterSpacing:"0.1em",marginBottom:6}}>AVERAGE TURN TIMES BY LOCATION</div>
      <div style={{background:"#0a0e14",borderRadius:6,border:"1px solid #1e2730",overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 55px 55px 55px 45px",gap:4,
          padding:"5px 10px",borderBottom:"1px solid #1e2730",fontSize:12,fontWeight:700,color:"#7a9ab8"}}>
          <span>LOCATION</span><span style={{textAlign:"right"}}>AVG</span><span style={{textAlign:"right"}}>MEDIAN</span><span style={{textAlign:"right"}}>MIN</span><span style={{textAlign:"right"}}>N</span>
        </div>
        {stats.turnByLoc.map((t,i)=>{
          const col = t.avg>60?SC.orange:t.avg>30?"#ffd740":SC.green;
          return <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 55px 55px 55px 45px",gap:4,
            padding:"5px 10px",borderBottom:i<stats.turnByLoc.length-1?"1px solid #0d1117":"none",fontSize:15,
            background:i%2===0?"#08101e":"#122030",cursor:"default"}} onMouseEnter={e=>e.currentTarget.style.background="#1a3048"} onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"#08101e":"#122030"}>
            <span style={{color:"#b8c8d8",fontWeight:700}}>{t.loc}</span>
            <span style={{color:col,fontWeight:700,textAlign:"right"}}>{t.avg}m</span>
            <span style={{color:"#7a9ab8",textAlign:"right"}}>{t.med}m</span>
            <span style={{color:"#6a8aa8",textAlign:"right"}}>{t.min}m</span>
            <span style={{color:"#6a8aa8",textAlign:"right"}}>{t.n}</span>
          </div>;
        })}
      </div>
    </div>}

    {/* ── ROUTES ── */}
    {tab==="routes"&&(()=>{
      const avg = arr => arr.length ? Math.round(arr.reduce((s,v)=>s+v,0)/arr.length) : null;
      const med = arr => { if(!arr.length) return null; const s=[...arr].sort((a,b)=>a-b); return s[Math.floor(s.length/2)]; };

      // All types present across all routes
      const allTypes = [...new Set(stats.byRoute.flatMap(r=>Object.keys(r.byType||{})))].sort();
      const TYPE_COLORS = {'PC-12':'#4a9eff','Garret TT':'#ffd740','EX Caravan':'#5aaa8a','Amphib Caravan':'#aa7adf','C206 Amphib':'#8888ff','Beaver':'#ff8844','Other':'#7a9ab8'};

      const COLS = [
        {key:"route",  label:"ROUTE",   w:150, align:"left",  val:r=>r.route},
        {key:"avg",    label:"AVG",     w:52,  align:"right", val:r=>r.avg,          color:SC.green},
        {key:"sched",  label:"SCHED",   w:52,  align:"right", val:r=>r.schedAvg||0,  color:"#4a9eff"},
        {key:"diff",   label:"DIFF",    w:48,  align:"right", val:r=>r.schedAvg?r.avg-r.schedAvg:null},
        {key:"med",    label:"MED",     w:48,  align:"right", val:r=>r.med},
        {key:"min",    label:"MIN",     w:44,  align:"right", val:r=>r.min},
        {key:"max",    label:"MAX",     w:48,  align:"right", val:r=>r.max},
        {key:"n",      label:"LEGS",    w:50,  align:"right", val:r=>r.n},
        {key:"avgPax", label:"PAX",     w:44,  align:"right", val:r=>r.avgPax},
      ];

      const startResize = (e, key) => {
        e.preventDefault();
        const startX = e.clientX;
        const startW = colWidths[key];
        const onMove = ev => setColWidths(p=>({...p,[key]:Math.max(40,startW+(ev.clientX-startX))}));
        const onUp   = () => { window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); };
        window.addEventListener('mousemove',onMove);
        window.addEventListener('mouseup',onUp);
      };

      const gridCols = COLS.map(c=>`${colWidths[c.key]}px`).join(' ');

      const sortFn = (a,b) => {
        const va = COLS.find(c=>c.key===routeSort.col)?.val(a)??0;
        const vb = COLS.find(c=>c.key===routeSort.col)?.val(b)??0;
        if(routeSort.col==="route") return routeSort.dir*(String(va).localeCompare(String(vb)));
        return routeSort.dir*((va||0)-(vb||0));
      };

      const SortHdr = ({col,label,align,color,ckey})=>{
        const active=routeSort.col===col;
        return <div style={{display:"flex",alignItems:"center",justifyContent:align==="right"?"flex-end":"space-between",
          position:"relative",paddingRight:8}}>
          <span onClick={()=>setRouteSort(s=>({col,dir:s.col===col?-s.dir:-1}))}
            style={{cursor:"pointer",userSelect:"none",flex:1,textAlign:align,
              color:active?(color||"#e0e8f0"):(color||"#7a9ab8"),
              display:"flex",alignItems:"center",gap:2,justifyContent:align==="right"?"flex-end":"flex-start"}}>
            {label}
            {active?<span style={{fontSize:10}}>{routeSort.dir===-1?"▼":"▲"}</span>:<span style={{fontSize:10,opacity:0.3}}>⇅</span>}
          </span>
          {/* Resize handle */}
          <div onMouseDown={e=>startResize(e,ckey)}
            style={{position:"absolute",right:0,top:0,bottom:0,width:6,
              cursor:"col-resize",background:"transparent",zIndex:2}}
            title="Drag to resize"/>
        </div>;
      };

      const filtered = stats.byRoute
        .filter(r=>!routeFilter||r.route.toLowerCase().includes(routeFilter.toLowerCase()))
        .sort(sortFn);

      return <div>
        <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
          <input value={routeFilter} onChange={e=>setRouteFilter(e.target.value)}
            placeholder="Filter routes (e.g. Juneau, Ketchikan)..."
            style={{...S.inp,fontSize:16,flex:1}}/>
          <button onClick={()=>{
            const rows=[["Route","Avg","Sched","Diff","Med","Min","Max","Legs","Avg Pax",
              ...allTypes.map(t=>t+" Avg"),...allTypes.map(t=>t+" Legs")]];
            filtered.forEach(r=>{
              const row=[r.route,r.avg,r.schedAvg||"",r.schedAvg?r.avg-r.schedAvg:"",r.med,r.min,r.max,r.n,r.avgPax];
              allTypes.forEach(t=>row.push(r.byType?.[t]?.length?Math.round(r.byType[t].reduce((s,v)=>s+v,0)/r.byType[t].length):""));
              allTypes.forEach(t=>row.push(r.byType?.[t]?.length||""));
              rows.push(row);
            });
            const csv=rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(",")).join("\n");
            const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
            a.download="route_stats.csv";a.click();
          }} style={{...S.btn("ghost"),padding:"6px 12px",fontSize:14,flexShrink:0}}>📥 CSV</button>
        </div>
        <div style={{fontSize:14,color:"#7a9ab0",marginBottom:6}}>
          {filtered.length} routes · drag column edges to resize · click headers to sort · click row for aircraft type breakdown
        </div>
        <div style={{background:"#080c12",borderRadius:6,border:"1px solid #1e2730",overflowX:"auto",userSelect:"none"}}>
          {/* Header */}
          <div style={{display:"grid",gridTemplateColumns:gridCols,
            borderBottom:"2px solid #1e2730",fontSize:14,fontWeight:700,
            background:"#0a0e14"}}>
            {COLS.map(c=>(
              <div key={c.key} style={{padding:"7px 8px",borderRight:"1px solid #1a2530",overflow:"hidden"}}>
                <SortHdr col={c.key} ckey={c.key} label={c.label} align={c.align} color={c.color}/>
              </div>
            ))}
          </div>
          {/* Rows */}
          {filtered.map((r,i)=>{
            const diff = r.schedAvg!=null ? r.avg-r.schedAvg : null;
            const diffCol = diff==null?"#3a4a5a":Math.abs(diff)<=2?"#7a9ab0":diff<0?SC.green:SC.orange;
            const isExpanded = expandedRoute===r.route;
            const typeEntries = Object.entries(r.byType||{}).filter(([,v])=>v.length>=2).sort((a,b)=>avg(a[1])-avg(b[1]));
            return <div key={i}>
              {/* Main row */}
              <div style={{display:"grid",gridTemplateColumns:gridCols,
                borderBottom:"1px solid #111820",
                background:isExpanded?"#0c1520":i%2===0?"#08101e":"#122030",
                fontSize:15,cursor:"pointer",transition:"background 0.1s"}}
                onClick={()=>setExpandedRoute(isExpanded?null:r.route)}
                onMouseEnter={e=>{if(!isExpanded)e.currentTarget.style.background="#0e1620"}}
                onMouseLeave={e=>{if(!isExpanded)e.currentTarget.style.background=i%2===0?"#08101e":"#122030"}}>
                <div style={{padding:"6px 8px",borderRight:"1px solid #1a2530",overflow:"hidden",
                  display:"flex",alignItems:"center",gap:5}}>
                  <span style={{color:isExpanded?"#4a9eff":"#c0d0e0",fontWeight:700}}>{r.route}</span>
                  {typeEntries.length>1&&<span style={{fontSize:14,color:"#5a8aaa",fontWeight:600,background:"rgba(74,158,255,0.1)",padding:"1px 5px",borderRadius:3,border:"1px solid rgba(74,158,255,0.2)"}}>▾ {typeEntries.length} types</span>}
                </div>
                <div style={{padding:"6px 8px",textAlign:"right",color:SC.green,fontWeight:700,borderRight:"1px solid #0f1820"}}>{r.avg}m</div>
                <div style={{padding:"6px 8px",textAlign:"right",color:"#4a9eff",fontWeight:600,borderRight:"1px solid #0f1820"}}>{r.schedAvg?`${r.schedAvg}m`:"—"}</div>
                <div style={{padding:"6px 8px",textAlign:"right",fontWeight:diff&&Math.abs(diff)>2?700:400,color:diffCol,borderRight:"1px solid #0f1820"}}>
                  {diff==null?"—":diff===0?"=":diff>0?`+${diff}m`:`${diff}m`}
                </div>
                <div style={{padding:"6px 8px",textAlign:"right",color:"#8aaac8",borderRight:"1px solid #0f1820"}}>{r.med}m</div>
                <div style={{padding:"6px 8px",textAlign:"right",color:"#6a8aa8",borderRight:"1px solid #0f1820"}}>{r.min}m</div>
                <div style={{padding:"6px 8px",textAlign:"right",color:"#6a8aa8",borderRight:"1px solid #0f1820"}}>{r.max}m</div>
                <div style={{padding:"6px 8px",textAlign:"right",color:"#9abacb",fontWeight:600,borderRight:"1px solid #0f1820"}}>{r.n}</div>
                <div style={{padding:"6px 8px",textAlign:"right",color:"#8aaac8"}}>{r.avgPax}</div>
              </div>
              {/* Aircraft type breakdown — expandable */}
              {isExpanded&&<div style={{background:"#0a0e14",borderBottom:"2px solid #1e2730",padding:"8px 12px"}}>
                <div style={{fontSize:14,color:"#7a9ab0",marginBottom:6,fontWeight:700,letterSpacing:"0.08em"}}>
                  AIRCRAFT TYPE BREAKDOWN — {r.route}
                </div>
                {/* Type rows */}
                <div style={{display:"grid",gridTemplateColumns:"160px 56px 56px 56px 50px 44px 44px 50px",
                  gap:0,fontSize:14,borderRadius:4,overflow:"hidden",border:"1px solid #1a2530"}}>
                  {/* Sub-header */}
                  {["TYPE","AVG","MED","SCHED DIFF","LEGS","MIN","MAX","vs OVERALL"].map((h,hi)=>(
                    <div key={h} style={{padding:"4px 8px",background:"#060a0e",
                      borderRight:hi<7?"1px solid #1a2530":"none",
                      fontSize:12,fontWeight:700,color:"#7a9ab0",letterSpacing:"0.06em",
                      textAlign:hi===0?"left":"right"}}>{h}</div>
                  ))}
                  {typeEntries.map(([type,times],ti)=>{
                    const typeAvg=Math.round(times.reduce((s,v)=>s+v,0)/times.length);
                    const typeMed=med(times);
                    const vOverall=typeAvg-r.avg;
                    const col=TYPE_COLORS[type]||"#7a9ab8";
                    return <React.Fragment key={type}>
                      <div style={{padding:"5px 8px",background:ti%2===0?"#08101e":"#122030",
                        borderRight:"1px solid #1a2530",display:"flex",alignItems:"center",gap:5}}>
                        <span style={{width:8,height:8,borderRadius:2,background:col,flexShrink:0,display:"inline-block"}}/>
                        <span style={{color:col,fontWeight:700}}>{type}</span>
                      </div>
                      <div style={{padding:"5px 8px",background:ti%2===0?"#08101e":"#122030",
                        textAlign:"right",color:col,fontWeight:700,borderRight:"1px solid #1a2530"}}>{typeAvg}m</div>
                      <div style={{padding:"5px 8px",background:ti%2===0?"#08101e":"#122030",
                        textAlign:"right",color:"#7a9ab8",borderRight:"1px solid #1a2530"}}>{typeMed}m</div>
                      <div style={{padding:"5px 8px",background:ti%2===0?"#08101e":"#122030",
                        textAlign:"right",color:r.schedAvg?(typeAvg<r.schedAvg?SC.green:SC.orange):"#3a5060",
                        borderRight:"1px solid #1a2530"}}>
                        {r.schedAvg?`${typeAvg>r.schedAvg?"+":""}${typeAvg-r.schedAvg}m`:"—"}
                      </div>
                      <div style={{padding:"5px 8px",background:ti%2===0?"#08101e":"#122030",
                        textAlign:"right",color:"#9abacb",fontWeight:600,borderRight:"1px solid #1a2530"}}>{times.length}</div>
                      <div style={{padding:"5px 8px",background:ti%2===0?"#08101e":"#122030",
                        textAlign:"right",color:"#6a8aa8",borderRight:"1px solid #1a2530"}}>{Math.min(...times)}m</div>
                      <div style={{padding:"5px 8px",background:ti%2===0?"#08101e":"#122030",
                        textAlign:"right",color:"#6a8aa8",borderRight:"1px solid #1a2530"}}>{Math.max(...times)}m</div>
                      <div style={{padding:"5px 8px",background:ti%2===0?"#08101e":"#122030",
                        textAlign:"right",fontWeight:700,
                        color:vOverall===0?"#7a9ab0":vOverall<0?SC.green:SC.orange}}>
                        {vOverall===0?"—":vOverall>0?`+${vOverall}m`:`${vOverall}m`}
                      </div>
                    </React.Fragment>;
                  })}
                  {typeEntries.length===0&&<div style={{gridColumn:"1/-1",padding:"10px",
                    color:"#3a5060",fontSize:14,textAlign:"center"}}>
                    Not enough data (need ≥2 flights per type)
                  </div>}
                </div>
                {/* Visual bar comparison */}
                {typeEntries.length>1&&<div style={{marginTop:8}}>
                  {typeEntries.map(([type,times])=>{
                    const typeAvg=Math.round(times.reduce((s,v)=>s+v,0)/times.length);
                    const maxAvg=Math.max(...typeEntries.map(([,v])=>Math.round(v.reduce((s,a)=>s+a,0)/v.length)));
                    const col=TYPE_COLORS[type]||"#7a9ab8";
                    return <div key={type} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <div style={{width:110,fontSize:14,color:col,fontWeight:700,flexShrink:0}}>{type}</div>
                      <div style={{flex:1,height:14,background:"#060a0e",borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${typeAvg/maxAvg*100}%`,
                          background:col,borderRadius:3,opacity:0.8,
                          display:"flex",alignItems:"center",paddingLeft:6}}>
                          <span style={{fontSize:12,color:"#080c12",fontWeight:700,whiteSpace:"nowrap"}}>{typeAvg}m</span>
                        </div>
                      </div>
                      <div style={{width:30,fontSize:14,color:"#7a9ab0",textAlign:"right",flexShrink:0}}>{times.length}×</div>
                    </div>;
                  })}
                </div>}
              </div>}
            </div>;
          })}
        </div>
      </div>;
    })()}

    {/* ── TURN TIMES ── */}
    {tab==="turns"&&(()=>{
      const avg=arr=>arr.length?Math.round(arr.reduce((s,n)=>s+n,0)/arr.length):0;
      const med=arr=>{const s=[...arr].sort((a,b)=>a-b);return s[Math.floor(s.length/2)]||0;};

      // Build AKS outstation table from turnByLocAKS
      const aksTable = (stats.turnByLocAKS||[]).map(([loc,times])=>{
        const under15=times.filter(t=>t<15).length;
        const over20=times.filter(t=>t>20).length;
        return {loc,avg:avg(times),med:med(times),min:Math.min(...times),max:Math.max(...times),n:times.length,
          pctUnder15:Math.round(under15/times.length*100),
          pctOver20:Math.round(over20/times.length*100)};
      }).sort((a,b)=>b.n-a.n);

      const totalAKS = aksTable.reduce((s,r)=>s+r.n,0);
      const totalUnder15 = aksTable.reduce((s,r)=>s+Math.round(r.pctUnder15*r.n/100),0);
      const totalOver20  = aksTable.reduce((s,r)=>s+Math.round(r.pctOver20*r.n/100),0);

      return <div>
        {/* Header + export */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:"#e0e8f0",marginBottom:3}}>AKS OUTSTATION TURNS</div>
            <div style={{fontSize:14,color:"#6a8aa8",lineHeight:1.6}}>
              Excludes JNU (variable schedule) · Excludes Island Air KTN/KLW hub sits<br/>
              Shows actual ground time between consecutive legs at same outstation
            </div>
          </div>
          <button onClick={()=>{
            const rows=[["Date","Tail","Location","Arrived From","Departed To","Land Time","Dept Time","Turn (min)","Pilot","Category"]];
            (stats.turnEvents||[]).sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
              rows.push([e.date,e.tail,e.location,e.arrivedFrom,e.departedTo,e.landTime,e.deptTime,e.turnMins,e.pilot||"—",e.category]);
            });
            const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
            const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
            a.download="turn_times.csv";a.click();
          }} style={{...S.btn("ghost"),padding:"6px 12px",fontSize:14,flexShrink:0,marginLeft:12}}>
            📥 EXPORT ALL
          </button>
        </div>

        {/* 15-min standard summary */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
          {[
            ["TOTAL TURNS", totalAKS, "#e0e8f0"],
            [`UNDER 15m`, `${Math.round(totalUnder15/totalAKS*100)}%`, SC.orange],
            [`OVER 20m`,  `${Math.round(totalOver20/totalAKS*100)}%`,  "#4a9eff"],
          ].map(([l,v,c])=>(
            <div key={l} style={{background:"#0a1118",borderRadius:6,padding:"10px 8px",textAlign:"center",border:"1px solid #1e2730"}}>
              <div style={{fontSize:27,fontWeight:700,color:c}}>{v}</div>

// ── WEATHER ───────────────────────────────────────────────────────────────────
// Maps ICAO to display name for weather labels
const WEATHER_STATIONS = {
  PAJN:"JNU", PAKT:"KTN", PASI:"SIT", PAHN:"HNS", PAGY:"SGY",
  PAGS:"GST", PAOH:"HNH", PAGN:"AGN", PATE:"TKE", PAEL:"ELV",
  PAPE:"PEL", PAFE:"KAE", PAKW:"KLW", PAWG:"WRG", PAPG:"PSG",
};
const ALL_ICAOS = Object.keys(WEATHER_STATIONS).join(',');

async function fetchMETARs() {
  const url = `https://aviationweather.gov/api/data/metar?ids=${ALL_ICAOS}&format=json&hours=2`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`Weather fetch failed: ${res.status}`);
  const data = await res.json();
  // Index by ICAO
  const out = {};
  data.forEach(m=>{
    out[m.icaoId] = {
      icao:     m.icaoId,
      name:     WEATHER_STATIONS[m.icaoId]||m.icaoId,
      cat:      m.flightCategory,   // VFR/MVFR/IFR/LIFR
      vis:      m.visib,
      wind:     m.wspd,
      gust:     m.wgst,
      wdir:     m.wdir,
      temp:     m.temp,
      altim:    m.altim,
      raw:      m.rawOb,
      clouds:   m.clouds||[],
      obsTime:  m.obsTime,
      ceiling:  (m.clouds||[]).filter(c=>c.cover==='BKN'||c.cover==='OVC')[0]?.base||null,
    };
  });
  return out;
}

const WX_COLORS = { VFR:"#2ecc71", MVFR:"#4a9eff", IFR:"#ff4757", LIFR:"#ff00ff" };
const WX_BG    = { VFR:"rgba(46,204,113,0.12)", MVFR:"rgba(74,158,255,0.12)", IFR:"rgba(255,71,87,0.15)", LIFR:"rgba(255,0,255,0.15)" };

function WxBadge({cat, size=9}) {
  if(!cat) return null;
  return <span style={{fontSize:size,fontWeight:700,padding:"1px 5px",borderRadius:3,
    color:WX_COLORS[cat]||"#7a9ab8",background:WX_BG[cat]||"transparent",
    border:`1px solid ${WX_COLORS[cat]||"#1e2730"}44`}}>{cat}</span>;
}

function useWeather(intervalMs=300000) { // refresh every 5 min
  const [wx, setWx] = useState(null);
  const [wxError, setWxError] = useState(null);
  const [wxAge, setWxAge] = useState(null);
  useEffect(()=>{
    const load = async () => {
      try {
        const data = await fetchMETARs();
        setWx(data);
        setWxAge(new Date());
        setWxError(null);
      } catch(e) {
        setWxError(e.message);
      }
    };
    load();
    const id = setInterval(load, intervalMs);
    return ()=>clearInterval(id);
  },[]);
  return {wx, wxError, wxAge};
}

// ── TURN TIME WARNINGS ────────────────────────────────────────────────────────
function getTurnWarnings(flights, minTurnMins=15) {
  const warnings = [];
  const sorted = [...flights].filter(f=>f.startTaxi||f.schedOff)
    .sort((a,b)=>(a.startTaxi||a.schedOff||'').localeCompare(b.startTaxi||b.schedOff||''));
  for(let i=0;i<sorted.length-1;i++){
    const a=sorted[i], b=sorted[i+1];
    if(a.destination!==b.origin) continue;
    const aLand    = a.stopTaxi||a.schedOn||(a.startTaxi?addMinToTime(a.startTaxi,a.totalMinutes||30):null);
    const bDep     = b.startTaxi||b.schedOff||'';
    if(!aLand||!bDep) continue;
    const turn = calcMin(aLand, bDep);
    if(turn!==null && turn>=0 && turn<minTurnMins) {
      // Was the inbound leg late? Compare actual land vs scheduled land
      const schedLand   = a.schedOn||null;
      const actualLand  = a.stopTaxi||null;
      const lateBy      = (schedLand&&actualLand) ? calcMin(schedLand,actualLand) : null;
      // Was the outbound scheduled turn tight even if on time?
      const schedTurn   = (schedLand&&b.schedOff) ? calcMin(schedLand,b.schedOff) : null;
      // Was outbound departure early / late?
      const schedDep    = b.schedOff||null;
      const actualDep   = b.startTaxi||null;
      const depLateBy   = (schedDep&&actualDep) ? calcMin(schedDep,actualDep) : null;
      // Status: is this an active (in progress) or upcoming flight?
      const isActive    = a._status==='completed'||a._status==='enroute';
      const isTomorrow  = a.date > (new Date().toISOString().slice(0,10));
      warnings.push({
        at: a.destination, turn, between: `${a.origin}\u2192${a.destination} & ${b.origin}\u2192${b.destination}`,
        landTime: aLand, depTime: bDep,
        lateBy, schedTurn, depLateBy, isActive, isTomorrow,
        inboundRoute: `${a.origin}\u2192${a.destination}`,
        outboundRoute: `${b.origin}\u2192${b.destination}`,
        date: a.date,
      });
    }
  }
  return warnings;
}

// Parse the uploaded XLSX into a normalized pilot map
async function fetchQualsFromGSheet(csvUrl) {
  const res = await fetch(csvUrl);
  if(!res.ok) throw new Error(`Failed to fetch quals: ${res.status}`);
  const text = await res.text();
  const rows = text.split('\n').map(line=>{
    const cells=[]; let cur='', inQ=false;
    for(const c of line){
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cells.push(cur.trim());cur='';}
      else cur+=c;
    }
    cells.push(cur.trim());
    return cells;
  }).filter(r=>r.some(c=>c));
  // Reuse parseQualsSheet logic by building a fake wb
  // Actually just parse the rows directly using the same column mapping
  const headers = rows[0]?.map(h=>String(h||'').trim().replace(/\n/g,' '))||[];
  const pilots = {};
  const MONTHS_MAP2 = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  rows.slice(1).forEach(row=>{
    const nameRaw = String(row[0]||'').trim();
    if(!nameRaw||nameRaw===','||nameRaw==='—') return;
    const parts = nameRaw.split(',').map(s=>s.trim());
    const fullName = parts.length>=2 ? `${parts[1]} ${parts[0]}` : nameRaw;
    const key = fullName.toLowerCase().replace(/\s+/g,'_');
    const entry = {fullName, rawName:nameRaw, aircraft:{}, locations:{}, checkAirman:false, ioe:false, training:false};
    headers.forEach((h,i)=>{
      if(i===0) return;
      const raw = String(row[i]||'').trim();
      const up = raw.toUpperCase();
      const isIFR=up.includes('IFR'), isVFR=up==='VFR', isRS=up.includes('RIGHT');
      const isTrue=!!(raw==='true'||up==='YES'||up==='TRUE'||isIFR||isVFR||isRS);
      const hUp=h.toUpperCase().replace(/\(.*?\)/g,'').replace(/[\n\r]/g,' ').trim();
      const acMap={'N721KP':'N721KP','N722KP':'N722KP','N726KP':'N726KP','N724KP':'N724KP',
        '753/754/755':'Garret-TT','450KP':'N450KP','438/336':'EX-Old',
        'AMPHIB 206':'Amphib-206','AMPHIB CARAVAN':'Amphib-C',
        'DHC-2 BEAVER':'Beaver','DHC-2 BEAVER  N60TF':'N60TF',
        'N754KP':'N754KP','N753KP':'N753KP','N755KP':'N755KP',
        'N450KP':'N450KP','N438JP':'N438JP','N336JP':'N336JP',
        'N264KP':'N264KP','N265KP':'N265KP','N748KP':'N748KP','N749KP':'N749KP',
        'N777DH':'N777DH','N4794C':'N4794C','N743KP':'N743KP',
        '754':'N754KP','753':'N753KP','755':'N755KP','36/38JP':'EX-Old'};
      const locCols=new Set(['SEAPILOTS (FLOATS)','PACK CREEK','ELFIN COVE','FOREST SERVICE','DRY BAY','NORRIS LAKE']);
      const acKey=acMap[hUp];
      if(acKey){const GX={'Garret-TT':['N754KP','N753KP','N755KP'],'EX-Old':['N438JP','N336JP'],'Amphib-C':['N264KP','N265KP'],'Amphib-206':['N748KP','N749KP'],'Beaver':['N777DH','N4794C','N743KP']};const q={qualified:isTrue,ifr:isIFR,vfr:isVFR||(!isIFR&&isTrue),rightSeat:isRS};(GX[acKey]||[acKey]).forEach(t=>{entry.aircraft[t]=q;});}
      else if(locCols.has(hUp)) entry.locations[h.replace(/\n.*$/,'').trim()]=isTrue;
    });
    pilots[key]=entry;
  });
  return pilots;
}

function parseQualsSheet(wb, utils) {
  const sheet = wb.Sheets['Aircraft Qualification'];
  if(!sheet) throw new Error('Sheet "Aircraft Qualification" not found');
  const rows = utils.sheet_to_json(sheet, {header:1, defval:''});
  if(rows.length < 2) throw new Error('Sheet appears empty');

  const pilots = {};

  // Normalize header for matching: collapse newlines to space, uppercase, trim
  // Keep parens so "DHC-2 Beaver (94C/7DH/743)" and "DHC-2 Beaver (N60TF)" stay distinct
  const normH = h => String(h||'').trim().replace(/[\n\r]+/g,' ').trim().toUpperCase();
  const headers = rows[0].map(normH);

  // Unified column map — keys are normalized header strings (uppercase, newlines→space)
  const acMap = {
    // Individual tails
    'N721KP':'N721KP','N722KP':'N722KP','N726KP':'N726KP','N724KP':'N724KP',
    '726KP':'N726KP','724KP':'N724KP',
    'N754KP':'N754KP','N753KP':'N753KP','N755KP':'N755KP',
    '754':'N754KP','753':'N753KP','755':'N755KP',
    'N450KP':'N450KP','450KP':'N450KP',
    'N438JP':'N438JP','N336JP':'N336JP',
    'N264KP':'N264KP','N265KP':'N265KP',
    'N748KP':'N748KP','N749KP':'N749KP',
    'N777DH':'N777DH','N4794C':'N4794C','N743KP':'N743KP',
    
    // Grouped headers (new sheet format, normalized)
    '753/754/755':'Garret-TT',
    '438/336':'EX-Old','36/38JP':'EX-Old',
    'AMPHIB 206 (748/749)':'Amphib-206',
    'AMPHIB CARAVAN (264/265)':'Amphib-C',
    'DHC-2 BEAVER (94C/7DH/743)':'Beaver',
    'DHC-2 BEAVER (N60TF)':'N60TF',
    // Also match without parens for older sheets
    'AMPHIB 206':'Amphib-206',
    'AMPHIB CARAVAN':'Amphib-C',
    
    
  };
  const locCols = new Set([
    'SEAPILOTS (FLOATS)','PACK CREEK','ELFIN COVE',
    'FOREST SERVICE','DRY BAY','NORRIS LAKE','FORK LIFT',
    'SEAPILOTS',  // fallback if parens stripped
  ]);

  rows.slice(1).forEach(row=>{
    const nameRaw = String(row[0]||'').trim();
    if(!nameRaw||nameRaw===','||nameRaw==='—') return;
    const parts = nameRaw.split(',').map(s=>s.trim());
    const fullName = parts.length>=2 ? `${parts[1]} ${parts[0]}` : nameRaw;

    const entry = { fullName, rawName:nameRaw, aircraft:{}, locations:{}, checkAirman:false, ioe:false, training:false };

    headers.forEach((h,i)=>{
      if(i===0) return;
      const raw = String(row[i]||'').trim();
      const val = raw.toUpperCase();
      const isIFR = val.includes('IFR');
      const isVFR = val==='VFR';
      const isRS  = val.includes('RIGHT');
      const isTraining = val==='TRAINING';
      const isTrue = !!(raw==='true'||val==='YES'||val==='TRUE'||isIFR||isVFR||isRS);
      const hUp = h.toUpperCase();

      // Map group keys → individual tails so edit grid works correctly
      const GROUP_EXPAND = {
        'Garret-TT': ['N754KP','N753KP','N755KP'],
        'EX-Old':    ['N438JP','N336JP'],
        'Amphib-C':  ['N264KP','N265KP'],
        'Amphib-206':['N748KP','N749KP'],
        'Beaver':    ['N777DH','N4794C','N743KP'],
      };
      const acKey = acMap[hUp];
      if(acKey) {
        const qual = { qualified:isTrue, ifr:isIFR,
          vfr:isVFR||(!isIFR&&isTrue&&!isTraining), rightSeat:isRS, training:isTraining };
        const tails = GROUP_EXPAND[acKey] || [acKey];
        tails.forEach(t => { entry.aircraft[t] = qual; });
      } else if(locCols.has(hUp)) {
        entry.locations[h.replace(/\n.*$/,'').trim()] = isTrue;
      }
    });

    pilots[fullName.toLowerCase().replace(/\s+/g,'_')] = entry;
  });

  // Parse check airmen sheet
  const caSheet = wb.Sheets['Training pilotsCheck Airmen'];
  if(caSheet) {
    const caRows = utils.sheet_to_json(caSheet, {header:1, defval:''});
    const caHeaders = caRows[0]?.map(h=>String(h||'').trim())||[];
    caRows.slice(1).forEach(row=>{
      const nameRaw = String(row[0]||'').trim();
      if(!nameRaw) return;
      const parts = nameRaw.split(',').map(s=>s.trim());
      const fullName = parts.length>=2 ? `${parts[1]} ${parts[0]}` : nameRaw;
      const key = fullName.toLowerCase().replace(/\s+/g,'_');
      if(pilots[key]) {
        const isTrue = v=>String(v||'').toUpperCase()==='TRUE';
        pilots[key].checkAirman = isTrue(row[caHeaders.indexOf('Check Airmen')]);
        pilots[key].ioe         = isTrue(row[caHeaders.indexOf('IOE')]);
        pilots[key].training    = isTrue(row[caHeaders.indexOf('Training Pilots')]);
      }
    });
  }

  return pilots;
}

// Check if a pilot is qualified for a specific tail number
function isPilotQualifiedForTail(pilotEntry, tailNumber) {
  if(!pilotEntry) return {qualified:false, reason:'Pilot not found in quals database'};
  const ac = pilotEntry.aircraft;

  // Helper: check both direct tail key and group key
  const has = (keys, getNote) => {
    for(const k of keys) if(ac[k]?.qualified) return {qualified:true, ifr:ac[k]?.ifr, vfr:ac[k]?.vfr, note:getNote?.(k)};
    return null;
  };

  // Direct check (exact tail)
  if(ac[tailNumber]?.qualified) return {qualified:true, ifr:ac[tailNumber]?.ifr, vfr:ac[tailNumber]?.vfr};

  // Garret TT group: 754KP, 753KP, 755KP — checked out in any = all
  if(['N754KP','N753KP','N755KP'].includes(tailNumber)) {
    const q=has(['Garret-TT','N754KP','N753KP','N755KP'],k=>'Via Garret TT group');
    if(q) return q;
  }

  // EX Caravan: 438→336 cross-qual; 450 separate
  if(tailNumber==='N336JP') {
    const q=has(['EX-Old','N438JP','N336JP'],k=>'Via 438JP checkout');
    if(q) return q;
  }
  if(tailNumber==='N438JP') {
    const q=has(['EX-Old','N438JP'],k=>'Via EX Caravan group');
    if(q) return q;
  }

  // Amphib Caravan (264/265)
  if(['N264KP','N265KP'].includes(tailNumber)) {
    const q=has(['Amphib-C','N264KP','N265KP'],k=>'Via amphib caravan checkout');
    if(q) return q;
  }

  // C206 Amphib (748/749)
  if(['N748KP','N749KP'].includes(tailNumber)) {
    const q=has(['Amphib-206','N748KP','N749KP'],k=>'Via C206 amphib checkout');
    if(q) return q;
  }

  // Standard Beaver (DH/94C/743)
  if(['N777DH','N4794C','N743KP'].includes(tailNumber)) {
    const q=has(['Beaver','N777DH','N4794C','N743KP'],k=>'Via Beaver checkout');
    if(q) return q;
  }

  return {qualified:false, reason:`Not checked out in ${tailNumber} or equivalent`};
}

// Check if pilot is qualified for a location
function isPilotQualifiedForLocation(pilotEntry, locationName) {
  if(!pilotEntry) return false;
  const loc = pilotEntry.locations;
  return !!(loc[locationName] || loc[locationName.toLowerCase()] ||
    Object.entries(loc).find(([k,v])=>k.toLowerCase()===locationName.toLowerCase()&&v)?.[1]);
}

function QualsScreen({ qualsData, onUpload, fleetData }) {

  const [syncing, setSyncing]       = useState(false);
  const [error, setError]           = useState(null);
  const [search, setSearch]         = useState('');
  const [viewMode, setViewMode]     = useState('edit');
  const [selectedPilot, setSelectedPilot] = useState(null);
  const [editData, setEditData]     = useState(null);
  const [addingPilot, setAddingPilot] = useState(false);
  const [newPilotName, setNewPilotName] = useState('');
  const [dirty, setDirty]           = useState(false);
  const [gsheetUrl, setGsheetUrl]   = useState('https://docs.google.com/spreadsheets/d/e/2PACX-1vRmwM6Ow-Ge0UdOvaL1Uisrc3ukFnlExIcrkpm8htYd9_ZiP0TS9BjkTxZqEZd36jaYIB7YnhZY9SoO/pub?output=csv');
  const fileRef = useRef();

  const syncFromGSheet = async () => {
    if(!gsheetUrl) return;
    setSyncing(true); setError(null);
    try {
      const parsed = await fetchQualsFromGSheet(gsheetUrl);
      setEditData(JSON.parse(JSON.stringify(parsed)));
      await onUpload(parsed);
    } catch(err) { setError(err.message); }
    setSyncing(false);
  };

  // Sync editData when qualsData loads
  useEffect(()=>{ if(qualsData&&!editData) setEditData(JSON.parse(JSON.stringify(qualsData))); },[qualsData]);

  const handleFile = async (e) => {
    const file = e.target.files[0]; if(!file) return;
    setUploading(true); setError(null);
    try {
      const XLSX = await loadXlsx();
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(new Uint8Array(buf), {type:'array'});
      const parsed = parseQualsSheet(wb, XLSX.utils);
      setEditData(JSON.parse(JSON.stringify(parsed)));
      await onUpload(parsed);
    } catch(err) { setError(err.message); }
    setUploading(false);
    if(fileRef.current) fileRef.current.value='';
  };

  const saveEdits = async () => {
    if(!editData) return;
    await onUpload(editData);
    setDirty(false);
  };

  const toggleAircraft = (pilotKey, tail, field) => {
    setEditData(prev=>{
      const p = {...prev};
      p[pilotKey] = {...p[pilotKey], aircraft:{...p[pilotKey].aircraft}};
      const cur = p[pilotKey].aircraft[tail]||{qualified:false,ifr:false,vfr:false};
      if(field==='ifr')      p[pilotKey].aircraft[tail] = {...cur, qualified:true, ifr:!cur.ifr, vfr:cur.ifr?false:cur.vfr};
      else if(field==='vfr') p[pilotKey].aircraft[tail] = {...cur, qualified:!cur.vfr&&!cur.ifr?true:cur.qualified, vfr:!cur.vfr, ifr:false};
      else                   p[pilotKey].aircraft[tail] = {...cur, qualified:!cur.qualified, ifr:false, vfr:false};

  };

    setEditData(prev=>{
      const p = {...prev};
      p[pilotKey] = {...p[pilotKey], locations:{...p[pilotKey].locations}};

          color:"#5aaa8a",fontSize:14,fontWeight:700,cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace"}}>
          💾 SAVE CHANGES
        </button>}
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="🔍 Search pilot..."
          style={{marginLeft:"auto",width:140,background:"#0a1118",border:"1px solid #1e2730",
            borderRadius:5,color:"#e8edf2",fontSize:15,padding:"5px 9px",
            fontFamily:"'JetBrains Mono',monospace",outline:"none"}}/>
      </div>

      {error&&<div style={{color:SC.red,fontSize:16,marginBottom:8}}>{error}</div>}

      {/* ── EDIT VIEW ── */}
      {viewMode==="edit"&&(()=>{
        const ALL_TAILS_EDIT = ['N721KP','N722KP','N726KP','N754KP','N753KP','N755KP','N450KP','N438JP','N336JP','N264KP','N265KP','N748KP','N749KP','N777DH','N4794C','N743KP'];
        const ALL_LOCS_EDIT  = ['Elfin Cove','Pack Creek','Dry Bay','Norris Lake','Forest Service','Seapilots (floats)'];
        const AC_COLS = [
          {label:'PC-12',       color:'#4a9eff', tails:['N721KP','N722KP','N726KP']},
          {label:'Garret TT',   color:'#ffd740', tails:['N754KP','N753KP','N755KP']},
          {label:'EX Caravan',  color:'#5aaa8a', tails:['N450KP','N438JP','N336JP']},
          {label:'Amphib 208',  color:'#aa7adf', tails:['N264KP','N265KP']},
          {label:'C206 Amphib', color:'#8888ff', tails:['N748KP','N749KP']},
          {label:'Beaver',      color:'#ff8844', tails:['N777DH','N4794C','N743KP','N60TF']},
        ];
        const SHORT = {'N721KP':'721','N722KP':'722','N726KP':'726','N754KP':'754','N753KP':'753','N755KP':'755','N450KP':'450','N438JP':'438','N336JP':'336','N264KP':'264','N265KP':'265','N748KP':'748','N749KP':'749','N777DH':'DH','N4794C':'94C','N743KP':'743','N60TF':'TF'};

        return <div>
          <div style={{fontSize:14,color:"#7a9ab0",marginBottom:8}}>
            Click cells to toggle. <span style={{color:"#4a9eff"}}>IFR</span> = IFR qualified · <span style={{color:"#5aaa8a"}}>VFR</span> = VFR only · empty = not qualified · <span style={{color:"#ff8844"}}>■</span> = location authorized
          </div>

          <div style={{overflowX:"auto"}}>
            <table style={{borderCollapse:"collapse",fontSize:14,minWidth:900,width:"100%"}}>
              <thead>
                {/* Single clean header row */}
                <tr style={{background:"#0a0e14"}}>
                  <th style={{padding:"6px 8px",textAlign:"left",fontSize:14,color:"#7a9ab8",
                    fontWeight:700,borderBottom:"2px solid #1e2730",
                    position:"sticky",left:0,background:"#0a0e14",zIndex:2,minWidth:130}}>
                    PILOT <span style={{color:"#3a5060",fontWeight:400}}>{sortedKeys.length}</span>
                  </th>
                  {ALL_TAILS_EDIT.map((t,i)=>{
                    const sec=AC_COLS.find(s=>s.tails.includes(t));
                    const isFirst=sec&&sec.tails.indexOf(t)===0;
                    return <th key={t} style={{
                      width:38,padding:"6px 2px",
                      borderBottom:"2px solid #1e2730",
                      borderLeft:isFirst?`2px solid ${sec?.color||"#333"}55`:"1px solid #0d1117",
                      background:"#0a0e14"}}>
                      <div style={{fontSize:12,fontWeight:700,textAlign:"center",lineHeight:1.2}}>
                        <div style={{color:sec?.color||"#7a9ab0"}}>{SHORT[t]}</div>
                        {isFirst&&<div style={{fontSize:10,color:(sec?.color||"#7a9ab0")+"88",marginTop:1}}>{sec?.label}</div>}
                      </div>
                    </th>;
                  })}
                  {ALL_LOCS_EDIT.map((l,i)=>{
                    const abbr={'Elfin Cove':'ELF','Pack Creek':'PCK','Dry Bay':'DRY',
                      'Norris Lake':'NOR','Forest Service':'FOR','Seapilots (floats)':'SEA'};
                    return <th key={l} style={{
                      width:38,padding:"6px 2px",
                      borderBottom:"2px solid #1e2730",
                      borderLeft:i===0?"2px solid #ff884455":"1px solid #0d1117",
                      background:"#0a0e14"}}>
                      <div style={{fontSize:12,color:"#ff8844",fontWeight:700,textAlign:"center",lineHeight:1.2}}>
                        {abbr[l]||l.slice(0,3).toUpperCase()}
                      </div>
                    </th>;
                  })}
                  <th style={{width:28,borderBottom:"2px solid #1e2730",borderLeft:"1px solid #1e2730",background:"#0a0e14"}}/>
                </tr>
              </thead>
              <tbody>
                {sortedKeys.filter(k=>{
                  const p=activeData[k];
                  return !search||p.fullName.toLowerCase().includes(search.toLowerCase());
                }).map((k,ri)=>{
                  const p=activeData[k];
                  return <tr key={k} onMouseEnter={e=>e.currentTarget.style.background="#1a3048"} onMouseLeave={e=>e.currentTarget.style.background=ri%2===0?"#08101e":"#122030"} style={{background:ri%2===0?"#08101e":"#122030",
                    borderBottom:"1px solid #0d1117"}}>
                    {/* Pilot name */}
                    <td style={{padding:"3px 8px",fontSize:15,color:"#c0d0e0",fontWeight:600,
                      position:"sticky",left:0,background:"inherit",
                      zIndex:1,whiteSpace:"nowrap"}}>
                      {p.fullName}
                    </td>
                    {/* Aircraft cells */}
                    {ALL_TAILS_EDIT.map(t=>{
                      const sec=AC_COLS.find(s=>s.tails.includes(t));
                      const ac=p.aircraft[t]||{};
                      const isIFR=ac.ifr;
                      const isVFR=ac.vfr||(!ac.ifr&&ac.qualified);
                      // Float/amphib/beaver = VFR only, no IFR option
                      const VFR_ONLY_TAILS = new Set(['N264KP','N265KP','N748KP','N749KP','N777DH','N4794C','N743KP']);
                      const vfrOnly = VFR_ONLY_TAILS.has(t);
                      // Cycle: empty → VFR → (IFR if allowed) → empty
                      const handleClick=()=>{
                        if(!ac.qualified&&!ac.ifr)      toggleAircraft(k,t,'vfr');
                        else if(ac.qualified&&!ac.ifr)  vfrOnly ? toggleAircraft(k,t,'clear') : toggleAircraft(k,t,'ifr');
                        else                             toggleAircraft(k,t,'clear');
                      };
                      return <td key={t} onClick={handleClick}
                        style={{textAlign:"center",cursor:"pointer",
                          borderLeft:sec&&sec.tails.indexOf(t)===0?`2px solid ${sec.color}22`:"none",
                          padding:"1px"}}>
                        <div style={{height:22,display:"flex",alignItems:"center",
                          justifyContent:"center",borderRadius:3,
                          background:isIFR?"rgba(74,158,255,0.18)":isVFR?"rgba(90,170,138,0.12)":"transparent",
                          transition:"background 0.1s"}}>
                          <span style={{fontSize:14,fontWeight:700,
                            color:isIFR?"#4a9eff":isVFR?"#5aaa8a":"#1e2730"}}>
                            {isIFR?"IFR":isVFR?"VFR":""}
                          </span>
                        </div>
                      </td>;
                    })}
                    {/* Location cells */}
                    {ALL_LOCS_EDIT.map((l,i)=>{
                      const auth=isPilotQualifiedForLocation(p,l);
                      return <td key={l} onClick={()=>toggleLocation(k,l)}
                        style={{textAlign:"center",cursor:"pointer",padding:"1px",
                          borderLeft:i===0?"2px solid #ff884422":"none"}}>
                        <div style={{height:22,display:"flex",alignItems:"center",
                          justifyContent:"center",borderRadius:3,
                          background:auth?"rgba(255,136,68,0.15)":"transparent",
                          transition:"background 0.1s"}}>
                          <span style={{fontSize:15,color:auth?"#ff8844":"#1e2730",fontWeight:700}}>
                            {auth?"✓":""}
                          </span>
                        </div>
                      </td>;
                    })}
                    {/* Remove pilot */}
                    <td style={{padding:"1px 4px",textAlign:"center",borderLeft:"1px solid #1a2530"}}>
                      <button onClick={()=>removePilot(k)}
                        style={{background:"transparent",border:"none",color:"#3a5060",
                          fontSize:18,cursor:"pointer",padding:"2px 4px",borderRadius:3,lineHeight:1}}
                        title="Remove pilot">×</button>
                    </td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>

          {/* Add pilot row */}
          <div style={{marginTop:8,display:"flex",gap:6,alignItems:"center"}}>
            {addingPilot
              ? <><input value={newPilotName} onChange={e=>setNewPilotName(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter')addPilot();if(e.key==='Escape'){setAddingPilot(false);setNewPilotName('');}}}
                  placeholder="First Last"
                  autoFocus
                  style={{background:"#0a1118",border:"1px solid #4a9eff",borderRadius:5,
                    color:"#e8edf2",fontSize:16,padding:"5px 9px",width:160,outline:"none",
                    fontFamily:"'JetBrains Mono',monospace"}}/>
                <button onClick={addPilot} style={{...S.btn("primary"),padding:"5px 12px",fontSize:14}}>ADD</button>
                <button onClick={()=>{setAddingPilot(false);setNewPilotName('');}} style={{...S.btn("ghost"),padding:"5px 10px",fontSize:14}}>CANCEL</button>
              </>
              : <button onClick={()=>setAddingPilot(true)}
                  style={{...S.btn("ghost"),padding:"5px 12px",fontSize:14}}>+ ADD PILOT</button>
            }
            {dirty&&<span style={{fontSize:14,color:"#5aaa8a",marginLeft:4}}>Unsaved changes</span>}
          </div>

          {/* Notes */}
          <div style={{marginTop:12,padding:"8px 10px",background:"#060a0e",borderRadius:6,
            border:"1px solid #1a2530",fontSize:12,color:"#6a8a9a",lineHeight:1.7}}>
            <span style={{color:"#6a8aaa",fontWeight:700}}>HOW IT WORKS: </span>
            Click to cycle: empty → <span style={{color:"#5aaa8a"}}>VFR</span> → <span style={{color:"#4a9eff"}}>IFR</span> → empty &nbsp;·&nbsp;
            Changes apply immediately to qualification warnings on FLT/DUTY &nbsp;·&nbsp;
            Upload a new XLSX anytime to re-sync from the spreadsheet
          </div>
        </div>;
      })()}

      {/* ── PILOT LIST VIEW ── */}
      {viewMode==="pilots"&&<div style={{display:"flex",flexDirection:"column",gap:4}}>
        {filtered.map(p=>{
          const isOpen = selectedPilot===p.fullName;
          const acCount = Object.values(p.aircraft).filter(a=>a.qualified).length;
          const locCount = Object.values(p.locations).filter(Boolean).length;
          const hasIFR = Object.values(p.aircraft).some(a=>a.ifr);
          return <div key={p.fullName}>
            <div onClick={()=>setSelectedPilot(isOpen?null:p.fullName)}
              style={{background:isOpen?"#0d1520":"#0d1117",borderRadius:6,padding:"10px 14px",cursor:"pointer",
                border:`1px solid ${isOpen?"#4a9eff":"#1e2730"}`,
                display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:18,fontWeight:700,color:"#e0e8f0"}}>{p.fullName}</span>
                {hasIFR&&<span style={{fontSize:12,padding:"1px 5px",borderRadius:3,
                  background:"rgba(74,158,255,0.15)",color:"#4a9eff",border:"1px solid #4a9eff44",fontWeight:700}}>IFR</span>}
                {p.checkAirman&&<span style={{fontSize:12,padding:"1px 5px",borderRadius:3,
                  background:"rgba(255,215,64,0.12)",color:"#ffd740",border:"1px solid #ffd74044",fontWeight:700}}>CHECK AIRMAN</span>}
                {p.training&&<span style={{fontSize:12,padding:"1px 5px",borderRadius:3,
                  background:"rgba(90,170,138,0.12)",color:"#5aaa8a",border:"1px solid #5aaa8a44",fontWeight:700}}>TRAINER</span>}
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center",fontSize:14,color:"#7a9ab0"}}>
                <span>{acCount} aircraft</span>
                {locCount>0&&<span>{locCount} special locs</span>}
                <span style={{color:"#3a5060"}}>{isOpen?"▼":"▶"}</span>
              </div>
            </div>

            {isOpen&&<div style={{background:"#080b0f",borderRadius:6,border:"1px solid #1a2530",
              padding:"12px 14px",marginTop:2}}>

              {/* Aircraft by group */}
              {AC_SECTIONS.map(sec=>{
                const qualTails = sec.tails.filter(t=>isPilotQualifiedForTail(p,t).qualified);
                if(!qualTails.length) return null;
                return <div key={sec.label} style={{marginBottom:10}}>
                  <div style={{fontSize:12,fontWeight:700,color:sec.color,letterSpacing:"0.1em",marginBottom:5}}>{sec.label}</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {sec.tails.map(t=>{
                      const q=isPilotQualifiedForTail(p,t);
                      const direct=p.aircraft[t];
                      if(!q.qualified) return null;
                      const label=direct?.ifr?"IFR":direct?.rightSeat?"RIGHT SEAT":q.note?"("+q.note+")":"VFR";
                      const col=direct?.ifr?"#4a9eff":direct?.rightSeat?"#aa7adf":q.note?"#7a9ab8":"#5aaa8a";
                      return <span key={t} style={{fontSize:14,padding:"2px 8px",borderRadius:3,
                        background:`${col}18`,color:col,border:`1px solid ${col}44`,fontWeight:700}}>
                        {t} <span style={{fontSize:12,fontWeight:400,opacity:0.8}}>{label}</span>
                      </span>;
                    })}
                  </div>
                </div>;
              })}

              {/* Unqualified aircraft */}
              {(()=>{
                const unqual = ALL_TAILS.filter(t=>!isPilotQualifiedForTail(p,t).qualified);
                if(!unqual.length) return null;
                return <div style={{marginBottom:10}}>
                  <div style={{fontSize:12,color:"#3a5060",marginBottom:4,fontWeight:700,letterSpacing:"0.1em"}}>NOT QUALIFIED</div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    {unqual.map(t=><span key={t} style={{fontSize:12,color:"#2a4050",padding:"1px 5px",
                      borderRadius:3,border:"1px solid #1a2530"}}>{t}</span>)}
                  </div>
                </div>;
              })()}

              {/* Special locations */}
              {ALL_LOCS.filter(l=>isPilotQualifiedForLocation(p,l)).length>0&&<div style={{marginBottom:8}}>
                <div style={{fontSize:12,fontWeight:700,color:"#ff8844",letterSpacing:"0.1em",marginBottom:4}}>SPECIAL LOCATIONS</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {ALL_LOCS.filter(l=>isPilotQualifiedForLocation(p,l)).map(l=>(
                    <span key={l} style={{fontSize:14,padding:"2px 8px",borderRadius:3,
                      background:"rgba(255,136,68,0.12)",color:"#ff8844",
                      border:"1px solid rgba(255,136,68,0.3)",fontWeight:700}}>{l}</span>
                  ))}
                </div>
              </div>}

              {/* IFR route note */}
              {!hasIFR&&<div style={{fontSize:14,color:"#7a9ab0",padding:"6px 8px",
                background:"rgba(255,215,64,0.06)",borderRadius:4,border:"1px solid rgba(255,215,64,0.15)"}}>
                ⚠ VFR only — monitor IFR-heavy routes: Kake, Sitka, KTN, KLW, PSG, WRG, Yakutat
              </div>}
            </div>}
          </div>;
        })}
      </div>}

      {/* ── AIRCRAFT MATRIX VIEW ── */}
      {viewMode==="aircraft"&&<div style={{overflowX:"auto"}}>
        {/* Legend */}
        <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
          {AC_SECTIONS.map(s=>(
            <div key={s.label} style={{fontSize:12,color:s.color,fontWeight:700,
              padding:"2px 8px",borderRadius:3,background:`${s.color}15`,border:`1px solid ${s.color}33`}}>
              {s.label}: {s.tails.map(t=>TAIL_SHORT[t]).join(' · ')}
            </div>
          ))}
          <span style={{fontSize:12,color:"#6a8aaa",marginLeft:4}}>
            <span style={{color:"#5aaa8a"}}>VFR</span> &nbsp;
            <span style={{color:"#4a9eff"}}>IFR</span> &nbsp;
            <span style={{color:"#aa7adf"}}>RS</span> &nbsp;
            <span style={{color:"#ffd740"}}>↑</span> via group
          </span>
        </div>

        {/* TRUE TABLE — browser enforces perfect column alignment */}
        <table style={{borderCollapse:"collapse",background:"#060a0e",
          borderRadius:6,border:"1px solid #1e2730",
          tableLayout:"fixed",width:"100%",minWidth:`${160+ALL_TAILS.length*44}px`}}>
          <colgroup>
            <col style={{width:160}}/>
            {ALL_TAILS.map(t=><col key={t} style={{width:44}}/>)}
          </colgroup>
          <thead>
            <tr style={{background:"#0a0e14"}}>
              <th style={{padding:"8px 10px",textAlign:"left",fontSize:15,
                color:"#8aaabb",fontWeight:700,
                borderBottom:"2px solid #1e2730",
                borderRight:"1px solid #1a2530",
                position:"sticky",left:0,background:"#0a0e14",zIndex:2}}>
                PILOT <span style={{color:"#3a5060",fontWeight:400,fontSize:14}}>{filtered.length}</span>
              </th>
              {ALL_TAILS.map((t,ti)=>{
                const sec=AC_SECTIONS.find(s=>s.tails.includes(t));
                const isFirst=sec&&sec.tails.indexOf(t)===0;
                return <th key={t} style={{
                  padding:"6px 2px 0px",
                  textAlign:"center",
                  borderBottom:"2px solid #1e2730",
                  borderLeft:isFirst?`2px solid ${sec?.color||"#333"}66`:"1px solid #131c28",
                  background:"#0a0e14"}}>
                  <div style={{fontSize:14,color:sec?.color||"#7a9ab0",fontWeight:700,marginBottom:3}}>
                    {TAIL_SHORT[t]}
                  </div>
                  <div style={{height:3,background:sec?`${sec.color}99`:"#1a2530",margin:"0 4px"}}/>
                </th>;
              })}
            </tr>
          </thead>
          <tbody>
            {filtered.map((p,pi)=>(
              <tr key={p.fullName}
                style={{background:pi%2===0?"#08101e":"#122030",borderBottom:"1px solid #111820"}}
                onMouseEnter={e=>e.currentTarget.style.background="#1a3048"}
                onMouseLeave={e=>e.currentTarget.style.background=pi%2===0?"#08101e":"#122030"}>
                <td style={{padding:"5px 10px",fontSize:15,color:"#c8d8e8",fontWeight:700,
                  borderRight:"1px solid #1a2530",
                  position:"sticky",left:0,
                  background:"inherit",
                  maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {p.fullName.split(' ').slice(-1)[0]+', '+p.fullName.split(' ')[0]}
                  {Object.values(p.aircraft).some(a=>a.ifr)&&
                    <span style={{fontSize:10,color:"#4a9eff",fontWeight:700,marginLeft:4}}>IFR</span>}
                </td>
                {ALL_TAILS.map((t,ti)=>{
                  const sec=AC_SECTIONS.find(s=>s.tails.includes(t));
                  const isFirst=sec&&sec.tails.indexOf(t)===0;
                  return <td key={t} style={{
                    padding:0,textAlign:"center",
                    borderLeft:isFirst?`2px solid ${sec?.color||"#333"}33`:"1px solid #131c28"}}>
                    <QCell p={p} tail={t}/>
                  </td>;
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>}

      {/* ── LOCATIONS VIEW ── */}
      {viewMode==="locations"&&<div>
        <div style={{fontSize:14,color:"#7a9ab0",marginBottom:10,lineHeight:1.6}}>
          Special authorization required for these locations. IFR-heavy routes flagged separately.
        </div>

        {/* Location cards */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:16}}>
          {ALL_LOCS.map(loc=>{
            const qualified = filtered.filter(p=>isPilotQualifiedForLocation(p,loc));
            return <div key={loc} style={{background:"#0a0e14",borderRadius:6,padding:"10px 12px",
              border:"1px solid #1a2530"}}>
              <div style={{fontSize:15,fontWeight:700,color:"#ff8844",marginBottom:6}}>{loc}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                {qualified.map(p=>(
                  <span key={p.fullName} style={{fontSize:12,color:"#6a9a7a",background:"rgba(90,170,138,0.1)",
                    padding:"1px 5px",borderRadius:3,border:"1px solid rgba(90,170,138,0.2)"}}>
                    {p.fullName.split(' ').slice(-1)[0]}
                  </span>
                ))}
                {!qualified.length&&<span style={{fontSize:14,color:"#3a5060"}}>No pilots authorized</span>}
              </div>
            </div>;
          })}
        </div>

        {/* IFR routes reference */}
        <div style={{background:"#0a0e14",borderRadius:6,padding:"12px 14px",border:"1px solid #1a2530"}}>
          <div style={{fontSize:15,fontWeight:700,color:"#4a9eff",marginBottom:8,letterSpacing:"0.08em"}}>
            IFR-HEAVY ROUTES (§135.297)
          </div>
          <div style={{fontSize:14,color:"#7a9ab0",marginBottom:8,lineHeight:1.6}}>
            Kake · Sitka · Klawock · Ketchikan · Petersburg · Wrangell · Yakutat<br/>
            VFR pilots <em>can</em> operate these routes in VMC — but flag when conditions deteriorate.
          </div>
          <div style={{fontSize:14,color:"#6a8aaa",marginBottom:6,fontWeight:700}}>IFR-QUALIFIED PILOTS</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {filtered.filter(p=>Object.values(p.aircraft).some(a=>a.ifr)).map(p=>(
              <span key={p.fullName} style={{fontSize:14,color:"#4a9eff",background:"rgba(74,158,255,0.1)",
                padding:"2px 7px",borderRadius:3,border:"1px solid rgba(74,158,255,0.25)",fontWeight:700}}>
                {p.fullName}
              </span>
            ))}
          </div>
        </div>
      </div>}
    </div>
  );
}


// ── MODALS ─────────────────────────────────────────────────────────────────────
function ProfileModal({profile,onSave,onClose}) {
  const [name,setName]=useState(profile.name);
  const [dt,setDt]=useState(profile.defaultDutyType);
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div style={{background:"#0d1117",borderRadius:"16px 16px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:430,border:"1px solid #1e2730"}}>
      <div style={{fontSize:24,fontWeight:700,letterSpacing:"0.1em",marginBottom:20,textTransform:"uppercase"}}>Pilot Profile</div>
      <div style={S.fg}><label style={S.lbl}>PILOT NAME</label><input value={name} onChange={e=>setName(e.target.value)} style={S.inp} placeholder="First Last" autoFocus/></div>
      <div style={S.fg}>
        <label style={S.lbl}>DEFAULT DUTY TYPE</label>
        <div style={{display:"flex",gap:8}}>

function DutyModal({date,initial,onSave,onClose}) {

  const dm=(ds&&de)?calcMin(ds,de):null;
  const dc=dm!=null?getStatus(dm,840,660):"green";

        <div style={{flex:1}}><label style={S.lbl}>DUTY START</label><input type="time" value={ds} onChange={e=>setDs(e.target.value)} style={{...S.inp,fontSize:30}}/></div>
        <div style={{flex:1}}><label style={S.lbl}>DUTY END</label><input type="time" value={de} onChange={e=>setDe(e.target.value)} style={{...S.inp,fontSize:30}}/></div>

      <div style={{display:"flex",gap:10,marginTop:8}}>
