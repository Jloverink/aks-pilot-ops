                  <StatCell label="AVG DUTY" value={c.avgDutyMins?fmtMin(c.avgDutyMins):"—"}
                    color="#8aaabb"
                    tip="Duty times are estimated as 1hr before first scheduled departure to 1hr after last landing, unless a blanket (06:00–20:00) or custom assignment is set.\nPart 135 limit: 14 hours.\nThis shows the average across all duty days."/>
                  <StatCell label="SHORTEST DUTY" value={c.minDutyMins?fmtMin(c.minDutyMins):"—"}
                    color="#6a9a7a"
                    tip="Duty times are estimated as 1hr before first scheduled departure to 1hr after last landing, unless a blanket (06:00–20:00) or custom assignment is set.\nPart 135 limit: 14 hours.\nThis shows the shortest day."/>
                </div>

                {/* ── PILOT STATS ── */}
                {c.legStats&&(()=>{
                  const ls=c.legStats;
                  const StatMini=({label,value,sub,color,tip})=>(
                    <Tip text={tip||""} width={200}>
                      <div style={{background:"#0a1018",borderRadius:4,padding:"7px 9px",
                        border:"1px solid #1a2530",cursor:tip?"help":"default"}}>
                        <div style={{fontSize:12,color:"#8aaabb",letterSpacing:"0.05em",marginBottom:2,fontWeight:600}}>
                          {label}{tip&&<span style={{color:"#3a5a6a",marginLeft:2}}>?</span>}
                        </div>
                        <div style={{fontSize:21,fontWeight:700,color:color||"#d0dae8",lineHeight:1}}>{value}</div>
                        {sub&&<div style={{fontSize:12,color:"#5a7a8a",marginTop:2}}>{sub}</div>}
                      </div>
                    </Tip>
                  );

                  const showPilotStats = !!(pilotStatsOpen[pd.username]);
                  return <div style={{background:"#060a0e",borderRadius:6,marginBottom:8,
                    border:"1px solid #1a2530",overflow:"visible"}}>
                    <div onClick={e=>{e.stopPropagation();setPilotStatsOpen(p=>({...p,[pd.username]:!p[pd.username]}));}}
                      style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                        padding:"8px 10px",cursor:"pointer",
                        borderBottom:pilotStatsOpen[pd.username]?"1px solid #1a2530":"none",
                        background:"rgba(74,158,255,0.04)",borderRadius:pilotStatsOpen[pd.username]?"6px 6px 0 0":"6px"}}>
                      <span style={{fontSize:15,color:"#4a9eff",fontWeight:700,letterSpacing:"0.1em",display:"flex",alignItems:"center",gap:5}}>
                        📊 PILOT STATS
                        <span style={{fontSize:15,color:showPilotStats?"#5aaa8a":"#4a9eff",fontWeight:700}}>{showPilotStats?"▼":"▶"}</span>
                      </span>
                    </div>
                    {showPilotStats&&<div style={{padding:"0 10px 10px"}}>

                      {/* Daily flight time */}
                      <div style={{fontSize:12,color:"#6a8aaa",fontWeight:700,letterSpacing:"0.08em",
                        marginBottom:5,marginTop:4}}>DAILY FLIGHT TIME</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,marginBottom:8}}>
                        <StatMini label="MAX DAY FLT" value={fmtMin(ls.maxDayFltMins)} color={SC.green}
                          tip="Highest total block time in a single day."/>
                        <StatMini label="AVG DAY FLT" value={fmtMin(ls.avgDayFltMins)} color="#8aaabb"
                          tip="Average total block time per working day."/>
                        <StatMini label="MIN DAY FLT" value={fmtMin(ls.minDayFltMins)} color="#6a9a7a"
                          tip="Lowest total block time on a day that had at least one flight."/>
                      </div>

                      {/* Daily leg counts */}
                      <div style={{fontSize:12,color:"#6a8aaa",fontWeight:700,letterSpacing:"0.08em",
                        marginBottom:5}}>DAILY LEG COUNT</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,marginBottom:8}}>
                        <StatMini label="MOST LEGS" value={ls.maxDayLegs} color={SC.green}
                          tip="Most legs flown in a single day."/>
                        <StatMini label="AVG LEGS/DAY" value={ls.avgDayLegs.toFixed(1)} color="#8aaabb"
                          tip="Average legs per working day."/>
                        <StatMini label="FEWEST LEGS" value={ls.minDayLegs} color="#6a9a7a"
                          tip="Fewest legs on a day with at least one flight."/>
                      </div>

                      {/* Individual leg times */}
                      <div style={{fontSize:12,color:"#6a8aaa",fontWeight:700,letterSpacing:"0.08em",
                        marginBottom:5}}>INDIVIDUAL LEG</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
                        <StatMini label="LONGEST LEG" value={fmtMin(ls.maxLegMins)} color={SC.green}
                          tip={ls.maxLegFlight?`${ls.maxLegFlight.origin}→${ls.maxLegFlight.destination} on ${ls.maxLegFlight.date}\n${fmtMin(ls.maxLegMins)} block · ${ls.maxLegFlight.tailNumber||"—"}`:"Longest single leg block time."}/>
                        <StatMini label="AVG LEG" value={fmtMin(ls.avgLegMins)} color="#8aaabb"
                          tip="Average block time per leg across all completed flights."/>
                        <StatMini label="SHORTEST LEG" value={fmtMin(ls.minLegMins)} color="#6a9a7a"
                          tip={ls.minLegFlight?`${ls.minLegFlight.origin}→${ls.minLegFlight.destination} on ${ls.minLegFlight.date}\n${fmtMin(ls.minLegMins)} block · ${ls.minLegFlight.tailNumber||"—"}`:"Shortest single leg block time."}/>
                      </div>

                    </div>}
                  </div>;
                })()}

                {/* ── QUALIFICATION WARNINGS ── */}
                {qualWarnings.length>0&&<div style={{background:"rgba(255,71,87,0.07)",
                  borderRadius:6,padding:"8px 10px",marginBottom:8,
                  border:"1px solid rgba(255,71,87,0.25)"}}>
                  <div style={{fontSize:14,fontWeight:700,color:SC.red,letterSpacing:"0.08em",marginBottom:5}}>
                    ⚠ QUALIFICATION WARNINGS
                  </div>
                  {qualWarnings.map((w,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:6,
                      fontSize:15,padding:"2px 0",
                      borderBottom:i<qualWarnings.length-1?"1px solid rgba(255,71,87,0.1)":"none"}}>
                      <span style={{fontSize:12,padding:"1px 4px",borderRadius:2,fontWeight:700,
                        background:`${w.color}22`,color:w.color,border:`1px solid ${w.color}44`}}>
                        {w.type==='aircraft'?'AIRCRAFT':w.type==='location'?'LOCATION':'IFR'}
                      </span>
                      <span style={{color:w.type==='ifr'?"#c0b060":"#c06060"}}>{w.msg}</span>
                    </div>
                  ))}
                </div>}


                {/* ── IOE & LOCATION TRACKING ── */}
                {(()=>{
                  const hasIOE = c.ioeFlights&&c.ioeFlights.length>0;
                  const hasLocs = c.locationStatus&&Object.keys(c.locationStatus).length>0;
                  if(!hasIOE&&!hasLocs) return null;
                  const ioeOpen = getSection(pd.username,'ioe',false);
                  const IOE_REQS = c.IOE_REQS||{};
                  const types = Object.keys(c.ioeHoursByType||{});
                  // Location counts
                  const ls = c.locationStatus||{};
                  const trained   = Object.entries(ls).filter(([,v])=>v==='trained').map(([k])=>k).sort();
                  const untrained = Object.entries(ls).filter(([,v])=>v==='untrained').map(([k])=>k).sort();
                  const never     = Object.entries(ls).filter(([,v])=>v==='never').map(([k])=>k).sort();
                  if(!hasIOE&&trained.length===0&&untrained.length===0) return null;
                  return <div style={{marginBottom:8}}>
                    <div onClick={e=>{e.stopPropagation();toggleSection(pd.username,'ioe');}}
                      style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",
                        padding:"6px 10px",borderRadius:6,marginBottom:ioeOpen?6:0,
                        background:"rgba(0,184,148,0.07)",border:"1px solid rgba(0,184,148,0.2)"}}>
                      <span style={{fontSize:13,fontWeight:700,letterSpacing:"0.1em",color:"#00b894"}}>
                        ✈ IOE &amp; LOCATIONS
                        <span style={{fontSize:11,fontWeight:400,color:"#5a8a7a",marginLeft:8}}>
                          {trained.length} trained · {untrained.length} solo · {never.length} never
                        </span>
                      </span>
                      <span style={{fontSize:14,color:ioeOpen?"#5aaa8a":"#00b894",fontWeight:700,marginLeft:4}}>
                        {ioeOpen?"▼":"▶"}
                      </span>
                    </div>
                    {ioeOpen&&<div style={{background:"rgba(0,0,0,0.3)",borderRadius:6,padding:"10px 12px",
                      border:"1px solid rgba(0,184,148,0.15)"}}>

                      {/* IOE Hours by aircraft type */}
                      {types.length>0&&<>
                        <div style={{fontSize:12,fontWeight:700,color:"#00b894",letterSpacing:"0.1em",marginBottom:6}}>
                          IOE HOURS (§135.244)
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
                          {types.map(t=>{
                            const req   = IOE_REQS[t];
                            if(!req) return null;
                            const mins  = c.ioeHoursByType[t]||0;
                            const hrs   = mins/60;
                            const ldgs  = c.ioeLandingsByType[t]||0;
                            const pctReq = Math.min(1, hrs/req.reqHrs);
                            const pctMin = Math.min(1, hrs/req.minHrs);
                            const metMin = hrs>=req.minHrs;
                            const metReq = hrs>=req.reqHrs;
                            const barCol = metReq?"#00b894":metMin?"#ffd740":SC.orange;
                            return <div key={t}>
                              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:13}}>
                                <span style={{color:"#9abacb"}}>{req.label}</span>
                                <span style={{color:barCol,fontWeight:700}}>
                                  {hrs.toFixed(1)}h / {req.reqHrs}h req
                                  <span style={{color:"#5a7a8a",fontWeight:400,marginLeft:6}}>
                                    ({ldgs} T&amp;Ls · min {req.minHrs}h)
                                  </span>
                                </span>
                              </div>
                              <div style={{height:6,background:"#1e2730",borderRadius:3,overflow:"hidden",position:"relative"}}>
                                <div style={{position:"absolute",left:`${(req.minHrs/req.reqHrs)*100}%`,top:0,bottom:0,
                                  width:1,background:"#ffd74077",zIndex:1}}/>
                                <div style={{height:"100%",width:`${pctReq*100}%`,background:barCol,borderRadius:3,
                                  transition:"width 0.3s"}}/>
                              </div>
                              {!metMin&&<div style={{fontSize:11,color:SC.orange,marginTop:2}}>
                                {(req.minHrs-hrs).toFixed(1)}h to minimum · {Math.max(0,req.reqHrs-hrs).toFixed(1)}h to full requirement
                              </div>}
                              {metMin&&!metReq&&<div style={{fontSize:11,color:"#ffd740",marginTop:2}}>
                                ✓ Minimum met · {(req.reqHrs-hrs).toFixed(1)}h to full requirement
                              </div>}
                              {metReq&&<div style={{fontSize:11,color:"#00b894",marginTop:2}}>✓ IOE complete</div>}
                            </div>;
                          })}
                        </div>
                      </>}

                      {/* Location status grid */}
                      {(trained.length>0||untrained.length>0||never.length>0)&&<>
                        <div style={{fontSize:12,fontWeight:700,color:"#00b894",letterSpacing:"0.1em",marginBottom:4}}>
                          LOCATIONS
                          <span style={{fontSize:10,fontWeight:400,color:"#5a7a8a",marginLeft:8}}>
                            🟢 with training pilot &nbsp;🟡 solo PIC &nbsp;⬜ never flown
                          </span>
                        </div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                          {trained.map(loc=>(
                            <span key={loc} style={{fontSize:12,padding:"2px 7px",borderRadius:3,
                              background:"rgba(0,184,148,0.15)",color:"#00b894",border:"1px solid rgba(0,184,148,0.3)",
                              fontFamily:"monospace",fontWeight:700}}>🟢 {loc}</span>
                          ))}
                          {untrained.map(loc=>(
                            <span key={loc} style={{fontSize:12,padding:"2px 7px",borderRadius:3,
                              background:"rgba(255,215,64,0.1)",color:"#ffd740",border:"1px solid rgba(255,215,64,0.25)",
                              fontFamily:"monospace",fontWeight:700}}>🟡 {loc}</span>
                          ))}
                          {never.map(loc=>(
                            <span key={loc} style={{fontSize:12,padding:"2px 7px",borderRadius:3,
                              background:"rgba(255,255,255,0.03)",color:"#3a5060",border:"1px solid #1e2730",
                              fontFamily:"monospace"}}>⬜ {loc}</span>
                          ))}
                        </div>
                      </>}
                    </div>}
                  </div>;
                })()}
                {/* Rolling breakdown — collapsible */}
                <div style={{background:"#060a0e",borderRadius:6,marginBottom:8,border:"1px solid #1a2530",overflow:"hidden"}}>
                  <div onClick={e=>{e.stopPropagation();toggleSection(pd.username,'rolling');}}
                    style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                      padding:"7px 10px",cursor:"pointer"}}>
                    <div style={{fontSize:15,color:"#9abada",fontWeight:700,letterSpacing:"0.08em"}}>
                      ROLLING 8-IN-24 BREAKDOWN
                      <span style={{fontWeight:400,marginLeft:8,color:"#7a9ab8",fontSize:14}}>
                        window: {msToLocalHHMM(c.windowStartMs)} → {msToLocalHHMM(c.windowStartMs+86400000)}
                      </span>
                    </div>
                    <span style={{fontSize:14,color:getSection(pd.username,'rolling',false)?"#5aaa8a":"#4a9eff",fontWeight:700,marginLeft:6}}>{getSection(pd.username,'rolling',false)?"▼":"▶"}</span>
                  </div>
                  {getSection(pd.username,'rolling',false)&&<div style={{padding:"0 10px 8px"}}>
                    {c.rolling>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid #1a2530",fontSize:16}}>
                      <span style={{color:SC.green}}>✓ Completed (in window)</span>
                      <span style={{fontWeight:700,color:SC.green}}>{fmtMin(c.rolling)}</span>
                    </div>}
                    {c.rolling===0&&<div style={{fontSize:15,color:"#7a9ab0",padding:"3px 0"}}>No completed flights in 24h window</div>}
                    {c.enrouteFlights?.map((f,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid #1a2530",fontSize:15}}>
                        <span style={{color:"#ffd740"}}>✈ En route {f.origin}→{f.destination} (est)</span>
                        <span style={{color:"#ffd740"}}>+{fmtMin(f.totalMinutes)}</span>
                      </div>
                    ))}
                    {c.schedInWindow?.map((f,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid #1a2530",fontSize:15}}>
                        <span style={{color:"#4a9eff"}}>→ {f.origin}→{f.destination} {f.startTaxi}</span>
                        <span style={{color:"#4a9eff"}}>+{fmtMin(f.totalMinutes)}</span>
                      </div>
                    ))}
                    {(!c.enrouteFlights?.length&&!c.schedInWindow?.length)&&<div style={{fontSize:15,color:"#7a9ab0",padding:"3px 0"}}>No upcoming flights in this 24h window</div>}
                    <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0 0",fontSize:18,marginTop:2}}>
                      <span style={{fontWeight:700,color:"#e0e8f0"}}>PROJECTED TOTAL</span>
                      <span style={{fontWeight:700,color:col}}>{fmtMin(c.rollingProjected)} / 8:00</span>
                    </div>
                    {c.noGoMs&&c.noGoMs>Date.now()&&<div style={{marginTop:6,padding:"6px 8px",background:"rgba(255,71,87,0.1)",borderRadius:4,border:"1px solid rgba(255,71,87,0.3)"}}>
                      <div style={{fontSize:15,fontWeight:700,color:SC.red}}>🚫 PROJECTED NO-GO AT {msToLocalHHMM(c.noGoMs)}</div>
                    </div>}
                    {c.noGoMs&&c.noGoMs<=Date.now()&&<div style={{marginTop:6,padding:"6px 8px",background:"rgba(255,71,87,0.1)",borderRadius:4,border:"1px solid rgba(255,71,87,0.3)"}}>
                      <div style={{fontSize:15,fontWeight:700,color:SC.red}}>🚫 AT OR OVER 8-HOUR LIMIT</div>
                      {c.clearsAtMs&&<div style={{fontSize:14,color:"#b8c8d8",marginTop:1}}>Clears at {msToLocalHHMM(c.clearsAtMs)}</div>}
                    </div>}
                  </div>}
                </div>
              </>;
            })()}

            {cw ? <div style={{background:"#060a0e",borderRadius:6,padding:"10px 12px",marginTop:4,border:`1px solid ${cwDot?cwDot+"33":"#1a2530"}`}}>
              <div onClick={e=>{e.stopPropagation();toggleSection(pd.username,'certs');}}
                style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  cursor:"pointer",marginBottom:getSection(pd.username,'certs',false)?8:0}}>
                <span style={{fontSize:14,fontWeight:700,letterSpacing:"0.1em",color:"#7a9ab8"}}>
                  🪪 CERTIFICATES &amp; CURRENCY
                  {cwDot&&<span style={{marginLeft:6,fontSize:12,fontWeight:700,padding:"1px 5px",borderRadius:3,
                    color:cwDot,background:`${cwDot}22`}}>
                    {cw.expired.length>0?`${cw.expired.length} EXPIRED`:cw.expiring.length>0?`${cw.expiring.length} ≤30d`:`${cw.warning.length} ≤60d`}
                  </span>}
                </span>
                <span style={{fontSize:12,color:"#5a6a7a",display:"flex",alignItems:"center",gap:4}}>via Pilot Status Board <span style={{fontSize:14,color:getSection(pd.username,'certs',false)?"#5aaa8a":"#4a9eff",fontWeight:700}}>{getSection(pd.username,'certs',false)?"▼":"▶"}</span></span>
              </div>
              {getSection(pd.username,'certs',false)&&<>

              {/* Qualifications badges */}
              {Object.values(cw.pilot.quals||{}).some(v=>v&&v!=="nan")&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
                {[["C-208",cw.pilot.quals.c208],["DHC-2",cw.pilot.quals.dhc2],["C-206",cw.pilot.quals.c206],["PC-12/47",cw.pilot.quals.pc12_47],["PC-12/45",cw.pilot.quals.pc12_45]].map(([acft,q])=>
                  q&&q!=="nan"?<span key={acft} style={{fontSize:14,padding:"2px 7px",borderRadius:3,background:"#0d1520",border:"1px solid #2a3a4a",color:"#7aaabb",fontWeight:700}}>{acft}: {q}</span>:null
                )}
              </div>}

              {/* Items by category */}
              {["medical","kal_checkride","kal_aircraft","kal_training","airx_checkride","airx_aircraft","airx_training","training","approach"].map(cat=>{
                const catItems = cat==="approach"
                  ? [...(crewData?.kalinin?.[cw.pilot.name]||[]),...(crewData?.airx?.[cw.pilot.name]||[])].map(a=>({
                      label:`[${a.airport||"?"}] ${a.approach}`, days:a.days, status:a.status, category:"approach"
                    }))
                  : Object.values(cw.pilot.items).filter(i=>i.category===cat);
                if(!catItems.length) return null;
                const catLabel={medical:"MEDICAL",kal_checkride:"KALININ CHECK RIDES",kal_aircraft:"KALININ AIRCRAFT",kal_training:"KALININ TRAINING",airx_checkride:"AIR X CHECK RIDES",airx_aircraft:"AIR X AIRCRAFT",airx_training:"AIR X TRAINING",training:"SHARED TRAINING",approach:"SPECIAL APPROACHES"}[cat]||cat;
                const catHasRed = catItems.some(i=>i.status==="red");
                const catHasOrange = catItems.some(i=>i.status==="orange");
                return <div key={cat} style={{marginBottom:8}}>
                  <div style={{fontSize:12,fontWeight:700,letterSpacing:"0.1em",
                    color:catHasRed?SC.red:catHasOrange?SC.orange:"#7a9ab0",marginBottom:4}}>
                    {catLabel}
                  </div>
                  {catItems.map((item,i)=>{
                    const ic=SC[item.status]||"#6a8aa8";
                    const label = item.label||(item.approach?`[${item.airport}] ${item.approach}`:"?");
                    const {daysStr,flair} = formatCertItem(item);
                    return <div key={i} style={{padding:"4px 0",borderBottom:"1px solid #0d1520"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:15}}>
                        <span style={{color:item.status==="green"?"#6a8aa8":"#b8c8d8",maxWidth:"65%"}}>{label}</span>
                        <div style={{display:"flex",alignItems:"center",gap:5}}>
                          {flair&&<span style={{fontSize:12,fontWeight:700,padding:"1px 5px",borderRadius:3,
                            color:flair.color,background:flair.bg,border:`1px solid ${flair.color}44`,whiteSpace:"nowrap"}}>
                            {flair.text}
                          </span>}
                          <span style={{fontWeight:700,color:ic,whiteSpace:"nowrap"}}>{daysStr}</span>
                        </div>
                      </div>
                    </div>;
                  })}
                </div>;
              })}
              </>}{/* end certs body */}
            </div>
            : hasCrew
              ? <div onClick={e=>{e.stopPropagation();}} style={{fontSize:14,color:"#7a9ab0",marginTop:6,padding:"6px 10px",background:"#060a0e",borderRadius:6,border:"1px solid #1a2530"}}>
                  🪪 No crew record matched for <em>{pd.fullName}</em> — check name spelling in Status Board
                </div>
              : <div style={{fontSize:14,color:"#7a9ab0",marginTop:6,padding:"6px 10px",background:"#060a0e",borderRadius:6,border:"1px dashed #1a2530"}}>
                  🪪 Upload Pilot Status Board on the CREW tab to see cert &amp; currency details here
                </div>
            }

          </div>}
        </div>;
      })}
    </div>

    {/* Duty assignment modal */}
    {assignDay&&<DutyAssignModal
      pilot={assignDay.username}
      date={assignDay.date}
      initial={assignDay.initial}
      onSave={(date,assignment)=>{ onUpdateDuty(assignDay.username,date,assignment); setAssignDay(null); }}
      onClose={()=>setAssignDay(null)}
    />}
  </div>;
}


// ── PART 135 REGULATIONS REFERENCE ───────────────────────────────────────────
const REGS = [
  {
    id: "135.244",
    title: "§135.244 — Operating Experience (IOE)",
    applies: "Pilots in command of commuter operations — all Part 135",
    color: "#00b894",
    sections: [
      {
        heading: "§(a) Required Operating Experience (OE)",
        rules: [
          { label: "Single-engine aircraft",              limit: "10 hours",  warn: "", note: "§(a)(1) — In make/model and crewmember position" },
          { label: "Multiengine, reciprocating",          limit: "15 hours",  warn: "", note: "§(a)(2)" },
          { label: "Multiengine, turbine-powered",        limit: "20 hours",  warn: "", note: "§(a)(3) — Covers Caravan, PC-12, etc." },
          { label: "Turbojet-powered",                    limit: "25 hours",  warn: "", note: "§(a)(4)" },
        ]
      },
      {
        heading: "§(b) How OE Must Be Acquired",
        rules: [
          { label: "Timing",             limit: "After ground & flight training", warn: "", note: "§(b)(1) — Must complete approved training first; OE provisions must be in the training program" },
          { label: "Flight type",        limit: "Commuter pax-carrying operations", warn: "", note: "§(b)(2) — Must be in actual revenue service. Ferry/proving flights may substitute if aircraft is new to the certificate holder" },
          { label: "Supervision",        limit: "Qualified check pilot required",   warn: "", note: "§(b)(3) — Trainee performs PIC duties; check airman supervises from right seat" },
          { label: "Reduction by T&Ls",  limit: "Down to 50% minimum",             warn: "", note: "§(b)(4) — Each additional T&L substitutes for 1 hour; cannot reduce below half the required hours" },
        ]
      },
      {
        heading: "Practical Notes for AKS",

const MONTHS_MAP = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};

// Returns { date, graceDate, isMmmYY }
// MMM-YY certs: expires last day of shown month (FAA rule — medicals expire END of month)
// grace month applies to check rides/training; medicals have NO grace period
// M/D/YY certs (icing courses etc.): exact date, no grace month
function parseDateInfo(v, isMedical=false) {
  if(!v || v==="nan") return null;
  const s = String(v).trim();
  if(!s || s==="nan" || s==="0") return null;
  if(/^\d{5,}$/.test(s)) return null; // raw Excel serial

  // "MMM-YY" → expires last day of that month (FAA: end of calendar month)
  const mmmYY = s.match(/^([A-Za-z]{3})-(\d{2})$/);
  if(mmmYY) {
    const mo = MONTHS_MAP[mmmYY[1].toLowerCase()];
    if(mo === undefined) return null;
    const yr = 2000 + parseInt(mmmYY[2]);
    if(yr < 2020 || yr > 2035) return null;
    const date      = new Date(yr, mo + 1, 0); // last day of expiry month
    // Medicals: no grace period — hard expiry at end of shown month
    // Other certs: 1 month grace (e.g. checkride currency)
    const graceDate = isMedical ? date : new Date(yr, mo + 2, 0);
    return { date, graceDate, isMmmYY: true };
  }

  // "M/D/YY" or "MM/DD/YY" → exact date, no grace
  const mdyy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/);
  if(mdyy) {
    const yr = 2000 + parseInt(mdyy[3]);
    if(yr < 2020 || yr > 2035) return null;
    const date = new Date(yr, parseInt(mdyy[1])-1, parseInt(mdyy[2]));
    return { date, graceDate: date, isMmmYY: false };
  }

  // ISO / full date strings
  const d = new Date(s);
  if(isNaN(d.getTime())) return null;
  const yr = d.getFullYear();
  if(yr < 2020 || yr > 2035) return null;
  return { date: d, graceDate: d, isMmmYY: false };
}

function parseDate(v) {
  const info = parseDateInfo(v);
  return info ? info.date : null;
}

function daysUntil(dateStr) {
  const d = parseDate(dateStr);
  if(!d) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

// Returns { days, graceDays, isMmmYY, phase }
// phase: "ok" | "base" (in base month) | "grace" (in grace month) | "expired"
function dateStatus(val, isMedical=false) {
  const info = parseDateInfo(val, isMedical);
  if(!info) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const days      = Math.round((info.date      - today) / 86400000);
  const graceDays = Math.round((info.graceDate - today) / 86400000);

  let phase, status;
  if(info.isMmmYY) {
    if(graceDays < 0)     { phase="expired"; status="red";    }
    else if(days < 0)     { phase="grace";   status="orange"; }
    else if(days <= 31)   { phase="base";    status="yellow"; }
    else if(days <= 62)   { phase="soon";    status="yellow"; }
    else                  { phase="ok";      status="green";  }
  } else {
    // Exact-date items (icing courses etc) — no grace month
    if(days < 0)          { phase="expired"; status="red";    }
    else if(days <= 30)   { phase="soon";    status="red";    }
    else if(days <= 60)   { phase="soon";    status="orange"; }
    else if(days <= 90)   { phase="soon";    status="yellow"; }
    else                  { phase="ok";      status="green";  }
  }
  return { days, graceDays, isMmmYY: info.isMmmYY, phase, status };
}

function statusFromDays(days) {
  if(days === null) return null;
  if(days < 0)   return "red";
  if(days <= 30) return "red";
  if(days <= 60) return "orange";
  if(days <= 90) return "yellow";
  return "green";
}

function parseCSVRow(row) {
  // Handle quoted fields with commas
  const result = [];
  let inQuote = false, cur = "";
  for(let i=0; i<row.length; i++){
    if(row[i]==="\"") { inQuote=!inQuote; continue; }
    if(row[i]==="," && !inQuote) { result.push(cur.trim()); cur=""; continue; }
    cur += row[i];
  }
  result.push(cur.trim());
  return result;
}

function parseCrewCSV(csvText, isHistorical=false) {
  const rows = csvText.split("\n").map(r => parseCSVRow(r));
  if(rows.length < 3) return [];
  // rows[0] and rows[1] are headers — skip both
  const pilots = [];
  for(let i=2; i<rows.length; i++){
    const r = rows[i];
    const last = r[COL.last]||"";
    const first = r[COL.first]||"";
    if(!last || last.toLowerCase()==="nan" || last.toLowerCase().includes("historical")) continue;
    // Historical sheet has "Date Of Separation" at col 2
    const sepDate = isHistorical ? (r[2]||"") : null;

    const items = {};
    Object.entries(COL_LABELS).forEach(([key, meta]) => {
      const val = r[COL[key]]||"";
      const ds = dateStatus(val, key==="medical"); // medicals: hard end-of-month, no grace
      if(ds !== null) {
        items[key] = { label:meta.label, category:meta.category, val,
          days:ds.days, graceDays:ds.graceDays, isMmmYY:ds.isMmmYY,
          phase:ds.phase, status:ds.status };
      }
    });

    // Aircraft qualifications (W/A/S letters)
    const quals = {
      c208:  r[COL.qual208]||"",
      dhc2:  r[COL.qualDhc2]||"",
      c206:  r[COL.qual206]||"",
      pc12_47: r[COL.pc12_47]||"",
      pc12_45: r[COL.pc12_45]||"",
    };

    // Worst status
    const statuses = Object.values(items).map(x=>x.status).filter(Boolean);
    const worstStatus = statuses.includes("red")?"red":statuses.includes("orange")?"orange":statuses.includes("yellow")?"yellow":"green";

    pilots.push({ last, first, name:`${first} ${last}`, pos:r[COL.pos]||"", cert:r[COL.cert]||"", items, quals, worstStatus, sepDate: sepDate||null, isHistorical });
  }
  return pilots;
}

// Approaches requiring both ground training AND a physical flight to be signed off
const APPROACH_DUAL_REQUIRED = new Set([
  "ROVZU 4",
  "ROVZU FOUR RNAV DEP",
  "ALSEK 4",
  "ALSEK FOUR RNAV DEP",
  "RNAV (GPS) Q RWY 8 LP",
]);

// Icing course expiry rules
// Boot Ice and TKS Ice expire exactly 1 year from the course date (M/D/YY format)
// All other MMM-YY certs expire end-of-month

function parseKalininCSV(csvText) {
  const rows = csvText.split("\n").map(r=>parseCSVRow(r));
  if(rows.length<3) return {};
  const airportRow = rows[0];
  const approachRow = rows[1];
  const result = {};
  for(let i=2; i<rows.length; i++){
    const r=rows[i];
    const last=r[0]||"", first=r[1]||"";
    if(!last||last.toLowerCase()==="nan") continue;
    const name=`${first} ${last}`;
    const approaches=[];
    for(let c=2; c<r.length; c++){
      const val=r[c]||"";
      const days=daysUntil(val);
      if(days!==null) {
        const apprName = (approachRow[c]||"").trim();
        approaches.push({
          airport:(airportRow[c]||"").trim(),
          approach: apprName,
          val, days,
          status: statusFromDays(days),
          dualRequired: APPROACH_DUAL_REQUIRED.has(apprName),
        });
      }
    }
    if(approaches.length) result[name]=approaches;
  }
  return result;
}

// Format a cert item's days + phase into display string and flair badge
function formatCertItem(item) {
  if(!item) return { daysStr:"—", flair:null };
  const { days, graceDays, isMmmYY, phase } = item;
  if(days === null) return { daysStr:"—", flair:null };

  let daysStr, flair=null;
  const FLAIR = {
    expired: { text:"EXPIRED",    color:"#ff4757", bg:"rgba(255,71,87,0.15)"  },
    grace:   { text:"GRACE MONTH",color:"#ff9f43", bg:"rgba(255,159,67,0.15)" },
    base:    { text:"BASE MONTH", color:"#ffd740", bg:"rgba(255,215,64,0.15)" },
    soon:    { text:"SOON",       color:"#ffd740", bg:"rgba(255,215,64,0.1)"  },
    ok:      null,
  };

  if(phase==="expired") {
    daysStr = `${Math.abs(days)}d ago`;
    flair = FLAIR.expired;
  } else if(phase==="grace") {
    daysStr = `${graceDays}d left`;
    flair = FLAIR.grace;
  } else if(phase==="base") {
    daysStr = `${days}d`;
    flair = FLAIR.base;
  } else {
    daysStr = days===0 ? "TODAY" : `${days}d`;
    flair = phase==="soon" ? FLAIR.soon : null;
  }
  return { daysStr, flair };
}

              </div>}
              {["medical","kal_checkride","kal_aircraft","kal_training","airx_checkride","airx_aircraft","airx_training","training"].map(cat=>{
                const catItems=Object.entries(p.items).filter(([k,v])=>v.category===cat);
                if(!catItems.length) return null;
                const catLabel={medical:"MEDICAL",kal_checkride:"KALININ CHECK RIDES",kal_aircraft:"KALININ AIRCRAFT",kal_training:"KALININ TRAINING",airx_checkride:"AIR X CHECK RIDES",airx_aircraft:"AIR X AIRCRAFT",airx_training:"AIR X TRAINING",training:"SHARED TRAINING"}[cat]||cat;
                return <div key={cat} style={{marginBottom:8}}>
                  <div style={{fontSize:12,fontWeight:700,letterSpacing:"0.1em",color:"#6a8a9a",marginBottom:4}}>{catLabel}</div>
                  {catItems.map(([k,item])=>(
                    <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",borderBottom:"1px solid #0d1117",fontSize:15}}>
                      <span style={{color:"#6a8a9a"}}>{item.label}</span>
                      <span style={{color:"#7a9ab0"}}>{item.days<0?`EXP ${Math.abs(item.days)}d ago`:`${item.days}d`}</span>
                    </div>
                  ))}
                </div>;
              })}
              {(pilotKalinin.length>0||pilotAirX.length>0)&&<div>
                <div style={{fontSize:12,fontWeight:700,letterSpacing:"0.1em",color:"#6a8a9a",marginBottom:4}}>SPECIAL APPROACHES (HISTORICAL)</div>
                {[["KALININ",pilotKalinin],["AIR X",pilotAirX]].map(([label,apprList])=>
                  apprList.length?<div key={label} style={{marginBottom:4}}>
                    <div style={{fontSize:12,color:"#6a8a9a",marginBottom:2}}>{label}</div>
                    {apprList.map((a,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",borderBottom:"1px solid #0d1117",fontSize:14}}>
                        <span style={{color:"#6a8a9a"}}>
                        {a.airport&&a.airport!=="nan"?`[${a.airport}] `:""}{a.approach}
                        {a.dualRequired&&<span style={{marginLeft:5,fontSize:12,color:"#a29bfe",fontWeight:700,padding:"1px 4px",borderRadius:2,background:"rgba(162,155,254,0.12)",border:"1px solid rgba(162,155,254,0.2)"}}>GND+FLT</span>}
                      </span>
                        <span style={{color:"#7a9ab0"}}>{a.days<0?`EXP ${Math.abs(a.days)}d ago`:`${a.days}d`}</span>
                      </div>
                    ))}
                  </div>:null
                )}
              </div>}
            </div>}
          </div>;
        })}
      </div>}
    </div>}
  </div>;
}



// ── NIGHT CURRENCY & TIME-IN-TYPE SCREEN ──────────────────────────────────────
function NightScreen({ fleetData, nightCurrencyData, onUploadNightXlsx }) {
  const [sortBy, setSortBy] = useState("status");
  const [companyFilter, setCompanyFilter] = useState("All");
  const [selected, setSelected] = useState(null);
  const todayStr = today();
  const cutoff90 = new Date(todayStr); cutoff90.setDate(cutoff90.getDate() - 90);
  const cutoff90Str = cutoff90.toISOString().slice(0,10);

  if(!fleetData||!Object.keys(fleetData).length) return (
    <div>
      <div style={S.ct}>NIGHT CURRENCY & TIME IN TYPE</div>
      <div style={{...S.card,textAlign:"center",padding:40,color:"#7a9ab8"}}>
        <div style={{fontSize:48,marginBottom:12}}>🌙</div>
        <div style={{fontSize:20,fontWeight:700,marginBottom:6}}>No Fleet Data</div>
        <div style={{fontSize:16,lineHeight:1.6}}>Go to IMPORT → upload Flight Log Export → Import All Pilots</div>
      </div>
    </div>
  );

  const ACFT_TYPES = {
    "PC-12": ["N721KP","N722KP"],
    "C208B": ["N750KP","N753KP","N755KP","N336JP","N438JP","N450KP"],
    "C208A": ["N264KP","N265KP"],
    "Beaver":["N4794C","N777DH","N743KP"],
    "C206":  ["N749KP","N748KP"],
  };
  const tailToType = {};
  Object.entries(ACFT_TYPES).forEach(([t,tails])=>tails.forEach(n=>tailToType[n]=t));

  const companies = [...new Set(Object.values(fleetData).map(pd=>pd.office||"Unknown"))].sort();

  const pilots = Object.entries(fleetData)
    .filter(([,pd])=> companyFilter==="All" || (pd.office||"Unknown")===companyFilter)
    .map(([k,pd]) => {
      const allFlights = pd.flights||[];
      const completed  = allFlights.filter(f=>f._status==="completed");

      // ── Night currency: 3 night T/O+landings in rolling 90 days ──
      const nightFlights90 = completed.filter(f=>f.date>=cutoff90Str && (f.nightLandings||0)>0);
      const nightLandings90 = nightFlights90.reduce((s,f)=>s+(f.nightLandings||0),0);
      const nightStatus = nightLandings90 >= 3 ? "green" : nightLandings90 === 2 ? "yellow" : nightLandings90 === 1 ? "orange" : "red";
      const lastNightFlight = [...nightFlights90].sort((a,b)=>b.date.localeCompare(a.date))[0];

      // ── Time in type ──
      const byType = {};
      completed.forEach(f => {
        const t = tailToType[f.tailNumber] || "Other";
        if(!byType[t]) byType[t] = { mins:0, legs:0, landings:0 };
        byType[t].mins     += f.totalMinutes||0;
        byType[t].legs     += 1;
        byType[t].landings += f.landings||0;
      });

      // ── Total flight time ──
      const totalMins = completed.reduce((s,f)=>s+(f.totalMinutes||0),0);

      // ── Recent activity: last 30 days ──
      const last30cutoff = new Date(todayStr); last30cutoff.setDate(last30cutoff.getDate()-30);
      const last30str = last30cutoff.toISOString().slice(0,10);
      const recent = completed.filter(f=>f.date>=last30str);
      const recentMins = recent.reduce((s,f)=>s+(f.totalMinutes||0),0);

      return { ...pd, username:pd.username||k, nightLandings90, nightStatus, lastNightFlight,
               byType, totalMins, recentMins, legs: completed.length };
    });

  const sorted = [...pilots].sort((a,b) => {
    if(sortBy==="status") {
      const o={red:0,orange:1,yellow:2,green:3};
      return (o[a.nightStatus]??4)-(o[b.nightStatus]??4) || (a.fullName||"").localeCompare(b.fullName||"");
    }
    if(sortBy==="hours") return b.totalMins - a.totalMins;
    if(sortBy==="recent") return b.recentMins - a.recentMins;
    return (a.fullName||"").localeCompare(b.fullName||"");
  });

  const needCurrency = sorted.filter(p=>p.nightStatus!=="green").length;

  // CSV logbook export
  const exportLogbook = (pilot) => {
    const rows = [["Date","Tail","Type","Origin","Destination","Dept","Arrival","Total Mins","Total Hrs","Landings","Night Landings","Flight Rules","Duty Type","Notes"]];
    (pilot.flights||[]).filter(f=>f._status==="completed").sort((a,b)=>a.date.localeCompare(b.date)).forEach(f=>{
      rows.push([f.date, f.tailNumber||"", tailToType[f.tailNumber]||"", f.origin||"", f.destination||"",
        f.startTaxi||"", f.stopTaxi||"", f.totalMinutes||0, ((f.totalMinutes||0)/60).toFixed(2),
        f.landings||0, f.nightLandings||0, f.flightRules||"", f.dutyType||"", f.notes||""]);
    });
    const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], {type:"text/csv"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `${pilot.fullName||pilot.username}_logbook.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  return <div>
    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <div style={{fontSize:20,fontWeight:700,letterSpacing:"0.1em",color:"#e0e8f0"}}>NIGHT CURRENCY</div>
      <button onClick={onUploadNightXlsx}
        style={{background:"rgba(74,158,255,0.1)",border:"1px solid #4a9eff",borderRadius:4,padding:"5px 10px",
          color:"#4a9eff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>
        📂 UPLOAD NIGHT XLSX
      </button>
    </div>

    {/* Night Currency Board from XLSX (if uploaded) */}
    {nightCurrencyData&&nightCurrencyData.length>0&&<div style={{...S.card,marginBottom:12,padding:"12px 14px"}}>
      <div style={{fontSize:14,fontWeight:700,letterSpacing:"0.1em",color:"#7a9ab8",marginBottom:8}}>
        FROM NIGHT CURRENCY SPREADSHEET
        <span style={{fontWeight:400,marginLeft:6,color:"#6a8aa8"}}>{nightCurrencyData.length} pilots</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:3}}>
        {nightCurrencyData.sort((a,b)=>{
          const o={red:0,orange:1,yellow:2,green:3};
          return (o[a.status]??4)-(o[b.status]??4)||(a.name||"").localeCompare(b.name||"");
        }).map((p,i)=>{
          const col=SC[p.status]||SC.green;
          return <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
            padding:"5px 8px",borderRadius:4,background:"#080b0f",border:`1px solid ${p.status!=="green"?col+"44":"#1e2730"}`}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:col,flexShrink:0}}/>
              <span style={{fontSize:16,fontWeight:700,color:"#e0e8f0"}}>{p.name}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {p.expires&&<span style={{fontSize:14,color:"#7a9ab8"}}>exp: {p.expires}</span>}
              {p.status==="red"&&<span style={{fontSize:12,fontWeight:700,padding:"1px 5px",borderRadius:3,
                color:SC.red,background:"rgba(255,71,87,0.12)",border:"1px solid rgba(255,71,87,0.3)"}}>
                {p.expires?"EXPIRED":"NO DATE"}
              </span>}
              {p.status==="orange"&&<span style={{fontSize:12,fontWeight:700,padding:"1px 5px",borderRadius:3,
                color:SC.orange,background:"rgba(255,109,0,0.12)",border:"1px solid rgba(255,109,0,0.3)"}}>
                ≤30d
              </span>}
              {p.status==="yellow"&&<span style={{fontSize:12,fontWeight:700,padding:"1px 5px",borderRadius:3,
                color:"#ffd740",background:"rgba(255,215,64,0.1)",border:"1px solid rgba(255,215,64,0.3)"}}>
                ≤60d
              </span>}
            </div>
          </div>;
        })}
      </div>
    </div>}

    <div style={{fontSize:14,color:"#7a9ab8",marginBottom:8}}>90-day rolling · 3 night ldgs req. from flight log</div>

    {/* Company filter */}
    <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
      {["All",...companies].map(co=>(
        <button key={co} onClick={()=>{setCompanyFilter(co);setSelected(null);}}
          style={{padding:"5px 10px",borderRadius:4,fontFamily:"'JetBrains Mono',monospace",
            border:`1px solid ${companyFilter===co?"#4a9eff":"#1e2730"}`,
            background:companyFilter===co?"rgba(74,158,255,0.12)":"transparent",
            color:companyFilter===co?"#4a9eff":"#7a9ab8",fontSize:14,fontWeight:700,cursor:"pointer"}}>
          {co==="All"?`ALL (${Object.keys(fleetData).length})`:co}
        </button>
      ))}
    </div>

    {/* Summary strip */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
      <div style={{background:"#0a1118",borderRadius:6,padding:"8px 12px",border:`1px solid ${needCurrency>0?SC.red:"#1e2730"}`}}>
        <div style={{fontSize:27,fontWeight:700,color:needCurrency>0?SC.red:SC.green}}>{needCurrency}</div>
        <div style={{fontSize:12,color:"#7a9ab8",marginTop:1}}>NEED NIGHT CURRENCY</div>
      </div>
      <div style={{background:"#0a1118",borderRadius:6,padding:"8px 12px",border:"1px solid #1e2730"}}>
        <div style={{fontSize:27,fontWeight:700,color:"#4a9eff"}}>{sorted.filter(p=>p.nightLandings90>=3).length}</div>
        <div style={{fontSize:12,color:"#7a9ab8",marginTop:1}}>CURRENT</div>
      </div>
    </div>

    {/* Sort */}
    <div style={{display:"flex",gap:4,marginBottom:10}}>
      {[["status","STATUS"],["hours","TOTAL HRS"],["recent","LAST 30D"],["name","NAME"]].map(([k,l])=>(
        <button key={k} onClick={()=>setSortBy(k)} style={{flex:1,padding:"5px 2px",borderRadius:4,
          border:`1px solid ${sortBy===k?"#4a9eff":"#1e2730"}`,
          background:sortBy===k?"rgba(74,158,255,0.1)":"transparent",
          color:sortBy===k?"#4a9eff":"#7a9ab8",fontSize:14,fontWeight:700,cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace"}}>
          {l}
        </button>
      ))}
    </div>

    {/* Pilot rows */}
    <div style={{display:"flex",flexDirection:"column",gap:4}}>
      {sorted.map(pd=>{
        const col = SC[pd.nightStatus]||SC.green;
        const isOpen = selected===pd.username;
        const pct = Math.min(pd.nightLandings90/3,1);
        return <div key={pd.username}>
          <div onClick={()=>setSelected(isOpen?null:pd.username)}
            style={{background:"#0d1117",borderRadius:6,border:`1px solid ${isOpen?col:"#1e2730"}`,padding:"10px 12px",cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:col,boxShadow:`0 0 6px ${col}`,flexShrink:0}}/>
                <span style={{fontSize:18,fontWeight:700,color:"#e0e8f0"}}>{pd.fullName}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20,fontWeight:700,color:col}}>🌙 {pd.nightLandings90}<span style={{fontSize:14,color:"#7a9ab8"}}>/3</span></span>
                <span style={{fontSize:14,color:"#7a9ab8",marginLeft:5}}>{isOpen?"▲":"▼"}</span>
              </div>
            </div>
            {/* Progress bar */}
            <div style={{height:3,background:"#1e2730",borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct*100}%`,background:col,borderRadius:2}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#7a9ab8",marginTop:2}}>
              <span>{pd.nightLandings90>=3?"✓ CURRENT":pd.nightLandings90===0?"NO NIGHT LDGS IN 90D":`NEED ${3-pd.nightLandings90} MORE`}</span>
              <span>{pd.lastNightFlight?`last: ${pd.lastNightFlight.date}`:"—"}</span>
            </div>
          </div>

          {isOpen&&<div style={{...S.card,borderColor:col,background:"#080b0f",marginTop:2,padding:"12px 14px"}}>
            {/* Night detail */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:14,fontWeight:700,letterSpacing:"0.1em",color:"#7a9ab8",marginBottom:6}}>🌙 NIGHT LANDINGS — LAST 90 DAYS</div>
              {pd.nightLandings90===0
                ? <div style={{fontSize:15,color:"#6a8aa8",padding:"6px 0"}}>No night landings in the last 90 days</div>
                : <div style={{display:"flex",flexDirection:"column",gap:2}}>
                    {(pd.flights||[]).filter(f=>f._status==="completed"&&f.date>=cutoff90Str&&(f.nightLandings||0)>0)
                      .sort((a,b)=>b.date.localeCompare(a.date))
                      .map((f,i)=>(
                        <div key={i} style={{display:"grid",gridTemplateColumns:"90px 1fr 50px 60px",gap:4,padding:"3px 0",borderBottom:"1px solid #0d1520",fontSize:15}}>
                          <span style={{color:"#7a9ab8"}}>{f.date}</span>
                          <span style={{color:"#b8c8d8"}}>{f.origin}→{f.destination}</span>
                          <span style={{color:"#e0e8f0",textAlign:"right"}}>{f.tailNumber||"—"}</span>
                          <span style={{color:SC.green,textAlign:"right",fontWeight:700}}>🌙×{f.nightLandings}</span>
                        </div>
                      ))
                    }
                  </div>
              }
            </div>

            {/* Time in type */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:14,fontWeight:700,letterSpacing:"0.1em",color:"#7a9ab8",marginBottom:6}}>TIME IN TYPE — ALL TIME</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:4}}>
                {Object.entries(pd.byType).sort((a,b)=>b[1].mins-a[1].mins).map(([type,data])=>(
                  <div key={type} style={{background:"#0a1118",borderRadius:5,padding:"8px 10px",border:"1px solid #1e2730"}}>
                    <div style={{fontSize:15,fontWeight:700,color:"#4a9eff",marginBottom:2}}>{type}</div>
                    <div style={{fontSize:21,fontWeight:700,color:"#e0e8f0"}}>{(data.mins/60).toFixed(1)}<span style={{fontSize:14,color:"#7a9ab8"}}>h</span></div>
                    <div style={{fontSize:12,color:"#7a9ab8",marginTop:1}}>{data.legs} legs · {data.landings} ldgs</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Summary stats */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4,marginBottom:12}}>
              {[
                ["TOTAL", `${(pd.totalMins/60).toFixed(1)}h`, "#e0e8f0"],
                ["LAST 30D", `${(pd.recentMins/60).toFixed(1)}h`, "#4a9eff"],
                ["TOTAL LEGS", pd.legs, "#b8c8d8"],
              ].map(([lbl,val,vc])=>(
                <div key={lbl} style={{textAlign:"center",background:"#0a1118",borderRadius:5,padding:"8px 4px"}}>
                  <div style={{fontSize:12,color:"#7a9ab8",marginBottom:2}}>{lbl}</div>
                  <div style={{fontSize:20,fontWeight:700,color:vc}}>{val}</div>
                </div>
              ))}
            </div>

            {/* Logbook export */}
            <button onClick={()=>exportLogbook(pd)}
              style={{...S.btn("ghost"),width:"100%",padding:10,fontSize:16}}>
              📥 EXPORT LOGBOOK CSV — {pd.fullName}
            </button>
          </div>}
        </div>;
      })}
    </div>
  </div>;
}

// ── TAILS SCREEN ──────────────────────────────────────────────────────────────
function TailsScreen({ fleetData, delayData, onImportDelays, routeAvgs }) {
  const [selected, setSelected] = useState(null);
  const [sortBy, setSortBy] = useState("util");
  const [delayFileRef] = useState(()=>({ current:null }));
  const fileRef = useRef(null);

  // Aggregate per-tail stats from fleet flight data
  const tailStats = {};
  Object.entries(AIRCRAFT_DB).forEach(([tail,info])=>{
    tailStats[tail] = {
      tail, info,
      scheduled:0, completed:0, enroute:0, totalMins:0,
      legs:[], cancelledLegs:[],
      pilots: new Set(),
    };
  });

  Object.values(fleetData).forEach(pd=>{
    (pd.flights||[]).forEach(f=>{
      const t = f.tailNumber;
      if(!t||!tailStats[t]) return;
      const ts = tailStats[t];
      ts.pilots.add(pd.fullName||pd.username);
      if(f._status==="completed") {
        ts.completed++;
        ts.totalMins += f.totalMinutes||0;
        ts.legs.push({...f, pilotName:pd.fullName||pd.username});
      } else if(f._status==="enroute") {
        ts.enroute++;
      } else if(f._status==="scheduled") {
        ts.scheduled++;
      }
    });
  });

  // Merge delay data if uploaded
  const delays = delayData || [];

  const tails = Object.values(tailStats)
    .filter(t=>t.completed+t.scheduled+t.enroute>0)
    .sort((a,b)=>{
      if(sortBy==="util") return b.totalMins-a.totalMins;
      if(sortBy==="legs") return b.completed-a.completed;
      if(sortBy==="type") return a.info.short.localeCompare(b.info.short);
      return a.tail.localeCompare(b.tail);
    });

  const totalFleetMins  = tails.reduce((s,t)=>s+t.totalMins,0);
  const totalCompleted  = tails.reduce((s,t)=>s+t.completed,0);
  const mostUsedTail    = tails[0];

  // Parse delay CSV upload
  const handleDelayFile = async (e) => {
    const file = e.target.files[0]; if(!file) return;
    const XLSX = await loadXlsx();
    const buf = await file.arrayBuffer();
    const wb  = XLSX.read(new Uint8Array(buf),{type:'array',cellDates:false,dateNF:'yyyy-mm-dd'});
    const csv = XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]],{raw:false});
    const rows = csv.split("\n").map(r=>r.split(",").map(v=>v.trim().replace(/^"|"$/g,"")));
    const hdr  = rows[0].map(h=>h.toLowerCase());
    const get  = (row,name) => { const i=hdr.findIndex(h=>h.includes(name)); return i>=0?row[i]:""; };
    const parsed = rows.slice(1).filter(r=>r.join("").trim()).map(r=>({
      date:       get(r,"date")||get(r,"depart"),
      tail:       get(r,"regno")||get(r,"aircraft")||get(r,"reg"),
      origin:     get(r,"origin")||get(r,"from"),
      destination:get(r,"dest")||get(r,"to"),
      delayCode:  get(r,"delay code")||get(r,"code"),
      delayMins:  parseInt(get(r,"delay")||get(r,"mins")||"0")||0,
      delayDesc:  get(r,"description")||get(r,"reason")||"",
    })).filter(r=>r.tail||r.date);
    onImportDelays(parsed);
    e.target.value="";
  };

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <div style={{fontSize:20,fontWeight:700,letterSpacing:"0.1em",color:"#e0e8f0"}}>TAILS</div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={handleDelayFile} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current?.click()}
          style={{...S.btn("ghost"),padding:"5px 10px",fontSize:14}}>
          {delays.length>0?`📋 ${delays.length} DELAYS`:"📋 UPLOAD DELAYS"}
        </button>
      </div>
    </div>

    {/* Fleet summary */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:10}}>
      {[
        ["TOTAL HRS", `${(totalFleetMins/60).toFixed(0)}h`, "#4a9eff"],
        ["COMPLETED", totalCompleted, SC.green],
        ["ACTIVE TAILS", tails.length, "#e0e8f0"],
      ].map(([lbl,val,vc])=>(
        <div key={lbl} style={{background:"#0a1118",borderRadius:6,padding:"8px 4px",textAlign:"center",border:"1px solid #1e2730"}}>
          <div style={{fontSize:27,fontWeight:700,color:vc}}>{val}</div>

                ["COMPLETED",   t.completed,                          SC.green],
                ["SCHEDULED",   t.scheduled,                          "#b8c8d8"],
                ["EN ROUTE",    t.enroute,                            "#ffd740"],

                ["COMPLETION",  `${(compRate*100).toFixed(0)}%`,      compRate<0.9?SC.orange:SC.green],
              ].map(([lbl,val,vc])=>(

            {/* Pilots who flew this tail */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:14,fontWeight:700,letterSpacing:"0.1em",color:"#7a9ab8",marginBottom:5}}>PILOTS</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {[...t.pilots].sort().map(p=>(
                  <span key={p} style={{fontSize:14,padding:"2px 7px",borderRadius:3,background:"#0d1520",border:"1px solid #1e2730",color:"#8aaabb"}}>{p}</span>
                ))}

            </div>

            {/* Scheduled vs actual — upcoming */}
            {t.scheduled>0&&<div style={{marginBottom:12}}>
              <div style={{fontSize:14,fontWeight:700,letterSpacing:"0.1em",color:"#4a9eff",marginBottom:5}}>UPCOMING SCHEDULED</div>
              {Object.values(fleetData).flatMap(pd=>(pd.flights||[])
                .filter(f=>f.tailNumber===t.tail&&f._status==="scheduled")
                .map(f=>({...f,pilotName:pd.fullName||pd.username})))
                .sort((a,b)=>a.date.localeCompare(b.date))
                .slice(0,5)
                .map((f,i)=>{
                  const est = routeAvgs ? (routeAvgs.byTailRoute[`${t.tail}|${f.origin}→${f.destination}`] || routeAvgs.byRoute[`${f.origin}→${f.destination}`]) : null;
                  return <div key={i} style={{display:"grid",gridTemplateColumns:"90px 1fr 1fr 60px 55px",gap:4,padding:"3px 0",borderBottom:"1px solid #0d1520",fontSize:15}}>
                    <span style={{color:"#7a9ab8"}}>{f.date}</span>
                    <span style={{color:"#4a9eff"}}>{f.origin}→{f.destination}</span>
                    <span style={{color:"#b8c8d8",fontSize:14}}>{f.pilotName}</span>
                    <span style={{color:"#7a9ab8",textAlign:"right"}}>{f.startTaxi||"—"}</span>
                    <span style={{color:SC.green,textAlign:"right",fontSize:14}}>{est?`~${est.avg}m`:"—"}</span>
                  </div>;
                })
              }
            </div>}

            {/* Delay codes */}
            {tailDelays.length>0&&<div style={{marginBottom:12}}>
              <div style={{fontSize:14,fontWeight:700,letterSpacing:"0.1em",color:SC.orange,marginBottom:5}}>⚠ DELAY EVENTS</div>
              {tailDelays.map((d,i)=>(
                <div key={i} style={{background:"rgba(255,109,0,0.06)",borderRadius:4,padding:"6px 8px",marginBottom:4,border:"1px solid rgba(255,109,0,0.15)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                    <span style={{fontSize:15,color:"#b8c8d8"}}>{d.date} · {d.origin||"—"}→{d.destination||"—"}</span>
                    <span style={{fontSize:15,fontWeight:700,color:SC.orange}}>+{d.delayMins}min</span>
                  </div>
                  <div style={{fontSize:14,color:"#7a9ab8"}}>{d.delayCode&&`[${d.delayCode}] `}{d.delayDesc||"No description"}</div>
                </div>

            </div>}

            {/* Recent completed legs */}
            <div>
              <div style={{fontSize:14,fontWeight:700,letterSpacing:"0.1em",color:"#7a9ab8",marginBottom:5}}>RECENT LEGS</div>
              {t.legs.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8).map((f,i)=>(
                <div key={i} style={{display:"grid",gridTemplateColumns:"90px 1fr 1fr 55px",gap:4,padding:"3px 0",borderBottom:"1px solid #0d1520",fontSize:15}}>
                  <span style={{color:"#7a9ab8"}}>{f.date}</span>
                  <span style={{color:"#b8c8d8"}}>{f.origin}→{f.destination}</span>
                  <span style={{color:"#6a8aa8",fontSize:14}}>{f.pilotName}</span>
                  <span style={{color:SC.green,textAlign:"right"}}>{fmtMin(f.totalMinutes)}</span>
                </div>
              ))}
            </div>
          </div>}
        </div>;
      })}
    </div>
  </div>;
}


// ── SPIDERTRACKS / FLIGHT LOG RECONCILIATION ──────────────────────────────────
const RECON_ICAO = {
  'PAJN':'Juneau','PAKT':'Ketchikan','PASI':'Sitka','PAHN':'Haines','PAGY':'Skagway',
  'PAGS':'Gustavus','PAOH':'Hoonah','PAGN':'Angoon','PATE':'Tenakee Springs',
  'PAEL':'Elfin Cove','PAPE':'Pelican','PAFE':'Kake','PAKW':'Klawock','PAWG':'Wrangell',
  'PAPG':'Petersburg','KBFI':'Boeing Field','KPDX':'Portland','PAWS':'Wasilla Airport',
  'TKE':'Tenakee Springs','PEC':'Pelican','PYBUS':'Pybus','PAPB':'Pybus',
};

function excelSerialToDate(s) {
  const n=parseFloat(s); if(isNaN(n)) return null;
  return new Date((n-25569)*86400000).toISOString().slice(0,10);
}
function excelSerialToTime(s) {
  const n=parseFloat(s); if(isNaN(n)) return null;
  const frac=n-Math.floor(n); if(frac<0.001) return null;
  const m=Math.round(frac*1440);
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}

async function runCorrelation(flightLogFile, spiderFiles, cachedSpiderRows) {
  const XLSX = await loadXlsx();

  // Parse flight log
  const flBuf = await flightLogFile.arrayBuffer();
  const flWb  = XLSX.read(new Uint8Array(flBuf),{type:'array'});
  const flJson = XLSX.utils.sheet_to_json(flWb.Sheets[flWb.SheetNames[0]], {defval:''});

  // Use cached spider rows if no new files provided, otherwise parse + merge
  let spRows = cachedSpiderRows || [];
  let newParsedRows = null;
  if(spiderFiles && (Array.isArray(spiderFiles)?spiderFiles:[spiderFiles]).length > 0) {
    const allSpRows = [...(cachedSpiderRows||[])];
    const seenIds = new Set(allSpRows.map(r=>r[1]));
    for(const file of (Array.isArray(spiderFiles)?spiderFiles:[spiderFiles])) {
      const text = await file.text();
      text.split('\n').slice(1)
        .map(r=>r.split(',').map(v=>v.trim().replace(/^"|"$/g,'')))
        .filter(r=>r[0]&&r[7]&&r[10])
        .forEach(r=>{ if(!seenIds.has(r[1])){seenIds.add(r[1]);allSpRows.push(r);} });
    }
    spRows = allSpRows;
    newParsedRows = allSpRows; // save back
  }

  // Build spider index: tail+date → legs sorted by blocks off
  const spIdx = {};
  spRows.forEach(r=>{
    const date=r[3]?.slice(0,10)||r[2]?.slice(0,10), tail=r[0]; // use LOCAL date (r[3]) not UTC
    if(!date||!tail) return;
    const key=`${tail}|${date}`;
    if(!spIdx[key]) spIdx[key]=[];
    spIdx[key].push({
      blocksOff:r[7], blocksOn:r[10],
      blockTimeHrs:parseFloat(r[15])||0,
      airTimeHrs:parseFloat(r[16])||0,
      landings:parseInt(r[13])||1,
      from:RECON_ICAO[r[17]]||r[17]||'', to:RECON_ICAO[r[18]]||r[18]||'',
    });
  });
  Object.values(spIdx).forEach(legs=>legs.sort((a,b)=>a.blocksOff.localeCompare(b.blocksOff)));

  // Filter FL rows needing reconciliation (no actual start time, completed)
  // Include rows that are clearly completed (have start+stop times) regardless of Flight Status field
  // Some exports have blank Flight Status but valid actual times — classify by times, not field
  const isActuallyCompleted = r => {
    const st = r['Flight Status'];
    const hasStatus = st && String(st).trim();
    const hasStart  = !!excelSerialToTime(r['Start Time']);
    const hasStop   = !!excelSerialToTime(r['Stop Time']);
    // Completed = has both times, OR status says Completed
    return (hasStart && hasStop) || String(st||'').trim()==='Completed';
  };
  const flNoTime = flJson.filter(r=>!excelSerialToTime(r['Start Time'])&&isActuallyCompleted(r));

  // Group by tail+date in order
  const flByKey = {};
  flNoTime.forEach(r=>{
    const date=excelSerialToDate(r['Date']), tail=r['Aircraft Rego'];
    if(!date||!tail) return;
    const key=`${tail}|${date}`;
    if(!flByKey[key]) flByKey[key]=[];
    flByKey[key].push({...r, _date:date});
  });

  // Match — unmatched legs fall back to scheduled block time
  const allLegs = [];
  Object.entries(flByKey).forEach(([key,flLegs])=>{
    const spLegs = spIdx[key] ? [...spIdx[key]] : [];
    const remaining=[...spLegs];
    const leftover=[];

    flLegs.forEach(fl=>{
      if(!remaining.length){ leftover.push(fl); return; }
      const o=fl['Origin']||'', d=fl['Destination']||'';
      const i=remaining.findIndex(sp=>(sp.from===o||!sp.from)&&(sp.to===d||!sp.to));
      if(i>=0) { allLegs.push({fl,sp:remaining.splice(i,1)[0],matchType:'spider_route'}); }
      else leftover.push(fl);
    });

    leftover.forEach((fl,i)=>{
      if(i<remaining.length) allLegs.push({fl,sp:remaining[i],matchType:'spider_position'});
      else allLegs.push({fl,sp:null,matchType:'scheduled_fallback'});
    });
  });

  const PMAP = {
    forsythe:'Jake Forsythe',erice:'Eric Evans',gabe:'Gabe Aburto',hosticka:'Louis Hosticka',
    hunters:'Hunter Sinclair',jerrys:'Jerry Stuart',jestergard:'Justin Estergard',kelleyn:'Nick Kelley',
    megant:'Megan Trejo',nicks:'Nick Swisher',patrickf:'Patrick Ford',rees:'Ben Rees',
    seank:'Sean Kveum',sethd:'Seth Downs',andrewh:'Andrew H',bradv:'Brad V',
    brandonw:'Brandon W',chuckp:'Chuck Perkins',ianh:'Ian Hasegawa',samt:'Sam T',
    schmitts:'Schmitt S',daves:'Dave Sandberg',danc:'Dan Corson',greggh:'Greg Hake',
  };

  const pilots={};
  allLegs.forEach(({fl,sp,matchType})=>{
    const u=fl['Pilot']||'?', name=PMAP[u]||u;
    if(!pilots[name]) pilots[name]={username:u,scheduledMins:0,actualBlockMins:0,actualAirMins:0,
      spiderLegs:0,fallbackLegs:0};
    const schedMins=parseInt(fl['Block Time'])||0;
    pilots[name].scheduledMins+=schedMins;
    if(sp){
      pilots[name].actualBlockMins+=Math.round(sp.blockTimeHrs*60);
      pilots[name].actualAirMins  +=Math.round(sp.airTimeHrs*60);
      pilots[name].spiderLegs++;
    } else {
      // No spider data — use scheduled block as-is
      pilots[name].actualBlockMins+=schedMins;
      pilots[name].actualAirMins  +=schedMins; // best we can do
      pilots[name].fallbackLegs++;
    }
  });

  const spiderCount  = allLegs.filter(l=>l.matchType!=='scheduled_fallback').length;
  const fallbackCount= allLegs.filter(l=>l.matchType==='scheduled_fallback').length;
  const dateRange = {
    start:[...flNoTime].map(r=>excelSerialToDate(r['Date'])).filter(Boolean).sort()[0],
    end:  [...flNoTime].map(r=>excelSerialToDate(r['Date'])).filter(Boolean).sort().pop(),
  };

  return {
    pilots, dateRange,
    totalLegs: allLegs.length,
    spiderLegs: spiderCount,
    fallbackLegs: fallbackCount,
    totalMatched: spiderCount,
    totalUnmatched: fallbackCount,
    noSpiderCoverage: fallbackCount,
    _newParsedRows: newParsedRows, // null if used cache only
    legs: allLegs.map(({fl,sp,matchType})=>{
      const schedMins=parseInt(fl['Block Time'])||0;
      return {
        date:fl._date, tail:fl['Aircraft Rego'], pilot:fl['Pilot'],
        pilotName:PMAP[fl['Pilot']]||fl['Pilot'],
        orig:fl['Origin'], dest:fl['Destination'], schedMins,
        actualBlockMins:sp?Math.round(sp.blockTimeHrs*60):schedMins,
        actualAirMins:  sp?Math.round(sp.airTimeHrs*60) :schedMins,
        blocksOff:sp?.blocksOff||null, blocksOn:sp?.blocksOn||null, matchType,
      };
    }),
  };
}

function ReconScreen({ reconData, spiderRows, onRunRecon }) {
  const [flFile,    setFlFile   ] = useState(null);
  const [spFiles,   setSpFiles  ] = useState([]); // supports multiple spider CSVs
  const [running,   setRunning  ] = useState(false);
  const [error,     setError    ] = useState(null);
  const [selected,  setSelected ] = useState(null);
  const [view,      setView     ] = useState('summary');
  const flRef = useRef(null);
  const spRef = useRef(null);

  const handleSpiderFiles = (e) => {
    const files = [...(e.target.files||[])];
    setSpFiles(prev=>{
      const names = new Set(prev.map(f=>f.name));
      return [...prev, ...files.filter(f=>!names.has(f.name))];
    });
    e.target.value="";
  };

  const handleRun = async () => {
    if(!flFile) return;
    if(!spFiles.length && !spiderRows) { setError("No spider data — upload at least one Spidertracks CSV first"); return; }
    setRunning(true); setError(null);
    try {
      const result = await runCorrelation(flFile, spFiles, spiderRows);
      onRunRecon(result, result._newParsedRows);
    } catch(e) {
      setError(e.message);
    }
    setRunning(false);
  };

  const exportCSV = () => {
    if(!reconData) return;
    const rows=[['Date','Tail','Pilot','Origin','Destination','Sched Block (min)','Actual Block (min)','Air Time (min)','Blocks Off','Blocks On','Diff (min)','Match Type']];
    reconData.legs.forEach(l=>rows.push([l.date,l.tail,l.pilotName,l.orig,l.dest,l.schedMins,l.actualBlockMins,l.actualAirMins,l.blocksOff,l.blocksOn,l.actualBlockMins-l.schedMins,l.matchType]));
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download='spidertracks_reconciliation.csv'; a.click();
  };

  const pilots = reconData ? Object.entries(reconData.pilots).sort((a,b)=>b[1].actualBlockMins-a[1].actualBlockMins) : [];
  const selPilotLegs = selected && reconData ? reconData.legs.filter(l=>l.pilot===selected) : [];

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <div style={{fontSize:20,fontWeight:700,letterSpacing:"0.1em",color:"#e0e8f0"}}>SPIDERTRACKS RECON</div>
      {reconData&&<button onClick={exportCSV} style={{...S.btn("ghost"),padding:"5px 10px",fontSize:14}}>📥 EXPORT CSV</button>}
    </div>

    {/* Upload panel */}
    <div style={{...S.card,marginBottom:12}}>
      <div style={{fontSize:14,fontWeight:700,letterSpacing:"0.1em",color:"#7a9ab8",marginBottom:10}}>UPLOAD FILES TO CORRELATE</div>
      <input ref={flRef} type="file" accept=".xlsx,.xls" onChange={e=>setFlFile(e.target.files[0])} style={{display:"none"}}/>
      <input ref={spRef} type="file" accept=".csv" multiple onChange={handleSpiderFiles} style={{display:"none"}}/>
      {spiderRows&&spiderRows.length>0&&<div style={{marginBottom:8,padding:"7px 10px",borderRadius:5,
        background:"rgba(0,230,118,0.07)",border:"1px solid rgba(0,230,118,0.25)",
        display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:14,color:SC.green,fontWeight:700}}>
          ✓ CACHED: {spiderRows.length} spider legs stored — no re-upload needed
        </span>
        <span style={{fontSize:12,color:"#6a8aa8"}}>add more CSVs below to extend</span>
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        <button onClick={()=>flRef.current?.click()} style={{...S.btn(flFile?"green":"ghost"),padding:"10px 8px",fontSize:15,textAlign:"center"}}>
          {flFile?`✓ ${flFile.name.slice(0,20)}…`:"📋 FLIGHT LOG EXPORT\n(.xlsx)"}
        </button>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          <button onClick={()=>spRef.current?.click()}
            style={{...S.btn(spFiles.length?"green":"ghost"),padding:"10px 8px",fontSize:15,textAlign:"center"}}>
            {spFiles.length?`✓ ${spFiles.length} spider file${spFiles.length>1?"s":""} loaded`:"🕷 SPIDERTRACKS CSV(s) — select one or more"}
          </button>
          {spFiles.map((f,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              fontSize:12,color:"#7a9ab8",padding:"2px 6px",background:"#0a0e14",borderRadius:3}}>
              <span>{f.name.slice(0,28)}</span>
              <button onClick={()=>setSpFiles(p=>p.filter((_,j)=>j!==i))}
                style={{background:"none",border:"none",color:SC.red,cursor:"pointer",fontSize:15,padding:0}}>✕</button>
            </div>
          ))}
        </div>
      </div>
      <button onClick={handleRun} disabled={!flFile||(!spFiles.length&&!spiderRows)||running}
        style={{...S.btn("primary"),width:"100%",padding:12,fontSize:20,opacity:(!flFile&&(!spFiles.length&&!spiderRows))?0.4:1}}>
        {running?"⏳ CORRELATING...":"⚡ RUN CORRELATION"}
      </button>
      {error&&<div style={{marginTop:8,fontSize:15,color:SC.red,padding:"6px 10px",background:"rgba(255,71,87,0.1)",borderRadius:4}}>{error}</div>}
    </div>

    {/* Results */}
    {reconData&&<>
      {/* Stats strip */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
        {[
          ["MATCHED", reconData.totalMatched, SC.green],
          ["UNMATCHED", reconData.totalUnmatched, reconData.totalUnmatched>100?SC.red:SC.orange],
          ["NO SPIDER", reconData.noSpiderCoverage, "#7a9ab8"],
          ["MATCH RATE", `${(reconData.totalMatched/(reconData.totalMatched+reconData.totalUnmatched)*100).toFixed(0)}%`, "#4a9eff"],
