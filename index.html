// ── SUNSET CALCULATOR (Astronomical Almanac formula) ─────────────────────────
// Returns sunset time as decimal hours UTC for given lat/lon/date
// Calculate sun times: sunrise, sunset, civil twilight (-6°)
// Returns decimal hours UTC, or null for polar conditions
function calcSunTimes(lat, lon, dateStr) {
  const d = new Date(dateStr + "T12:00:00Z");
  const J = Math.floor(d.getTime()/86400000) + 2440587.5;
  const n = J - 2451545.0;
  const L = (280.460 + 0.9856474*n) % 360;
  const g = ((357.528 + 0.9856003*n) % 360) * Math.PI/180;
  const lam = (L + 1.915*Math.sin(g) + 0.020*Math.sin(2*g)) * Math.PI/180;
  const eps = 23.439 * Math.PI/180;
  const sinDec = Math.sin(eps)*Math.sin(lam);
  const dec = Math.asin(sinDec);
  const latR = lat*Math.PI/180;
  // Correct solar noon: 12h UTC + west-longitude offset
  // lon is negative for west (e.g. -134.576), so -lon/15 is positive
  const noon = 12 - lon/15;

  const horiz = (angleDeg) => {
    const cosH = (Math.sin(angleDeg*Math.PI/180) - Math.sin(latR)*sinDec)
               / (Math.cos(latR)*Math.cos(dec));
    if(cosH > 1 || cosH < -1) return null;
    return Math.acos(cosH)*180/Math.PI;
  };
  const H_sun   = horiz(-0.8333);
  const H_civil = horiz(-6);

  return {
    sunrise:   H_sun   ? noon - H_sun/15   : null,
    sunset:    H_sun   ? noon + H_sun/15   : null,
    civilDawn: H_civil ? noon - H_civil/15 : null,
    civilDusk: H_civil ? noon + H_civil/15 : null,
  };
}

function calcSunset(lat, lon, dateStr) {
  const d = new Date(dateStr + "T12:00:00Z");
  const J = Math.floor(d.getTime()/86400000) + 2440587.5;
  const n = J - 2451545.0;
  const L = (280.460 + 0.9856474*n) % 360;
  const g = ((357.528 + 0.9856003*n) % 360) * Math.PI/180;
  const lam = (L + 1.915*Math.sin(g) + 0.020*Math.sin(2*g)) * Math.PI/180;
  const eps = 23.439 * Math.PI/180;
  const sinDec = Math.sin(eps)*Math.sin(lam);
  const dec = Math.asin(sinDec);
  const latR = lat*Math.PI/180;
  const cosH = (Math.sin(-0.8333*Math.PI/180) - Math.sin(latR)*sinDec)
             / (Math.cos(latR)*Math.cos(dec));
  if(cosH > 1) return null;  // polar night
  if(cosH < -1) return null; // midnight sun
  const H = Math.acos(cosH)*180/Math.PI;
  // Solar noon in UTC
  const lonW = -lon; // west positive
  const noon = 12 + lonW/15 - (L - g*180/Math.PI)/360*24;
  const sunset = noon + H/15;
  return sunset; // decimal hours UTC
}

// Returns sunset as local time string "HH:MM" and offset from a given HH:MM time in minutes
// positive = time is after sunset, negative = before sunset
function sunsetInfo(airport, dateStr, landingTimeStr) {
  const ap = AIRPORTS_LL[airport];
  if(!ap) return null;
  const sunsetUTC = calcSunset(ap.lat, ap.lon, dateStr);
  if(sunsetUTC === null) return null;
  // Alaska Time = UTC - 9 (AKST) or UTC - 8 (AKDT, mid-Mar to Nov)
  // Rough rule: AKDT if date is between 2nd Sun of March and 1st Sun of November
  const d = new Date(dateStr + "T00:00:00Z");
  const mo = d.getUTCMonth(); // 0=Jan
  const isDST = mo >= 2 && mo <= 9; // approx March-October
  const offset = isDST ? -8 : -9;
  const sunsetLocal = sunsetUTC + offset;
  const sunsetH = Math.floor(sunsetLocal) % 24;
  const sunsetM = Math.round((sunsetLocal - Math.floor(sunsetLocal))*60);
  const sunsetStr = `${String(sunsetH).padStart(2,"0")}:${String(sunsetM).padStart(2,"0")}`;

  if(!landingTimeStr || !landingTimeStr.match(/^\d{1,2}:\d{2}/)) {
    return { sunsetStr, minsAfterSunset: null };
  }
  const [lh, lm] = landingTimeStr.split(":").map(Number);
  const landingDecimal = lh + lm/60;
  const minsAfterSunset = Math.round((landingDecimal - sunsetLocal)*60);
  return { sunsetStr, minsAfterSunset };
}

// Signed diff: actual - scheduled. Negative = early, positive = late.
// Handles times near midnight by assuming diffs are within ±12hrs
const signedDiff = (sched, actual) => {
  if(!sched||!actual) return null;
  const [sh,sm]=sched.split(':').map(Number);
  const [ah,am]=actual.split(':').map(Number);
  let d=(ah*60+am)-(sh*60+sm);
  if(d>720) d-=1440; // wrap: if diff > 12hrs, assume it crossed midnight the other way
  if(d<-720) d+=1440;
  return d;
};

};

function getCompliance(flights, dutyType, duties=[]) {
  const ref=today(), refDate=new Date(ref), now=Date.now();
  const sorted=[...flights].sort((a,b)=>(a.date+(a.startTaxi||"")).localeCompare(b.date+(b.startTaxi||"")));
  const todayMin=sorted.filter(f=>f.date===ref).reduce((s,f)=>s+(f.totalMinutes||0),0);
  const rolling24=sorted.filter(f=>{ const d=new Date(f.date+"T"+(f.startTaxi||"00:00")+":00"); return(now-d.getTime())<=86400000; }).reduce((s,f)=>s+(f.totalMinutes||0),0);
  const todayDuty=duties.find(d=>d.date===ref)||{};
  const dutyMinutes=(todayDuty.dutyStart&&todayDuty.dutyEnd)?calcMin(todayDuty.dutyStart,todayDuty.dutyEnd):null;
  const yesterday=duties.filter(d=>d.date<ref&&d.dutyEnd).sort((a,b)=>b.date.localeCompare(a.date))[0];
  let restMinutes=null, nextAvailable=null;
  if(yesterday?.dutyEnd){
    const reqRest=dutyType==="onDemand"?LIMITS.onDemand.minRest9:LIMITS.scheduled.minRest;
    const lastEndMs=new Date(yesterday.date+"T"+yesterday.dutyEnd+":00").getTime();
    restMinutes=Math.floor((now-lastEndMs)/60000);
    const earliest=new Date(lastEndMs+reqRest*60000);
    nextAvailable=earliest.toTimeString().slice(0,5);
  }
  const qStart=new Date(refDate.getFullYear(),Math.floor(refDate.getMonth()/3)*3,1);
  const quarterly=sorted.filter(f=>new Date(f.date)>=qStart).reduce((s,f)=>s+(f.totalMinutes||0),0);
  const saStart=new Date(qStart); saStart.setMonth(saStart.getMonth()-3);
  const semiAnnual=sorted.filter(f=>new Date(f.date)>=saStart).reduce((s,f)=>s+(f.totalMinutes||0),0);
  const yearStart=new Date(refDate.getFullYear(),0,1);
  const annual=sorted.filter(f=>new Date(f.date)>=yearStart).reduce((s,f)=>s+(f.totalMinutes||0),0);
  return { todayMin, rolling24, dutyMinutes, restMinutes, nextAvailable, rem24:Math.max(0,480-rolling24),
    flightToday:{value:todayMin,limit:480,warn:390},
    rolling24comp:{value:rolling24,limit:480,warn:390},
    dutyComp:{value:dutyMinutes||0,limit:840,warn:660},
    quarterly:{value:quarterly,limit:30000,warn:25200},
    semiAnnual:{value:semiAnnual,limit:48000,warn:40800},
    annual:{value:annual,limit:84000,warn:71400},
  };
}

function useClock(intervalMs=30000) {
  const [now, setNow] = useState(Date.now());
  useEffect(()=>{
    const t = setInterval(()=>setNow(Date.now()), intervalMs);
    return ()=>clearInterval(t);
  },[intervalMs]);
  return now;
}

function useWindowWidth() {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 430);
  useEffect(() => {
    const fn = () => setW(window.innerWidth);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return w;
}

function WeatherStrip() {
  const [wx, setWx] = useState([]);

  const fetchWx = useCallback(async () => {
    setLoading(true);
    try {
      const ids = WX_AIRPORTS.join(",");
      const r = await fetch(`https://aviationweather.gov/api/data/metar?ids=${ids}&format=json&hours=1`);
      const data = await r.json();
      setWx(data || []);

    } catch(e) { console.error(e); }

  const parseWx = (m) => {
    const cat = m.fltcat || m.flight_category || "?";
    const wind = m.wdir!=null ? `${String(m.wdir).padStart(3,"0")}°/${m.wspd||0}kt${m.wgst?` G${m.wgst}`:""}` : "Calm";

        </div>
      </div>

      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {wx.map(m => {
          const p = parseWx(m);
          const c = CAT_COLOR[p.cat] || "#7a9ab8";
          const bg = CAT_BG[p.cat] || "rgba(74,106,138,0.1)";
          return <div key={p.icao} style={{background:bg,border:`1px solid ${c}22`,borderRadius:6,padding:"7px 10px",minWidth:120,flex:"1 1 120px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
              <span style={{fontSize:12,fontWeight:700}}>{p.icao.replace("PA","")}</span>
              <span style={{fontSize:10,fontWeight:700,color:c,background:`${c}22`,padding:"1px 5px",borderRadius:3}}>{p.cat}</span>
            </div>
            <div style={{fontSize:9,color:"#7a9ab8",lineHeight:1.6}}>

// ── LOCATION PICKER ───────────────────────────────────────────────────────────
function LocationPicker({ label, value, onChange }) {
  const isCustom = value && !AK_LOCATIONS.find(l => l.code === value && l.code !== "custom");
  const [mode, setMode] = useState(isCustom ? "custom" : "select");
  const [customVal, setCustomVal] = useState(isCustom ? value : "");

  const handleSelect = (v) => {
    if (v === "custom") { setMode("custom"); onChange(""); }
    else { setMode("select"); onChange(v); }
  };
  const handleCustom = (v) => {
    const up = v.toUpperCase().slice(0, 6);
    setCustomVal(up); onChange(up);
  };

  return (
    <div>
      <label style={S.lbl}>{label}</label>
      <select
        value={mode === "custom" ? "custom" : (value || "")}
        onChange={e => handleSelect(e.target.value)}
        style={S.sel}
      >
        <option value="">Select...</option>
        {AK_LOCATIONS.filter(l => l.type !== "custom").map(l => (
          <option key={l.code} value={l.code}>{l.code} — {l.name}{l.type==="float"?" 🚤":""}</option>
        ))}
        <option value="custom">✏ Custom / Float / Charter</option>
      </select>
      {mode === "custom" && (
        <input
          value={customVal}
          onChange={e => handleCustom(e.target.value)}
          style={{...S.inp, marginTop:6, fontSize:18, fontWeight:700, letterSpacing:"0.1em"}}
          placeholder="e.g. FUNTER, HAWK, CABIN1"
          autoFocus
        />
      )}
      {mode === "select" && value && (
        <div style={{fontSize:10, color:"#7a9ab8", marginTop:3}}>
          {AK_LOCATIONS.find(l=>l.code===value)?.name}
        </div>
      )}
    </div>
  );
}

// ── SCAN SCREEN ────────────────────────────────────────────────────────────────
function ScanScreen({ onFlightsScanned }) {
  const [image,setImage]=useState(null);
  const [loading,setLoading]=useState(false);
  const [results,setResults]=useState(null);
  const [error,setError]=useState(null);
  const fileRef=useRef();
  const ICAO_MAP={"PAJN":"JNU","PAKW":"KWP","PASI":"SIT","PAOH":"HNH","PAHN":"HNS","PAGY":"SKA","PAGS":"GST","PAKT":"KTN","PAPG":"PSG","PAFE":"KAE","PAWG":"WRG"};
  const normA=(s)=>s?( ICAO_MAP[s.toUpperCase()]||s.toUpperCase()):s;
  const TAIL_M={"722":"N722KP","721":"N721KP","749":"N749KP","753":"N753KP","754":"N754KP","755":"N755KP","264":"N264KP","265":"N265KP","450":"N450KP","336":"N336JP"};
  const normT=(r)=>{ if(!r)return""; const s=r.trim().toUpperCase().replace(/\s/g,""); if(Object.keys(AIRCRAFT_DB).includes(s))return s; const noN=s.startsWith("N")?s.slice(1):s; return TAIL_M[noN]||TAIL_M[s]||("N"+s); };

  const handleFile=(e)=>{ const f=e.target.files[0];if(!f)return; const r=new FileReader(); r.onload=(ev)=>setImage({data:ev.target.result.split(",")[1],type:f.type,preview:ev.target.result}); r.readAsDataURL(f); };

  const scan=async()=>{
    if(!image)return; setLoading(true); setError(null);
    try{

{"pilotName":string|null,"date":"YYYY-MM-DD"|null,"tailNumber":"full reg","legs":[{"origin":"3-letter","destination":"3-letter","pax":number|null,"startTaxi":"HH:MM","stopTaxi":"HH:MM","totalMinutes":number|null,"beginHobbs":number|null,"endHobbs":number|null,"grossWeight":number|null,"index":string|null}]}`}

    onFlightsScanned(flights,results.pilotName);

  return <div>
    <div style={S.ct}>SCAN PAPER FORM</div>
    <div style={{...S.card,background:"#0a1215",borderColor:"#1a2a35",marginBottom:12,padding:"10px 14px"}}>

// ── IMPORT SCREEN ─────────────────────────────────────────────────────────────
function ImportScreen({ onImport, onImportFleet, onUploadQuals, onUploadCrew }) {
  const [source,setSource]=useState("flightlog");
  const [parsing,setParsing]=useState(false);
  const [preview,setPreview]=useState(null);
  const [error,setError]=useState(null);
  const [pilotFilter,setPilotFilter]=useState("");
  const [logFile,setLogFile]=useState(null);
  const [rosFile,setRosFile]=useState(null);
  const logRef=useRef(), rosRef=useRef(), legRef=useRef();

  // Bulk drop zone state
  const [dropping, setDropping]   = useState(false);
  const [bulkStatus, setBulkStatus] = useState([]); // [{name, status, msg}]
  const [bulkRunning, setBulkRunning] = useState(false);

  const detectFileType = (name) => {
    const n = name.toLowerCase();
    if(n.includes('flight_log') || n.includes('flight log')) return 'flightlog';
    if(n.includes('status_board') || n.includes('status board') || n.includes('pilot_status')) return 'crew';
    if(n.includes('aircraft_board') || n.includes('aircraft board') || n.includes('aircraft_qual') || n.includes('pilot_aircraft')) return 'quals';
    return null;
  };

  const processBulkFiles = async (files) => {
    setBulkRunning(true);
    const results = [];
    const XLSX = await loadXlsx();

    for(const file of files) {
      const type = detectFileType(file.name);
      const entry = {name: file.name, status:'processing', msg:'', type};
      results.push(entry);
      setBulkStatus([...results]);

      try {
        const buf = await file.arrayBuffer();
        const wb  = XLSX.read(new Uint8Array(buf), {type:'array', cellDates:false});

        if(type==='flightlog') {
          // Re-use the existing analyze flow
          const {parseTakefliteXLSX, computeRouteAverages} = (() => {
            // We need to trigger the full analyze+import flow
            // Simplest: read file into logRef and trigger analyze
            return {parseTakefliteXLSX: null, computeRouteAverages: null};
          })();
          // Set the file and auto-analyze
          setLogFile(file);
          entry.status = 'ok';
          entry.msg = 'Loaded — click Analyze below to import pilots';
          setSource('flightlog');
        } else if(type==='crew') {
          await onUploadCrew(file);
          entry.status = 'ok';
          entry.msg = 'Crew status board imported';
        } else if(type==='quals') {
          const parsed = parseQualsSheet(wb, XLSX.utils);
          await onUploadQuals(parsed);
          entry.status = 'ok';
          entry.msg = `${Object.keys(parsed).length} pilots imported`;
        } else {
          entry.status = 'warn';
          entry.msg = 'Unknown file type — rename to include "Flight_Log", "Status_Board", or "Aircraft_Board"';
        }
      } catch(err) {
        entry.status = 'error';
        entry.msg = err.message;
      }
      setBulkStatus([...results]);
    }
    setBulkRunning(false);
  };

  const fmtDT = (v) => {
    if(!v) return "";
    if(v instanceof Date) return `${String(v.getUTCHours()).padStart(2,"0")}:${String(v.getUTCMinutes()).padStart(2,"0")}`;
    if(typeof v === "number") {
      // Excel serial datetime — reject whole integers (midnight / no time entered)
      const frac = v - Math.floor(v);
      if(frac < 0.0007) return ""; // less than ~1 minute = no time entered
      const d = new Date(Math.round((v - 25569)*86400*1000));
      return `${String(d.getUTCHours()).padStart(2,"0")}:${String(d.getUTCMinutes()).padStart(2,"0")}`;
    }
    if(typeof v === "string") {
      const m = v.match(/(\d{1,2}):(\d{2})(AM|PM)?/i);
      if(m) {
        let h=parseInt(m[1]),mn=parseInt(m[2]);
        if(m[3]&&m[3].toUpperCase()==="PM"&&h!==12)h+=12;
        if(m[3]&&m[3].toUpperCase()==="AM"&&h===12)h=0;
        // Reject "00:00" — means no time was entered
        if(h===0&&mn===0) return "";
        return `${String(h).padStart(2,"0")}:${String(mn).padStart(2,"0")}`;
      }
    }
    return "";
  };

  const fmtDate = (v) => {
    if(!v) return null;
    if(v instanceof Date) return `${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,"0")}-${String(v.getDate()).padStart(2,"0")}`;
    if(typeof v === "number") {
      const d = new Date(Math.round((v - 25569)*86400*1000));
      return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`;
    }
    if(typeof v === "string") {
      if(/\d{4}-\d{2}-\d{2}/.test(v)) return v.slice(0,10);
      const mdy = v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if(mdy) return `${mdy[3]}-${String(parseInt(mdy[1])).padStart(2,"0")}-${String(parseInt(mdy[2])).padStart(2,"0")}`;
    }
    return null;
  };

  const cityToCode2 = (s) => {
    if(!s) return "";
    const up = String(s).trim().toUpperCase();
    if(/^[A-Z]{3,4}$/.test(up)) return up;
    return (CITY_CODE_MAP[String(s).trim().toLowerCase()] || up.slice(0,4)).toUpperCase();
  };

  // ── Parse the Flight Log Export (single file, whole fleet) ──────────────────
  const parseFlightLogExport = (wb, utils) => {
    const sheet = wb.Sheets["Flight Log Export"] || wb.Sheets[wb.SheetNames[0]];
    const rows = utils.sheet_to_json(sheet, {header:1, defval:null});
    if(!rows.length) return {};

    // Find header row
    let headerRow = -1;
    for(let i=0;i<Math.min(rows.length,5);i++){
      if(rows[i] && String(rows[i][0]||'').trim()==='Date') { headerRow=i; break; }
    }
    if(headerRow<0) return {};
    const headers = rows[headerRow].map(h=>String(h||'').trim());
    const col = (name) => headers.indexOf(name);

    const pilots = {};
    for(let i=headerRow+1;i<rows.length;i++){
      const r = rows[i];
      if(!r || r.every(v=>v===null)) continue;

      const pilot  = String(r[col('Pilot')]||'').trim().toLowerCase();
      if(!pilot) continue;

      const dateStr   = fmtDate(r[col('Date')]);
      const ac        = String(r[col('Aircraft Rego')]||'').trim();
      const origin    = cityToCode2(r[col('Origin')]);
      const dest      = cityToCode2(r[col('Destination')]);
      const startT    = fmtDT(r[col('Start Time')]);
      const stopT     = fmtDT(r[col('Stop Time')]);
      const schedOff  = fmtDT(r[col('Sched Depart Time')]);
      const schedOn   = fmtDT(r[col('Sched Arrival Time')]);
      const blkHrs    = parseFloat(r[col('Block Time Hrs')])||0;
      const pax       = parseInt(r[col('Total Pax')])||0;
      const ldgs      = parseInt(r[col('Landings')])||1;
      const vfr       = String(r[col('VFR / IFR')]||'VFR').trim()||'VFR';
      const flightNo  = String(r[col('Flight No')]||'').trim();
      const ftype     = String(r[col('Flight Type')]||'').trim();
      const fstatus   = String(r[col('Flight Status')]||'').trim();
      const office    = String(r[col('Office')]||'').trim();

      if(!dateStr) continue;

      // Determine status by ACTUAL TIMES, not Flight Status field
      const hasStart = !!startT;
      const hasStop  = !!stopT;
      const isCompleted = hasStart && hasStop;
      const isEnRoute   = hasStart && !hasStop;
      const isScheduled = !hasStart;

      const effectiveStart = startT || schedOff || '';

      // En route: estimated arrival = actual block-off + scheduled leg duration
      // e.g. actual off 14:11, sched was 14:00→14:45 (45 min) → est arrival 14:56
      let effectiveStop = '';
      if(isCompleted) {
        effectiveStop = stopT;
      } else if(isEnRoute) {
        // Compute scheduled leg duration, add to actual block-off
        const schedDurMins = (schedOff && schedOn) ? calcMin(schedOff, schedOn) : 0;
        if(schedDurMins > 0 && startT) {
          effectiveStop = addMinToHHMM(startT, schedDurMins);
        } else {
          effectiveStop = schedOn || '';
        }
      } else {
        effectiveStop = schedOn || '';
      }

      const totalMinutes = isCompleted && blkHrs>0
        ? Math.round(blkHrs*60)
        : calcMin(effectiveStart, effectiveStop);

      if(!pilots[pilot]) pilots[pilot] = [];
      pilots[pilot].push({
        id:uid(), date:dateStr, tailNumber:ac,
        origin, destination:dest,
        pax:String(pax), startTaxi:effectiveStart, stopTaxi:effectiveStop,
        // Store original Takeflite scheduled times separately — never overwritten
        schedOff: schedOff||'', schedOn: schedOn||'',
        totalMinutes: totalMinutes||0,
        beginHobbs:'', endHobbs:'', hobbsDelta:null,
        grossWeight:'', index:'',
        notes: flightNo,
        delayCode: String(r[col('Delay Code')]||'').trim() || '',
        dutyType: ftype.toLowerCase().includes('charter')?'onDemand':'scheduled',
        flightRules: vfr, landings:ldgs, nightLandings:0,
        trainingType: ftype.toLowerCase().includes('train')?'Training':'',
        ifCheck:false,
        _status: isCompleted?'completed':isEnRoute?'enroute':'scheduled',
        _office: office,
        _schedDurMins: (schedOff&&schedOn) ? (()=>{let d=calcMin(schedOff,schedOn);return d&&d>0&&d<300?d:null;})() : null,
      });
    }
    return pilots;
  };

  // ── Route average block times (tail+route → avg mins) ────────────────────────
  const computeRouteAverages = (pilots) => {
    const tailRoute = {}; // `tail|orig→dest` → [mins,...]
    const routeOnly = {}; // `orig→dest` → [mins,...]

    const schedByRoute = {}; // collect sched durations at import time (UTC-safe)

    Object.values(pilots).forEach(flights => {
      flights.filter(f=>f._status==="completed"&&f.totalMinutes>0&&f.totalMinutes<300).forEach(f=>{
        const orig=f.origin||'', dest=f.destination||'', tail=f.tailNumber||'';
        if(!orig||!dest||orig===dest) return;
        const trKey=`${tail}|${orig}→${dest}`;
        const rKey=`${orig}→${dest}`;
        if(!tailRoute[trKey]) tailRoute[trKey]={tail,orig,dest,times:[]};
        tailRoute[trKey].times.push(f.totalMinutes);
        if(!routeOnly[rKey]) routeOnly[rKey]={orig,dest,times:[]};
        routeOnly[rKey].times.push(f.totalMinutes);
        // Collect scheduled durations — computed at parse time in UTC context
        if(f._schedDurMins>0 && f._schedDurMins<300) {
          if(!schedByRoute[rKey]) schedByRoute[rKey]=[];
          schedByRoute[rKey].push(f._schedDurMins);
        }
      });
    });

    const avg = (arr) => Math.round(arr.reduce((s,n)=>s+n,0)/arr.length);
    const result = { byTailRoute:{}, byRoute:{} };
    Object.entries(tailRoute).forEach(([k,v])=>{
      result.byTailRoute[k]={tail:v.tail,orig:v.orig,dest:v.dest,
        avg:avg(v.times),min:Math.min(...v.times),max:Math.max(...v.times),n:v.times.length};
    });
    Object.entries(routeOnly).forEach(([k,v])=>{
      const sched = schedByRoute[k]||[];
      result.byRoute[k]={orig:v.orig,dest:v.dest,
        avg:avg(v.times),min:Math.min(...v.times),max:Math.max(...v.times),n:v.times.length,
        schedAvg: sched.length>=3 ? avg(sched) : null,
        schedN:   sched.length};
    });
    return result;
  };

  // Look up best estimated block time for a leg
  const estimateLegMins = (routeAvgs, tail, orig, dest) => {
    if(!routeAvgs||!orig||!dest) return null;
    const trKey=`${tail}|${orig}→${dest}`;
    if(routeAvgs.byTailRoute[trKey]) return routeAvgs.byTailRoute[trKey];
    const rKey=`${orig}→${dest}`;
    if(routeAvgs.byRoute[rKey]) return {...routeAvgs.byRoute[rKey], tail:null};
    return null;
  };

  // ── Rolling 8-in-24 from real timestamps ────────────────────────────────────
  const computeRolling8 = (flights) => {
    const completed = flights.filter(f=>f._status==='completed'&&f.totalMinutes>0);
    const enroute   = flights.filter(f=>f._status==='enroute');
    const scheduled = flights.filter(f=>f._status==='scheduled');
    if(!completed.length && !enroute.length) return {used:0, usedWithSched:0, remaining:480, status:'green', enroute:0, scheduled:0};

    // Sort by date+time
    const sorted = [...completed].sort((a,b)=>
      (a.date+a.startTaxi).localeCompare(b.date+b.startTaxi));

    // If no completed flights (only enroute/scheduled), used=0
    let used = 0;
    if(sorted.length) {
      const lastFlight = sorted[sorted.length-1];
      const lastDT = lastFlight.date+'T'+(lastFlight.startTaxi||'00:00');
      const windowStart = new Date(new Date(lastDT).getTime() - 24*60*60*1000);
      const inWindow = sorted.filter(f=>{
        const ft = new Date(f.date+'T'+(f.startTaxi||'00:00'));
        return ft >= windowStart;
      });
      used = inWindow.reduce((s,f)=>s+f.totalMinutes,0);
    }

    // Add en-route time (started but not landed)
    const enrouteMin = enroute.reduce((s,f)=>s+(f.totalMinutes||30),0);

    // Add scheduled time
    const schedMin = scheduled.reduce((s,f)=>s+(f.totalMinutes||0),0);
    const usedWithSched = used + enrouteMin + schedMin;

    const status = used>=480?'red':used>=390?'orange':used>=300?'yellow':'green';
    const statusWithSched = usedWithSched>=480?'red':usedWithSched>=390?'orange':usedWithSched>=300?'yellow':'green';
    return {
      used, usedWithSched, remaining:Math.max(0,480-used),
      remainingWithSched:Math.max(0,480-usedWithSched),
      status, statusWithSched,
      enroute:enrouteMin, scheduled:schedMin,
    };
  };

  const handleFlightLogExport = async () => {
    if(!logFile){setError("Upload the Flight Log Export XLSX first.");return;}
    setParsing(true);setError(null);setPreview(null);
    try {
      const XLSX = await loadXlsx();
      const buf = await logFile.arrayBuffer();
      const wb = XLSX.read(new Uint8Array(buf),{type:'array',cellDates:false});
      const pilotFlights = parseFlightLogExport(wb,XLSX.utils);
      const usernames = Object.keys(pilotFlights).sort();
      // Compute route averages from all completed flights across all pilots
      const routeAvgs = computeRouteAverages(pilotFlights);
      const pilotData = {};
      usernames.forEach(u=>{
        const rawFlights = pilotFlights[u];
        // Apply historical avg to scheduled legs that have no block time
        const flights = rawFlights.map(f=>{
          // Never override scheduled duration if Takeflite sched times exist
          const hasSchedTimes = f.schedOff && f.schedOn;
          if(f._status!=="scheduled" || f.totalMinutes>0 || hasSchedTimes) return f;
          const est = estimateLegMins(routeAvgs, f.tailNumber, f.origin, f.destination);
          if(!est) return f;
          return {...f, totalMinutes:est.avg, _estimated:true, _estSource:est.tail?"tail+route":"route", _estN:est.n};
        });
        pilotData[u] = {
          username:u,

// ── FLEET COMPLIANCE ENGINE v2 ────────────────────────────────────────────────
// Handles: rolling 8-in-24 with scheduled projections, duty day auto/assigned,
// 14h duty limit, per-day assignment override UI

function dtToMs(dateStr, timeStr) {
  // Convert Alaska local time string → UTC milliseconds
  // Flight times stored as Alaska local (e.g. "08:15").
  // Use "Z" suffix to force UTC interpretation of the string, then add Alaska→UTC offset.
  // This works in any browser timezone: "08:15Z" is always 08:15 UTC,
  // then we add 8 or 9 hours to get true UTC.
  if(!dateStr || !timeStr) return null;
  const t = timeStr.length===5 ? timeStr : timeStr.slice(0,5);
  const mo = parseInt(dateStr.slice(5,7))-1; // 0=Jan
  const akOffset = (mo>=2 && mo<=10) ? -8 : -9; // AKDT=-8, AKST=-9
  return new Date(dateStr+"T"+t+":00Z").getTime() + (-akOffset)*3600000;
}

function msToHHMM(ms) {
  if(ms==null) return "—";
  const totalMin = Math.round(ms/60000);
  return `${String(Math.floor(totalMin/60)).padStart(2,"0")}:${String(totalMin%60).padStart(2,"0")}`;
}
// Format a UTC ms timestamp as local HH:MM
function msToLocalHHMM(ms) {
  // Convert UTC ms → Alaska local time HH:MM
  if(!ms) return null;
  const d = new Date(ms);
  const mo = d.getUTCMonth(); // 0=Jan
  const akOffset = (mo>=2 && mo<=10) ? -8 : -9;
  const localMs = ms + akOffset*3600000;
  const ld = new Date(localMs);
  return `${String(ld.getUTCHours()).padStart(2,"0")}:${String(ld.getUTCMinutes()).padStart(2,"0")}`;
}

function addMinToTime(timeStr, mins) {
  if(!timeStr) return "";
  const [h,m] = timeStr.split(":").map(Number);
  const total = h*60+m+mins;
  return `${String(Math.floor(total/60)%24).padStart(2,"0")}:${String(((total%60)+60)%60).padStart(2,"0")}`;
}
// Alias used in parser — same thing
const addMinToHHMM = addMinToTime;

function computeFleetCompliance(flights, dutyAssignments={}, winterMode=false) {
  if(!flights||!flights.length) return {
    rolling:0, rollingProjected:0, status:"green", statusProjected:"green",
    enrouteLegs:0, todayLegs:0, todayMins:0, todayFlights:[],
    tomorrowFlights:[], maxDutyMins:0, minDutyMins:0, avgDutyMins:0, dutyDaysCount:0, maxFltMins:0, q1Hrs:0, legStats:null,
    dutyDays:{}, projectedDutyDays:{}
  };

  const todayStr    = today();
  const tomorrowStr   = (()=>{ const d=new Date(todayStr); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); })();
  const yesterdayStr  = (()=>{ const d=new Date(todayStr); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();
  // Dynamic quarterly window based on today
  const todayDate = new Date(todayStr);
  const qtr = Math.floor(todayDate.getMonth()/3);
  const qtrStarts = ["01-01","04-01","07-01","10-01"];
  const qtrEnds   = ["03-31","06-30","09-30","12-31"];
  const qYear = todayDate.getFullYear();
  const q1Start = `${qYear}-${qtrStarts[qtr]}`;
  const q1End   = `${qYear}-${qtrEnds[qtr]}`;

  // Defensive re-classification — guards against stale cached data from old parser bug
  // where midnight Excel serials produced "00:00" start times making old flights look en-route
  const todayStrLocal = today();
  const sanitized = flights.map(f => {
    if(f._status !== "enroute") return f;
    // En-route flight in the past = must have landed, treat as completed
    if(f.date < todayStrLocal) return {...f, _status:"completed"};
    // En-route with "00:00" start = midnight bug, treat as scheduled
    if(f.startTaxi === "00:00" || !f.startTaxi) return {...f, _status:"scheduled", startTaxi:""};
    return f;
  });
  const completed = sanitized.filter(f=>f._status==="completed");
  const enroute   = sanitized.filter(f=>f._status==="enroute");
  const scheduled = sanitized.filter(f=>f._status==="scheduled");
  // nowMs is passed in from clockMs so 8-in-24 window updates in real time
  const nowMs = Date.now(); // true UTC ms, matches dtToMs output

  // ── Rolling 8-in-24 (actual) ──────────────────────────────────────────────
  // FAR 135.265: window = 24h rolling back from NOW (current wall clock time).
  // Flights whose block-off was more than 24 hours ago don't count regardless
  // of when the pilot last flew. This gives a live countdown that ticks down
  // as old flights age out of the window in real time.
  const withTimes = completed.filter(f=>f.startTaxi&&f.date);
  const sortedComp = [...withTimes].sort((a,b)=>(a.date+a.startTaxi).localeCompare(b.date+b.startTaxi));
  const windowStartMs = nowMs - 24*3600000; // always anchored to RIGHT NOW
  const rolling = sortedComp
    .filter(f=>{ const ms=dtToMs(f.date,f.startTaxi); return ms&&ms>=windowStartMs; })
    .reduce((s,f)=>s+(f.totalMinutes||0),0);

  // ── Projected rolling 8-in-24 (actual + en-route + scheduled) ─────────────
  const enrouteMins = enroute.reduce((s,f)=>s+(f.totalMinutes||0),0);

  // The projected window: same 24h window as actual, but we also check whether
  // upcoming scheduled flights would open a NEW worst-case 24h window.
  // Upper bound = windowStart + 24h (only flights that fit in the SAME window)
  // +EN-ROUTE projection: only include scheduled flights for TODAY (not tomorrow).
  // Tomorrow's projection is shown separately in the next-day calc below.
  // We cap at end of today (23:59 AKST) so tomorrow's legs don't inflate the number.
  const todayEndMs = dtToMs(todayStr, "23:59");

  const upcomingSchedSorted = [...scheduled]
    .filter(f=>f.startTaxi&&f.date)
    .sort((a,b)=>(a.date+a.startTaxi).localeCompare(b.date+b.startTaxi));

  // Only today's remaining scheduled legs — flights that haven't departed yet today
  const schedInWindow = upcomingSchedSorted.filter(f=>{
    const ms=dtToMs(f.date,f.startTaxi);
    return ms && ms>=nowMs && f.date===todayStr;
  });
  const schedMins = schedInWindow.reduce((s,f)=>s+(f.totalMinutes||0),0);
  const rollingProjected = rolling + enrouteMins + schedMins;

  // Also compute next-day projection: worst-case 24h window anchored on first
  // scheduled departure (shows what 8-in-24 will look like at start of next duty day)
  let nextDayProjected = 0, nextDayFlights = [];
  // Anchor next duty day on TOMORROW specifically, not first upcoming sched leg
  // (first upcoming could be today's remaining legs which would bleed into tomorrow)
  const tomorrowSchedLegs = upcomingSchedSorted.filter(f=>f.date===tomorrowStr);
  if(tomorrowSchedLegs.length) {
    // Tomorrow's rolling 8-in-24 = today's completed that carry over + tomorrow's scheduled
    // Carry-over = today's completed flights that fall within 24h of tomorrow's first departure
    const firstTmrwMs = dtToMs(tomorrowSchedLegs[0].date, tomorrowSchedLegs[0].startTaxi);
    if(firstTmrwMs) {
      const compCarry = sortedComp.filter(f=>{
        const ms=dtToMs(f.date,f.startTaxi);
        return ms && ms>=(firstTmrwMs-24*3600000) && ms<firstTmrwMs;
      });
      nextDayFlights = tomorrowSchedLegs;
      nextDayProjected = compCarry.reduce((s,f)=>s+(f.totalMinutes||0),0)
                       + tomorrowSchedLegs.reduce((s,f)=>s+(f.totalMinutes||0),0);
    }
  }

  const status          = rolling>=480?"red":rolling>=390?"orange":rolling>=300?"yellow":"green";
  const statusProjected = rollingProjected>=480?"red":rollingProjected>=390?"orange":rollingProjected>=300?"yellow":"green";
  const statusNextDay   = nextDayProjected>=480?"red":nextDayProjected>=390?"orange":nextDayProjected>=300?"yellow":"green";

  // ── No-go time prediction ─────────────────────────────────────────────────
  // Find the exact minute the pilot will hit 8:00 given current + scheduled flights
  let noGoMs = null; // null = not projected to hit limit
  const LIMIT = 480;

  if(rollingProjected >= LIMIT) {
    // Walk through flights in the projected window chronologically and find crossing point
    const inWindow = [
      ...sortedComp.filter(f=>{ const ms=dtToMs(f.date,f.startTaxi); return ms&&ms>=windowStartMs; }),
      ...enroute,
      ...schedInWindow,
    ].sort((a,b)=>(a.date+(a.startTaxi||'00:00')).localeCompare(b.date+(b.startTaxi||'00:00')));

    let cumMins = 0;
    for(const f of inWindow) {
      const prevCum = cumMins;
      cumMins += f.totalMinutes||0;
      if(cumMins >= LIMIT) {
        // Crosses limit during this leg
        const minsNeeded = LIMIT - prevCum;
        const startMs = dtToMs(f.date, f.startTaxi||'00:00');
        if(startMs) noGoMs = startMs + minsNeeded*60000;
        break;
      }
    }
    if(!noGoMs) noGoMs = nowMs; // already over
  }

  // Also compute "clears at" — when does the oldest in-window flight age out enough
  // to bring rolling back under limit?
  let clearsAtMs = null;
  if(rolling >= LIMIT && sortedComp.length) {
    // Find the oldest flight in window — when it ages out of the 24h window,
    // rolling drops by its minutes
    const inWindow2 = sortedComp.filter(f=>{ const ms=dtToMs(f.date,f.startTaxi); return ms&&ms>=windowStartMs; });
    let cumFromOldest = rolling;
    for(const f of inWindow2) {
      cumFromOldest -= f.totalMinutes||0;
      if(cumFromOldest < LIMIT) {
        // When this flight ages out, we drop below limit
        const flightMs = dtToMs(f.date, f.startTaxi);
        if(flightMs) clearsAtMs = flightMs + 24*3600000;
        break;
      }
    }
  }

  // ── Per-day duty periods ───────────────────────────────────────────────────
  // Use sanitized array so midnight-start Jan flights are reclassified before duty calc
  const allDates = [...new Set(sanitized.map(f=>f.date))].sort();
  const dutyDays={}, projectedDutyDays={};

  allDates.forEach(date=>{
    const dayFlights = sanitized.filter(f=>f.date===date);
    // Extra guard: reject any completed flight where startTaxi="00:00" (midnight serial artifact)
    const dayComp    = dayFlights.filter(f=>f._status==="completed"&&f.startTaxi&&f.startTaxi!=="00:00"&&f.stopTaxi&&f.stopTaxi!=="00:00");
    const daySched   = dayFlights.filter(f=>(f._status==="scheduled"||f._status==="enroute")&&f.startTaxi&&f.startTaxi!=="00:00");

    // Actual duty (completed flights only)
    const assigned = dutyAssignments[date];
    if(dayComp.length) {
      const starts = dayComp.map(f=>f.startTaxi).filter(Boolean).sort();
      const ends   = dayComp.map(f=>f.stopTaxi).filter(Boolean).sort();
      const blanketAssigned = assigned?.blanket;
      // Duty start: blanket = 06:00, else 1hr before first flight (same as projected)
      const firstFlight = starts[0];
      const dutyStart = blanketAssigned ? "06:00"
        : (assigned?.assigned && assigned.dutyStart) ? assigned.dutyStart
        : firstFlight ? addMinToTime(firstFlight, -60) : firstFlight;
      const lastEnd   = ends[ends.length-1];
      const maxDutyEnd = addMinToTime(dutyStart, 14*60);
      // Duty end for PAST completed days: last landing + 30min (realistic clock-out)
      // For TODAY (still active): always start + 14hrs so no false over-duty warnings
      const isPastDay = date < todayStr;
      const realisticEnd = lastEnd ? addMinToTime(lastEnd, 30) : maxDutyEnd;
      const dutyEnd = blanketAssigned ? "20:00"
        : (assigned?.assigned && assigned.dutyEnd) ? assigned.dutyEnd
        : isPastDay ? (calcMin(dutyStart, realisticEnd) <= 14*60 ? realisticEnd : maxDutyEnd)
        : maxDutyEnd;
      dutyDays[date]={
        dutyStart, dutyEnd,
        dutyMins: calcMin(dutyStart,dutyEnd),
        fltMins:  dayComp.reduce((s,f)=>s+(f.totalMinutes||0),0),
        legs:     dayComp.length,
        assigned: !blanketAssigned,
        blanket:  blanketAssigned,
      };
    }

    // Projected duty (scheduled / not yet flown)
    if(daySched.length) {
      let projStart, projEnd;
      if(assigned?.blanket) {
        projStart = "06:00";
        projEnd   = "20:00"; // blanket always 14hr block 06:00-20:00
      } else if(assigned?.assigned && assigned.dutyStart && assigned.dutyEnd) {
        projStart = assigned.dutyStart;
        projEnd   = assigned.dutyEnd;
      } else {
        // Auto: 1hr before first flight, always 14hr block from start
        const schedStarts = daySched.map(f=>f.startTaxi).filter(Boolean).sort();
        const schedEnds   = daySched.map(f=>f.stopTaxi||f.schedOn).filter(Boolean).sort();
        if(schedStarts.length) {
          projStart = addMinToTime(schedStarts[0], -60);
          // Always 14hrs from duty start — winter mode only affects ACTUAL duty end
          projEnd = addMinToTime(projStart, 14*60);
        }
      }
      if(projStart&&projEnd) {
        const projFltMins = daySched.reduce((s,f)=>s+(f.totalMinutes||0),0);
        projectedDutyDays[date]={
          dutyStart:projStart, dutyEnd:projEnd,
          dutyMins: calcMin(projStart,projEnd),
          fltMins:  projFltMins,
          legs:     daySched.length,
          assigned: !!(dutyAssignments[date]?.assigned),
          blanket:  !!(dutyAssignments[date]?.blanket),
        };
      }
    }
  });

  // Max actual duty day
  const dutyDayVals = Object.values(dutyDays).map(d=>Math.min(d.dutyMins||0,960)).filter(m=>m>30);
  const maxDutyMins   = dutyDayVals.length ? Math.max(...dutyDayVals) : 0;
  const minDutyMins   = dutyDayVals.length ? Math.min(...dutyDayVals) : 0;
  const avgDutyMins   = dutyDayVals.length ? Math.round(dutyDayVals.reduce((s,v)=>s+v,0)/dutyDayVals.length) : 0;
  const maxFltMins    = Object.values(dutyDays).reduce((mx,d)=>Math.max(mx,d.fltMins||0),0);
  const dutyDaysCount = dutyDayVals.length;

  // Per-leg stats from all completed flights
  const compLegs = completed.filter(f=>f.totalMinutes>0&&f.origin&&f.destination);
  const legMins  = compLegs.map(f=>f.totalMinutes);
  // Daily leg counts
  const legsByDay = {};
  compLegs.forEach(f=>{ legsByDay[f.date]=(legsByDay[f.date]||0)+1; });
  const dayLegCounts = Object.values(legsByDay);

  const legStats = legMins.length ? {
    maxLegMins:  Math.max(...legMins),
    minLegMins:  Math.min(...legMins),
    avgLegMins:  Math.round(legMins.reduce((s,v)=>s+v,0)/legMins.length),
    maxLegFlight: compLegs[legMins.indexOf(Math.max(...legMins))],
    minLegFlight: compLegs[legMins.indexOf(Math.min(...legMins))],
    maxDayLegs:  dayLegCounts.length ? Math.max(...dayLegCounts) : 0,
    minDayLegs:  dayLegCounts.length ? Math.min(...dayLegCounts) : 0,
    avgDayLegs:  dayLegCounts.length ? Math.round(dayLegCounts.reduce((s,v)=>s+v,0)/dayLegCounts.length*10)/10 : 0,
    maxDayFltMins: Object.values(dutyDays).length ? Math.max(...Object.values(dutyDays).map(d=>d.fltMins||0)) : 0,
    minDayFltMins: Object.values(dutyDays).filter(d=>(d.fltMins||0)>0).length
      ? Math.min(...Object.values(dutyDays).filter(d=>(d.fltMins||0)>0).map(d=>d.fltMins))
      : 0,
    avgDayFltMins: Object.values(dutyDays).filter(d=>(d.fltMins||0)>0).length
      ? Math.round(Object.values(dutyDays).filter(d=>(d.fltMins||0)>0).reduce((s,d)=>s+(d.fltMins||0),0)
          / Object.values(dutyDays).filter(d=>(d.fltMins||0)>0).length)
      : 0,
  } : null;

  // Today & tomorrow
  const todayFlights     = flights.filter(f=>f.date===todayStr);
  const tomorrowFlights  = flights.filter(f=>f.date===tomorrowStr);
  const yesterdayFlights = sanitized.filter(f=>f.date===yesterdayStr&&f._status==="completed");
  const todayMins       = completed.filter(f=>f.date===todayStr).reduce((s,f)=>s+(f.totalMinutes||0),0);
  // Today's SCHEDULED block from Takeflite (Sched Depart → Sched Arrival, ALL legs)
  const todaySchedMins  = todayFlights.reduce((s,f)=>{
    const d = (f.schedOff&&f.schedOn) ? calcMin(f.schedOff,f.schedOn) : (f._schedDurMins||0);
    return s+(d||0);
  },0);

  // Q1 hours
  const q1Hrs = completed
    .filter(f=>f.date>=q1Start&&f.date<=q1End)
    .reduce((s,f)=>s+(f.totalMinutes||0),0)/60;

  // Annual hours (calendar year)
  const yearStart = `${qYear}-01-01`;
  const yearEnd   = `${qYear}-12-31`;
  const annualHrs = completed
    .filter(f=>f.date>=yearStart&&f.date<=yearEnd)
    .reduce((s,f)=>s+(f.totalMinutes||0),0)/60;

  // Consecutive days worked (streak ending on most recent worked day)
  const workedDays = [...new Set(completed.map(f=>f.date))].sort();
  let consecutiveDays = 0;
  if(workedDays.length) {
    consecutiveDays = 1;
    for(let i=workedDays.length-2; i>=0; i--) {
      const a = new Date(workedDays[i]+'T12:00:00');
      const b = new Date(workedDays[i+1]+'T12:00:00');
      if(Math.round((b-a)/86400000)===1) consecutiveDays++;
      else break;
    }
  }
  const lastWorkedDate = workedDays[workedDays.length-1]||null;

  // Last worked day flights (for display when today has no completed legs)
  const lastWorkedFlights = lastWorkedDate && lastWorkedDate !== todayStr
    ? sanitized.filter(f=>f.date===lastWorkedDate&&f._status==="completed")
    : [];

  return {
    rolling, rollingProjected, status, statusProjected,
    enrouteLegs:enroute.length, schedLegs:scheduled.length,
    todayLegs:todayFlights.length, todayMins, todaySchedMins,
    todayFlights, tomorrowFlights, yesterdayFlights, lastWorkedFlights, lastWorkedDate,
    maxDutyMins, minDutyMins, avgDutyMins, dutyDaysCount, maxFltMins, q1Hrs, annualHrs, consecutiveDays, lastWorkedDate, legStats,
    dutyDays, projectedDutyDays,
    windowStartMs, projWindowEndMs:todayEndMs,
    inWindowFlights: sortedComp.filter(f=>{ const ms=dtToMs(f.date,f.startTaxi); return ms&&ms>=windowStartMs; }),
    enrouteFlights: enroute,
    schedInWindow,
    nextDayProjected,
    nextDayFlights,
    statusNextDay,
    noGoMs,       // ms timestamp when 8hr limit will be hit (null if not projected)
    clearsAtMs,   // ms timestamp when rolling drops back under limit (null if not over)
  };
}

// ── TOOLTIP ──────────────────────────────────────────────────────────────────
function Tip({text, children, width=220}) {
  const [show, setShow] = useState(false);
  const ref = useRef(null);
  if(!text) return <>{children}</>;
  return <div style={{position:"relative",display:"inline-flex",alignItems:"center",gap:3}}>
    {children}
    {/* ⓘ icon — click on mobile, hover on desktop */}
    <div ref={ref} style={{position:"relative",display:"inline-flex",alignItems:"center"}}
      onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}
      onTouchStart={e=>{e.stopPropagation();e.preventDefault();setShow(s=>!s)}}>
      <span style={{
        display:"inline-flex",alignItems:"center",justifyContent:"center",
        width:13,height:13,borderRadius:"50%",
        background:show?"rgba(74,158,255,0.3)":"rgba(74,158,255,0.12)",
        border:"1px solid rgba(74,158,255,0.35)",
        color:"#4a9eff",fontSize:8,fontWeight:700,cursor:"pointer",
        lineHeight:1,flexShrink:0,userSelect:"none",
        transition:"background 0.15s"}}>i</span>
      {show&&<div style={{position:"absolute",bottom:"calc(100% + 6px)",left:"50%",
        transform:"translateX(-50%)",width,background:"#0d1520",border:"1px solid #2a3a4a",
        borderRadius:6,padding:"8px 10px",fontSize:10,color:"#c0d4e8",lineHeight:1.5,
        zIndex:500,pointerEvents:"none",boxShadow:"0 4px 20px rgba(0,0,0,0.6)",
        whiteSpace:"pre-wrap"}}>
        {text}
        <div style={{position:"absolute",bottom:-5,left:"50%",
          width:8,height:8,background:"#0d1520",border:"1px solid #2a3a4a",
          borderRight:"none",borderTop:"none",transform:"translateX(-50%) rotate(-45deg)"}}/>
      </div>}
    </div>
  </div>;
}

// ── DUTY DAY ASSIGNMENT MODAL ─────────────────────────────────────────────────
function DutyAssignModal({pilot, date, initial, onSave, onClose}) {
  const pd = initial || {};
  // mode: 'blanket' = 06:00-20:00 company default | 'auto' = ±1hr first/last | 'custom' = manual
  const initMode = !pd.assigned ? (pd.blanket ? 'blanket' : 'auto') : 'custom';
  const [mode, setMode] = useState(initMode);
  const [start, setStart] = useState(pd.dutyStart||"06:00");
  const [end,   setEnd  ] = useState(pd.dutyEnd||"20:00");

  const dutyMins = mode==='blanket' ? calcMin("06:00","20:00")
                 : mode==='custom' && start&&end ? calcMin(start,end) : 0;
  const col = dutyMins>=840?SC.red:dutyMins>=660?SC.orange:SC.green;

  const MODES = [
    {k:'blanket', label:'BLANKET', sub:'06:00–20:00'},
    {k:'auto',    label:'AUTO',    sub:'±1hr first/last'},
    {k:'custom',  label:'CUSTOM',  sub:'set times'},
  ];

  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
    <div style={{background:"#0d1117",borderRadius:"16px 16px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:460,border:"1px solid #1e2730"}} onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:14,fontWeight:700,letterSpacing:"0.1em",marginBottom:2}}>{String(pilot||'').toUpperCase()}</div>
      <div style={{fontSize:11,color:"#7a9ab8",marginBottom:16}}>Duty assignment — {date}</div>

      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {MODES.map(m=>(
          <button key={m.k} onClick={()=>setMode(m.k)}
            style={{flex:1,padding:"10px 6px",borderRadius:6,fontFamily:"'JetBrains Mono',monospace",
              border:`2px solid ${mode===m.k?"#4a9eff":"#1e2730"}`,
              background:mode===m.k?"rgba(74,158,255,0.1)":"transparent",
              color:mode===m.k?"#4a9eff":"#7a9ab8",fontSize:10,fontWeight:700,cursor:"pointer",
              display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span>{m.label}</span>
            <span style={{fontSize:8,opacity:0.7,fontWeight:400}}>{m.sub}</span>
          </button>
        ))}
      </div>

      {mode==='blanket'&&<div style={{...S.card,background:"#080d10",padding:12,marginBottom:16,fontSize:11,color:"#7a9ab8",lineHeight:1.6}}>
        Company default duty window:<br/>
        <span style={{color:"#4a9eff",fontWeight:700}}>06:00 – 20:00</span>
        <span style={{color:"#7a9ab0",marginLeft:8}}>(14 hours — applied to all days)</span>
      </div>}
      {mode==='auto'&&<div style={{...S.card,background:"#080d10",padding:12,marginBottom:16,fontSize:11,color:"#7a9ab8",lineHeight:1.6}}>
        Duty start = first scheduled departure <span style={{color:"#4a9eff"}}>minus 1 hour</span><br/>
        Duty end = last scheduled arrival <span style={{color:"#4a9eff"}}>plus 1 hour</span><br/>
        <span style={{fontSize:10,color:"#7a9ab0"}}>Updates automatically as schedule changes</span>
      </div>}
      {mode==='custom'&&<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          <div style={S.fg}>
            <label style={S.lbl}>DUTY START</label>
            <input type="time" value={start} onChange={e=>setStart(e.target.value)} style={S.inp}/>
          </div>
          <div style={S.fg}>
            <label style={S.lbl}>DUTY END</label>
            <input type="time" value={end} onChange={e=>setEnd(e.target.value)} style={S.inp}/>
          </div>
        </div>
        {dutyMins>0&&<div style={{...S.card,borderColor:col,textAlign:"center",padding:"10px",marginBottom:16}}>
          <span style={{fontSize:18,fontWeight:700,color:col}}>{fmtMin(dutyMins)}</span>
          <span style={{fontSize:11,color:"#7a9ab8",marginLeft:8}}>{dutyMins>=840?"⚠ NEAR 14H LIMIT":"duty period ✓"}</span>
        </div>}
      </>}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <button onClick={onClose} style={{...S.btn("ghost"),padding:13}}>CANCEL</button>
        <button onClick={()=>onSave(date,{
            dutyStart: mode==='blanket'?"06:00":mode==='custom'?start:"",
            dutyEnd:   mode==='blanket'?"20:00":mode==='custom'?end:"",
            assigned:  mode==='custom',
            blanket:   mode==='blanket',
          })} style={{...S.btn("primary"),padding:13}}>SAVE</button>
      </div>
    </div>
  </div>;
}

// ── DUTY DAY TIMELINE BAR ─────────────────────────────────────────────────────
function DutyBar({dutyStart, dutyEnd, dutyMins, fltMins, flights, assigned, blanket, label}) {
  const [hovered, setHovered] = useState(null); // index of hovered flight block
  if(!dutyStart||!dutyEnd) return null;
  const col = dutyMins>=840?SC.red:dutyMins>=660?SC.orange:SC.green;

  // Timeline spans 05:00–23:00 (18hrs) to show full day context
  const TL_START = 5*60;  // 05:00 in minutes
  const TL_END   = 23*60; // 23:00
  const TL_SPAN  = TL_END - TL_START;
  const toPct = (t) => { if(!t) return 0; const [h,m]=t.split(':').map(Number); return Math.max(0,Math.min(100,((h*60+m)-TL_START)/TL_SPAN*100)); };

  const dutyStartPct = toPct(dutyStart);
  const dutyEndPct   = toPct(dutyEnd);
  const dutyWidthPct = dutyEndPct - dutyStartPct;

  // Hour tick marks
  const ticks = [];
  for(let h=6;h<=22;h+=2) ticks.push(h);

  return <div style={{marginBottom:10}}>
    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
      <span style={{fontSize:9,color:"#7a9ab8",fontWeight:700,letterSpacing:"0.08em"}}>
        {label}
        {blanket&&<span style={{marginLeft:6,fontSize:8,color:"#6a8a9a"}}>blanket 06:00–20:00</span>}
        {assigned&&<span style={{marginLeft:6,fontSize:8,color:"#4a9eff"}}>✎ assigned</span>}
      </span>
      <span style={{fontSize:10,color:col,fontWeight:700}}>{dutyStart} – {dutyEnd}
        <span style={{fontSize:8,color:"#7a9ab8",marginLeft:6}}>({fmtMin(dutyMins)})</span>
      </span>
    </div>

    {/* Timeline */}
    <div style={{position:"relative",height:28,userSelect:"none"}}>
      {/* Background track */}
      <div style={{position:"absolute",top:8,left:0,right:0,height:12,background:"#0d1520",borderRadius:3}}/>

      {/* Hour ticks */}
      {ticks.map(h=>{
        const p=((h*60)-TL_START)/TL_SPAN*100;
        return <div key={h} style={{position:"absolute",top:0,left:`${p}%`,display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{fontSize:7,color:"#2a3a4a",marginBottom:1}}>{h}</div>
          <div style={{width:1,height:20,background:"#1a2530"}}/>
        </div>;
      })}

      {/* Duty window */}
      <div style={{position:"absolute",top:8,left:`${dutyStartPct}%`,width:`${dutyWidthPct}%`,
        height:12,background:`${col}18`,border:`1px solid ${col}44`,borderRadius:3}}/>

      {/* Duty start marker */}
      <div style={{position:"absolute",top:4,left:`${dutyStartPct}%`,transform:"translateX(-50%)",
        display:"flex",flexDirection:"column",alignItems:"center",zIndex:2}}>
        <div style={{fontSize:7,color:col,fontWeight:700,background:"#080b0f",padding:"0 2px",borderRadius:2}}>{dutyStart}</div>
        <div style={{width:2,height:16,background:col,borderRadius:1}}/>
      </div>

      {/* Duty end marker */}
      <div style={{position:"absolute",top:4,left:`${dutyEndPct}%`,transform:"translateX(-50%)",
        display:"flex",flexDirection:"column",alignItems:"center",zIndex:2}}>
        <div style={{fontSize:7,color:"#7a9ab0",background:"#080b0f",padding:"0 2px",borderRadius:2}}>{dutyEnd}</div>
        <div style={{width:2,height:16,background:"#2a3a4a",borderRadius:1}}/>
      </div>

      {/* Flight blocks */}
      {(flights||[]).map((f,i)=>{
        if(!f.startTaxi) return null;
        const fStart = toPct(f.startTaxi);
        const fEnd   = toPct(f.stopTaxi||addMinToTime(f.startTaxi,f.totalMinutes||30));
        const fWidth = Math.max(fEnd-fStart,0.5);
        const isComp = f._status==="completed";
        const isEnR  = f._status==="enroute";
        const fc     = isEnR?"#ffd740":isComp?SC.green:"#4a9eff";
        return <div key={i}
          onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}
          onTouchStart={e=>{e.stopPropagation();setHovered(h=>h===i?null:i);}}
          style={{position:"absolute",top:9,left:`${fStart}%`,width:`${fWidth}%`,
            height:10,background:fc,borderRadius:2,opacity:hovered===i?1:0.85,
            cursor:"pointer",transition:"opacity 0.1s",zIndex:3}}>
          {/* Hover tooltip */}
          {hovered===i&&<div style={{position:"absolute",bottom:"calc(100% + 6px)",left:"50%",
            transform:"translateX(-50%)",background:"#0d1520",border:"1px solid #2a3a4a",
            borderRadius:6,padding:"6px 9px",fontSize:9,color:"#c0d4e8",
            whiteSpace:"nowrap",zIndex:10,boxShadow:"0 4px 16px rgba(0,0,0,0.7)",pointerEvents:"none"}}>
            <div style={{fontWeight:700,color:fc,marginBottom:2}}>{f.origin}→{f.destination}</div>
            <div style={{color:"#8aaabb"}}>{f.startTaxi||"—"} → {f.stopTaxi||"…"}</div>
            <div style={{color:"#6a8aaa"}}>{fmtMin(f.totalMinutes)} block · {f.tailNumber||"—"}</div>
            {f.pax&&parseInt(f.pax)>0&&<div style={{color:"#6a8aaa"}}>{f.pax} pax</div>}
          </div>}
        </div>;
      })}

      {/* Current time marker */}
      {(()=>{
        const now = new Date();
        const akOff = (now.getUTCMonth()>=2&&now.getUTCMonth()<=10)?-8:-9;
        const akNow = new Date(now.getTime()+akOff*3600000);
        const nowMins = akNow.getUTCHours()*60+akNow.getUTCMinutes();
        if(nowMins<TL_START||nowMins>TL_END) return null;
        const nowPct = (nowMins-TL_START)/TL_SPAN*100;
        return <div style={{position:"absolute",top:6,left:`${nowPct}%`,transform:"translateX(-50%)",
          width:2,height:16,background:"#ff4757",opacity:0.8,borderRadius:1,zIndex:4}}/>;
      })()}
    </div>

    {/* Footer */}
    <div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:"#6a8a9a",marginTop:2}}>
      <span style={{color:"#7a9ab0"}}>flt: <span style={{color:SC.green}}>{fmtMin(fltMins)}</span></span>
      <span style={{color:dutyMins>=840?SC.red:dutyMins>=660?SC.orange:"#6a8a9a"}}>
        {dutyMins>=840?"⚠ OVER 14H":dutyMins>=660?"⚠ NEAR 14H":"14h limit"}
      </span>
    </div>
  </div>;
}

// ── CREW WARNING LOOKUP ──────────────────────────────────────────────────────
// Given a pilot's full name and crewData, returns their warning items sorted by urgency
function getPilotCrewWarnings(fullName, crewData) {
  if(!crewData?.pilots || !fullName) return null;
  // Match by full name — try exact, then last-name-only fallback
  const nameLower = fullName.trim().toLowerCase();
  let pilot = crewData.pilots.find(p => p.name.toLowerCase() === nameLower);
  if(!pilot) {
    const lastName = nameLower.split(" ").pop();
    const firstName = nameLower.split(" ")[0];
    pilot = crewData.pilots.find(p =>
      p.last.toLowerCase() === lastName ||
      (p.first.toLowerCase() === firstName && p.last.toLowerCase() === lastName)
    );
  }
  if(!pilot) return null;

  // Collect all items + approaches, sorted red → orange → yellow → green
  const all = Object.values(pilot.items);

  // Also grab approach warnings
  const kalininAppr = (crewData.kalinin?.[pilot.name] || []);
  const airxAppr    = (crewData.airx?.[pilot.name]    || []);
  const approaches  = [...kalininAppr, ...airxAppr].map(a => ({
    label: `[${a.airport||"APPR"}] ${a.approach.slice(0,20)}`,
    category: "approach", days: a.days, status: a.status,
  }));

  const combined = [...all, ...approaches];
  const order = { red:0, orange:1, yellow:2, green:3 };
  combined.sort((a,b) => (order[a.status]??4) - (order[b.status]??4));

  const worstStatus = pilot.worstStatus;
  const expired  = combined.filter(i => i.status==="red" && i.days < 0);
  const expiring = combined.filter(i => i.status==="red" && i.days >= 0);
  const warning  = combined.filter(i => i.status==="orange");
  const watch    = combined.filter(i => i.status==="yellow");

  return { pilot, worstStatus, expired, expiring, warning, watch, all: combined };
}

  const lastUpdated = Object.values(fleetData)[0]?.lastUpdated

  // All unique companies in the dataset
  const companies = [...new Set(Object.values(fleetData).map(pd=>pd.office||'Unknown'))].sort();

  // Compute compliance for filtered pilots only
  const withCompliance = Object.entries(fleetData)
    .filter(([k,pd])=> companyFilter==='All' || (pd.office||'Unknown')===companyFilter)
    .map(([k,pd])=>{
    const c=computeFleetCompliance(pd.flights, pd.dutyAssignments||{}, winterMode);
    return {...pd, username: pd.username||k, compliance:c};
  });

  // Active today = has en-route OR completed flights today
  const todayStr_ = today();
  // Active tiers — used for sort priority
  // Tier 0: currently in the air (en-route)
  // Tier 1: has completed flights today OR has scheduled flights today
  // Tier 2: has flights tomorrow (scheduled)
  // Tier 3: no activity today/tomorrow
  const activeToday = (pd) => {
    if(pd.compliance.enrouteLegs > 0) return 0; // en-route = highest priority
    const todayFlights = (pd.flights||[]).filter(f=>f.date===todayStr_);
    if(todayFlights.some(f=>f._status==="completed")) return 1; // flew today
    if(todayFlights.some(f=>f._status==="scheduled"||f._status==="enroute")) return 1; // scheduled today
    const tmrwStr = (()=>{const d=new Date(todayStr_);d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);})();
    if((pd.flights||[]).some(f=>f.date===tmrwStr)) return 2; // has tomorrow
    return 3; // no activity
  };

  // Sort — active today float to top, then by sort mode within each tier
  const sorted=[...withCompliance].sort((a,b)=>{
    const aTier = activeToday(a);
    const bTier = activeToday(b);
    if(aTier !== bTier) return aTier - bTier; // lower tier = higher priority

    if(sortBy==="status"){
      // Within tier 0+1 (active today): sort by most hours accumulated
      if(aTier <= 1) return b.compliance.rollingProjected - a.compliance.rollingProjected;
      const order={red:0,orange:1,yellow:2,green:3};
      return (order[a.compliance.statusProjected]??4)-(order[b.compliance.statusProjected]??4)
        || (a.fullName||a.username||"").localeCompare(b.fullName||b.username||"");
    }
    if(sortBy==="rolling") return b.compliance.rollingProjected-a.compliance.rollingProjected;
    if(sortBy==="quarterly") return b.compliance.q1Hrs-a.compliance.q1Hrs;
    return (a.fullName||a.username||"").localeCompare(b.fullName||b.username||"");
