// ── SUNSET CALCULATOR (Astronomical Almanac formula) ─────────────────────────
// Returns sunset time as decimal hours UTC for given lat/lon/date
// Calculate sun times: sunrise, sunset, civil twilight (-6°)
// Returns decimal hours UTC, or null for polar conditions
function calcSunTimes(lat, lon, dateStr) {
  const d = new Date(dateStr + "T12:00:00Z");
  const J = Math.floor(d.getTime()/86400000) + 2440587.5;
  const n = J - 2451545.0;
  const L = (280.460 + 0.9856474*n) % 360;
  const g = ((357.528 + 0.9856003*n) % 360) * Math.PI/180;
  const lam = (L + 1.915*Math.sin(g) + 0.020*Math.sin(2*g)) * Math.PI/180;
  const eps = 23.439 * Math.PI/180;
  const sinDec = Math.sin(eps)*Math.sin(lam);
  const dec = Math.asin(sinDec);
  const latR = lat*Math.PI/180;
  // Correct solar noon: 12h UTC + west-longitude offset
  // lon is negative for west (e.g. -134.576), so -lon/15 is positive
  const noon = 12 - lon/15;

  const horiz = (angleDeg) => {
    const cosH = (Math.sin(angleDeg*Math.PI/180) - Math.sin(latR)*sinDec)
               / (Math.cos(latR)*Math.cos(dec));
    if(cosH > 1 || cosH < -1) return null;
    return Math.acos(cosH)*180/Math.PI;
  };
  const H_sun   = horiz(-0.8333);
  const H_civil = horiz(-6);

  return {
    sunrise:   H_sun   ? noon - H_sun/15   : null,
    sunset:    H_sun   ? noon + H_sun/15   : null,
    civilDawn: H_civil ? noon - H_civil/15 : null,
    civilDusk: H_civil ? noon + H_civil/15 : null,
  };
}

function calcSunset(lat, lon, dateStr) {
  const d = new Date(dateStr + "T12:00:00Z");
  const J = Math.floor(d.getTime()/86400000) + 2440587.5;
  const n = J - 2451545.0;
  const L = (280.460 + 0.9856474*n) % 360;
  const g = ((357.528 + 0.9856003*n) % 360) * Math.PI/180;
  const lam = (L + 1.915*Math.sin(g) + 0.020*Math.sin(2*g)) * Math.PI/180;
  const eps = 23.439 * Math.PI/180;
  const sinDec = Math.sin(eps)*Math.sin(lam);
  const dec = Math.asin(sinDec);
  const latR = lat*Math.PI/180;
  const cosH = (Math.sin(-0.8333*Math.PI/180) - Math.sin(latR)*sinDec)
             / (Math.cos(latR)*Math.cos(dec));
  if(cosH > 1) return null;  // polar night
  if(cosH < -1) return null; // midnight sun
  const H = Math.acos(cosH)*180/Math.PI;
  // Solar noon in UTC
  const lonW = -lon; // west positive
  const noon = 12 + lonW/15 - (L - g*180/Math.PI)/360*24;
  const sunset = noon + H/15;
  return sunset; // decimal hours UTC
}

// Returns sunset as local time string "HH:MM" and offset from a given HH:MM time in minutes
// positive = time is after sunset, negative = before sunset
function sunsetInfo(airport, dateStr, landingTimeStr) {
  const ap = AIRPORTS_LL[airport];
  if(!ap) return null;
  const sunsetUTC = calcSunset(ap.lat, ap.lon, dateStr);
  if(sunsetUTC === null) return null;
  // Alaska Time = UTC - 9 (AKST) or UTC - 8 (AKDT, mid-Mar to Nov)
  // Rough rule: AKDT if date is between 2nd Sun of March and 1st Sun of November
  const d = new Date(dateStr + "T00:00:00Z");
  const mo = d.getUTCMonth(); // 0=Jan
  const isDST = mo >= 2 && mo <= 9; // approx March-October
  const offset = isDST ? -8 : -9;
  const sunsetLocal = sunsetUTC + offset;
  const sunsetH = Math.floor(sunsetLocal) % 24;
  const sunsetM = Math.round((sunsetLocal - Math.floor(sunsetLocal))*60);
  const sunsetStr = `${String(sunsetH).padStart(2,"0")}:${String(sunsetM).padStart(2,"0")}`;

  if(!landingTimeStr || !landingTimeStr.match(/^\d{1,2}:\d{2}/)) {
    return { sunsetStr, minsAfterSunset: null };
  }
  const [lh, lm] = landingTimeStr.split(":").map(Number);
  const landingDecimal = lh + lm/60;
  const minsAfterSunset = Math.round((landingDecimal - sunsetLocal)*60);
  return { sunsetStr, minsAfterSunset };
}

const parseTime = (s) => { if(!s)return null; const[h,mm]=s.split(":").map(Number); return isNaN(h)||isNaN(mm)?null:h*60+mm; };
// Signed diff: actual - scheduled. Negative = early, positive = late.
// Handles times near midnight by assuming diffs are within ±12hrs
const signedDiff = (sched, actual) => {
  if(!sched||!actual) return null;
  const [sh,sm]=sched.split(':').map(Number);
  const [ah,am]=actual.split(':').map(Number);
  let d=(ah*60+am)-(sh*60+sm);
  if(d>720) d-=1440; // wrap: if diff > 12hrs, assume it crossed midnight the other way
  if(d<-720) d+=1440;
  return d;
};
const calcMin = (a,b) => {
  const s=parseTime(a),e=parseTime(b);
  if(s===null||e===null) return null;

};

// ── AKSFLIGHTS SUPABASE TABLE ─────────────────────────────────────────────────
// Batch upsert parsed flights to aks_flights table. Processes in chunks of 400.
// pk = date + '_' + (flightNo||id) + '_' + pilot — stable composite key for dedup.
async function upsertFlightsBatch(pilotFlights, onProgress) {
  const rows = [];
  Object.entries(pilotFlights).forEach(([pilot, flights]) => {
    flights.forEach(f => {
      if(f._isCoPilot) return; // skip CA right-seat duplicates — stored once on main pilot
      // pk = Takeflite global Flight ID + pilot — truly unique across all years
      // Takeflite assigns sequential integers per flight event, never reused
      const pk = f._takefliteId
        ? `${f._takefliteId}_${pilot}`
        : `${f.date||'0000-00-00'}_${pilot}_${f.schedOff||f.startTaxi||''}_${f.origin||''}_${f.destination||''}`;
      rows.push({
        pk,
        flight_id: f.notes || '',
        pilot,
        date: f.date || '2000-01-01',
        tail: f.tailNumber || '',
        origin: f.origin || '',
        destination: f.destination || '',
        flight_type: f.trainingType || f.dutyType || '',
        status: f._status || '',
        start_time: f.startTaxi || '',
        stop_time: f.stopTaxi || '',
        sched_off: f.schedOff || '',
        sched_on: f.schedOn || '',
        block_mins: f.totalMinutes || 0,
        pax: parseInt(f.pax) || 0,
        landings: f.landings || 1,
        vfr_ifr: f.flightRules || 'VFR',
        delay_code: f.delayCode || '',
        fuel_uplift: f.fuelUplift || 0,
        co_pilot: f._caSupervisor ? '' : '',  // co_pilot is on the source row
        office: f._office || '',
        is_ioe: !!f._isIOE,
        updated_at: new Date().toISOString(),
      });
    });
  });

  const CHUNK = 400;
  let done = 0;
  for(let i=0; i<rows.length; i+=CHUNK) {
    const chunk = rows.slice(i, i+CHUNK);
    try {
      const res = await fetch(`${SUPA_URL}/rest/v1/aks_flights?apikey=${SUPA_KEY}`, {
        method: 'POST',
        headers: {...SUPA_HDRS, 'Prefer': 'resolution=merge-duplicates'},
        body: JSON.stringify(chunk),
      });
      if(!res.ok) console.warn('Upsert chunk failed:', res.status, await res.text());
    } catch(e) { console.warn('Upsert error:', e.message); }
    done += chunk.length;
    if(onProgress) onProgress(done, rows.length);
  }
  return rows.length;
}

// ── MERGE HISTORY STATS ───────────────────────────────────────────────────────
// Merges a new stats object into existing saved stats so uploads accumulate
// rather than overwrite. Each field is combined additively.
function mergeHistoryStats(existing, fresh) {
  if(!existing) return fresh;
  if(!fresh)    return existing;

  // Totals
  const out = {
    generated: new Date().toISOString(),
    totalLegs: (existing.totalLegs||0) + (fresh.totalLegs||0),
    totalMins: (existing.totalMins||0) + (fresh.totalMins||0),
    totalPax:  (existing.totalPax||0)  + (fresh.totalPax||0),
    dateRange: {
      start: [existing.dateRange?.start, fresh.dateRange?.start].filter(Boolean).sort()[0],
      end:   [existing.dateRange?.end,   fresh.dateRange?.end  ].filter(Boolean).sort().pop(),
    },
  };

  // byYear — add per year
  const byYear = {...(existing.byYear||{})};
  Object.entries(fresh.byYear||{}).forEach(([y,d])=>{
    if(!byYear[y]) byYear[y]={legs:0,mins:0,pax:0};
    byYear[y].legs+=d.legs; byYear[y].mins+=d.mins; byYear[y].pax+=d.pax;
  });
  out.byYear = byYear;

  // byMonth — add per month
  out.byMonth = (existing.byMonth||Array(12).fill(null).map(()=>({legs:0,mins:0,pax:0})))
    .map((m,i)=>{
      const n=(fresh.byMonth||[])[i]||{legs:0,mins:0,pax:0};
      return {legs:(m.legs||0)+n.legs, mins:(m.mins||0)+n.mins, pax:(m.pax||0)+n.pax};
    });

  // topDays — combine lists, re-sort, take top 20
  const allDaysByLegs = [...(existing.topDaysByLegs||[]), ...(fresh.topDaysByLegs||[])];
  const dayMap = {};
  allDaysByLegs.forEach(d=>{ const k=d.date;
    if(!dayMap[k]) dayMap[k]={...d};
    else { dayMap[k].legs+=d.legs; dayMap[k].mins+=d.mins; dayMap[k].pax+=d.pax; dayMap[k].pilots=Math.max(dayMap[k].pilots,d.pilots); }
  });
  out.topDaysByLegs = Object.values(dayMap).sort((a,b)=>b.legs-a.legs).slice(0,20);

  const allDaysByPax = [...(existing.topDaysByPax||[]), ...(fresh.topDaysByPax||[])];
  const dayMap2 = {};
  allDaysByPax.forEach(d=>{ const k=d.date;
    if(!dayMap2[k]) dayMap2[k]={...d};
    else { dayMap2[k].legs+=d.legs; dayMap2[k].mins+=d.mins; dayMap2[k].pax+=d.pax; dayMap2[k].pilots=Math.max(dayMap2[k].pilots,d.pilots); }
  });
  out.topDaysByPax = Object.values(dayMap2).sort((a,b)=>b.pax-a.pax).slice(0,20);

  // byPilot — merge per pilot
  const byPilot = {...(existing.byPilot||{})};
  Object.entries(fresh.byPilot||{}).forEach(([u,d])=>{
    if(!byPilot[u]) { byPilot[u]={...d}; return; }
    const e=byPilot[u];
    e.totalLegs+=d.totalLegs; e.totalMins+=d.totalMins; e.totalPax+=d.totalPax;
    e.cpMins=(e.cpMins||0)+(d.cpMins||0);
    e.ioeLegs=(e.ioeLegs||0)+(d.ioeLegs||0);
    // byType
    Object.entries(d.byType||{}).forEach(([t,m])=>{ e.byType[t]=(e.byType[t]||0)+m; });
    // Dates
    if(!e.firstFlight||d.firstFlight<e.firstFlight) e.firstFlight=d.firstFlight;
    if(!e.lastFlight ||d.lastFlight >e.lastFlight)  e.lastFlight=d.lastFlight;
    e.daysSince=e.lastFlight?Math.floor((new Date()-new Date(e.lastFlight))/86400000):9999;
    // Locations
    const allLocs=new Set([...(e.uniqueDests||[]),...(d.uniqueDests||[])]);
    e.uniqueDests=[...allLocs]; e.locationCount=allLocs.size;
    // Years
    const allYrs=new Set([...(e.years||[]),...(d.years||[])]);
    e.years=[...allYrs].sort();
    // topDests — rebuild from combined destFreq (approximate)
    const df={};
    [...(e.topDests||[]),...(d.topDests||[])].forEach(({dest,n})=>{ df[dest]=(df[dest]||0)+n; });
    e.topDests=Object.entries(df).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([dest,n])=>({dest,n}));
  });
  out.byPilot = byPilot;
  out.uniquePilots = Object.keys(byPilot).length;

  // destStats — merge per location
  const destMap={};
  [...(existing.destStats||[]),...(fresh.destStats||[])].forEach(d=>{
    if(!destMap[d.loc]) { destMap[d.loc]={...d}; return; }
    const e=destMap[d.loc];
    e.legs+=d.legs; e.mins+=d.mins; e.pax+=d.pax;
    e.pilotCount=Math.max(e.pilotCount,d.pilotCount);
    if(d.firstDate<e.firstDate) e.firstDate=d.firstDate;
    if(d.lastDate >e.lastDate)  e.lastDate=d.lastDate;
  });
  out.destStats=Object.values(destMap).sort((a,b)=>b.legs-a.legs);

  // tailStats — merge per tail
  const tailMap={};
  [...(existing.tailStats||[]),...(fresh.tailStats||[])].forEach(d=>{
    if(!tailMap[d.tail]) { tailMap[d.tail]={...d}; return; }
    const e=tailMap[d.tail];
    e.legs+=d.legs; e.mins+=d.mins; e.pax+=d.pax;
    if(d.firstDate<e.firstDate) e.firstDate=d.firstDate;
    if(d.lastDate >e.lastDate)  e.lastDate=d.lastDate;
  });
  out.tailStats=Object.values(tailMap).sort((a,b)=>b.legs-a.legs);

  return out;
}

function computeHistoryStats(pilotFlights) {
  const all = [];
  Object.entries(pilotFlights).forEach(([pilot, flights]) => {
    flights.forEach(f => {
      if(f._isCoPilot) return;
      all.push({...f, _pilot: pilot});
    });
  });

  const comp = all.filter(f => f._status === 'completed' && f.totalMinutes > 0);

  // Company totals
  const totalLegs = comp.length;
  const totalMins = comp.reduce((s,f) => s+(f.totalMinutes||0), 0);
  const totalPax  = comp.reduce((s,f) => s+(parseInt(f.pax)||0), 0);

  // By year
  const byYear = {};
  comp.forEach(f => {
    const y = f.date?.slice(0,4); if(!y) return;
    if(!byYear[y]) byYear[y]={legs:0,mins:0,pax:0};
    byYear[y].legs++; byYear[y].mins+=f.totalMinutes||0; byYear[y].pax+=parseInt(f.pax)||0;
  });

  // By month (seasonal, across all years)
  const byMonth = Array(12).fill(null).map(()=>({legs:0,mins:0,pax:0}));
  comp.forEach(f => {
    const m=parseInt(f.date?.slice(5,7))-1;
    if(m>=0&&m<12){byMonth[m].legs++;byMonth[m].mins+=f.totalMinutes||0;byMonth[m].pax+=parseInt(f.pax)||0;}
  });

  // By date (for top days)
  const byDate = {};
  comp.forEach(f => {
    if(!f.date) return;
    if(!byDate[f.date]) byDate[f.date]={legs:0,mins:0,pax:0,pilotsArr:[]};
    byDate[f.date].legs++; byDate[f.date].mins+=f.totalMinutes||0; byDate[f.date].pax+=parseInt(f.pax)||0;
    if(!byDate[f.date].pilotsArr.includes(f._pilot)) byDate[f.date].pilotsArr.push(f._pilot);
  });
  const topDaysByLegs = Object.entries(byDate)
    .map(([d,v])=>({date:d,legs:v.legs,mins:v.mins,pax:v.pax,pilots:v.pilotsArr.length}))
    .sort((a,b)=>b.legs-a.legs).slice(0,20);
  const topDaysByPax = Object.entries(byDate)
    .map(([d,v])=>({date:d,legs:v.legs,mins:v.mins,pax:v.pax,pilots:v.pilotsArr.length}))
    .sort((a,b)=>b.pax-a.pax).slice(0,20);

  // By destination
  const byDest = {};
  comp.forEach(f => {
    if(!f.destination) return;
    if(!byDest[f.destination]) byDest[f.destination]={legs:0,mins:0,pax:0,pilotsArr:[],firstDate:f.date,lastDate:f.date};
    const d=byDest[f.destination];
    d.legs++; d.mins+=f.totalMinutes||0; d.pax+=parseInt(f.pax)||0;
    if(!d.pilotsArr.includes(f._pilot)) d.pilotsArr.push(f._pilot);
    if(f.date<d.firstDate) d.firstDate=f.date;
    if(f.date>d.lastDate)  d.lastDate=f.date;
  });
  const destStats = Object.entries(byDest).map(([loc,d])=>({
    loc, legs:d.legs, mins:d.mins, pax:d.pax, pilotCount:d.pilotsArr.length,
    firstDate:d.firstDate, lastDate:d.lastDate,
  })).sort((a,b)=>b.legs-a.legs);

  // By tail
  const byTail = {};
  const tailDestFreq = {};
  comp.forEach(f => {
    if(!f.tailNumber) return;
    if(!byTail[f.tailNumber]) byTail[f.tailNumber]={legs:0,mins:0,pax:0,firstDate:f.date,lastDate:f.date,pilotsArr:[]};
    const d=byTail[f.tailNumber];
    d.legs++; d.mins+=f.totalMinutes||0; d.pax+=parseInt(f.pax)||0;
    if(!d.pilotsArr.includes(f._pilot)) d.pilotsArr.push(f._pilot);
    if(f.date<d.firstDate) d.firstDate=f.date;
    if(f.date>d.lastDate)  d.lastDate=f.date;
    if(f.destination){
      if(!tailDestFreq[f.tailNumber]) tailDestFreq[f.tailNumber]={};
      tailDestFreq[f.tailNumber][f.destination]=(tailDestFreq[f.tailNumber][f.destination]||0)+1;
    }
  });
  // Active fleet determined by 1-year gap (see ONE_YEAR_STR below)
  const ONE_YEAR_AGO = new Date(); ONE_YEAR_AGO.setFullYear(ONE_YEAR_AGO.getFullYear()-1);
  const ONE_YEAR_STR = ONE_YEAR_AGO.toISOString().slice(0,10);
  const tailStats = Object.entries(byTail).map(([tail,d])=>({
    tail, legs:d.legs, mins:d.mins, pax:d.pax,
    firstDate:d.firstDate, lastDate:d.lastDate,
    type:TAIL_TYPE_MAP[tail]||'?',
    desc:TAIL_DESC[tail]||tail,
    pilotCount:d.pilotsArr.length,
    active: d.lastDate >= ONE_YEAR_STR,
    topDestList: tailDestFreq[tail]
      ? Object.entries(tailDestFreq[tail]).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([dest,n])=>({dest,n}))
      : [],
  })).sort((a,b)=>b.legs-a.legs);

  // By pilot (career stats)
  const TODAY_STR = (new Date()).toISOString().slice(0,10);
  const byPilot = {};
  Object.entries(pilotFlights).forEach(([pilot, flights]) => {
    const pComp   = flights.filter(f=>!f._isCoPilot&&f._status==='completed'&&f.totalMinutes>0);
    const cpLegs  = flights.filter(f=>f._isCoPilot&&f._status==='completed');
    if(!pComp.length && !cpLegs.length) return;

    const allDates = pComp.map(f=>f.date).filter(Boolean).sort();
    const destFreq = {};
    pComp.forEach(f=>{if(f.destination){destFreq[f.destination]=(destFreq[f.destination]||0)+1;}});
    const topDests = Object.entries(destFreq).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([d,n])=>({dest:d,n}));
    const byType={};
    pComp.forEach(f=>{const t=TAIL_TYPE_MAP[f.tailNumber]||'UNK';byType[t]=(byType[t]||0)+(f.totalMinutes||0);});
    const years=[...new Set(pComp.map(f=>f.date?.slice(0,4)).filter(Boolean))].sort();
    const lastFlight = allDates[allDates.length-1]||null;
    const daysSince  = lastFlight ? Math.floor((new Date(TODAY_STR)-new Date(lastFlight))/86400000) : 9999;
    const ioeLegs    = pComp.filter(f=>f._isIOE);
    const uniqueDests= [...new Set(pComp.map(f=>f.destination).filter(Boolean))];

    // Longest single leg
    const longestLeg = pComp.length ? pComp.reduce((mx,f)=>(f.totalMinutes||0)>(mx.totalMinutes||0)?f:mx, pComp[0]) : null;
    // Busiest day by legs
    const dayLegsMap={}, dayPaxMap={}, dayMinsMap={};
    pComp.forEach(f=>{ if(!f.date) return;
      dayLegsMap[f.date]=(dayLegsMap[f.date]||0)+1;
      dayPaxMap[f.date]=(dayPaxMap[f.date]||0)+(parseInt(f.pax)||0);
      dayMinsMap[f.date]=(dayMinsMap[f.date]||0)+(f.totalMinutes||0);
    });
    const busiestDayLegs = Object.entries(dayLegsMap).sort((a,b)=>b[1]-a[1])[0];
    const busiestDayPax  = Object.entries(dayPaxMap).sort((a,b)=>b[1]-a[1])[0];
    const avgPaxPerLeg   = pComp.length ? Math.round(pComp.reduce((s,f)=>s+(parseInt(f.pax)||0),0)/pComp.length*10)/10 : 0;
    const daysWorked     = Object.keys(dayLegsMap).length;
    const avgLegsPerDay  = daysWorked ? Math.round(pComp.length/daysWorked*10)/10 : 0;
    const avgPaxPerDay   = daysWorked ? Math.round(Object.values(dayPaxMap).reduce((s,v)=>s+v,0)/daysWorked) : 0;
    const avgBlockPerDay = daysWorked ? Math.round(Object.values(dayMinsMap).reduce((s,v)=>s+v,0)/daysWorked) : 0;
    // All routes with frequency
    const allRouteFreq={};
    pComp.forEach(f=>{ if(!f.origin||!f.destination) return;
      const r=`${f.origin}→${f.destination}`;
      if(!allRouteFreq[r]) allRouteFreq[r]={route:r,legs:0,pax:0,mins:0};
      allRouteFreq[r].legs++; allRouteFreq[r].pax+=parseInt(f.pax)||0; allRouteFreq[r].mins+=f.totalMinutes||0;
    });
    const allRoutes = Object.values(allRouteFreq).sort((a,b)=>b.legs-a.legs);
    // Years of service
    const yearsOfService = years.length>1 ? (parseInt(years[years.length-1])-parseInt(years[0])+1) : years.length;

    byPilot[pilot] = {
      username:pilot, fullName:PILOT_NAME_MAP[pilot]||pilot,
      totalLegs:pComp.length,
      totalMins:pComp.reduce((s,f)=>s+(f.totalMinutes||0),0),
      totalPax:pComp.reduce((s,f)=>s+(parseInt(f.pax)||0),0),
      cpMins:cpLegs.reduce((s,f)=>s+(f.totalMinutes||0),0),
      byType, topDests, allRoutes, years, firstFlight:allDates[0]||null, lastFlight, daysSince,
      locationCount:uniqueDests.length, uniqueDests,
      ioeLegs:ioeLegs.length,
      longestLeg, busiestDayLegs, busiestDayPax,
      avgPaxPerLeg, avgLegsPerDay, avgPaxPerDay, avgBlockPerDay,
      daysWorked, yearsOfService,
    };
  });

  // Day detail for top days — company + tail breakdown (for click-through drill-down)
  const byDateFull = {}; // date → [flights]
  comp.forEach(f => {
    if(!f.date) return;
    if(!byDateFull[f.date]) byDateFull[f.date]=[];
    byDateFull[f.date].push(f);
  });
  const TOP_DAYS_ALL = [...topDaysByLegs, ...topDaysByPax].map(d=>d.date);
  const uniqueTopDays = [...new Set(TOP_DAYS_ALL)];
  const topDaysDetail = {};
  uniqueTopDays.forEach(date => {
    const dayF = byDateFull[date]||[];
    const tailMap = {};
    dayF.forEach(f => {
      const t = f.tailNumber||'?';
      if(!tailMap[t]) tailMap[t]={legs:0,mins:0,pax:0,pilots:new Set(),isIA:ISLAND_AIR_TAILS.has(t)};
      tailMap[t].legs++; tailMap[t].mins+=f.totalMinutes||0; tailMap[t].pax+=parseInt(f.pax)||0;
      tailMap[t].pilots.add(f._pilot);
    });
    const tailArr = Object.entries(tailMap).map(([t,d])=>({
      tail:t, legs:d.legs, mins:d.mins, pax:d.pax,
      pilots:d.pilots.size, isIA:d.isIA,
      desc:TAIL_DESC[t]||t, type:TAIL_TYPE_MAP[t]||'?',
    })).sort((a,b)=>b.legs-a.legs);
    const aksLegs = tailArr.filter(t=>!t.isIA).reduce((s,t)=>s+t.legs,0);
    const iaLegs  = tailArr.filter(t=> t.isIA).reduce((s,t)=>s+t.legs,0);
    const aksHrs  = tailArr.filter(t=>!t.isIA).reduce((s,t)=>s+t.mins,0);
    const iaHrs   = tailArr.filter(t=> t.isIA).reduce((s,t)=>s+t.mins,0);
    topDaysDetail[date] = { tailArr, aksLegs, iaLegs, aksHrs, iaHrs };
  });

    // Route pairs (origin→dest)
  const byRoute = {};
  comp.forEach(f => {
    if(!f.origin&&!f.destination) return;
    const orig = f.origin||'?'; const dest = f.destination||'?';
    const key  = `${orig}→${dest}`;
    if(!byRoute[key]) byRoute[key]={route:key,orig,dest,legs:0,mins:0,pax:0,pilotsArr:[]};
    byRoute[key].legs++; byRoute[key].mins+=f.totalMinutes||0; byRoute[key].pax+=parseInt(f.pax)||0;
    if(!byRoute[key].pilotsArr.includes(f._pilot)) byRoute[key].pilotsArr.push(f._pilot);
  });
  const routeStats = Object.values(byRoute)
    .map(d=>({...d,pilotCount:d.pilotsArr.length,pilotsArr:undefined}))
    .sort((a,b)=>b.legs-a.legs).slice(0,60);

  // Enrich byPilot with year-by-year and route breakdown
  Object.entries(pilotFlights).forEach(([pilot,flights])=>{
    if(!byPilot[pilot]) return;
    const pComp = flights.filter(f=>!f._isCoPilot&&(f._status==='completed'||f.totalMinutes>0)&&f.totalMinutes>0);
    const pilotByYear={};
    pComp.forEach(f=>{
      const y=f.date?.slice(0,4); if(!y) return;
      if(!pilotByYear[y]) pilotByYear[y]={legs:0,mins:0,pax:0};
      pilotByYear[y].legs++; pilotByYear[y].mins+=f.totalMinutes||0; pilotByYear[y].pax+=parseInt(f.pax)||0;
    });
    const routeFreq={};
    pComp.forEach(f=>{
      if(!f.origin&&!f.destination) return;
      const r=`${f.origin||'?'}→${f.destination||'?'}`;
      if(!routeFreq[r]) routeFreq[r]={route:r,legs:0,pax:0};
      routeFreq[r].legs++; routeFreq[r].pax+=parseInt(f.pax)||0;
    });
    byPilot[pilot].byYear = pilotByYear;
    byPilot[pilot].topRoutes = Object.values(routeFreq).sort((a,b)=>b.legs-a.legs).slice(0,10);
    // Per-year detail: top tails and routes for each year
    const byYearDetail = {};
    Object.keys(pilotByYear).forEach(yr=>{
      const yrF = pComp.filter(f=>f.date?.startsWith(yr));
      const yrTails={}, yrRts={};
      yrF.forEach(f=>{
        const t=f.tailNumber||'?';
        if(!yrTails[t]) yrTails[t]={legs:0,mins:0};
        yrTails[t].legs++; yrTails[t].mins+=f.totalMinutes||0;
        if(f.origin&&f.destination){
          const r=`${f.origin}→${f.destination}`;
          yrRts[r]=(yrRts[r]||0)+1;
        }
      });
      byYearDetail[yr]={
        topTails:Object.entries(yrTails).map(([t,d])=>({tail:t,legs:d.legs,mins:d.mins,desc:TAIL_DESC[t]||t})).sort((a,b)=>b.mins-a.mins).slice(0,6),
        topRoutes:Object.entries(yrRts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([r,n])=>({route:r,n})),
      };
    });
    byPilot[pilot].byYearDetail = byYearDetail;
    // Per-tail hours breakdown
    const pilotByTail = {};
    pComp.forEach(f=>{
      if(!f.tailNumber) return;
      if(!pilotByTail[f.tailNumber]) pilotByTail[f.tailNumber]={legs:0,mins:0};
      pilotByTail[f.tailNumber].legs++;
      pilotByTail[f.tailNumber].mins += f.totalMinutes||0;
    });
    byPilot[pilot].byTailArr = Object.entries(pilotByTail)
      .map(([t,d])=>({tail:t,legs:d.legs,mins:d.mins,desc:TAIL_DESC[t]||t,type:TAIL_TYPE_MAP[t]||'?'}))
      .sort((a,b)=>b.mins-a.mins).slice(0,20);
  });

  // Pre-compute records for instant display
  const pilotArr = Object.values(byPilot);
  const records = {
    mostLegs:    [...pilotArr].sort((a,b)=>b.totalLegs-a.totalLegs).slice(0,10).map(p=>({name:p.fullName,username:p.username,value:p.totalLegs,sub:`${(p.totalMins/60).toFixed(0)}h`})),
    mostHours:   [...pilotArr].sort((a,b)=>b.totalMins-a.totalMins).slice(0,10).map(p=>({name:p.fullName,username:p.username,value:Math.round(p.totalMins/60),sub:`${p.totalLegs.toLocaleString()} legs`})),
    mostPax:     [...pilotArr].sort((a,b)=>b.totalPax-a.totalPax).slice(0,10).map(p=>({name:p.fullName,username:p.username,value:p.totalPax,sub:`${p.totalLegs.toLocaleString()} legs`})),
    topRouteLegs:routeStats.slice(0,10).map(r=>({name:r.route,value:r.legs,sub:`${r.pax.toLocaleString()} pax`})),
    topRoutePax: [...routeStats].sort((a,b)=>b.pax-a.pax).slice(0,10).map(r=>({name:r.route,value:r.pax,sub:`${r.legs.toLocaleString()} legs`})),
    busyDays:    topDaysByLegs.slice(0,10).map(d=>({name:d.date,value:d.legs,sub:`${d.pax} pax · ${d.pilots} pilots`})),
    paxDays:     topDaysByPax.slice(0,10).map(d=>({name:d.date,value:d.pax,sub:`${d.legs} legs · ${d.pilots} pilots`})),
    topTails:    tailStats.slice(0,10).map(t=>({name:t.tail,value:t.legs,sub:`${Math.round(t.mins/60).toLocaleString()}h`})),
  };

  const allDatesAll = comp.map(f=>f.date).filter(Boolean).sort();
  return {
    generated: new Date().toISOString(),
    totalLegs, totalMins, totalPax,
    uniquePilots: Object.keys(byPilot).length,
    dateRange: {start:allDatesAll[0], end:allDatesAll[allDatesAll.length-1]},
    byYear, byMonth, topDaysByLegs, topDaysByPax, topDaysDetail,
    destStats, routeStats, tailStats, byPilot, records,
  };
}

// ── COMPLIANCE ────────────────────────────────────────────────────────────────
function getCompliance(flights, dutyType, duties=[]) {
  const ref=today(), refDate=new Date(ref), now=Date.now();
  const sorted=[...flights].sort((a,b)=>(a.date+(a.startTaxi||"")).localeCompare(b.date+(b.startTaxi||"")));
  const todayMin=sorted.filter(f=>f.date===ref).reduce((s,f)=>s+(f.totalMinutes||0),0);
  const rolling24=sorted.filter(f=>{ const d=new Date(f.date+"T"+(f.startTaxi||"00:00")+":00"); return(now-d.getTime())<=86400000; }).reduce((s,f)=>s+(f.totalMinutes||0),0);
  const todayDuty=duties.find(d=>d.date===ref)||{};
  const dutyMinutes=(todayDuty.dutyStart&&todayDuty.dutyEnd)?calcMin(todayDuty.dutyStart,todayDuty.dutyEnd):null;
  const yesterday=duties.filter(d=>d.date<ref&&d.dutyEnd).sort((a,b)=>b.date.localeCompare(a.date))[0];
  let restMinutes=null, nextAvailable=null;
  if(yesterday?.dutyEnd){
    const reqRest=dutyType==="onDemand"?LIMITS.onDemand.minRest9:LIMITS.scheduled.minRest;
    const lastEndMs=new Date(yesterday.date+"T"+yesterday.dutyEnd+":00").getTime();
    restMinutes=Math.floor((now-lastEndMs)/60000);
    const earliest=new Date(lastEndMs+reqRest*60000);
    nextAvailable=earliest.toTimeString().slice(0,5);
  }
  const qStart=new Date(refDate.getFullYear(),Math.floor(refDate.getMonth()/3)*3,1);
  const quarterly=sorted.filter(f=>new Date(f.date)>=qStart).reduce((s,f)=>s+(f.totalMinutes||0),0);
  const saStart=new Date(qStart); saStart.setMonth(saStart.getMonth()-3);
  const semiAnnual=sorted.filter(f=>new Date(f.date)>=saStart).reduce((s,f)=>s+(f.totalMinutes||0),0);
  const yearStart=new Date(refDate.getFullYear(),0,1);
  const annual=sorted.filter(f=>new Date(f.date)>=yearStart).reduce((s,f)=>s+(f.totalMinutes||0),0);
  return { todayMin, rolling24, dutyMinutes, restMinutes, nextAvailable, rem24:Math.max(0,480-rolling24),
    flightToday:{value:todayMin,limit:480,warn:390},
    rolling24comp:{value:rolling24,limit:480,warn:390},
    dutyComp:{value:dutyMinutes||0,limit:840,warn:660},
    quarterly:{value:quarterly,limit:30000,warn:25200},
    semiAnnual:{value:semiAnnual,limit:48000,warn:40800},
    annual:{value:annual,limit:84000,warn:71400},
  };
}


// ── RESPONSIVE HOOK ───────────────────────────────────────────────────────────
function useClock(intervalMs=30000) {
  const [now, setNow] = useState(Date.now());
  useEffect(()=>{
    const t = setInterval(()=>setNow(Date.now()), intervalMs);
    return ()=>clearInterval(t);
  },[intervalMs]);
  return now;
}

function useWindowWidth() {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 430);
  useEffect(() => {
    const fn = () => setW(window.innerWidth);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return w;
}

// ── WEATHER STRIP ─────────────────────────────────────────────────────────────
const CAT_COLOR = { VFR:"#00e676", MVFR:"#4a9eff", IFR:"#ff6d00", LIFR:"#ff1744" };
const CAT_BG = { VFR:"rgba(0,230,118,0.1)", MVFR:"rgba(74,158,255,0.1)", IFR:"rgba(255,109,0,0.12)", LIFR:"rgba(255,23,68,0.15)" };

function WeatherStrip() {
  const [wx, setWx] = useState([]);
  const [loading, setLoading] = useState(true);
  const [lastFetch, setLastFetch] = useState(null);

  const fetchWx = useCallback(async () => {
    setLoading(true);
    try {
      const ids = WX_AIRPORTS.join(",");
      const r = await fetch(`https://aviationweather.gov/api/data/metar?ids=${ids}&format=json&hours=1`);
      const data = await r.json();
      setWx(data || []);
      setLastFetch(new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}));
    } catch(e) { console.error(e); }
    setLoading(false);
  }, []);

  useEffect(() => { fetchWx(); const t=setInterval(fetchWx,300000); return()=>clearInterval(t); }, [fetchWx]);

  const parseWx = (m) => {
    const cat = m.fltcat || m.flight_category || "?";
    const wind = m.wdir!=null ? `${String(m.wdir).padStart(3,"0")}°/${m.wspd||0}kt${m.wgst?` G${m.wgst}`:""}` : "Calm";
    const vis = m.visib!=null ? `${m.visib}SM` : "?";
    const ceil = m.cldCvg1 ? `${m.cldCvg1} ${m.cldBas1||0}ft` : "CLR";
    const icao = m.icaoId || m.station_id || "";
    const name = {PAJN:"Juneau",PAOH:"Hoonah",PAKW:"Klawock",PASI:"Sitka",PAHN:"Haines",PAGY:"Skagway",PAGS:"Gustavus",PAKT:"Ketchikan",PAPG:"Petersburg",PAFE:"Kake",PAWG:"Wrangell"}[icao]||icao;
    return { icao, name, cat, wind, vis, ceil };
  };

  return (
    <div style={{...S.card, padding:"12px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={S.ct}>🌤 SE AK WEATHER</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {lastFetch&&<span style={{fontSize:14,color:"#6a8aa8"}}>{lastFetch}</span>}
          <button onClick={fetchWx} style={{background:"none",border:"1px solid #1e2730",borderRadius:4,color:"#7a9ab8",fontSize:15,padding:"3px 8px",cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>↻</button>
        </div>
      </div>
      {loading && <div style={{fontSize:16,color:"#7a9ab8",textAlign:"center",padding:"10px 0"}}>Fetching METARs...</div>}
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {wx.map(m => {
          const p = parseWx(m);
          const c = CAT_COLOR[p.cat] || "#7a9ab8";
          const bg = CAT_BG[p.cat] || "rgba(74,106,138,0.1)";
          return <div key={p.icao} style={{background:bg,border:`1px solid ${c}22`,borderRadius:6,padding:"7px 10px",minWidth:120,flex:"1 1 120px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
              <span style={{fontSize:18,fontWeight:700}}>{p.icao.replace("PA","")}</span>
              <span style={{fontSize:15,fontWeight:700,color:c,background:`${c}22`,padding:"1px 5px",borderRadius:3}}>{p.cat}</span>
            </div>
            <div style={{fontSize:14,color:"#7a9ab8",lineHeight:1.6}}>
              <div>{p.name}</div>
              <div>{p.wind}</div>
              <div>{p.vis} · {p.ceil}</div>
            </div>
          </div>;
        })}
      </div>
      {/* Category legend */}
      <div style={{display:"flex",gap:10,marginTop:10,flexWrap:"wrap"}}>
        {[["VFR",">3SM >1000ft"],["MVFR","3SM 1000ft"],["IFR","1SM 500ft"],["LIFR","<1SM <500ft"]].map(([c,d])=>(
          <div key={c} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:CAT_COLOR[c]}}/>
            <span style={{fontSize:14,color:"#7a9ab8"}}>{c}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── PAYLOAD CALCULATOR ────────────────────────────────────────────────────────
function PayloadScreen() {
  const [aircraft, setAircraft] = useState("");
  const [pilotName, setPilotName] = useState("");
  const [pilotWt, setPilotWt] = useState("");
  const [fuel, setFuel] = useState("");
  const [paxWeight2, setPaxWeight2] = useState("");
  const [bags, setBags] = useState("");
  const [icing, setIcing] = useState(false);

  const ac = AIRCRAFT_DB[aircraft];
  const pilotWeight = parseFloat(pilotWt)||0;
  const fuelWeight = parseFloat(fuel)||0;
  const paxWeight = parseFloat(paxWeight2)||0;
  const bagsWeight = parseFloat(bags)||0;
  const tksWeight = ac?.tks||0;
  const totalLoaded = (ac?.empty||0) + pilotWeight + fuelWeight + paxWeight + bagsWeight + tksWeight;
  const maxAllowed = icing ? (ac?.maxIcing || ac?.maxGross || 0) : (ac?.maxGross||0);
  const remaining = maxAllowed - totalLoaded;
  const pct = ac ? Math.min(totalLoaded/maxAllowed, 1) : 0;
  const overweight = remaining < 0;
  const statusColor = !ac?"#7a9ab8":overweight?SC.red:remaining<200?SC.orange:remaining<500?SC.yellow:SC.green;
  const verdict = !ac?"—":overweight?`OVER BY ${Math.round(-remaining)} LBS`:remaining===0?"AT GROSS":`${Math.round(remaining)} LBS REMAINING`;

  const selectPilot = (name) => {
    setPilotName(name);
    const p = PILOT_DB.find(p=>p.name===name);
    if(p && p.weight) setPilotWt(String(p.weight));
    else setPilotWt("");
  };

  // Max pax that can fit


  return (
    <div>
      <div style={S.ct}>⚖ PAYLOAD QUICK-CHECK</div>
      <div style={{...S.card,background:"#090d13",borderColor:"#1a2535",marginBottom:14,padding:"10px 14px"}}>
        <div style={{fontSize:16,color:"#4a9eff",marginBottom:3}}>FOR DISPATCH &amp; RAMP USE</div>
        <div style={{fontSize:16,color:"#7a9ab8",lineHeight:1.6}}>Quick guesstimate before the aircraft lands. Enter what you know — get a GO/NO-GO and max pax count for the next leg.</div>
      </div>

      <div style={S.fg}>
        <label style={S.lbl}>AIRCRAFT</label>
        <select value={aircraft} onChange={e=>setAircraft(e.target.value)} style={S.sel}>
          <option value="">Select aircraft...</option>
          {Object.entries(AIRCRAFT_DB).map(([reg,info])=>(
            <option key={reg} value={reg}>{reg} — {info.short}</option>
          ))}
        </select>
        {ac&&<div style={{fontSize:16,color:"#7a9ab8",marginTop:4}}>
          Empty: {(ac.empty||0).toLocaleString()} lbs · Max: {(ac.maxGross||0).toLocaleString()} lbs · Icing: {ac.maxIcing ? ac.maxIcing.toLocaleString()+" lbs" : "N/A"}
        </div>}
      </div>

      <div style={S.row}>
        <div style={{flex:1}}>
          <label style={S.lbl}>PILOT</label>
          <select value={pilotName} onChange={e=>selectPilot(e.target.value)} style={S.sel}>
            <option value="">Select pilot...</option>
            {PILOT_DB.map(p=><option key={p.name} value={p.name}>{p.name}</option>)}
            <option value="__custom">Custom weight</option>
          </select>
        </div>
        <div style={{flex:"0 0 90px"}}>
          <label style={S.lbl}>WEIGHT (LBS)</label>
          <input type="number" value={pilotWt} onChange={e=>setPilotWt(e.target.value)} style={S.inp} placeholder="185" />
        </div>
      </div>

      <div style={S.row}>
        <div style={{flex:1}}>
          <label style={S.lbl}>FUEL ONBOARD (LBS)</label>
          <input type="number" value={fuel} onChange={e=>setFuel(e.target.value)} style={S.inp} placeholder="0" />
        </div>
        <div style={{flex:1}}>
          <label style={S.lbl}>BAGS (LBS)</label>
          <input type="number" value={bags} onChange={e=>setBags(e.target.value)} style={S.inp} placeholder="0" />
        </div>
      </div>

      <div style={S.row}>
        <div style={{flex:1}}>
          <label style={S.lbl}>TOTAL PAX WEIGHT (LBS)</label>
          <input type="number" value={paxWeight2} onChange={e=>setPaxWeight2(e.target.value)} style={S.inp} placeholder="0" />
        </div>
        <div style={{flex:1}}>
          <label style={S.lbl}>TOTAL BAG WEIGHT (LBS)</label>
          <input type="number" value={bags} onChange={e=>setBags(e.target.value)} style={S.inp} placeholder="0" />
        </div>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,padding:"10px 12px",background:"#0a1118",borderRadius:6,border:"1px solid #1e2730"}}>
        <input type="checkbox" id="icing" checked={icing} onChange={e=>setIcing(e.target.checked)} style={{width:20,height:20,accentColor:"#ff6d00"}}/>
        <label htmlFor="icing" style={{...S.lbl,marginBottom:0,fontSize:20,color:"#b8c8d8"}}>Apply icing / amphib pavement weight limit</label>
      </div>

      {/* Result card */}
      {ac && (
        <div style={{...S.card,border:`2px solid ${statusColor}`,textAlign:"center",padding:"20px 16px"}}>
          <div style={{fontSize:48,fontWeight:700,color:statusColor,lineHeight:1,marginBottom:4}}>
            {overweight?"🚫 OVERWEIGHT":"✅ GO"}
          </div>
          <div style={{fontSize:21,fontWeight:700,color:statusColor,marginBottom:16,letterSpacing:"0.08em"}}>{verdict}</div>

          {/* Weight bar */}
          <div style={{height:14,borderRadius:7,background:"#1e2730",position:"relative",overflow:"hidden",marginBottom:16}}>
            <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pct*100}%`,background:statusColor,borderRadius:7,transition:"width 0.4s"}}/>
          </div>

          {/* Breakdown */}
          <div style={{textAlign:"left",fontSize:18,lineHeight:2}}>
            {[
              ["Aircraft Empty",(ac.empty||0).toLocaleString()+" lbs"],
              pilotWeight?["Pilot",pilotWeight+" lbs"]:null,
              fuelWeight?["Fuel",fuelWeight+" lbs"]:null,
              paxWeight?["Pax Weight",paxWeight+" lbs"]:null,
              bagsWeight?["Bags",bagsWeight+" lbs"]:null,
              tksWeight?["TKS Fluid",tksWeight+" lbs"]:null,
            ].filter(Boolean).map(([l,v])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",borderBottom:"1px solid #1e2730",padding:"1px 0"}}>
                <span style={{color:"#7a9ab8"}}>{l}</span>
                <span style={{fontWeight:700}}>{v}</span>
              </div>
            ))}
            <div style={{display:"flex",justifyContent:"space-between",paddingTop:4}}>
              <span style={{fontWeight:700,color:"#4a9eff"}}>TOTAL LOADED</span>
              <span style={{fontWeight:700,color:"#4a9eff"}}>{Math.round(totalLoaded).toLocaleString()} lbs</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{color:"#7a9ab8"}}>{icing?"ICING LIMIT":"MAX GROSS"}</span>
              <span>{(maxAllowed||0).toLocaleString()} lbs</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── FUEL REFERENCE ────────────────────────────────────────────────────────────
function FuelScreen() {
  const [acType, setAcType] = useState("C208B");
  const [engine, setEngine] = useState("garrett");
  const [fltRules, setFltRules] = useState("vfr");
  const routes = Object.keys(FUEL_TABLE[acType]||{});

  const getMin = (route) => {
    const r = FUEL_TABLE[acType]?.[route];
    if(!r) return null;
    if(acType==="C208B") return fltRules==="vfr"?(engine==="garrett"?r.vfr_g:r.vfr_ex):(engine==="garrett"?r.ifr_g:r.ifr_ex);
    return fltRules==="vfr"?r.vfr:r.ifr;
  };

  return (
    <div>
      <div style={S.ct}>⛽ MINIMUM FUEL REFERENCE</div>
      <div style={{...S.card,background:"#0a0d08",borderColor:"#1a2a1a",marginBottom:12,padding:"10px 14px"}}>
        <div style={{fontSize:16,color:"#ff6d00",fontWeight:700,marginBottom:3}}>DISCLAIMER</div>
        <div style={{fontSize:15,color:"#7a9ab8",lineHeight:1.6}}>These are minimum fuel suggestions. PIC is required to calculate actual fuel requirements based on conditions. PC must also consider ZFW and max landing weight.</div>
      </div>

      {/* Selectors */}
      <div style={S.row}>
        <div style={{flex:1}}>
          <label style={S.lbl}>AIRCRAFT TYPE</label>
          <select value={acType} onChange={e=>setAcType(e.target.value)} style={S.sel}>
            <option value="C208B">C208B (Caravan)</option>
            <option value="PC-12">PC-12 (Pilatus)</option>
          </select>
        </div>
        <div style={{flex:1}}>
          <label style={S.lbl}>RULES</label>
          <select value={fltRules} onChange={e=>setFltRules(e.target.value)} style={S.sel}>
            <option value="vfr">VFR</option>
            <option value="ifr">IFR</option>
          </select>
        </div>
      </div>

      {acType==="C208B"&&(
        <div style={{...S.fg}}>
          <label style={S.lbl}>ENGINE</label>
          <div style={{display:"flex",gap:8}}>
            {[["garrett","Garret TPE331"],["ex","EX Caravan PT6"]].map(([k,l])=>(
              <button key={k} onClick={()=>setEngine(k)} style={{flex:1,padding:"10px",borderRadius:6,fontFamily:"'JetBrains Mono',monospace",border:`2px solid ${engine===k?"#ff6d00":"#1e2730"}`,background:engine===k?"rgba(255,109,0,0.1)":"#0a1118",color:engine===k?"#ff6d00":"#7a9ab8",fontSize:16,fontWeight:700,cursor:"pointer"}}>
                {l}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Route table */}
      <div style={S.card}>
        <div style={S.ct}>{fltRules.toUpperCase()} MINIMUMS — {acType}</div>
        {routes.map(route => {
          const min = getMin(route);
          return (
            <div key={route} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #1e2730"}}>
              <span style={{fontSize:20,color:"#b8c8d8"}}>{route}</span>
              {min ? (
                <span style={{fontSize:27,fontWeight:700,color:"#ff6d00"}}>{min.toLocaleString()} <span style={{fontSize:16,color:"#7a9ab8"}}>lbs</span></span>
              ) : (
                <span style={{fontSize:18,color:"#7a9ab8",fontStyle:"italic"}}>N/A</span>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── HOME SCREEN ────────────────────────────────────────────────────────────────
function HomeScreen({ flights, duties, profile, onNewFlight, onSetupProfile, onDutyEdit }) {
  const todayFlights = flights.filter(f=>f.date===today());
  const todayDuty = duties.find(d=>d.date===today())||{};
  const comp = getCompliance(flights, profile.defaultDutyType, duties);
  const fc = profile.defaultDutyType==="onDemand"?comp.rolling24comp:comp.flightToday;
  const flightColor = getStatus(fc.value,fc.limit,fc.warn);

  const warnings = [];
  if(fc.value>=480) warnings.push({color:"red",icon:"🚫",title:"FLIGHT TIME LIMIT REACHED",body:`8:00 hrs reached. No further flight time.`});
  else if(fc.value>=390) warnings.push({color:"orange",icon:"⚠️",title:"APPROACHING LIMIT",body:`${fmtMin(fc.value)} of 8:00 used — ${fmtMin(480-fc.value)} remaining.`});
  else if(fc.value>=300) warnings.push({color:"yellow",icon:"⏱",title:`${fmtHrs(fc.value)} HRS FLIGHT TIME`,body:`${fmtMin(480-fc.value)} remaining in this period.`});
  if(comp.dutyMinutes>=840) warnings.push({color:"red",icon:"🚫",title:"DUTY PERIOD LIMIT",body:"14:00 duty period reached."});
  else if(comp.dutyMinutes>=660) warnings.push({color:"orange",icon:"⚠️",title:"APPROACHING DUTY LIMIT",body:`${fmtMin(comp.dutyMinutes)} of 14:00 duty used.`});

  return (
    <div>
      {/* Weather strip - always on home */}
      <WeatherStrip/>

      {/* Pilot header */}
      <div style={{...S.card,background:"linear-gradient(135deg,#0d1520 0%,#0d1117 100%)",borderColor:"#1a2535"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:15,color:"#7a9ab8",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:4}}>PILOT</div>
            <div style={{fontSize:33,fontWeight:700}}>{profile.name||<span style={{color:"#7a9ab8"}}>Not Set</span>}</div>
            <div style={{marginTop:5}}><span style={S.badge(profile.defaultDutyType)}>{profile.defaultDutyType==="scheduled"?"📅 SCHEDULED":"📡 ON-DEMAND"}</span></div>
          </div>
          <button onClick={onSetupProfile} style={{...S.btn("ghost"),padding:"10px 14px",fontSize:16}}>PROFILE</button>
        </div>
      </div>

      {/* Warnings */}
      {warnings.map((w,i)=><WarnBanner key={i} {...w}/>)}

      {/* Today stats */}
      <div style={{...S.card,textAlign:"center"}}>
        <div style={S.ct}>TODAY — {today()}</div>
        <div style={{fontSize:78,fontWeight:700,color:SC[flightColor],lineHeight:1,marginBottom:4}}>{fmtMin(comp.todayMin)}</div>
        <div style={{fontSize:16,color:"#7a9ab8",letterSpacing:"0.1em"}}>{todayFlights.length} LEG{todayFlights.length!==1?"S":""} · BLOCK HRS</div>
        <div style={{marginTop:14}}>
          <ProgRow label={profile.defaultDutyType==="onDemand"?"Rolling 24-hr":"Flight / Duty"} value={fc.value} limit={fc.limit} warn={fc.warn}/>
          {comp.dutyMinutes>0&&<ProgRow label="Duty Period" value={comp.dutyMinutes} limit={840} warn={660}/>}
        </div>
        <div style={{display:"flex",gap:8,marginTop:4}}>
          {[["QTR",comp.quarterly],["6-MO",comp.semiAnnual],["YR",comp.annual]].map(([l,c])=>{
            const col=getStatus(c.value,c.limit,c.warn);
            return <div key={l} style={{flex:1,background:"#0a1118",borderRadius:6,padding:"8px 6px",textAlign:"center"}}>
              <div style={{...S.dot(col),margin:"0 auto 4px"}}/>
              <div style={{fontSize:14,color:"#7a9ab8",textTransform:"uppercase"}}>{l}</div>
              <div style={{fontSize:16,fontWeight:700,color:SC[col]}}>{fmtHrs(c.value)}</div>
            </div>;
          })}
        </div>
      </div>

      {/* Duty + rest */}
      <div style={S.card}>
        <div style={{...S.ct,marginBottom:8}}>DUTY DAY</div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <div style={{flex:1}}>
            <div style={{fontSize:15,color:"#7a9ab8",marginBottom:3}}>DUTY START</div>
            <div style={{fontSize:30,fontWeight:700,color:"#4a9eff"}}>{todayDuty.dutyStart||"—:——"}</div>
          </div>
          <div style={{fontSize:27,color:"#6a8aa8",alignSelf:"center"}}>→</div>
          <div style={{flex:1}}>
            <div style={{fontSize:15,color:"#7a9ab8",marginBottom:3}}>DUTY END</div>
            <div style={{fontSize:30,fontWeight:700,color:todayDuty.dutyEnd?SC.green:"#6a8aa8"}}>{todayDuty.dutyEnd||"—:——"}</div>
          </div>
          {comp.dutyMinutes!=null&&comp.dutyMinutes>0&&<div style={{flex:1}}>
            <div style={{fontSize:15,color:"#7a9ab8",marginBottom:3}}>TOTAL</div>
            <div style={{fontSize:30,fontWeight:700,color:getStatus(comp.dutyMinutes,840,660)==="green"?SC.green:SC[getStatus(comp.dutyMinutes,840,660)]}}>{fmtMin(comp.dutyMinutes)}</div>
          </div>}
        </div>
        {comp.restMinutes!=null&&(
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <div style={{flex:1,background:"#0a1118",borderRadius:6,padding:"8px 10px"}}>
              <div style={{fontSize:14,color:"#7a9ab8",marginBottom:2}}>REST SO FAR</div>
              <div style={{fontSize:24,fontWeight:700,color:comp.restMinutes>=540?SC.green:SC.red}}>{fmtMin(comp.restMinutes)}</div>
            </div>
            <div style={{flex:1,background:"#0a1118",borderRadius:6,padding:"8px 10px"}}>
              <div style={{fontSize:14,color:"#7a9ab8",marginBottom:2}}>EARLIEST NEXT</div>
              <div style={{fontSize:24,fontWeight:700,color:SC.green}}>{comp.nextAvailable||"—"}</div>
            </div>
            <div style={{flex:1,background:"#0a1118",borderRadius:6,padding:"8px 10px"}}>
              <div style={{fontSize:14,color:"#7a9ab8",marginBottom:2}}>24-HR AVAIL</div>
              <div style={{fontSize:24,fontWeight:700,color:comp.rem24>60?SC.green:SC.orange}}>{fmtMin(comp.rem24)}</div>
            </div>
          </div>
        )}
        <button onClick={()=>onDutyEdit(today())} style={{...S.btn("ghost"),width:"100%",padding:"10px",fontSize:18}}>
          {todayDuty.dutyStart?"EDIT DUTY TIMES":"+ SET DUTY TIMES"}
        </button>
      </div>

      <button onClick={onNewFlight} style={{...S.btn("primary"),width:"100%",fontSize:22,padding:"15px",marginBottom:14}}>+ LOG NEW FLIGHT</button>

      {/* Today legs */}
      {todayFlights.length>0&&<>
        <div style={S.ct}>TODAY'S LEGS</div>
        {[...todayFlights].reverse().map(f=>(
          <div key={f.id} style={{...S.card,borderLeft:`3px solid ${f.dutyType==="scheduled"?"#4a9eff":"#b464ff"}`,padding:"10px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:22,fontWeight:700}}>{f.origin}→{f.destination}</span>
              <span style={{fontSize:21,fontWeight:700,color:SC.green}}>{fmtMin(f.totalMinutes)}</span>
            </div>
            <div style={{fontSize:16,color:"#7a9ab8",marginTop:2}}>
              {f.startTaxi}–{f.stopTaxi} · {f.tailNumber}
              {f.flightRules&&<span style={{marginLeft:8,color:"#4a9eff"}}>{f.flightRules}</span>}
            </div>
          </div>
        ))}
      </>}
    </div>
  );
}

// ── LOCATION PICKER ───────────────────────────────────────────────────────────
function LocationPicker({ label, value, onChange }) {
  const isCustom = value && !AK_LOCATIONS.find(l => l.code === value && l.code !== "custom");
  const [mode, setMode] = useState(isCustom ? "custom" : "select");
  const [customVal, setCustomVal] = useState(isCustom ? value : "");

  const handleSelect = (v) => {
    if (v === "custom") { setMode("custom"); onChange(""); }
    else { setMode("select"); onChange(v); }
  };
  const handleCustom = (v) => {
    const up = v.toUpperCase().slice(0, 6);
    setCustomVal(up); onChange(up);
  };

  return (
    <div>
      <label style={S.lbl}>{label}</label>
      <select
        value={mode === "custom" ? "custom" : (value || "")}
        onChange={e => handleSelect(e.target.value)}
        style={S.sel}
      >
        <option value="">Select...</option>
        {AK_LOCATIONS.filter(l => l.type !== "custom").map(l => (
          <option key={l.code} value={l.code}>{l.code} — {l.name}{l.type==="float"?" 🚤":""}</option>
        ))}
        <option value="custom">✏ Custom / Float / Charter</option>
      </select>
      {mode === "custom" && (
        <input
          value={customVal}
          onChange={e => handleCustom(e.target.value)}
          style={{...S.inp, marginTop:6, fontSize:27, fontWeight:700, letterSpacing:"0.1em"}}
          placeholder="e.g. FUNTER, HAWK, CABIN1"
          autoFocus
        />
      )}
      {mode === "select" && value && (
        <div style={{fontSize:15, color:"#7a9ab8", marginTop:3}}>
          {AK_LOCATIONS.find(l=>l.code===value)?.name}
        </div>
      )}
    </div>
  );
}

// ── FLIGHT FORM ────────────────────────────────────────────────────────────────

          <label htmlFor="ifc" style={{...S.lbl,marginBottom:0,fontSize:20,color:"#b8c8d8"}}>Instrument flight (currency)</label>

      <button onClick={()=>onSave(form)} style={{...S.btn("primary"),width:"100%",fontSize:22,padding:"15px"}}>{initial?"SAVE CHANGES":"LOG FLIGHT"}</button>
    </div>
  );
}

// ── HISTORY ────────────────────────────────────────────────────────────────────
function HistoryScreen({ flights, duties, onEdit, onDelete }) {
  const grouped={};
  flights.forEach(f=>{if(!grouped[f.date])grouped[f.date]=[];grouped[f.date].push(f);});
  const dates=Object.keys(grouped).sort().reverse();
  return <div>
    <div style={S.ct}>FLIGHT HISTORY</div>
    {dates.length===0?<div style={{...S.card,textAlign:"center",color:"#7a9ab8",padding:32}}>No flights logged yet</div>
    :dates.map(date=>{
      const dayF=grouped[date], dayMin=dayF.reduce((s,f)=>s+(f.totalMinutes||0),0);
      const duty=duties.find(d=>d.date===date);
      const col=getStatus(dayMin,480,390);
      return <div key={date}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,marginTop:4}}>
          <div style={{fontSize:20,fontWeight:700,color:"#4a9eff"}}>{date}</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {duty?.dutyStart&&<span style={{fontSize:14,color:"#7a9ab8"}}>{duty.dutyStart}–{duty.dutyEnd||"?"}</span>}
            <div style={S.dot(col)}/><span style={{fontSize:20,fontWeight:700,color:SC[col]}}>{fmtMin(dayMin)}</span>
            <span style={{fontSize:15,color:"#7a9ab8"}}>{dayF.length} legs</span>
          </div>
        </div>
        {dayF.map(f=>(
          <div key={f.id} style={{...S.card,borderLeft:`3px solid ${f.dutyType==="scheduled"?"#4a9eff":"#b464ff"}`,padding:"10px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span style={{fontSize:22,fontWeight:700}}>{f.origin}→{f.destination}</span>
              <span style={{fontSize:21,fontWeight:700,color:SC.green}}>{fmtMin(f.totalMinutes)}</span>
            </div>
            <div style={{fontSize:16,color:"#7a9ab8",marginBottom:6}}>
              {f.startTaxi}–{f.stopTaxi} · {f.tailNumber}
              {f.flightRules&&<span style={{marginLeft:8,color:"#4a9eff"}}>{f.flightRules}</span>}
              {(f.landings||1)>0&&<span style={{marginLeft:8,color:"#7a9ab8"}}>▼{f.landings||1}</span>}
              {f.nightLandings>0&&<span style={{marginLeft:8,color:"#b464ff"}}>🌙{f.nightLandings}</span>}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>onEdit(f)} style={{...S.btn("ghost"),padding:"8px 14px",fontSize:16,flex:1}}>EDIT</button>
              <button onClick={()=>onDelete(f.id)} style={{...S.btn("danger"),padding:"8px 14px",fontSize:16}}>✕</button>
            </div>
          </div>
        ))}
        <div style={{height:1,background:"#1e2730",margin:"6px 0 12px"}}/>
      </div>;
    })}
  </div>;
}

// ── SCAN SCREEN ────────────────────────────────────────────────────────────────
function ScanScreen({ onFlightsScanned }) {
  const [image,setImage]=useState(null);
  const [loading,setLoading]=useState(false);
  const [results,setResults]=useState(null);
  const [error,setError]=useState(null);
  const fileRef=useRef();
  const ICAO_MAP={"PAJN":"JNU","PAKW":"KWP","PASI":"SIT","PAOH":"HNH","PAHN":"HNS","PAGY":"SKA","PAGS":"GST","PAKT":"KTN","PAPG":"PSG","PAFE":"KAE","PAWG":"WRG"};
  const normA=(s)=>s?( ICAO_MAP[s.toUpperCase()]||s.toUpperCase()):s;
  const TAIL_M={"722":"N722KP","721":"N721KP","749":"N749KP","753":"N753KP","754":"N754KP","755":"N755KP","264":"N264KP","265":"N265KP","450":"N450KP","336":"N336JP"};
  const normT=(r)=>{ if(!r)return""; const s=r.trim().toUpperCase().replace(/\s/g,""); if(Object.keys(AIRCRAFT_DB).includes(s))return s; const noN=s.startsWith("N")?s.slice(1):s; return TAIL_M[noN]||TAIL_M[s]||("N"+s); };

  const handleFile=(e)=>{ const f=e.target.files[0];if(!f)return; const r=new FileReader(); r.onload=(ev)=>setImage({data:ev.target.result.split(",")[1],type:f.type,preview:ev.target.result}); r.readAsDataURL(f); };

  const scan=async()=>{
    if(!image)return; setLoading(true); setError(null);
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:image.type,data:image.data}},
        {type:"text",text:`You are reading an Alaska Seaplanes pilot flight log sheet. It may have ONE OR MORE flight legs.

Extract ALL visible legs. Columns: Tail# (shared, top of form), Origin, Destination, Pax, Start Taxi (block off), Stop Taxi (block on), Total Min, Begin Hobbs, End Hobbs, Gross Weight, Index.

Also read: Pilot name, Date (YYYY-MM-DD).

ICAO→FAA: PAJN=JNU, PAKW=KWP, PASI=SIT, PAOH=HNH, PAHN=HNS, PAGY=SKA, PAGS=GST, PAKT=KTN.
Times: convert to HH:MM 24hr (e.g. "0901"→"09:01").
Tail: short numbers like "722"→"N722KP". Full fleet: N721KP,N722KP,N749KP,N753KP,N754KP,N755KP,N264KP,N265KP,N336JP,N1229C,N1229Z.

Return ONLY JSON:
{"pilotName":string|null,"date":"YYYY-MM-DD"|null,"tailNumber":"full reg","legs":[{"origin":"3-letter","destination":"3-letter","pax":number|null,"startTaxi":"HH:MM","stopTaxi":"HH:MM","totalMinutes":number|null,"beginHobbs":number|null,"endHobbs":number|null,"grossWeight":number|null,"index":string|null}]}`}
      ]}]})});
      const data=await resp.json();
      const text=data.content?.find(c=>c.type==="text")?.text||"{}";
      setResults(JSON.parse(text.replace(/```json|```/g,"").trim()));
    }catch(e){setError("Could not read form. Try a clearer, flat photo.");}
    setLoading(false);
  };

  const useResults=()=>{
    if(!results?.legs)return;
    const flights=results.legs.map(leg=>({id:uid(),date:results.date||today(),tailNumber:normT(results.tailNumber),origin:normA(leg.origin),destination:normA(leg.destination),pax:leg.pax??0,startTaxi:leg.startTaxi||"",stopTaxi:leg.stopTaxi||"",totalMinutes:leg.totalMinutes||calcMin(leg.startTaxi,leg.stopTaxi),beginHobbs:leg.beginHobbs??"",endHobbs:leg.endHobbs??"",hobbsDelta:leg.beginHobbs&&leg.endHobbs?Math.round((leg.endHobbs-leg.beginHobbs)*100)/100:null,grossWeight:leg.grossWeight??"",index:leg.index||"",notes:"",dutyType:"scheduled",flightRules:"VFR",nightLandings:0,trainingType:"",ifCheck:false}));
    onFlightsScanned(flights,results.pilotName);
  };

  return <div>
    <div style={S.ct}>SCAN PAPER FORM</div>
    <div style={{...S.card,background:"#0a1215",borderColor:"#1a2a35",marginBottom:12,padding:"10px 14px"}}>
      <div style={{fontSize:16,color:"#4a9eff",fontWeight:700,marginBottom:3}}>✓ MULTI-LEG · AI EXTRACTS ALL ROWS</div>
      <div style={{fontSize:16,color:"#7a9ab8",lineHeight:1.6}}>Flat overhead photo. Good lighting. All rows visible. ICAO codes converted automatically.</div>
    </div>
    <div style={{...S.card,textAlign:"center",padding:24}}>
      {image?.preview?<img src={image.preview} alt="form" style={{maxWidth:"100%",borderRadius:6,marginBottom:12}}/>
      :<div style={{padding:"28px 0",color:"#7a9ab8"}}><div style={{fontSize:60,marginBottom:12}}>📋</div><div style={{fontSize:20}}>Overhead photo of the entire form</div></div>}
      <div style={{display:"flex",gap:10,justifyContent:"center"}}>
        <button onClick={()=>fileRef.current.click()} style={{...S.btn("primary"),padding:"12px 18px",fontSize:20}}>📷 PHOTO</button>
        <button onClick={()=>fileRef.current.click()} style={{...S.btn("ghost"),padding:"12px 18px",fontSize:20}}>🖼 GALLERY</button>
      </div>
      <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{display:"none"}}/>
    </div>
    {image&&<button onClick={scan} disabled={loading} style={{...S.btn("primary"),width:"100%",padding:15,fontSize:21}}>
      {loading?"⏳ READING ALL LEGS...":"🤖 EXTRACT WITH AI"}
    </button>}
    {error&&<div style={{...S.card,borderColor:"#ff1744",color:"#ff1744",fontSize:20,marginTop:12}}>⚠ {error}</div>}
    {results&&<div style={{...S.card,marginTop:12}}>
      <div style={S.ct}>EXTRACTED — {results.legs?.length||0} LEGS</div>
      {results.pilotName&&<div style={{marginBottom:8,fontSize:20}}>Pilot: <span style={{color:"#4a9eff",fontWeight:700}}>{results.pilotName}</span></div>}
      {results.date&&<div style={{marginBottom:8,fontSize:20}}>Date: <span style={{fontWeight:700}}>{results.date}</span></div>}
      {results.tailNumber&&<div style={{marginBottom:12,fontSize:20}}>Tail: <span style={{color:SC.green,fontWeight:700}}>{normT(results.tailNumber)}</span></div>}
      {results.legs?.map((leg,i)=>(
        <div key={i} style={{background:"#0a1118",borderRadius:6,padding:"10px 12px",marginBottom:8,borderLeft:"3px solid #4a9eff"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontSize:21,fontWeight:700}}>{normA(leg.origin)}→{normA(leg.destination)}</span>
            <span style={{fontSize:20,fontWeight:700,color:SC.green}}>{leg.totalMinutes?fmtMin(leg.totalMinutes):"—"}</span>
          </div>
          <div style={{fontSize:16,color:"#7a9ab8"}}>{leg.startTaxi}–{leg.stopTaxi} · {leg.pax} pax · {leg.grossWeight} lbs</div>
        </div>
      ))}
      <button onClick={useResults} style={{...S.btn("green"),width:"100%",marginTop:12,padding:13,fontSize:20}}>✓ IMPORT ALL {results.legs?.length} LEGS →</button>
    </div>}
  </div>;
}

// ── CHECK AIRMEN ─────────────────────────────────────────────────────────────
// Pilots listed here accrue block time when flying as co-pilot (right seat instruction).
// Keys must match the Takeflite "Co-Pilot" column values (lowercase).
// Update this list when check airman designations change.
// Island Air tails — used for company breakdown in day drill-down
const ISLAND_AIR_TAILS = new Set(['N1229C','N1229Z','N1245X','N32009']);

const CHECK_AIRMEN = new Set([
  "danc",       // Dan Corson    — CA Seaplanes + IP
  "patrickf",   // Patrick Ford  — CA Seaplanes + IP
  "greggh",     // Greg Hake     — CA Seaplanes + IP + CA Air X
