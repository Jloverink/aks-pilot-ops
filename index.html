function useWeather(intervalMs=300000) { // refresh every 5 min
  const [wx, setWx] = useState(null);
  const [wxError, setWxError] = useState(null);
  const [wxAge, setWxAge] = useState(null);
  useEffect(()=>{
    const load = async () => {
      try {
        const data = await fetchMETARs();
        setWx(data);
        setWxAge(new Date());
        setWxError(null);
      } catch(e) {
        setWxError(e.message);
      }
    };
    load();
    const id = setInterval(load, intervalMs);
    return ()=>clearInterval(id);
  },[]);
  return {wx, wxError, wxAge};
}

// ── TURN TIME WARNINGS ────────────────────────────────────────────────────────
function getTurnWarnings(flights, minTurnMins=15) {
  // Given a sorted list of today's/tomorrow's flights for one pilot,
  // find consecutive legs at the same station with < minTurnMins ground time
  const warnings = [];
  const sorted = [...flights].filter(f=>f.startTaxi||f.schedOff)
    .sort((a,b)=>(a.startTaxi||a.schedOff||'').localeCompare(b.startTaxi||b.schedOff||''));
  for(let i=0;i<sorted.length-1;i++){
    const a=sorted[i], b=sorted[i+1];
    if(a.destination!==b.origin) continue;
    const aLand = a.stopTaxi||a.schedOn||(a.startTaxi?addMinToTime(a.startTaxi,a.totalMinutes||30):null);
    const bDep  = b.startTaxi||b.schedOff||'';
    if(!aLand||!bDep) continue;
    const turn = calcMin(aLand, bDep);
    if(turn!==null && turn>=0 && turn<minTurnMins) {
      warnings.push({
        at: a.destination, turn, between: `${a.origin}→${a.destination} & ${b.origin}→${b.destination}`,
        landTime: aLand, depTime: bDep,
      });
    }
  }
  return warnings;
}

// Parse the uploaded XLSX into a normalized pilot map
async function fetchQualsFromGSheet(csvUrl) {
  const res = await fetch(csvUrl);
  if(!res.ok) throw new Error(`Failed to fetch quals: ${res.status}`);
  const text = await res.text();
  const rows = text.split('\n').map(line=>{
    const cells=[]; let cur='', inQ=false;
    for(const c of line){
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cells.push(cur.trim());cur='';}
      else cur+=c;
    }
    cells.push(cur.trim());
    return cells;
  }).filter(r=>r.some(c=>c));
  // Reuse parseQualsSheet logic by building a fake wb
  // Actually just parse the rows directly using the same column mapping
  const headers = rows[0]?.map(h=>String(h||'').trim().replace(/\n/g,' '))||[];
  const pilots = {};
  const MONTHS_MAP2 = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  rows.slice(1).forEach(row=>{
    const nameRaw = String(row[0]||'').trim();
    if(!nameRaw||nameRaw===','||nameRaw==='—') return;
    const parts = nameRaw.split(',').map(s=>s.trim());
    const fullName = parts.length>=2 ? `${parts[1]} ${parts[0]}` : nameRaw;
    const key = fullName.toLowerCase().replace(/\s+/g,'_');
    const entry = {fullName, rawName:nameRaw, aircraft:{}, locations:{}, checkAirman:false, ioe:false, training:false};
    headers.forEach((h,i)=>{
      if(i===0) return;
      const raw = String(row[i]||'').trim();
      const up = raw.toUpperCase();
      const isIFR=up.includes('IFR'), isVFR=up==='VFR', isRS=up.includes('RIGHT');
      const isTrue=!!(raw==='true'||up==='YES'||up==='TRUE'||isIFR||isVFR||isRS);
      const hUp=h.toUpperCase().replace(/\(.*?\)/g,'').replace(/[\n\r]/g,' ').trim();
      const acMap={'N721KP':'N721KP','N722KP':'N722KP','N726KP':'N726KP','N724KP':'N724KP',
        '753/754/755':'Garret-TT','450KP':'N450KP','438/336':'EX-Old',
        'AMPHIB 206':'Amphib-206','AMPHIB CARAVAN':'Amphib-C',
        'DHC-2 BEAVER':'Beaver','DHC-2 BEAVER  N60TF':'N60TF',
        'N754KP':'N754KP','N753KP':'N753KP','N755KP':'N755KP',
        'N450KP':'N450KP','N438JP':'N438JP','N336JP':'N336JP',
        'N264KP':'N264KP','N265KP':'N265KP','N748KP':'N748KP','N749KP':'N749KP',
        'N777DH':'N777DH','N4794C':'N4794C','N743KP':'N743KP','N60TF DHC2':'N60TF',
        '754':'N754KP','753':'N753KP','755':'N755KP','36/38JP':'EX-Old'};
      const locCols=new Set(['SEAPILOTS (FLOATS)','PACK CREEK','ELFIN COVE','FOREST SERVICE','DRY BAY','NORRIS LAKE']);
      const acKey=acMap[hUp];
      if(acKey){const GX={'Garret-TT':['N754KP','N753KP','N755KP'],'EX-Old':['N438JP','N336JP'],'Amphib-C':['N264KP','N265KP'],'Amphib-206':['N748KP','N749KP'],'Beaver':['N777DH','N4794C','N743KP']};const q={qualified:isTrue,ifr:isIFR,vfr:isVFR||(!isIFR&&isTrue),rightSeat:isRS};(GX[acKey]||[acKey]).forEach(t=>{entry.aircraft[t]=q;});}
      else if(locCols.has(hUp)) entry.locations[h.replace(/\n.*$/,'').trim()]=isTrue;
    });
    pilots[key]=entry;
  });
  return pilots;
}

function parseQualsSheet(wb, utils) {
  const sheet = wb.Sheets['Aircraft Qualification'];
  if(!sheet) throw new Error('Sheet "Aircraft Qualification" not found');
  const rows = utils.sheet_to_json(sheet, {header:1, defval:''});
  if(rows.length < 2) throw new Error('Sheet appears empty');

  const pilots = {};

  // Normalize header for matching: collapse newlines to space, uppercase, trim
  // Keep parens so "DHC-2 Beaver (94C/7DH/743)" and "DHC-2 Beaver (N60TF)" stay distinct
  const normH = h => String(h||'').trim().replace(/[\n\r]+/g,' ').trim().toUpperCase();
  const headers = rows[0].map(normH);

  // Unified column map — keys are normalized header strings (uppercase, newlines→space)
  const acMap = {
    // Individual tails
    'N721KP':'N721KP','N722KP':'N722KP','N726KP':'N726KP','N724KP':'N724KP',
    '726KP':'N726KP','724KP':'N724KP',
    'N754KP':'N754KP','N753KP':'N753KP','N755KP':'N755KP',
    '754':'N754KP','753':'N753KP','755':'N755KP',
    'N450KP':'N450KP','450KP':'N450KP',
    'N438JP':'N438JP','N336JP':'N336JP',
    'N264KP':'N264KP','N265KP':'N265KP',
    'N748KP':'N748KP','N749KP':'N749KP',
    'N777DH':'N777DH','N4794C':'N4794C','N743KP':'N743KP',
    'N60TF':'N60TF',
    // Grouped headers (new sheet format, normalized)
    '753/754/755':'Garret-TT',
    '438/336':'EX-Old','36/38JP':'EX-Old',
    'AMPHIB 206 (748/749)':'Amphib-206',
    'AMPHIB CARAVAN (264/265)':'Amphib-C',
    'DHC-2 BEAVER (94C/7DH/743)':'Beaver',
    'DHC-2 BEAVER (N60TF)':'N60TF',
    // Also match without parens for older sheets
    'AMPHIB 206':'Amphib-206',
    'AMPHIB CARAVAN':'Amphib-C',
    'N60TF DHC2':'N60TF',
    'N60TF DHC2 ':'N60TF',
  };
  const locCols = new Set([
    'SEAPILOTS (FLOATS)','PACK CREEK','ELFIN COVE',
    'FOREST SERVICE','DRY BAY','NORRIS LAKE','FORK LIFT',
    'SEAPILOTS',  // fallback if parens stripped
  ]);

  rows.slice(1).forEach(row=>{
    const nameRaw = String(row[0]||'').trim();
    if(!nameRaw||nameRaw===','||nameRaw==='—') return;
    const parts = nameRaw.split(',').map(s=>s.trim());
    const fullName = parts.length>=2 ? `${parts[1]} ${parts[0]}` : nameRaw;

    const entry = { fullName, rawName:nameRaw, aircraft:{}, locations:{}, checkAirman:false, ioe:false, training:false };

    headers.forEach((h,i)=>{
      if(i===0) return;
      const raw = String(row[i]||'').trim();
      const val = raw.toUpperCase();
      const isIFR = val.includes('IFR');
      const isVFR = val==='VFR';
      const isRS  = val.includes('RIGHT');
      const isTraining = val==='TRAINING';
      const isTrue = !!(raw==='true'||val==='YES'||val==='TRUE'||isIFR||isVFR||isRS);
      const hUp = h.toUpperCase();

      // Map group keys → individual tails so edit grid works correctly
      const GROUP_EXPAND = {
        'Garret-TT': ['N754KP','N753KP','N755KP'],
        'EX-Old':    ['N438JP','N336JP'],
        'Amphib-C':  ['N264KP','N265KP'],
        'Amphib-206':['N748KP','N749KP'],
        'Beaver':    ['N777DH','N4794C','N743KP'],
      };
      const acKey = acMap[hUp];
      if(acKey) {
        const qual = { qualified:isTrue, ifr:isIFR,
          vfr:isVFR||(!isIFR&&isTrue&&!isTraining), rightSeat:isRS, training:isTraining };
        const tails = GROUP_EXPAND[acKey] || [acKey];
        tails.forEach(t => { entry.aircraft[t] = qual; });
      } else if(locCols.has(hUp)) {
        entry.locations[h.replace(/\n.*$/,'').trim()] = isTrue;
      }
    });

    pilots[fullName.toLowerCase().replace(/\s+/g,'_')] = entry;
  });

  // Parse check airmen sheet
  const caSheet = wb.Sheets['Training pilotsCheck Airmen'];
  if(caSheet) {
    const caRows = utils.sheet_to_json(caSheet, {header:1, defval:''});
    const caHeaders = caRows[0]?.map(h=>String(h||'').trim())||[];
    caRows.slice(1).forEach(row=>{
      const nameRaw = String(row[0]||'').trim();
      if(!nameRaw) return;
      const parts = nameRaw.split(',').map(s=>s.trim());
      const fullName = parts.length>=2 ? `${parts[1]} ${parts[0]}` : nameRaw;
      const key = fullName.toLowerCase().replace(/\s+/g,'_');
      if(pilots[key]) {
        const isTrue = v=>String(v||'').toUpperCase()==='TRUE';
        pilots[key].checkAirman = isTrue(row[caHeaders.indexOf('Check Airmen')]);
        pilots[key].ioe         = isTrue(row[caHeaders.indexOf('IOE')]);
        pilots[key].training    = isTrue(row[caHeaders.indexOf('Training Pilots')]);
      }
    });
  }

  return pilots;
}

// Check if a pilot is qualified for a specific tail number
function isPilotQualifiedForTail(pilotEntry, tailNumber) {
  if(!pilotEntry) return {qualified:false, reason:'Pilot not found in quals database'};
  const ac = pilotEntry.aircraft;

  // Helper: check both direct tail key and group key
  const has = (keys, getNote) => {
    for(const k of keys) if(ac[k]?.qualified) return {qualified:true, ifr:ac[k]?.ifr, vfr:ac[k]?.vfr, note:getNote?.(k)};
    return null;
  };

  // Direct check (exact tail)
  if(ac[tailNumber]?.qualified) return {qualified:true, ifr:ac[tailNumber]?.ifr, vfr:ac[tailNumber]?.vfr};

  // Garret TT group: 754KP, 753KP, 755KP — checked out in any = all
  if(['N754KP','N753KP','N755KP'].includes(tailNumber)) {
    const q=has(['Garret-TT','N754KP','N753KP','N755KP'],k=>'Via Garret TT group');
    if(q) return q;
  }

  // EX Caravan: 438→336 cross-qual; 450 separate
  if(tailNumber==='N336JP') {
    const q=has(['EX-Old','N438JP','N336JP'],k=>'Via 438JP checkout');
    if(q) return q;
  }
  if(tailNumber==='N438JP') {
    const q=has(['EX-Old','N438JP'],k=>'Via EX Caravan group');
    if(q) return q;
  }

  // Amphib Caravan (264/265)
  if(['N264KP','N265KP'].includes(tailNumber)) {
    const q=has(['Amphib-C','N264KP','N265KP'],k=>'Via amphib caravan checkout');
    if(q) return q;
  }

  // C206 Amphib (748/749)
  if(['N748KP','N749KP'].includes(tailNumber)) {
    const q=has(['Amphib-206','N748KP','N749KP'],k=>'Via C206 amphib checkout');
    if(q) return q;
  }

  // Standard Beaver (DH/94C/743)
  if(['N777DH','N4794C','N743KP'].includes(tailNumber)) {
    const q=has(['Beaver','N777DH','N4794C','N743KP'],k=>'Via Beaver checkout');
    if(q) return q;
  }

  return {qualified:false, reason:`Not checked out in ${tailNumber} or equivalent`};
}

// Check if pilot is qualified for a location
function isPilotQualifiedForLocation(pilotEntry, locationName) {
  if(!pilotEntry) return false;
  const loc = pilotEntry.locations;
  return !!(loc[locationName] || loc[locationName.toLowerCase()] ||
    Object.entries(loc).find(([k,v])=>k.toLowerCase()===locationName.toLowerCase()&&v)?.[1]);
}

                    <td style={{padding:"3px 8px",fontSize:10,color:"#c0d0e0",fontWeight:600,
                      position:"sticky",left:0,background:"inherit",
                      zIndex:1,whiteSpace:"nowrap"}}>
                      {p.fullName}
                    </td>
                    {/* Aircraft cells */}
                    {ALL_TAILS_EDIT.map(t=>{
                      const sec=AC_COLS.find(s=>s.tails.includes(t));
                      const ac=p.aircraft[t]||{};
                      const isIFR=ac.ifr;
                      const isVFR=ac.vfr||(!ac.ifr&&ac.qualified);
                      // Float/amphib/beaver = VFR only, no IFR option
                      const VFR_ONLY_TAILS = new Set(['N264KP','N265KP','N748KP','N749KP','N777DH','N4794C','N743KP','N60TF']);
                      const vfrOnly = VFR_ONLY_TAILS.has(t);
                      // Cycle: empty → VFR → (IFR if allowed) → empty
                      const handleClick=()=>{
                        if(!ac.qualified&&!ac.ifr)      toggleAircraft(k,t,'vfr');
                        else if(ac.qualified&&!ac.ifr)  vfrOnly ? toggleAircraft(k,t,'clear') : toggleAircraft(k,t,'ifr');
                        else                             toggleAircraft(k,t,'clear');
                      };
                      return <td key={t} onClick={handleClick}
                        style={{textAlign:"center",cursor:"pointer",
                          borderLeft:sec&&sec.tails.indexOf(t)===0?`2px solid ${sec.color}22`:"none",
                          padding:"1px"}}>
                        <div style={{height:22,display:"flex",alignItems:"center",
                          justifyContent:"center",borderRadius:3,
                          background:isIFR?"rgba(74,158,255,0.18)":isVFR?"rgba(90,170,138,0.12)":"transparent",
                          transition:"background 0.1s"}}>
                          <span style={{fontSize:9,fontWeight:700,
                            color:isIFR?"#4a9eff":isVFR?"#5aaa8a":"#1e2730"}}>
                            {isIFR?"IFR":isVFR?"VFR":""}
                          </span>
                        </div>
                      </td>;
                    })}
                    {/* Location cells */}
                    {ALL_LOCS_EDIT.map((l,i)=>{
                      const auth=isPilotQualifiedForLocation(p,l);
                      return <td key={l} onClick={()=>toggleLocation(k,l)}
                        style={{textAlign:"center",cursor:"pointer",padding:"1px",
                          borderLeft:i===0?"2px solid #ff884422":"none"}}>
                        <div style={{height:22,display:"flex",alignItems:"center",
                          justifyContent:"center",borderRadius:3,
                          background:auth?"rgba(255,136,68,0.15)":"transparent",
                          transition:"background 0.1s"}}>
                          <span style={{fontSize:10,color:auth?"#ff8844":"#1e2730",fontWeight:700}}>
                            {auth?"✓":""}
                          </span>
                        </div>
                      </td>;
                    })}
                    {/* Remove pilot */}
                    <td style={{padding:"1px 4px",textAlign:"center",borderLeft:"1px solid #1a2530"}}>
                      <button onClick={()=>removePilot(k)}
                        style={{background:"transparent",border:"none",color:"#3a5060",
                          fontSize:12,cursor:"pointer",padding:"2px 4px",borderRadius:3,lineHeight:1}}
                        title="Remove pilot">×</button>
                    </td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>

          {/* Add pilot row */}
          <div style={{marginTop:8,display:"flex",gap:6,alignItems:"center"}}>
            {addingPilot
              ? <><input value={newPilotName} onChange={e=>setNewPilotName(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter')addPilot();if(e.key==='Escape'){setAddingPilot(false);setNewPilotName('');}}}
                  placeholder="First Last"
                  autoFocus
                  style={{background:"#0a1118",border:"1px solid #4a9eff",borderRadius:5,
                    color:"#e8edf2",fontSize:11,padding:"5px 9px",width:160,outline:"none",
                    fontFamily:"'JetBrains Mono',monospace"}}/>
                <button onClick={addPilot} style={{...S.btn("primary"),padding:"5px 12px",fontSize:9}}>ADD</button>
                <button onClick={()=>{setAddingPilot(false);setNewPilotName('');}} style={{...S.btn("ghost"),padding:"5px 10px",fontSize:9}}>CANCEL</button>
              </>
              : <button onClick={()=>setAddingPilot(true)}
                  style={{...S.btn("ghost"),padding:"5px 12px",fontSize:9}}>+ ADD PILOT</button>
            }
            {dirty&&<span style={{fontSize:9,color:"#5aaa8a",marginLeft:4}}>Unsaved changes</span>}
          </div>

          {/* Notes */}
          <div style={{marginTop:12,padding:"8px 10px",background:"#060a0e",borderRadius:6,
            border:"1px solid #1a2530",fontSize:8,color:"#6a8a9a",lineHeight:1.7}}>
            <span style={{color:"#6a8aaa",fontWeight:700}}>HOW IT WORKS: </span>
            Click to cycle: empty → <span style={{color:"#5aaa8a"}}>VFR</span> → <span style={{color:"#4a9eff"}}>IFR</span> → empty &nbsp;·&nbsp;
            Changes apply immediately to qualification warnings on FLT/DUTY &nbsp;·&nbsp;
            Upload a new XLSX anytime to re-sync from the spreadsheet
          </div>
        </div>;
      })()}

      {/* ── PILOT LIST VIEW ── */}
      {viewMode==="pilots"&&<div style={{display:"flex",flexDirection:"column",gap:4}}>
        {filtered.map(p=>{
          const isOpen = selectedPilot===p.fullName;
          const acCount = Object.values(p.aircraft).filter(a=>a.qualified).length;
          const locCount = Object.values(p.locations).filter(Boolean).length;
          const hasIFR = Object.values(p.aircraft).some(a=>a.ifr);
          return <div key={p.fullName}>
            <div onClick={()=>setSelectedPilot(isOpen?null:p.fullName)}
              style={{background:isOpen?"#0d1520":"#0d1117",borderRadius:6,padding:"10px 14px",cursor:"pointer",
                border:`1px solid ${isOpen?"#4a9eff":"#1e2730"}`,
                display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:12,fontWeight:700,color:"#e0e8f0"}}>{p.fullName}</span>
                {hasIFR&&<span style={{fontSize:8,padding:"1px 5px",borderRadius:3,
                  background:"rgba(74,158,255,0.15)",color:"#4a9eff",border:"1px solid #4a9eff44",fontWeight:700}}>IFR</span>}
                {p.checkAirman&&<span style={{fontSize:8,padding:"1px 5px",borderRadius:3,
                  background:"rgba(255,215,64,0.12)",color:"#ffd740",border:"1px solid #ffd74044",fontWeight:700}}>CHECK AIRMAN</span>}
                {p.training&&<span style={{fontSize:8,padding:"1px 5px",borderRadius:3,
                  background:"rgba(90,170,138,0.12)",color:"#5aaa8a",border:"1px solid #5aaa8a44",fontWeight:700}}>TRAINER</span>}
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center",fontSize:9,color:"#7a9ab0"}}>
                <span>{acCount} aircraft</span>
                {locCount>0&&<span>{locCount} special locs</span>}
                <span style={{color:"#3a5060"}}>{isOpen?"▼":"▶"}</span>
              </div>
            </div>

            {isOpen&&<div style={{background:"#080b0f",borderRadius:6,border:"1px solid #1a2530",
              padding:"12px 14px",marginTop:2}}>

              {/* Aircraft by group */}
              {AC_SECTIONS.map(sec=>{
                const qualTails = sec.tails.filter(t=>isPilotQualifiedForTail(p,t).qualified);
                if(!qualTails.length) return null;
                return <div key={sec.label} style={{marginBottom:10}}>
                  <div style={{fontSize:8,fontWeight:700,color:sec.color,letterSpacing:"0.1em",marginBottom:5}}>{sec.label}</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {sec.tails.map(t=>{
                      const q=isPilotQualifiedForTail(p,t);
                      const direct=p.aircraft[t];
                      if(!q.qualified) return null;
                      const label=direct?.ifr?"IFR":direct?.rightSeat?"RIGHT SEAT":q.note?"("+q.note+")":"VFR";
                      const col=direct?.ifr?"#4a9eff":direct?.rightSeat?"#aa7adf":q.note?"#7a9ab8":"#5aaa8a";
                      return <span key={t} style={{fontSize:9,padding:"2px 8px",borderRadius:3,
                        background:`${col}18`,color:col,border:`1px solid ${col}44`,fontWeight:700}}>
                        {t} <span style={{fontSize:8,fontWeight:400,opacity:0.8}}>{label}</span>
                      </span>;
                    })}
                  </div>
                </div>;
              })}

              {/* Unqualified aircraft */}
              {(()=>{
                const unqual = ALL_TAILS.filter(t=>!isPilotQualifiedForTail(p,t).qualified);
                if(!unqual.length) return null;
                return <div style={{marginBottom:10}}>
                  <div style={{fontSize:8,color:"#3a5060",marginBottom:4,fontWeight:700,letterSpacing:"0.1em"}}>NOT QUALIFIED</div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    {unqual.map(t=><span key={t} style={{fontSize:8,color:"#2a4050",padding:"1px 5px",
                      borderRadius:3,border:"1px solid #1a2530"}}>{t}</span>)}
                  </div>
                </div>;
              })()}

              {/* Special locations */}
              {ALL_LOCS.filter(l=>isPilotQualifiedForLocation(p,l)).length>0&&<div style={{marginBottom:8}}>
                <div style={{fontSize:8,fontWeight:700,color:"#ff8844",letterSpacing:"0.1em",marginBottom:4}}>SPECIAL LOCATIONS</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {ALL_LOCS.filter(l=>isPilotQualifiedForLocation(p,l)).map(l=>(
                    <span key={l} style={{fontSize:9,padding:"2px 8px",borderRadius:3,
                      background:"rgba(255,136,68,0.12)",color:"#ff8844",
                      border:"1px solid rgba(255,136,68,0.3)",fontWeight:700}}>{l}</span>
                  ))}
                </div>
              </div>}

              {/* IFR route note */}
              {!hasIFR&&<div style={{fontSize:9,color:"#7a9ab0",padding:"6px 8px",
                background:"rgba(255,215,64,0.06)",borderRadius:4,border:"1px solid rgba(255,215,64,0.15)"}}>
                ⚠ VFR only — monitor IFR-heavy routes: Kake, Sitka, KTN, KLW, PSG, WRG, Yakutat
              </div>}
            </div>}
          </div>;
        })}
      </div>}

      {/* ── AIRCRAFT MATRIX VIEW ── */}
      {viewMode==="aircraft"&&<div style={{overflowX:"auto"}}>
        {/* Legend */}
        <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
          {AC_SECTIONS.map(s=>(
            <div key={s.label} style={{fontSize:8,color:s.color,fontWeight:700,
              padding:"2px 8px",borderRadius:3,background:`${s.color}15`,border:`1px solid ${s.color}33`}}>
              {s.label}: {s.tails.map(t=>TAIL_SHORT[t]).join(' · ')}
            </div>
          ))}
          <span style={{fontSize:8,color:"#6a8aaa",marginLeft:4}}>
            <span style={{color:"#5aaa8a"}}>VFR</span> &nbsp;
            <span style={{color:"#4a9eff"}}>IFR</span> &nbsp;
            <span style={{color:"#aa7adf"}}>RS</span> &nbsp;
            <span style={{color:"#ffd740"}}>↑</span> via group
          </span>
        </div>

        {/* TRUE TABLE — browser enforces perfect column alignment */}
        <table style={{borderCollapse:"collapse",background:"#060a0e",
          borderRadius:6,border:"1px solid #1e2730",
          tableLayout:"fixed",width:"100%",minWidth:`${160+ALL_TAILS.length*44}px`}}>
          <colgroup>
            <col style={{width:160}}/>
            {ALL_TAILS.map(t=><col key={t} style={{width:44}}/>)}
          </colgroup>
          <thead>
            <tr style={{background:"#0a0e14"}}>
              <th style={{padding:"8px 10px",textAlign:"left",fontSize:10,
                color:"#8aaabb",fontWeight:700,
                borderBottom:"2px solid #1e2730",
                borderRight:"1px solid #1a2530",
                position:"sticky",left:0,background:"#0a0e14",zIndex:2}}>
                PILOT <span style={{color:"#3a5060",fontWeight:400,fontSize:9}}>{filtered.length}</span>
              </th>
              {ALL_TAILS.map((t,ti)=>{
                const sec=AC_SECTIONS.find(s=>s.tails.includes(t));
                const isFirst=sec&&sec.tails.indexOf(t)===0;
                return <th key={t} style={{
                  padding:"6px 2px 0px",
                  textAlign:"center",
                  borderBottom:"2px solid #1e2730",
                  borderLeft:isFirst?`2px solid ${sec?.color||"#333"}66`:"1px solid #131c28",
                  background:"#0a0e14"}}>
                  <div style={{fontSize:9,color:sec?.color||"#7a9ab0",fontWeight:700,marginBottom:3}}>
                    {TAIL_SHORT[t]}
                  </div>
                  <div style={{height:3,background:sec?`${sec.color}99`:"#1a2530",margin:"0 4px"}}/>
                </th>;
              })}
            </tr>
          </thead>
          <tbody>
            {filtered.map((p,pi)=>(
              <tr key={p.fullName}
                style={{background:pi%2===0?"#08101e":"#122030",borderBottom:"1px solid #111820"}}
                onMouseEnter={e=>e.currentTarget.style.background="#1a3048"}
                onMouseLeave={e=>e.currentTarget.style.background=pi%2===0?"#08101e":"#122030"}>
                <td style={{padding:"5px 10px",fontSize:10,color:"#c8d8e8",fontWeight:700,
                  borderRight:"1px solid #1a2530",
                  position:"sticky",left:0,
                  background:"inherit",
                  maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {p.fullName.split(' ').slice(-1)[0]+', '+p.fullName.split(' ')[0]}
                  {Object.values(p.aircraft).some(a=>a.ifr)&&
                    <span style={{fontSize:7,color:"#4a9eff",fontWeight:700,marginLeft:4}}>IFR</span>}
                </td>
                {ALL_TAILS.map((t,ti)=>{
                  const sec=AC_SECTIONS.find(s=>s.tails.includes(t));
                  const isFirst=sec&&sec.tails.indexOf(t)===0;
                  return <td key={t} style={{
                    padding:0,textAlign:"center",
                    borderLeft:isFirst?`2px solid ${sec?.color||"#333"}33`:"1px solid #131c28"}}>
                    <QCell p={p} tail={t}/>
                  </td>;
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>}

      {/* ── LOCATIONS VIEW ── */}
      {viewMode==="locations"&&<div>
        <div style={{fontSize:9,color:"#7a9ab0",marginBottom:10,lineHeight:1.6}}>
          Special authorization required for these locations. IFR-heavy routes flagged separately.
        </div>

        {/* Location cards */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:16}}>
          {ALL_LOCS.map(loc=>{
            const qualified = filtered.filter(p=>isPilotQualifiedForLocation(p,loc));
            return <div key={loc} style={{background:"#0a0e14",borderRadius:6,padding:"10px 12px",
              border:"1px solid #1a2530"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#ff8844",marginBottom:6}}>{loc}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                {qualified.map(p=>(
                  <span key={p.fullName} style={{fontSize:8,color:"#6a9a7a",background:"rgba(90,170,138,0.1)",
                    padding:"1px 5px",borderRadius:3,border:"1px solid rgba(90,170,138,0.2)"}}>
                    {p.fullName.split(' ').slice(-1)[0]}
                  </span>
                ))}
                {!qualified.length&&<span style={{fontSize:9,color:"#3a5060"}}>No pilots authorized</span>}
              </div>
            </div>;
          })}
        </div>

        {/* IFR routes reference */}
        <div style={{background:"#0a0e14",borderRadius:6,padding:"12px 14px",border:"1px solid #1a2530"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#4a9eff",marginBottom:8,letterSpacing:"0.08em"}}>
            IFR-HEAVY ROUTES (§135.297)
          </div>
          <div style={{fontSize:9,color:"#7a9ab0",marginBottom:8,lineHeight:1.6}}>
            Kake · Sitka · Klawock · Ketchikan · Petersburg · Wrangell · Yakutat<br/>
            VFR pilots <em>can</em> operate these routes in VMC — but flag when conditions deteriorate.
          </div>
          <div style={{fontSize:9,color:"#6a8aaa",marginBottom:6,fontWeight:700}}>IFR-QUALIFIED PILOTS</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {filtered.filter(p=>Object.values(p.aircraft).some(a=>a.ifr)).map(p=>(
              <span key={p.fullName} style={{fontSize:9,color:"#4a9eff",background:"rgba(74,158,255,0.1)",
                padding:"2px 7px",borderRadius:3,border:"1px solid rgba(74,158,255,0.25)",fontWeight:700}}>
                {p.fullName}
              </span>
            ))}
          </div>
        </div>
      </div>}
    </div>
  );
}

function ProfileModal({profile,onSave,onClose}) {
  const [name,setName]=useState(profile.name);
  const [dt,setDt]=useState(profile.defaultDutyType);
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div style={{background:"#0d1117",borderRadius:"16px 16px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:430,border:"1px solid #1e2730"}}>
      <div style={{fontSize:16,fontWeight:700,letterSpacing:"0.1em",marginBottom:20,textTransform:"uppercase"}}>Pilot Profile</div>
      <div style={S.fg}><label style={S.lbl}>PILOT NAME</label><input value={name} onChange={e=>setName(e.target.value)} style={S.inp} placeholder="First Last" autoFocus/></div>
      <div style={S.fg}>
        <label style={S.lbl}>DEFAULT DUTY TYPE</label>
        <div style={{display:"flex",gap:8}}>
          {["scheduled","onDemand"].map(t=>(<button key={t} onClick={()=>setDt(t)} style={{flex:1,padding:12,borderRadius:6,fontFamily:"'JetBrains Mono',monospace",border:`2px solid ${dt===t?(t==="scheduled"?"#4a9eff":"#b464ff"):"#1e2730"}`,background:dt===t?(t==="scheduled"?"rgba(74,158,255,0.1)":"rgba(180,100,255,0.1)"):"#0a1118",color:dt===t?(t==="scheduled"?"#4a9eff":"#b464ff"):"#7a9ab8",fontSize:11,fontWeight:700,letterSpacing:"0.08em",cursor:"pointer"}}>{t==="scheduled"?"📅 SCHEDULED":"📡 ON-DEMAND"}</button>))}
        </div>
      </div>
      <div style={{display:"flex",gap:10,marginTop:20}}>
        <button onClick={onClose} style={{...S.btn("ghost"),flex:1}}>CANCEL</button>
        <button onClick={()=>onSave({name,defaultDutyType:dt})} style={{...S.btn("primary"),flex:2}}>SAVE</button>
      </div>
    </div>
  </div>;
}

function DutyModal({date,initial,onSave,onClose}) {
  const [ds,setDs]=useState(initial?.dutyStart||"");
  const [de,setDe]=useState(initial?.dutyEnd||"");
  const dm=(ds&&de)?calcMin(ds,de):null;
  const dc=dm!=null?getStatus(dm,840,660):"green";
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div style={{background:"#0d1117",borderRadius:"16px 16px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:430,border:"1px solid #1e2730"}}>
      <div style={{fontSize:16,fontWeight:700,marginBottom:4,textTransform:"uppercase"}}>Duty Day — {date}</div>
      <div style={{fontSize:11,color:"#7a9ab8",marginBottom:20}}>Duty period start and end times</div>
      <div style={S.row}>
        <div style={{flex:1}}><label style={S.lbl}>DUTY START</label><input type="time" value={ds} onChange={e=>setDs(e.target.value)} style={{...S.inp,fontSize:20}}/></div>
        <div style={{flex:1}}><label style={S.lbl}>DUTY END</label><input type="time" value={de} onChange={e=>setDe(e.target.value)} style={{...S.inp,fontSize:20}}/></div>
      </div>
      {dm!=null&&<div style={{textAlign:"center",marginBottom:14}}>
        <div style={{fontSize:11,color:"#7a9ab8",marginBottom:3}}>DUTY PERIOD</div>
        <div style={{fontSize:36,fontWeight:700,color:SC[dc]}}>{fmtMin(dm)}</div>
        {dm>=840&&<div style={{color:SC.red,fontSize:12,marginTop:3}}>⚠ AT 14-HOUR LIMIT</div>}
      </div>}
      <div style={{display:"flex",gap:10,marginTop:8}}>
        <button onClick={onClose} style={{...S.btn("ghost"),flex:1}}>CANCEL</button>
        <button onClick={()=>onSave({date,dutyStart:ds,dutyEnd:de})} style={{...S.btn("primary"),flex:2}}>SAVE DUTY</button>
      </div>
    </div>
  </div>;
}

function WarnPopup({flights,profile,onDismiss}) {
  const c=getCompliance(flights,profile.defaultDutyType);
  const mins=profile.defaultDutyType==="onDemand"?c.rolling24:c.todayMin;
  if(mins<300)return null;
  const color=mins>=480?"red":mins>=390?"orange":"yellow";
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:"#0d1117",borderRadius:12,padding:24,width:"100%",maxWidth:380,border:`2px solid ${SC[color]}`}}>
      <div style={{fontSize:32,textAlign:"center",marginBottom:10}}>{mins>=480?"🚫":"⚠️"}</div>
      <div style={{fontSize:15,fontWeight:700,color:SC[color],textAlign:"center",marginBottom:8,letterSpacing:"0.05em"}}>{mins>=480?"FLIGHT LIMIT REACHED":"FLIGHT TIME ALERT"}</div>
      <div style={{fontSize:13,color:"#b8c8d8",textAlign:"center",marginBottom:18,lineHeight:1.6}}>{mins>=480?"8:00 hrs reached — no further flight time.":`${fmtMin(mins)} of 8:00 used. ${fmtMin(480-mins)} remaining.`}</div>
      <div style={{height:10,borderRadius:5,background:"#1e2730",marginBottom:18,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${Math.min(mins/480*100,100)}%`,background:SC[color]}}/>
      </div>
      <button onClick={onDismiss} style={{...S.btn(color==="red"?"danger":"primary"),width:"100%",padding:14}}>ACKNOWLEDGED</button>
    </div>
  </div>;
}

const NAV=[
  {id:"fleet", icon:"👥",label:"FLT/DUTY"},
  {id:"crew",  icon:"✈", label:"CREW"},
  {id:"night", icon:"🌙",label:"NIGHT"},
  {id:"tails", icon:"🔧",label:"TAILS"},
  {id:"payload",icon:"⚖",label:"PAYLOAD"},
  {id:"fuel",  icon:"⛽",label:"FUEL"},
  {id:"regs",  icon:"§", label:"REGS"},
  {id:"quals", icon:"🎖",label:"QUALS"},
  {id:"stats", icon:"📊",label:"STATS"},
  {id:"import",icon:"↑", label:"IMPORT"},
];

function App() {
  const [screen,setScreen]=useState("fleet");
  const [winterMode,setWinterMode]=useState(false);
  const [screen2,setScreen2]=useState("crew");
  const winW = useWindowWidth();
  const isDesktop = winW >= DESKTOP;
  const [flights,setFlights]=useState([]);
  const [duties,setDuties]=useState([]);
  const [profile,setProfile]=useState({name:"",defaultDutyType:"scheduled"});
  const [fleetData,setFleetData]=useState({});
  const [delayData,setDelayData]=useState(null);
  const [nightCurrencyData,setNightCurrencyData]=useState(null);
  const [reconData,setReconData]=useState(null);
  const [spiderRows,setSpiderRows]=useState(null);
  const [routeAvgs,setRouteAvgs]=useState(null);
  const [qualsData,setQualsData]=useState(null);
  const {wx, wxError, wxAge} = useWeather();
  const [crewData,    setCrewData   ]=useState(null);
  const [crewSyncing, setCrewSyncing]=useState(false);
  const [crewError,   setCrewError  ]=useState(null);
  const [crewLastSync,setCrewLastSync]=useState(null);
  const [crewSource,  setCrewSource ]=useState("xlsx");
  const [editFlight,setEditFlight]=useState(null);
  const [dutyDate,setDutyDate]=useState(null);
  const [showProfile,setShowProfile]=useState(false);
  const [loaded,setLoaded]=useState(false);
  const [dismissed,setDismissed]=useState(new Set());

  useEffect(()=>{
    // Safety net: always load within 5 seconds no matter what
    const fallbackTimer = setTimeout(()=>setLoaded(true), 5000);

    Promise.all([sget(SK.flights),sget(SK.profile),sget(SK.duties),sget(SK.fleet),sget(SK.crew),sget(SK.delays),sget(SK.nightCurrency),sget(SK.recon),sget(SK.spider),sget(SK.routes),sget(SK.quals)])
    .then(([f,p,d,fl,cr,dl,nc,rc,sp,ra,ql])=>{
      clearTimeout(fallbackTimer);
      try { setFlights(Array.isArray(f)?f:[]); } catch(e){}
      try { setProfile(p&&typeof p==="object"?p:{name:"",defaultDutyType:"scheduled"}); } catch(e){}
      try { setDuties(Array.isArray(d)?d:[]); } catch(e){}
      try {
        const patchedFleet = {};
        if(fl&&typeof fl==="object") Object.entries(fl).forEach(([u,pd])=>{
          patchedFleet[u] = {...pd, office: pilotCompany(u)};
        });
        setFleetData(patchedFleet);
      } catch(e){}
      try { if(cr){ setCrewData(cr.data||null); setCrewLastSync(cr.ts||null); setCrewSource(cr.source||'xlsx'); } } catch(e){}
      try { if(dl) setDelayData(dl); } catch(e){}
      try { if(nc) setNightCurrencyData(nc); } catch(e){}
      try { if(sp) setSpiderRows(sp); } catch(e){}
      try { if(ra) setRouteAvgs(ra); } catch(e){}
      try { if(ql) setQualsData(ql); } catch(e){}
      sget(SK.winterMode).then(v=>{ if(v) setWinterMode(!!v); }).catch(()=>{});
      setLoaded(true);
      try { if(!p?.name)setShowProfile(true); } catch(e){}
    })
    .catch(err=>{
      clearTimeout(fallbackTimer);
      console.error('Storage load error:', err);
      setLoaded(true);
    });
  },[]);

  const comp=getCompliance(flights,profile.defaultDutyType,duties);
  const curMins=profile.defaultDutyType==="onDemand"?comp.rolling24:comp.todayMin;
  const trigThresh=WARN_THRESHOLDS.filter(t=>curMins>=t).pop();
  const showWarn=trigThresh&&!dismissed.has(trigThresh);

  const saveFlight=useCallback(async(f)=>{
    setFlights(prev=>{const exists=prev.find(x=>x.id===f.id);const u=exists?prev.map(x=>x.id===f.id?f:x):[...prev,f];sset(SK.flights,u);return u;});
    setEditFlight(null);setScreen("home");
  },[]);

  const importFlights=useCallback(async(newF,newD=[])=>{
    setFlights(prev=>{
      // Smart merge: find the date range covered by the new import
      // Only overwrite dates that appear in the new data — everything else stays untouched
      if(!newF.length) return prev;

      const newDates = new Set(newF.map(f=>f.date));
      const minNewDate = [...newDates].sort()[0];

      // Keep all historical flights that are NOT in the new date range
      const historical = prev.filter(f=>!newDates.has(f.date));

      // For the dates in the new import, use the new data (deduped by id)
      const newById = {};
      newF.forEach(f=>{ newById[f.id]=f; });
      const fresh = Object.values(newById);

      const merged = [...historical, ...fresh]
        .sort((a,b)=>(a.date+(a.startTaxi||'')).localeCompare(b.date+(b.startTaxi||'')));

      console.log(`Import: ${newDates.size} days updated (${minNewDate}+), ${historical.length} historical flights preserved, ${fresh.length} new flights`);
      sset(SK.flights, merged);
      return merged;
    });
    // Duties: only update dates present in new duties, preserve everything else
    if(newD.length>0) setDuties(prev=>{
      const newDutyDates = new Set(newD.map(d=>d.date));
      const historical = prev.filter(d=>!newDutyDates.has(d.date));
      const merged = [...historical, ...newD].sort((a,b)=>a.date.localeCompare(b.date));
      sset(SK.duties, merged);
      return merged;
    });
    setScreen("home");
  },[]);

  const nightFileRef = useRef(null);

  const uploadNightXlsx = useCallback(async()=>{
    // Trigger file picker
    if(!nightFileRef.current) return;
    nightFileRef.current.click();
  },[]);

  const handleNightFile = useCallback(async(e)=>{
    const file = e.target.files[0]; if(!file) return;
    const XLSX = await loadXlsx();
    const buf  = await file.arrayBuffer();
    const wb   = XLSX.read(new Uint8Array(buf),{type:'array',cellDates:false,dateNF:'yyyy-mm-dd'});
    const csv  = XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]],{raw:false});
    const rows = csv.split("\n").map(r=>r.split(",").map(v=>v.trim().replace(/^"|"$/g,"")));
    // Format: col0=TF input, col1=Name "Last, First", col2=Date Completed, col3=Expires
    const parsed = [];
    const today_ = new Date(); today_.setHours(0,0,0,0);
    rows.slice(3).forEach(r=>{
      const raw = r[1]||""; if(!raw) return;
      // Name is "Last, First" → convert to "First Last"
      const nameParts = raw.split(",").map(s=>s.trim());
      const name = nameParts.length>=2 ? `${nameParts[1]} ${nameParts[0]}` : raw;
      const expires = r[3]||"";
      const expDate = parseDateInfo(expires);
      let status = "red";
      if(expDate) {
        const days = Math.round((expDate.date - today_)/86400000);
        status = days < 0 ? "red" : days <= 30 ? "orange" : days <= 60 ? "yellow" : "green";
      }
      parsed.push({ name, expires: expires||null, status, completed: r[2]||null });
    });
    setNightCurrencyData(parsed);
    await sset(SK.nightCurrency, parsed);
    e.target.value="";
  },[]);

  const importRecon=useCallback(async(result, parsedSpiderRows)=>{
    setReconData(result);
    await sset(SK.recon, result);
    if(parsedSpiderRows) {
      setSpiderRows(parsedSpiderRows);
      await sset(SK.spider, parsedSpiderRows);
    }
  },[]);

  const importDelays=useCallback(async(parsed)=>{
    setDelayData(parsed);
    await sset(SK.delays, parsed);
  },[]);

  const uploadQuals=useCallback(async(parsed)=>{
    setQualsData(parsed);
    await sset(SK.quals, parsed);
  },[]);

  const importFleet=useCallback(async(pilotMap, newRouteAvgs)=>{
    const newFleet = {...fleetData, ...pilotMap};
    setFleetData(newFleet);
    await sset(SK.fleet, newFleet);
    if(newRouteAvgs) {
      setRouteAvgs(newRouteAvgs);
      await sset(SK.routes, newRouteAvgs);
    }
    setScreen("fleet");
  },[fleetData]);

  const updateDuty=useCallback(async(username,date,assignment)=>{
    setFleetData(prev=>{
      const pilot = prev[username];
      if(!pilot) return prev;
      const updated = {
        ...prev,
        [username]: {
          ...pilot,
          dutyAssignments: {
            ...(pilot.dutyAssignments||{}),
            [date]: assignment,
          }
        }
      };
      sset(SK.fleet, updated);
      return updated;
    });
  },[]);

  const syncCrew = useCallback(async()=>{
    setCrewSyncing(true); setCrewError(null);
    const base = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=`;
    try {
      const [pilotRes, kalininRes, airxRes] = await Promise.all([
        fetch(base + SHEET_GIDS.pilots),
        fetch(base + SHEET_GIDS.kalinin),
        fetch(base + SHEET_GIDS.airx),
      ]);
      const [pilotCSV, kalininCSV, airxCSV] = await Promise.all([
        pilotRes.text(), kalininRes.text(), airxRes.text()
      ]);
      const pilots  = parseCrewCSV(pilotCSV);
      const kalinin = parseKalininCSV(kalininCSV);
      const airx    = parseKalininCSV(airxCSV); // same structure
      const data    = { pilots, kalinin, airx };
      const ts      = new Date().toISOString();
      setCrewData(data); setCrewLastSync(ts); setCrewSource("sheets");
      await sset(SK.crew, { data, ts, source:"sheets" });
    } catch(e) {
      setCrewError("Could not fetch sheet — make sure it's shared as 'Anyone with link → Viewer'");
      console.error(e);
    }
    setCrewSyncing(false);
  },[]);

  const uploadCrewXlsx = useCallback(async(file)=>{
    setCrewSyncing(true); setCrewError(null);
    try {
      const XLSX = await loadXlsx();
      const buf  = await file.arrayBuffer();
      // cellDates:false + dateNF so dates come out as formatted strings "YYYY-MM-DD"
      const wb   = XLSX.read(new Uint8Array(buf), {type:'array', cellDates:false, dateNF:'yyyy-mm-dd'});

      const sheetNames = wb.SheetNames;
      // 0=Pilots, 1=Historical Pilots, 2=Kalinin Specials, 3=Air X Specials
      // 4=Historical Kalinin Specials, 5=Historical Air X Specials
      const toCSV = (sheet) => sheet ? XLSX.utils.sheet_to_csv(sheet, {raw:false, dateNF:'yyyy-mm-dd'}) : "";

      const pilots         = parseCrewCSV(toCSV(wb.Sheets[sheetNames[0]]));
      const historicalPilots = parseCrewCSV(toCSV(wb.Sheets[sheetNames[1]]), true);
      const kalinin        = parseKalininCSV(toCSV(wb.Sheets[sheetNames[2]]));
      const airx           = parseKalininCSV(toCSV(wb.Sheets[sheetNames[3]]));
      const kalininHist    = parseKalininCSV(toCSV(wb.Sheets[sheetNames[4]]));
      const airxHist       = parseKalininCSV(toCSV(wb.Sheets[sheetNames[5]]));

      const data = { pilots, historicalPilots, kalinin, airx, kalininHist, airxHist };
      const ts   = new Date().toISOString();
      setCrewData(data); setCrewLastSync(ts); setCrewSource("xlsx");
      await sset(SK.crew, { data, ts, source:"xlsx" });
    } catch(e) {
      setCrewError("Could not parse file — make sure it's the Pilot Status Board XLSX.");
      console.error(e);
    }
    setCrewSyncing(false);
  },[]);

  const deleteFlight=useCallback((id)=>{
    if(!confirm("Delete this flight?"))return;
    setFlights(prev=>{const u=prev.filter(f=>f.id!==id);sset(SK.flights,u);return u;});
  },[]);

  const saveDuty=useCallback(async(duty)=>{
    setDuties(prev=>{const u=[...prev.filter(d=>d.date!==duty.date),duty];sset(SK.duties,u);return u;});
    setDutyDate(null);
  },[]);

  const saveProfile=useCallback(async(p)=>{ setProfile(p);await sset(SK.profile,p);setShowProfile(false); },[]);

  const handleScanned=useCallback((newFlights,pilotName)=>{
    if(pilotName&&!profile.name){const np={...profile,name:pilotName};setProfile(np);sset(SK.profile,np);}
    importFlights(newFlights);
  },[profile,importFlights]);

  if(!loaded)return <div style={{...S.app,alignItems:"center",justifyContent:"center",minHeight:"100vh"}}><div style={{fontSize:40}}>✈</div><div style={{fontSize:12,color:"#7a9ab8",letterSpacing:"0.2em",marginTop:12}}>LOADING...</div></div>;

  const renderScreen=(s=screen)=>{
    if(s==="new")     return <FlightForm initial={editFlight} profile={profile} onSave={saveFlight} onCancel={()=>{setEditFlight(null);setScreen("home");}}/>;
    if(s==="history") return <HistoryScreen flights={flights} duties={duties} onEdit={(f)=>{setEditFlight(f);setScreen("new");}} onDelete={deleteFlight}/>;
    if(s==="fleet")   return <FleetScreen fleetData={fleetData} onUpdateDuty={updateDuty} crewData={crewData} routeAvgs={routeAvgs} wx={wx} wxAge={wxAge} qualsData={qualsData} winterMode={winterMode}/>;
    if(s==="payload") return <PayloadScreen/>;
    if(s==="fuel")    return <FuelScreen/>;
    if(s==="scan")    return <ScanScreen onFlightsScanned={handleScanned}/>;
    if(s==="crew")    return <CrewScreen crewData={crewData} onSync={syncCrew} onUploadXlsx={uploadCrewXlsx} syncing={crewSyncing} lastSync={crewLastSync} sheetError={crewError} sourceMode={crewSource}/>;
    if(s==="import")  return <ImportScreen onImport={importFlights} onImportFleet={importFleet} onUploadQuals={uploadQuals} onUploadCrew={uploadCrewXlsx}/>;
    if(s==="regs")    return <RegsScreen/>;
    if(s==="quals")   return <QualsScreen qualsData={qualsData} onUpload={uploadQuals} fleetData={fleetData}/>;
    if(s==="stats")   return <StatsScreen fleetData={fleetData} routeAvgs={routeAvgs}/>;
    if(s==="night")   return <NightScreen fleetData={fleetData} nightCurrencyData={nightCurrencyData} onUploadNightXlsx={uploadNightXlsx}/>;
    if(s==="tails")   return <TailsScreen fleetData={fleetData} delayData={delayData} onImportDelays={importDelays} routeAvgs={routeAvgs} wx={wx}/>;
    return <FleetScreen fleetData={fleetData} onUpdateDuty={updateDuty} crewData={crewData}/>;
  };

  // Fleet alert badge
  const fleetAlerts = Object.values(fleetData).filter(pd=>{
    const c=computeFleetCompliance(pd.flights);
    return c.status==="red"||c.status==="orange";
  }).length;
  const crewAlerts = (crewData?.pilots||[]).filter(p=>p.worstStatus==="red").length;

  // ── Shared nav button renderer ───────────────────────────────────────────────
  const NavBtn = ({item, active, onClick, vertical=false}) => (
    <button onClick={onClick} style={{
      display:"flex", flexDirection:"column", alignItems:"center",
      gap: vertical ? 4 : 2,
      padding: vertical ? "12px 8px" : "8px 1px 10px",
      cursor:"pointer", background:"none", border:"none",
      color: active ? "#ffffff" : "rgba(255,255,255,0.35)",
      transition:"color 0.15s", flex: vertical ? undefined : 1,
      width: vertical ? "100%" : undefined,
      borderLeft: vertical && active ? "2px solid #4a9eff" : vertical ? "2px solid transparent" : "none",
      borderBottom: !vertical && active ? "2px solid #4a9eff" : "none",
    }}>
      <div style={{position:"relative",display:"inline-block"}}>
        <span style={{fontSize: vertical ? 18 : 15, lineHeight:1,
          filter:active?"drop-shadow(0 0 6px #4a9eff99)":"none",
          opacity:active?1:0.55}}>{item.icon}</span>
        {item.id==="fleet"&&fleetAlerts>0&&<span style={{position:"absolute",top:-4,right:-6,background:SC.red,color:"#fff",borderRadius:"50%",width:12,height:12,fontSize:7,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{fleetAlerts}</span>}
        {item.id==="crew"&&crewAlerts>0&&<span style={{position:"absolute",top:-4,right:-6,background:SC.red,color:"#fff",borderRadius:"50%",width:12,height:12,fontSize:7,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{crewAlerts}</span>}
      </div>
      <span style={{
        fontSize: vertical ? 9 : 10, letterSpacing:"0.05em", textTransform:"uppercase", fontWeight:700,
        color: active ? "#4a9eff" : "rgba(255,255,255,0.45)",
      }}>{item.label}</span>
    </button>
  );

  const modals = <>
    <input ref={nightFileRef} type="file" accept=".xlsx,.xls" onChange={handleNightFile} style={{display:"none"}}/>
    {showProfile&&<ProfileModal profile={profile} onSave={saveProfile} onClose={()=>setShowProfile(false)}/>}
    {dutyDate&&<DutyModal date={dutyDate} initial={duties.find(d=>d.date===dutyDate)} onSave={saveDuty} onClose={()=>setDutyDate(null)}/>}
    {showWarn&&<WarnPopup flights={flights} profile={profile} onDismiss={()=>setDismissed(s=>new Set([...s,trigThresh]))}/>}
  </>;

  const globalStyle = <style>{`@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}body{background:#080b0f;}input[type="date"]::-webkit-calendar-picker-indicator,input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(0.5);}::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#1e2730;border-radius:2px;}.panel-scroll{overflow-y:auto;}`}</style>;

  // ── DESKTOP LAYOUT ────────────────────────────────────────────────────────────
  if(isDesktop) return <>
    {globalStyle}
    <div style={{display:"flex",height:"100vh",overflow:"hidden",fontFamily:"'JetBrains Mono',monospace",color:"#e8edf2",background:"#080b0f"}}>

      {/* Sidebar nav */}
      <div style={{width:100,background:"#0a0d12",borderRight:"1px solid #1e2730",display:"flex",flexDirection:"column",alignItems:"center",paddingTop:14,flexShrink:0,overflowY:"auto"}}>
        <div style={{fontSize:20,marginBottom:4}}>✈</div>
        <div style={{fontSize:7,color:"#4a9eff",letterSpacing:"0.12em",fontWeight:700,marginBottom:16,textAlign:"center"}}>AKS<br/>PART 135</div>
        <div style={{width:"100%",height:1,background:"#1e2730",marginBottom:8}}/>
        {NAV.map(item=>(
          <NavBtn key={item.id} item={item} active={screen===item.id}
            onClick={()=>{setEditFlight(null);setScreen(item.id);}} vertical={true}/>
        ))}
      </div>

      {/* Main content area — fills all remaining width */}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,overflow:"hidden"}}>
        {/* Top bar */}
        <div style={{background:"#0a0d12",borderBottom:"1px solid #1e2730",padding:"10px 28px",
          display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div>
            <div style={{fontSize:14,color:"#4a9eff",fontWeight:700,letterSpacing:"0.12em"}}>ALASKA SEAPLANES</div>
            <div style={{fontSize:10,color:"#7a9ab8",letterSpacing:"0.06em"}}>PART 135 · PILOT OPS · {today()} · <span style={{color:"#3a5060"}}>v{APP_VERSION}</span></div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:20}}>
            {/* Winter Mode toggle */}
            <div onClick={()=>{const next=!winterMode;setWinterMode(next);sset(SK.winterMode,next);}}
              style={{cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:40,height:22,borderRadius:11,position:"relative",transition:"background 0.2s",
                background:winterMode?"#4a9eff":"#1e2730",border:`1px solid ${winterMode?"#4a9eff44":"#2a3a4a"}`}}>
                <div style={{position:"absolute",top:3,left:winterMode?20:3,width:14,height:14,
                  borderRadius:"50%",background:winterMode?"#fff":"#4a6a7a",transition:"left 0.2s"}}/>
              </div>
              <span style={{fontSize:9,fontWeight:700,color:winterMode?"#4a9eff":"#4a6a7a",letterSpacing:"0.08em"}}>
                {winterMode?"❄ WINTER":"☀ SUMMER"}
              </span>
            </div>
            <div style={{fontSize:11,color:"#7a9ab8"}}>{flights.filter(f=>f.date===today()).length} legs today</div>
            <div style={{fontSize:13,color:"#4a9eff",fontWeight:700,letterSpacing:"0.12em"}}>
              {NAV.find(n=>n.id===screen)?.icon} {NAV.find(n=>n.id===screen)?.label}
            </div>
          </div>
        </div>
        {/* Content — full width, generous padding */}
        <div style={{flex:1,overflowY:"auto",padding:"20px 28px 40px"}}>
          {renderScreen()}
        </div>
      </div>
    </div>
    {modals}
  </>;

  // ── MOBILE LAYOUT ─────────────────────────────────────────────────────────────
  return <>
    {globalStyle}
    <div style={S.app}>
      <div style={S.topBar}>
        <div>
          <div style={{fontSize:13,letterSpacing:"0.15em",color:"#4a9eff",fontWeight:700,textTransform:"uppercase"}}>✈ ALASKA SEAPLANES</div>
          <div style={{fontSize:11,color:"#8aaabb",letterSpacing:"0.08em"}}>PART 135 · PILOT OPS <span style={{color:"#3a5a6a",fontSize:9}}>v{APP_VERSION}</span></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {/* Winter Mode toggle */}
          <div onClick={()=>{
            const next=!winterMode;
            setWinterMode(next);
            sset(SK.winterMode,next);
          }} style={{cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <div style={{
              width:36,height:20,borderRadius:10,position:"relative",transition:"background 0.2s",
              background:winterMode?"#4a9eff":"#1e2730",border:`1px solid ${winterMode?"#4a9eff44":"#2a3a4a"}`}}>
              <div style={{
                position:"absolute",top:2,left:winterMode?18:2,width:14,height:14,
                borderRadius:"50%",background:winterMode?"#fff":"#4a6a7a",
                transition:"left 0.2s",boxShadow:"0 1px 3px rgba(0,0,0,0.4)"}}/>
            </div>
            <div style={{fontSize:7,fontWeight:700,letterSpacing:"0.08em",
              color:winterMode?"#4a9eff":"#4a6a7a"}}>
              {winterMode?"❄ WINTER":"☀ SUMMER"}
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:"#7a9ab8"}}>{today()}</div>
            <div style={{fontSize:10,color:"#6a8aa8"}}>{flights.filter(f=>f.date===today()).length} legs today</div>
          </div>
        </div>
      </div>
      <div style={S.content}>{renderScreen()}</div>
      <nav style={S.navBar}>
        {NAV.map(item=>(
          <NavBtn key={item.id} item={item} active={screen===item.id}
            onClick={()=>{setEditFlight(null);setScreen(item.id);}} vertical={false}/>
        ))}
      </nav>
      {modals}
    </div>
  </>;
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

  </script>
</body>
</html>
