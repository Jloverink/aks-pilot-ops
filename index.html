                </div>
              </>;
            })()}

            {cw ? <div style={{background:"#060a0e",borderRadius:6,padding:"10px 12px",marginTop:4,border:`1px solid ${cwDot?cwDot+"33":"#1a2530"}`}}>
              <div onClick={e=>{e.stopPropagation();toggleSection(pd.username,'certs');}}
                style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  cursor:"pointer",marginBottom:getSection(pd.username,'certs',false)?8:0}}>
                <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",color:"#7a9ab8"}}>
                  🪪 CERTIFICATES &amp; CURRENCY
                  {cwDot&&<span style={{marginLeft:6,fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:3,
                    color:cwDot,background:`${cwDot}22`}}>
                    {cw.expired.length>0?`${cw.expired.length} EXPIRED`:cw.expiring.length>0?`${cw.expiring.length} ≤30d`:`${cw.warning.length} ≤60d`}

                </span>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:8,color:"#5a6a7a"}}>via Pilot Status Board</span>

                </div>
              </div>
              {getSection(pd.username,'certs',false)&&<>

              {/* Qualifications badges */}
              {Object.values(cw.pilot.quals||{}).some(v=>v&&v!=="nan")&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
                {[["C-208",cw.pilot.quals.c208],["DHC-2",cw.pilot.quals.dhc2],["C-206",cw.pilot.quals.c206],["PC-12/47",cw.pilot.quals.pc12_47],["PC-12/45",cw.pilot.quals.pc12_45]].map(([acft,q])=>
                  q&&q!=="nan"?<span key={acft} style={{fontSize:9,padding:"2px 7px",borderRadius:3,background:"#0d1520",border:"1px solid #2a3a4a",color:"#7aaabb",fontWeight:700}}>{acft}: {q}</span>:null
                )}
              </div>}

              {/* Items by category */}
              {["medical","kal_checkride","kal_aircraft","kal_training","airx_checkride","airx_aircraft","airx_training","training","approach"].map(cat=>{
                const catItems = cat==="approach"
                  ? [...(crewData?.kalinin?.[cw.pilot.name]||[]),...(crewData?.airx?.[cw.pilot.name]||[])].map(a=>({
                      label:`[${a.airport||"?"}] ${a.approach}`, days:a.days, status:a.status, category:"approach"
                    }))
                  : Object.values(cw.pilot.items).filter(i=>i.category===cat);
                if(!catItems.length) return null;
                const catLabel={medical:"MEDICAL",kal_checkride:"KALININ CHECK RIDES",kal_aircraft:"KALININ AIRCRAFT",kal_training:"KALININ TRAINING",airx_checkride:"AIR X CHECK RIDES",airx_aircraft:"AIR X AIRCRAFT",airx_training:"AIR X TRAINING",training:"SHARED TRAINING",approach:"SPECIAL APPROACHES"}[cat]||cat;
                const catHasRed = catItems.some(i=>i.status==="red");
                const catHasOrange = catItems.some(i=>i.status==="orange");
                return <div key={cat} style={{marginBottom:8}}>
                  <div style={{fontSize:8,fontWeight:700,letterSpacing:"0.1em",
                    color:catHasRed?SC.red:catHasOrange?SC.orange:"#7a9ab0",marginBottom:4}}>
                    {catLabel}
                  </div>
                  {catItems.map((item,i)=>{
                    const ic=SC[item.status]||"#6a8aa8";
                    const label = item.label||(item.approach?`[${item.airport}] ${item.approach}`:"?");
                    const {daysStr,flair} = formatCertItem(item);
                    return <div key={i} style={{padding:"4px 0",borderBottom:"1px solid #0d1520"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:10}}>
                        <span style={{color:item.status==="green"?"#6a8aa8":"#b8c8d8",maxWidth:"65%"}}>{label}</span>
                        <div style={{display:"flex",alignItems:"center",gap:5}}>
                          {flair&&<span style={{fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:3,
                            color:flair.color,background:flair.bg,border:`1px solid ${flair.color}44`,whiteSpace:"nowrap"}}>
                            {flair.text}
                          </span>}
                          <span style={{fontWeight:700,color:ic,whiteSpace:"nowrap"}}>{daysStr}</span>
                        </div>
                      </div>
                    </div>;
                  })}
                </div>;
              })}
              </>}{/* end certs body */}
            </div>
            : hasCrew
              ? <div onClick={e=>{e.stopPropagation();}} style={{fontSize:9,color:"#7a9ab0",marginTop:6,padding:"6px 10px",background:"#060a0e",borderRadius:6,border:"1px solid #1a2530"}}>

              : <div style={{fontSize:9,color:"#7a9ab0",marginTop:6,padding:"6px 10px",background:"#060a0e",borderRadius:6,border:"1px dashed #1a2530"}}>
                  🪪 Upload Pilot Status Board on the CREW tab to see cert &amp; currency details here
                </div>
            }

          </div>}
        </div>;
      })}
    </div>

    {/* Duty assignment modal */}
    {assignDay&&<DutyAssignModal
      pilot={assignDay.username}
      date={assignDay.date}
      initial={assignDay.initial}
      onSave={(date,assignment)=>{ onUpdateDuty(assignDay.username,date,assignment); setAssignDay(null); }}
      onClose={()=>setAssignDay(null)}
    />}
  </div>;
}

              {sec.rules.map((rule,i)=>(
                <div key={i} style={{marginBottom:8, paddingBottom:8,

// M/D/YY certs (icing courses etc.): exact date, no grace month
function parseDateInfo(v, isMedical=false) {
  if(!v || v==="nan") return null;
  const s = String(v).trim();
  if(!s || s==="nan" || s==="0") return null;
  if(/^\d{5,}$/.test(s)) return null; // raw Excel serial

  // "MMM-YY" → expires last day of that month (FAA: end of calendar month)
  const mmmYY = s.match(/^([A-Za-z]{3})-(\d{2})$/);
  if(mmmYY) {
    const mo = MONTHS_MAP[mmmYY[1].toLowerCase()];
    if(mo === undefined) return null;
    const yr = 2000 + parseInt(mmmYY[2]);
    if(yr < 2020 || yr > 2035) return null;
    const date      = new Date(yr, mo + 1, 0); // last day of expiry month
    // Medicals: no grace period — hard expiry at end of shown month
    // Other certs: 1 month grace (e.g. checkride currency)
    const graceDate = isMedical ? date : new Date(yr, mo + 2, 0);
    return { date, graceDate, isMmmYY: true };
  }

  // "M/D/YY" or "MM/DD/YY" → exact date, no grace
  const mdyy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/);
  if(mdyy) {
    const yr = 2000 + parseInt(mdyy[3]);
    if(yr < 2020 || yr > 2035) return null;
    const date = new Date(yr, parseInt(mdyy[1])-1, parseInt(mdyy[2]));
    return { date, graceDate: date, isMmmYY: false };
  }

  // ISO / full date strings
  const d = new Date(s);
  if(isNaN(d.getTime())) return null;
  const yr = d.getFullYear();
  if(yr < 2020 || yr > 2035) return null;
  return { date: d, graceDate: d, isMmmYY: false };
}

function parseDate(v) {
  const info = parseDateInfo(v);
  return info ? info.date : null;
}

function daysUntil(dateStr) {
  const d = parseDate(dateStr);
  if(!d) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

// Returns { days, graceDays, isMmmYY, phase }
// phase: "ok" | "base" (in base month) | "grace" (in grace month) | "expired"
function dateStatus(val, isMedical=false) {
  const info = parseDateInfo(val, isMedical);
  if(!info) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const days      = Math.round((info.date      - today) / 86400000);
  const graceDays = Math.round((info.graceDate - today) / 86400000);

  let phase, status;
  if(info.isMmmYY) {
    if(graceDays < 0)     { phase="expired"; status="red";    }
    else if(days < 0)     { phase="grace";   status="orange"; }
    else if(days <= 31)   { phase="base";    status="yellow"; }
    else if(days <= 62)   { phase="soon";    status="yellow"; }
    else                  { phase="ok";      status="green";  }
  } else {
    // Exact-date items (icing courses etc) — no grace month
    if(days < 0)          { phase="expired"; status="red";    }
    else if(days <= 30)   { phase="soon";    status="red";    }
    else if(days <= 60)   { phase="soon";    status="orange"; }
    else if(days <= 90)   { phase="soon";    status="yellow"; }
    else                  { phase="ok";      status="green";  }
  }
  return { days, graceDays, isMmmYY: info.isMmmYY, phase, status };
}

function statusFromDays(days) {
  if(days === null) return null;
  if(days < 0)   return "red";
  if(days <= 30) return "red";
  if(days <= 60) return "orange";
  if(days <= 90) return "yellow";
  return "green";
}

function parseCSVRow(row) {
  // Handle quoted fields with commas
  const result = [];
  let inQuote = false, cur = "";
  for(let i=0; i<row.length; i++){
    if(row[i]==="\"") { inQuote=!inQuote; continue; }
    if(row[i]==="," && !inQuote) { result.push(cur.trim()); cur=""; continue; }
    cur += row[i];
  }
  result.push(cur.trim());
  return result;
}

function parseCrewCSV(csvText, isHistorical=false) {
  const rows = csvText.split("\n").map(r => parseCSVRow(r));
  if(rows.length < 3) return [];
  // rows[0] and rows[1] are headers — skip both
  const pilots = [];
  for(let i=2; i<rows.length; i++){
    const r = rows[i];
    const last = r[COL.last]||"";
    const first = r[COL.first]||"";
    if(!last || last.toLowerCase()==="nan" || last.toLowerCase().includes("historical")) continue;
    // Historical sheet has "Date Of Separation" at col 2
    const sepDate = isHistorical ? (r[2]||"") : null;

    const items = {};
    Object.entries(COL_LABELS).forEach(([key, meta]) => {
      const val = r[COL[key]]||"";
      const ds = dateStatus(val, key==="medical"); // medicals: hard end-of-month, no grace
      if(ds !== null) {
        items[key] = { label:meta.label, category:meta.category, val,
          days:ds.days, graceDays:ds.graceDays, isMmmYY:ds.isMmmYY,
          phase:ds.phase, status:ds.status };
      }
    });

    // Aircraft qualifications (W/A/S letters)
    const quals = {
      c208:  r[COL.qual208]||"",
      dhc2:  r[COL.qualDhc2]||"",
      c206:  r[COL.qual206]||"",
      pc12_47: r[COL.pc12_47]||"",
      pc12_45: r[COL.pc12_45]||"",
    };

    // Worst status
    const statuses = Object.values(items).map(x=>x.status).filter(Boolean);
    const worstStatus = statuses.includes("red")?"red":statuses.includes("orange")?"orange":statuses.includes("yellow")?"yellow":"green";

    pilots.push({ last, first, name:`${first} ${last}`, pos:r[COL.pos]||"", cert:r[COL.cert]||"", items, quals, worstStatus, sepDate: sepDate||null, isHistorical });
  }
  return pilots;
}

// Approaches requiring both ground training AND a physical flight to be signed off
const APPROACH_DUAL_REQUIRED = new Set([
  "ROVZU 4",
  "ROVZU FOUR RNAV DEP",
  "ALSEK 4",
  "ALSEK FOUR RNAV DEP",
  "RNAV (GPS) Q RWY 8 LP",
]);

// Icing course expiry rules
// Boot Ice and TKS Ice expire exactly 1 year from the course date (M/D/YY format)
// All other MMM-YY certs expire end-of-month

function parseKalininCSV(csvText) {
  const rows = csvText.split("\n").map(r=>parseCSVRow(r));
  if(rows.length<3) return {};
  const airportRow = rows[0];
  const approachRow = rows[1];
  const result = {};
  for(let i=2; i<rows.length; i++){
    const r=rows[i];
    const last=r[0]||"", first=r[1]||"";
    if(!last||last.toLowerCase()==="nan") continue;
    const name=`${first} ${last}`;
    const approaches=[];
    for(let c=2; c<r.length; c++){
      const val=r[c]||"";
      const days=daysUntil(val);
      if(days!==null) {
        const apprName = (approachRow[c]||"").trim();
        approaches.push({
          airport:(airportRow[c]||"").trim(),
          approach: apprName,
          val, days,
          status: statusFromDays(days),
          dualRequired: APPROACH_DUAL_REQUIRED.has(apprName),
        });
      }
    }
    if(approaches.length) result[name]=approaches;
  }
  return result;
}

// Format a cert item's days + phase into display string and flair badge
function formatCertItem(item) {
  if(!item) return { daysStr:"—", flair:null };
  const { days, graceDays, isMmmYY, phase } = item;
  if(days === null) return { daysStr:"—", flair:null };

  let daysStr, flair=null;
  const FLAIR = {
    expired: { text:"EXPIRED",    color:"#ff4757", bg:"rgba(255,71,87,0.15)"  },
    grace:   { text:"GRACE MONTH",color:"#ff9f43", bg:"rgba(255,159,67,0.15)" },
    base:    { text:"BASE MONTH", color:"#ffd740", bg:"rgba(255,215,64,0.15)" },
    soon:    { text:"SOON",       color:"#ffd740", bg:"rgba(255,215,64,0.1)"  },
    ok:      null,
  };

  if(phase==="expired") {
    daysStr = `${Math.abs(days)}d ago`;
    flair = FLAIR.expired;
  } else if(phase==="grace") {
    daysStr = `${graceDays}d left`;
    flair = FLAIR.grace;
  } else if(phase==="base") {
    daysStr = `${days}d`;
    flair = FLAIR.base;
  } else {
    daysStr = days===0 ? "TODAY" : `${days}d`;
    flair = phase==="soon" ? FLAIR.soon : null;
  }
  return { daysStr, flair };
}

                      </div>

                  </div>;
                })}
              </div>;
            })()}
            {(pilotKalinin.length>0||pilotAirX.length>0)&&<div>
              <div style={{fontSize:8,fontWeight:700,letterSpacing:"0.1em",color:"#74b9ff",marginBottom:5}}>SPECIAL APPROACHES</div>
              {[["KALININ",pilotKalinin],["AIR X",pilotAirX]].map(([label,apprList])=>
                apprList.length?<div key={label} style={{marginBottom:6}}>
                  <div style={{fontSize:8,color:"#7a9ab8",marginBottom:3}}>{label}</div>

                    const c=SC[a.status]||SC.green;
                    return <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",borderBottom:"1px solid #0d1117",fontSize:9}}>
                      <span style={{color:"#b8c8d8"}}>
                        {a.airport&&a.airport!=="nan"?`[${a.airport}] `:""}{a.approach}
                        {a.dualRequired&&<span style={{marginLeft:5,fontSize:8,color:"#a29bfe",fontWeight:700,padding:"1px 4px",borderRadius:2,background:"rgba(162,155,254,0.12)",border:"1px solid rgba(162,155,254,0.2)"}}>GND+FLT</span>}
                      </span>
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        {(()=>{const {flair}=formatCertItem(a);return flair?<span style={{fontSize:7,fontWeight:700,padding:"1px 4px",borderRadius:2,color:flair.color,background:flair.bg,border:`1px solid ${flair.color}44`,whiteSpace:"nowrap"}}>{flair.text}</span>:null;})()}
                        <span style={{fontWeight:700,color:c,whiteSpace:"nowrap"}}>{formatCertItem(a).daysStr}</span>
                      </div>
                    </div>;
                  })}
                </div>:null
              )}
            </div>}
          </div>}
        </div>;
      })}
    </div>

    {/* Historical Pilots section */}
    {historicalPilots.length > 0 && <div style={{marginTop:8}}>
      <button onClick={()=>setShowHistorical(v=>!v)}
        style={{width:"100%",background:"transparent",border:"1px solid #1e2730",borderRadius:6,
          padding:"10px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",
          alignItems:"center",fontFamily:"'JetBrains Mono',monospace",marginBottom:showHistorical?8:0}}>
        <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",color:"#7a9ab8"}}>
          📁 HISTORICAL PILOTS ({historicalPilots.length})
        </span>
        <span style={{fontSize:12,color:"#7a9ab8"}}>{showHistorical?"▲":"▼"}</span>
      </button>
      {showHistorical && <div style={{display:"flex",flexDirection:"column",gap:3}}>
        {historicalPilots.map(p=>{
          const isOpen = selected===("hist:"+p.name);
          const pilotKalinin = kalininHist[p.name]||[];
          const pilotAirX    = airxHist[p.name]||[];
          return <div key={p.name}>
            <div onClick={()=>setSelected(isOpen?null:"hist:"+p.name)}
              style={{background:"#0a0e14",borderRadius:6,border:"1px solid #1a2230",padding:"9px 12px",cursor:"pointer",opacity:0.8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:"#3a4a5a",flexShrink:0}}/>
                  <div>
                    <span style={{fontSize:11,fontWeight:700,color:"#8aaabb"}}>{p.name}</span>
                    <span style={{marginLeft:8,fontSize:9,color:"#7a9ab0"}}>{p.pos}</span>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {p.sepDate&&<span style={{fontSize:9,color:"#7a9ab0"}}>sep: {p.sepDate.slice(0,10)}</span>}
                  <span style={{fontSize:12,color:"#7a9ab0"}}>{isOpen?"▲":"▼"}</span>
                </div>
              </div>
            </div>
            {isOpen&&<div style={{background:"#080b0f",borderRadius:6,border:"1px solid #1a2230",padding:"12px 14px",marginTop:2}}>
              {Object.values(p.quals).some(v=>v&&v!=="nan")&&<div style={{marginBottom:8}}>
                <div style={{fontSize:8,fontWeight:700,letterSpacing:"0.1em",color:"#7a9ab0",marginBottom:4}}>QUALIFICATIONS</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {[["C-208",p.quals.c208],["DHC-2",p.quals.dhc2],["C-206",p.quals.c206],["PC-12/47",p.quals.pc12_47],["PC-12/45",p.quals.pc12_45]].map(([acft,q])=>
                    q&&q!=="nan"?<span key={acft} style={{fontSize:9,padding:"2px 6px",borderRadius:3,background:"#0d1117",color:"#5a7a9a",fontWeight:700}}>{acft}: {q}</span>:null
                  )}
                </div>
              </div>}
              {["medical","kal_checkride","kal_aircraft","kal_training","airx_checkride","airx_aircraft","airx_training","training"].map(cat=>{
                const catItems=Object.entries(p.items).filter(([k,v])=>v.category===cat);
                if(!catItems.length) return null;
                const catLabel={medical:"MEDICAL",kal_checkride:"KALININ CHECK RIDES",kal_aircraft:"KALININ AIRCRAFT",kal_training:"KALININ TRAINING",airx_checkride:"AIR X CHECK RIDES",airx_aircraft:"AIR X AIRCRAFT",airx_training:"AIR X TRAINING",training:"SHARED TRAINING"}[cat]||cat;
                return <div key={cat} style={{marginBottom:8}}>
                  <div style={{fontSize:8,fontWeight:700,letterSpacing:"0.1em",color:"#6a8a9a",marginBottom:4}}>{catLabel}</div>
                  {catItems.map(([k,item])=>(
                    <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",borderBottom:"1px solid #0d1117",fontSize:10}}>
                      <span style={{color:"#6a8a9a"}}>{item.label}</span>
                      <span style={{color:"#7a9ab0"}}>{item.days<0?`EXP ${Math.abs(item.days)}d ago`:`${item.days}d`}</span>
                    </div>
                  ))}
                </div>;
              })}
              {(pilotKalinin.length>0||pilotAirX.length>0)&&<div>
                <div style={{fontSize:8,fontWeight:700,letterSpacing:"0.1em",color:"#6a8a9a",marginBottom:4}}>SPECIAL APPROACHES (HISTORICAL)</div>
                {[["KALININ",pilotKalinin],["AIR X",pilotAirX]].map(([label,apprList])=>
                  apprList.length?<div key={label} style={{marginBottom:4}}>
                    <div style={{fontSize:8,color:"#6a8a9a",marginBottom:2}}>{label}</div>
                    {apprList.map((a,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",borderBottom:"1px solid #0d1117",fontSize:9}}>
                        <span style={{color:"#6a8a9a"}}>
                        {a.airport&&a.airport!=="nan"?`[${a.airport}] `:""}{a.approach}
                        {a.dualRequired&&<span style={{marginLeft:5,fontSize:8,color:"#a29bfe",fontWeight:700,padding:"1px 4px",borderRadius:2,background:"rgba(162,155,254,0.12)",border:"1px solid rgba(162,155,254,0.2)"}}>GND+FLT</span>}
                      </span>
                        <span style={{color:"#7a9ab0"}}>{a.days<0?`EXP ${Math.abs(a.days)}d ago`:`${a.days}d`}</span>
                      </div>
                    ))}
                  </div>:null
                )}
              </div>}
            </div>}
          </div>;
        })}
      </div>}
    </div>}
  </div>;
}



// ── NIGHT CURRENCY & TIME-IN-TYPE SCREEN ──────────────────────────────────────
function NightScreen({ fleetData, nightCurrencyData, onUploadNightXlsx }) {
  const [sortBy, setSortBy] = useState("status");
  const [companyFilter, setCompanyFilter] = useState("All");
  const [selected, setSelected] = useState(null);
  const todayStr = today();
  const cutoff90 = new Date(todayStr); cutoff90.setDate(cutoff90.getDate() - 90);
  const cutoff90Str = cutoff90.toISOString().slice(0,10);

  if(!fleetData||!Object.keys(fleetData).length) return (
    <div>
      <div style={S.ct}>NIGHT CURRENCY & TIME IN TYPE</div>
      <div style={{...S.card,textAlign:"center",padding:40,color:"#7a9ab8"}}>
        <div style={{fontSize:32,marginBottom:12}}>🌙</div>
        <div style={{fontSize:13,fontWeight:700,marginBottom:6}}>No Fleet Data</div>
        <div style={{fontSize:11,lineHeight:1.6}}>Go to IMPORT → upload Flight Log Export → Import All Pilots</div>
      </div>
    </div>
  );

  const ACFT_TYPES = {
    "PC-12": ["N721KP","N722KP"],
    "C208B": ["N750KP","N753KP","N755KP","N336JP","N438JP","N450KP"],
    "C208A": ["N264KP","N265KP"],
    "Beaver":["N4794C","N777DH","N743KP"],
    "C206":  ["N749KP","N748KP"],
  };
  const tailToType = {};
  Object.entries(ACFT_TYPES).forEach(([t,tails])=>tails.forEach(n=>tailToType[n]=t));

  const companies = [...new Set(Object.values(fleetData).map(pd=>pd.office||"Unknown"))].sort();

  const pilots = Object.entries(fleetData)
    .filter(([,pd])=> companyFilter==="All" || (pd.office||"Unknown")===companyFilter)
    .map(([k,pd]) => {
      const allFlights = pd.flights||[];
      const completed  = allFlights.filter(f=>f._status==="completed");

      // ── Night currency: 3 night T/O+landings in rolling 90 days ──
      const nightFlights90 = completed.filter(f=>f.date>=cutoff90Str && (f.nightLandings||0)>0);
      const nightLandings90 = nightFlights90.reduce((s,f)=>s+(f.nightLandings||0),0);
      const nightStatus = nightLandings90 >= 3 ? "green" : nightLandings90 === 2 ? "yellow" : nightLandings90 === 1 ? "orange" : "red";
      const lastNightFlight = [...nightFlights90].sort((a,b)=>b.date.localeCompare(a.date))[0];

      // ── Time in type ──
      const byType = {};
      completed.forEach(f => {
        const t = tailToType[f.tailNumber] || "Other";
        if(!byType[t]) byType[t] = { mins:0, legs:0, landings:0 };
        byType[t].mins     += f.totalMinutes||0;
        byType[t].legs     += 1;
        byType[t].landings += f.landings||0;
      });

      // ── Total flight time ──
      const totalMins = completed.reduce((s,f)=>s+(f.totalMinutes||0),0);

      // ── Recent activity: last 30 days ──
      const last30cutoff = new Date(todayStr); last30cutoff.setDate(last30cutoff.getDate()-30);
      const last30str = last30cutoff.toISOString().slice(0,10);
      const recent = completed.filter(f=>f.date>=last30str);
      const recentMins = recent.reduce((s,f)=>s+(f.totalMinutes||0),0);

      return { ...pd, username:pd.username||k, nightLandings90, nightStatus, lastNightFlight,
               byType, totalMins, recentMins, legs: completed.length };
    });

  const sorted = [...pilots].sort((a,b) => {
    if(sortBy==="status") {
      const o={red:0,orange:1,yellow:2,green:3};
      return (o[a.nightStatus]??4)-(o[b.nightStatus]??4) || (a.fullName||"").localeCompare(b.fullName||"");
    }
    if(sortBy==="hours") return b.totalMins - a.totalMins;
    if(sortBy==="recent") return b.recentMins - a.recentMins;
    return (a.fullName||"").localeCompare(b.fullName||"");
  });

  const needCurrency = sorted.filter(p=>p.nightStatus!=="green").length;

  // CSV logbook export
  const exportLogbook = (pilot) => {
    const rows = [["Date","Tail","Type","Origin","Destination","Dept","Arrival","Total Mins","Total Hrs","Landings","Night Landings","Flight Rules","Duty Type","Notes"]];
    (pilot.flights||[]).filter(f=>f._status==="completed").sort((a,b)=>a.date.localeCompare(b.date)).forEach(f=>{
      rows.push([f.date, f.tailNumber||"", tailToType[f.tailNumber]||"", f.origin||"", f.destination||"",
        f.startTaxi||"", f.stopTaxi||"", f.totalMinutes||0, ((f.totalMinutes||0)/60).toFixed(2),
        f.landings||0, f.nightLandings||0, f.flightRules||"", f.dutyType||"", f.notes||""]);
    });
    const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], {type:"text/csv"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `${pilot.fullName||pilot.username}_logbook.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  return <div>
    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <div style={{fontSize:13,fontWeight:700,letterSpacing:"0.1em",color:"#e0e8f0"}}>NIGHT CURRENCY</div>
      <button onClick={onUploadNightXlsx}
        style={{background:"rgba(74,158,255,0.1)",border:"1px solid #4a9eff",borderRadius:4,padding:"5px 10px",
          color:"#4a9eff",fontSize:9,fontWeight:700,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>
        📂 UPLOAD NIGHT XLSX
      </button>
    </div>

    {/* Night Currency Board from XLSX (if uploaded) */}
    {nightCurrencyData&&nightCurrencyData.length>0&&<div style={{...S.card,marginBottom:12,padding:"12px 14px"}}>
      <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",color:"#7a9ab8",marginBottom:8}}>
        FROM NIGHT CURRENCY SPREADSHEET
        <span style={{fontWeight:400,marginLeft:6,color:"#6a8aa8"}}>{nightCurrencyData.length} pilots</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:3}}>
        {nightCurrencyData.sort((a,b)=>{
          const o={red:0,orange:1,yellow:2,green:3};
          return (o[a.status]??4)-(o[b.status]??4)||(a.name||"").localeCompare(b.name||"");
        }).map((p,i)=>{
          const col=SC[p.status]||SC.green;
          return <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
            padding:"5px 8px",borderRadius:4,background:"#080b0f",border:`1px solid ${p.status!=="green"?col+"44":"#1e2730"}`}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:col,flexShrink:0}}/>
              <span style={{fontSize:11,fontWeight:700,color:"#e0e8f0"}}>{p.name}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {p.expires&&<span style={{fontSize:9,color:"#7a9ab8"}}>exp: {p.expires}</span>}
              {p.status==="red"&&<span style={{fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:3,
                color:SC.red,background:"rgba(255,71,87,0.12)",border:"1px solid rgba(255,71,87,0.3)"}}>
                {p.expires?"EXPIRED":"NO DATE"}
              </span>}
              {p.status==="orange"&&<span style={{fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:3,
                color:SC.orange,background:"rgba(255,109,0,0.12)",border:"1px solid rgba(255,109,0,0.3)"}}>
                ≤30d
              </span>}
              {p.status==="yellow"&&<span style={{fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:3,
                color:"#ffd740",background:"rgba(255,215,64,0.1)",border:"1px solid rgba(255,215,64,0.3)"}}>
                ≤60d
              </span>}
            </div>
          </div>;
        })}
      </div>
    </div>}

    <div style={{fontSize:9,color:"#7a9ab8",marginBottom:8}}>90-day rolling · 3 night ldgs req. from flight log</div>

    {/* Company filter */}
    <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
      {["All",...companies].map(co=>(
        <button key={co} onClick={()=>{setCompanyFilter(co);setSelected(null);}}
          style={{padding:"5px 10px",borderRadius:4,fontFamily:"'JetBrains Mono',monospace",
            border:`1px solid ${companyFilter===co?"#4a9eff":"#1e2730"}`,
            background:companyFilter===co?"rgba(74,158,255,0.12)":"transparent",
            color:companyFilter===co?"#4a9eff":"#7a9ab8",fontSize:9,fontWeight:700,cursor:"pointer"}}>
          {co==="All"?`ALL (${Object.keys(fleetData).length})`:co}
        </button>
      ))}
    </div>

    {/* Summary strip */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
      <div style={{background:"#0a1118",borderRadius:6,padding:"8px 12px",border:`1px solid ${needCurrency>0?SC.red:"#1e2730"}`}}>
        <div style={{fontSize:18,fontWeight:700,color:needCurrency>0?SC.red:SC.green}}>{needCurrency}</div>
        <div style={{fontSize:8,color:"#7a9ab8",marginTop:1}}>NEED NIGHT CURRENCY</div>
      </div>
      <div style={{background:"#0a1118",borderRadius:6,padding:"8px 12px",border:"1px solid #1e2730"}}>
        <div style={{fontSize:18,fontWeight:700,color:"#4a9eff"}}>{sorted.filter(p=>p.nightLandings90>=3).length}</div>
        <div style={{fontSize:8,color:"#7a9ab8",marginTop:1}}>CURRENT</div>
      </div>
    </div>

    {/* Sort */}
    <div style={{display:"flex",gap:4,marginBottom:10}}>
      {[["status","STATUS"],["hours","TOTAL HRS"],["recent","LAST 30D"],["name","NAME"]].map(([k,l])=>(
        <button key={k} onClick={()=>setSortBy(k)} style={{flex:1,padding:"5px 2px",borderRadius:4,
          border:`1px solid ${sortBy===k?"#4a9eff":"#1e2730"}`,
          background:sortBy===k?"rgba(74,158,255,0.1)":"transparent",
          color:sortBy===k?"#4a9eff":"#7a9ab8",fontSize:9,fontWeight:700,cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace"}}>
          {l}
        </button>
      ))}
    </div>

    {/* Pilot rows */}
    <div style={{display:"flex",flexDirection:"column",gap:4}}>
      {sorted.map(pd=>{
        const col = SC[pd.nightStatus]||SC.green;
        const isOpen = selected===pd.username;
        const pct = Math.min(pd.nightLandings90/3,1);
        return <div key={pd.username}>
          <div onClick={()=>setSelected(isOpen?null:pd.username)}
            style={{background:"#0d1117",borderRadius:6,border:`1px solid ${isOpen?col:"#1e2730"}`,padding:"10px 12px",cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:col,boxShadow:`0 0 6px ${col}`,flexShrink:0}}/>
                <span style={{fontSize:12,fontWeight:700,color:"#e0e8f0"}}>{pd.fullName}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:13,fontWeight:700,color:col}}>🌙 {pd.nightLandings90}<span style={{fontSize:9,color:"#7a9ab8"}}>/3</span></span>
                <span style={{fontSize:14,color:"#7a9ab8"}}>{isOpen?"▲":"▼"}</span>
              </div>
            </div>
            {/* Progress bar */}
            <div style={{height:3,background:"#1e2730",borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct*100}%`,background:col,borderRadius:2}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:"#7a9ab8",marginTop:2}}>
              <span>{pd.nightLandings90>=3?"✓ CURRENT":pd.nightLandings90===0?"NO NIGHT LDGS IN 90D":`NEED ${3-pd.nightLandings90} MORE`}</span>
              <span>{pd.lastNightFlight?`last: ${pd.lastNightFlight.date}`:"—"}</span>
            </div>
          </div>

          {isOpen&&<div style={{...S.card,borderColor:col,background:"#080b0f",marginTop:2,padding:"12px 14px"}}>
            {/* Night detail */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",color:"#7a9ab8",marginBottom:6}}>🌙 NIGHT LANDINGS — LAST 90 DAYS</div>
              {pd.nightLandings90===0
                ? <div style={{fontSize:10,color:"#6a8aa8",padding:"6px 0"}}>No night landings in the last 90 days</div>
                : <div style={{display:"flex",flexDirection:"column",gap:2}}>
                    {(pd.flights||[]).filter(f=>f._status==="completed"&&f.date>=cutoff90Str&&(f.nightLandings||0)>0)
                      .sort((a,b)=>b.date.localeCompare(a.date))
                      .map((f,i)=>(
                        <div key={i} style={{display:"grid",gridTemplateColumns:"90px 1fr 50px 60px",gap:4,padding:"3px 0",borderBottom:"1px solid #0d1520",fontSize:10}}>
                          <span style={{color:"#7a9ab8"}}>{f.date}</span>
                          <span style={{color:"#b8c8d8"}}>{f.origin}→{f.destination}</span>
                          <span style={{color:"#e0e8f0",textAlign:"right"}}>{f.tailNumber||"—"}</span>
                          <span style={{color:SC.green,textAlign:"right",fontWeight:700}}>🌙×{f.nightLandings}</span>
                        </div>
                      ))
                    }
                  </div>
              }
            </div>

            {/* Time in type */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",color:"#7a9ab8",marginBottom:6}}>TIME IN TYPE — ALL TIME</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:4}}>
                {Object.entries(pd.byType).sort((a,b)=>b[1].mins-a[1].mins).map(([type,data])=>(
                  <div key={type} style={{background:"#0a1118",borderRadius:5,padding:"8px 10px",border:"1px solid #1e2730"}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#4a9eff",marginBottom:2}}>{type}</div>
                    <div style={{fontSize:14,fontWeight:700,color:"#e0e8f0"}}>{(data.mins/60).toFixed(1)}<span style={{fontSize:9,color:"#7a9ab8"}}>h</span></div>
                    <div style={{fontSize:8,color:"#7a9ab8",marginTop:1}}>{data.legs} legs · {data.landings} ldgs</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Summary stats */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4,marginBottom:12}}>
              {[
                ["TOTAL", `${(pd.totalMins/60).toFixed(1)}h`, "#e0e8f0"],
                ["LAST 30D", `${(pd.recentMins/60).toFixed(1)}h`, "#4a9eff"],
                ["TOTAL LEGS", pd.legs, "#b8c8d8"],
              ].map(([lbl,val,vc])=>(
                <div key={lbl} style={{textAlign:"center",background:"#0a1118",borderRadius:5,padding:"8px 4px"}}>
                  <div style={{fontSize:8,color:"#7a9ab8",marginBottom:2}}>{lbl}</div>
                  <div style={{fontSize:13,fontWeight:700,color:vc}}>{val}</div>

            <button onClick={()=>exportLogbook(pd)}

    </div>
  </div>;
}

// ── TAILS SCREEN ──────────────────────────────────────────────────────────────
function TailsScreen({ fleetData, delayData, onImportDelays, routeAvgs }) {
  const [selected, setSelected] = useState(null);
  const [sortBy, setSortBy] = useState("util");
  const [delayFileRef] = useState(()=>({ current:null }));
  const fileRef = useRef(null);

  // Aggregate per-tail stats from fleet flight data
  const tailStats = {};
  Object.entries(AIRCRAFT_DB).forEach(([tail,info])=>{
    tailStats[tail] = {
      tail, info,
      scheduled:0, completed:0, enroute:0, totalMins:0,
      legs:[], cancelledLegs:[],
      pilots: new Set(),
    };
  });

  Object.values(fleetData).forEach(pd=>{
    (pd.flights||[]).forEach(f=>{
      const t = f.tailNumber;
      if(!t||!tailStats[t]) return;
      const ts = tailStats[t];
      ts.pilots.add(pd.fullName||pd.username);
      if(f._status==="completed") {
        ts.completed++;
        ts.totalMins += f.totalMinutes||0;
        ts.legs.push({...f, pilotName:pd.fullName||pd.username});
      } else if(f._status==="enroute") {
        ts.enroute++;
      } else if(f._status==="scheduled") {
        ts.scheduled++;
      }
    });
  });

  // Merge delay data if uploaded
  const delays = delayData || [];

  const tails = Object.values(tailStats)
    .filter(t=>t.completed+t.scheduled+t.enroute>0)
    .sort((a,b)=>{
      if(sortBy==="util") return b.totalMins-a.totalMins;
      if(sortBy==="legs") return b.completed-a.completed;
      if(sortBy==="type") return a.info.short.localeCompare(b.info.short);
      return a.tail.localeCompare(b.tail);
    });

  const totalFleetMins  = tails.reduce((s,t)=>s+t.totalMins,0);
  const totalCompleted  = tails.reduce((s,t)=>s+t.completed,0);
  const mostUsedTail    = tails[0];

  // Parse delay CSV upload
  const handleDelayFile = async (e) => {
    const file = e.target.files[0]; if(!file) return;
    const XLSX = await loadXlsx();
    const buf = await file.arrayBuffer();
    const wb  = XLSX.read(new Uint8Array(buf),{type:'array',cellDates:false,dateNF:'yyyy-mm-dd'});
    const csv = XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]],{raw:false});
    const rows = csv.split("\n").map(r=>r.split(",").map(v=>v.trim().replace(/^"|"$/g,"")));
    const hdr  = rows[0].map(h=>h.toLowerCase());
    const get  = (row,name) => { const i=hdr.findIndex(h=>h.includes(name)); return i>=0?row[i]:""; };
    const parsed = rows.slice(1).filter(r=>r.join("").trim()).map(r=>({
      date:       get(r,"date")||get(r,"depart"),
      tail:       get(r,"regno")||get(r,"aircraft")||get(r,"reg"),
      origin:     get(r,"origin")||get(r,"from"),
      destination:get(r,"dest")||get(r,"to"),
      delayCode:  get(r,"delay code")||get(r,"code"),
      delayMins:  parseInt(get(r,"delay")||get(r,"mins")||"0")||0,
      delayDesc:  get(r,"description")||get(r,"reason")||"",

    onImportDelays(parsed);
    e.target.value="";
  };

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <div style={{fontSize:13,fontWeight:700,letterSpacing:"0.1em",color:"#e0e8f0"}}>TAILS</div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>

          style={{...S.btn("ghost"),padding:"5px 10px",fontSize:9}}>

    </div>

    {/* Fleet summary */}

      {[
        ["TOTAL HRS", `${(totalFleetMins/60).toFixed(0)}h`, "#4a9eff"],

        ["ACTIVE TAILS", tails.length, "#e0e8f0"],

// ── SPIDERTRACKS / FLIGHT LOG RECONCILIATION ──────────────────────────────────
const RECON_ICAO = {
  'PAJN':'Juneau','PAKT':'Ketchikan','PASI':'Sitka','PAHN':'Haines','PAGY':'Skagway',
  'PAGS':'Gustavus','PAOH':'Hoonah','PAGN':'Angoon','PATE':'Tenakee Springs',
  'PAEL':'Elfin Cove','PAPE':'Pelican','PAFE':'Kake','PAKW':'Klawock','PAWG':'Wrangell',
  'PAPG':'Petersburg','KBFI':'Boeing Field','KPDX':'Portland','PAWS':'Wasilla Airport',
  'TKE':'Tenakee Springs','PEC':'Pelican','PYBUS':'Pybus','PAPB':'Pybus',
};

function excelSerialToDate(s) {
  const n=parseFloat(s); if(isNaN(n)) return null;
  return new Date((n-25569)*86400000).toISOString().slice(0,10);
}
function excelSerialToTime(s) {
  const n=parseFloat(s); if(isNaN(n)) return null;
  const frac=n-Math.floor(n); if(frac<0.001) return null;
  const m=Math.round(frac*1440);
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}

async function runCorrelation(flightLogFile, spiderFiles, cachedSpiderRows) {
  const XLSX = await loadXlsx();

  // Parse flight log
  const flBuf = await flightLogFile.arrayBuffer();
  const flWb  = XLSX.read(new Uint8Array(flBuf),{type:'array'});
  const flJson = XLSX.utils.sheet_to_json(flWb.Sheets[flWb.SheetNames[0]], {defval:''});

  // Use cached spider rows if no new files provided, otherwise parse + merge
  let spRows = cachedSpiderRows || [];
  let newParsedRows = null;
  if(spiderFiles && (Array.isArray(spiderFiles)?spiderFiles:[spiderFiles]).length > 0) {
    const allSpRows = [...(cachedSpiderRows||[])];
    const seenIds = new Set(allSpRows.map(r=>r[1]));
    for(const file of (Array.isArray(spiderFiles)?spiderFiles:[spiderFiles])) {
      const text = await file.text();
      text.split('\n').slice(1)
        .map(r=>r.split(',').map(v=>v.trim().replace(/^"|"$/g,'')))
        .filter(r=>r[0]&&r[7]&&r[10])
        .forEach(r=>{ if(!seenIds.has(r[1])){seenIds.add(r[1]);allSpRows.push(r);} });
    }
    spRows = allSpRows;
    newParsedRows = allSpRows; // save back
  }

  // Build spider index: tail+date → legs sorted by blocks off
  const spIdx = {};
  spRows.forEach(r=>{
    const date=r[3]?.slice(0,10)||r[2]?.slice(0,10), tail=r[0]; // use LOCAL date (r[3]) not UTC
    if(!date||!tail) return;
    const key=`${tail}|${date}`;
    if(!spIdx[key]) spIdx[key]=[];
    spIdx[key].push({
      blocksOff:r[7], blocksOn:r[10],
      blockTimeHrs:parseFloat(r[15])||0,
      airTimeHrs:parseFloat(r[16])||0,
      landings:parseInt(r[13])||1,
      from:RECON_ICAO[r[17]]||r[17]||'', to:RECON_ICAO[r[18]]||r[18]||'',
    });
  });
  Object.values(spIdx).forEach(legs=>legs.sort((a,b)=>a.blocksOff.localeCompare(b.blocksOff)));

  // Filter FL rows needing reconciliation (no actual start time, completed)
  // Include rows that are clearly completed (have start+stop times) regardless of Flight Status field
  // Some exports have blank Flight Status but valid actual times — classify by times, not field
  const isActuallyCompleted = r => {
    const st = r['Flight Status'];
    const hasStatus = st && String(st).trim();
    const hasStart  = !!excelSerialToTime(r['Start Time']);
    const hasStop   = !!excelSerialToTime(r['Stop Time']);
    // Completed = has both times, OR status says Completed
    return (hasStart && hasStop) || String(st||'').trim()==='Completed';
  };
  const flNoTime = flJson.filter(r=>!excelSerialToTime(r['Start Time'])&&isActuallyCompleted(r));

  // Group by tail+date in order
  const flByKey = {};
  flNoTime.forEach(r=>{
    const date=excelSerialToDate(r['Date']), tail=r['Aircraft Rego'];
    if(!date||!tail) return;
    const key=`${tail}|${date}`;
    if(!flByKey[key]) flByKey[key]=[];
    flByKey[key].push({...r, _date:date});
  });

  // Match — unmatched legs fall back to scheduled block time
  const allLegs = [];
  Object.entries(flByKey).forEach(([key,flLegs])=>{
    const spLegs = spIdx[key] ? [...spIdx[key]] : [];
    const remaining=[...spLegs];
    const leftover=[];

    flLegs.forEach(fl=>{
      if(!remaining.length){ leftover.push(fl); return; }
      const o=fl['Origin']||'', d=fl['Destination']||'';
      const i=remaining.findIndex(sp=>(sp.from===o||!sp.from)&&(sp.to===d||!sp.to));
      if(i>=0) { allLegs.push({fl,sp:remaining.splice(i,1)[0],matchType:'spider_route'}); }
      else leftover.push(fl);
    });

    leftover.forEach((fl,i)=>{
      if(i<remaining.length) allLegs.push({fl,sp:remaining[i],matchType:'spider_position'});
      else allLegs.push({fl,sp:null,matchType:'scheduled_fallback'});
    });
  });

  const PMAP = {
    forsythe:'Jake Forsythe',erice:'Eric Evans',gabe:'Gabe Aburto',hosticka:'Louis Hosticka',
    hunters:'Hunter Sinclair',jerrys:'Jerry Stuart',jestergard:'Justin Estergard',kelleyn:'Nick Kelley',
    megant:'Megan Trejo',nicks:'Nick Swisher',patrickf:'Patrick Ford',rees:'Ben Rees',
    seank:'Sean Kveum',sethd:'Seth Downs',andrewh:'Andrew H',bradv:'Brad V',
    brandonw:'Brandon W',chuckp:'Chuck Perkins',ianh:'Ian Hasegawa',samt:'Sam T',
    schmitts:'Schmitt S',daves:'Dave Sandberg',danc:'Dan Corson',greggh:'Greg Hake',
  };

  const pilots={};
  allLegs.forEach(({fl,sp,matchType})=>{
    const u=fl['Pilot']||'?', name=PMAP[u]||u;
    if(!pilots[name]) pilots[name]={username:u,scheduledMins:0,actualBlockMins:0,actualAirMins:0,
      spiderLegs:0,fallbackLegs:0};
    const schedMins=parseInt(fl['Block Time'])||0;
    pilots[name].scheduledMins+=schedMins;
    if(sp){
      pilots[name].actualBlockMins+=Math.round(sp.blockTimeHrs*60);
      pilots[name].actualAirMins  +=Math.round(sp.airTimeHrs*60);
      pilots[name].spiderLegs++;
    } else {
      // No spider data — use scheduled block as-is
      pilots[name].actualBlockMins+=schedMins;
      pilots[name].actualAirMins  +=schedMins; // best we can do
      pilots[name].fallbackLegs++;
    }
  });

  const spiderCount  = allLegs.filter(l=>l.matchType!=='scheduled_fallback').length;
  const fallbackCount= allLegs.filter(l=>l.matchType==='scheduled_fallback').length;
  const dateRange = {
    start:[...flNoTime].map(r=>excelSerialToDate(r['Date'])).filter(Boolean).sort()[0],
    end:  [...flNoTime].map(r=>excelSerialToDate(r['Date'])).filter(Boolean).sort().pop(),
  };

  return {
    pilots, dateRange,
    totalLegs: allLegs.length,
    spiderLegs: spiderCount,
    fallbackLegs: fallbackCount,
    totalMatched: spiderCount,
    totalUnmatched: fallbackCount,
    noSpiderCoverage: fallbackCount,
    _newParsedRows: newParsedRows, // null if used cache only
    legs: allLegs.map(({fl,sp,matchType})=>{
      const schedMins=parseInt(fl['Block Time'])||0;
      return {
        date:fl._date, tail:fl['Aircraft Rego'], pilot:fl['Pilot'],
        pilotName:PMAP[fl['Pilot']]||fl['Pilot'],
        orig:fl['Origin'], dest:fl['Destination'], schedMins,
        actualBlockMins:sp?Math.round(sp.blockTimeHrs*60):schedMins,
        actualAirMins:  sp?Math.round(sp.airTimeHrs*60) :schedMins,
        blocksOff:sp?.blocksOff||null, blocksOn:sp?.blocksOn||null, matchType,
      };
    }),
  };
}

function ReconScreen({ reconData, spiderRows, onRunRecon }) {
  const [flFile,    setFlFile   ] = useState(null);
  const [spFiles,   setSpFiles  ] = useState([]); // supports multiple spider CSVs
  const [running,   setRunning  ] = useState(false);
  const [error,     setError    ] = useState(null);
  const [selected,  setSelected ] = useState(null);
  const [view,      setView     ] = useState('summary');
  const flRef = useRef(null);
  const spRef = useRef(null);

  const handleSpiderFiles = (e) => {
    const files = [...(e.target.files||[])];
    setSpFiles(prev=>{
      const names = new Set(prev.map(f=>f.name));
      return [...prev, ...files.filter(f=>!names.has(f.name))];
    });
    e.target.value="";
  };

  const handleRun = async () => {
    if(!flFile) return;
    if(!spFiles.length && !spiderRows) { setError("No spider data — upload at least one Spidertracks CSV first"); return; }
    setRunning(true); setError(null);
    try {
      const result = await runCorrelation(flFile, spFiles, spiderRows);
      onRunRecon(result, result._newParsedRows);
    } catch(e) {
      setError(e.message);
    }

      {spiderRows&&spiderRows.length>0&&<div style={{marginBottom:8,padding:"7px 10px",borderRadius:5,

// ── STATS SCREEN ──────────────────────────────────────────────────────────────
function computeStats(fleetData, routeAvgs) {
  // Flatten all completed flights across all pilots
  const all = [];
  Object.values(fleetData||{}).forEach(pd=>{
    (pd.flights||[]).filter(f=>f._status==="completed"&&f.totalMinutes>3&&f.totalMinutes<300&&f.startTaxi&&f.stopTaxi).forEach(f=>{
      all.push({...f, pilotName:pd.fullName||pd.username});
    });
  });
  if(!all.length) return null;

  const avg = arr => arr.length ? Math.round(arr.reduce((s,n)=>s+n,0)/arr.length) : 0;
  const med = arr => { const s=[...arr].sort((a,b)=>a-b); return s[Math.floor(s.length/2)]||0; };
  const toMins = t => { if(!t) return null; const[h,m]=t.split(':').map(Number); return h*60+m; };
  const fmtMins = m => m==null?"—":`${Math.floor(m/60)?Math.floor(m/60)+'h ':''}${m%60}m`;

  // ── On-time performance ──────────────────────────────────────────────────────
  const withSched = all.filter(f=>f.startTaxi);
  // schedDepart is stored as startTaxi on scheduled flights — for completed,
  // we'd need the original sched time. Use notes or compare to route avg.
  // We can compute delay as actual start vs median start for that route
  const routeStartTimes = {};
  all.forEach(f=>{
    const k=`${f.origin}→${f.destination}`;
    if(!routeStartTimes[k]) routeStartTimes[k]=[];
    const m=toMins(f.startTaxi);
    if(m) routeStartTimes[k].push(m);
  });

  // ── Turn times by location ───────────────────────────────────────────────────
  // Group by tail+date, sort by start, find consecutive same-dest→orig pairs
  const byTailDate = {};
  all.forEach(f=>{
    const k=`${f.tailNumber}|${f.date}`;
    if(!byTailDate[k]) byTailDate[k]=[];
    byTailDate[k].push(f);
  });
  Object.values(byTailDate).forEach(legs=>legs.sort((a,b)=>(toMins(a.startTaxi)||0)-(toMins(b.startTaxi)||0)));

  const ISLAND_AIR_TAILS = new Set(['N1229C','N1229Z','N1245X','N754KP','N726KP','N32009']);
  const JNU_NAMES = new Set(['Juneau']);
  const KTN_KLW  = new Set(['Ketchikan','Klawock']);

  const turnByLoc = {};
  const turnByLocAKS = {}; // AKS outstation turns only
  const turnEvents = [];
  Object.entries(byTailDate).forEach(([key, legs])=>{
    for(let i=0;i<legs.length-1;i++){
      const a=legs[i], b=legs[i+1];
      if(a.destination===b.origin){
        const landMin=toMins(a.stopTaxi), depMin=toMins(b.startTaxi);
        if(landMin!=null&&depMin!=null){
          const turn=depMin-landMin;
          if(turn>=0&&turn<=180){
            const isIslandAirTail = ISLAND_AIR_TAILS.has(a.tailNumber);
            const isJNU  = JNU_NAMES.has(a.destination);
            const isHub  = KTN_KLW.has(a.destination);
            const isAKSOutstation = !isIslandAirTail && !isJNU && !isHub;

            if(!turnByLoc[a.destination]) turnByLoc[a.destination]=[];
            turnByLoc[a.destination].push(turn);

            if(isAKSOutstation) {
              if(!turnByLocAKS[a.destination]) turnByLocAKS[a.destination]=[];
              turnByLocAKS[a.destination].push(turn);
            }

            let category = isIslandAirTail ? 'island_air_hub'
              : isJNU  ? 'jnu'
              : isHub  ? 'hub_layover'
              : 'aks_outstation';

            turnEvents.push({
              date:a.date, tail:a.tailNumber, location:a.destination,
              arrivedFrom:a.origin, departedTo:b.destination,
              landTime:a.stopTaxi, deptTime:b.startTaxi,
              turnMins:turn, pilot:a.pilotName, category,
            });
          }
        }
      }
    }
  });

  // ── Aircraft type classifier ─────────────────────────────────────────────────
  const getAcType = tail => {
    if(!tail) return null;
    if(['N721KP','N722KP','N726KP'].includes(tail))             return 'PC-12';
    if(['N754KP','N753KP','N755KP'].includes(tail))             return 'Garret TT';
    if(['N450KP','N438JP','N336JP'].includes(tail))             return 'EX Caravan';
    if(['N264KP','N265KP'].includes(tail))                      return 'Amphib Caravan';
    if(['N748KP','N749KP'].includes(tail))                      return 'C206 Amphib';
    if(['N777DH','N4794C','N743KP','N60TF'].includes(tail))     return 'Beaver';
    return null; // unknown/other tail - skip from type breakdown
  };

  // ── Route block time stats ────────────────────────────────────────────────────
  const byRoute = {};
  all.forEach(f=>{
    if(!f.origin||!f.destination||f.origin===f.destination) return;
    const k=`${f.origin}→${f.destination}`;
    if(!byRoute[k]) byRoute[k]={orig:f.origin,dest:f.destination,times:[],sched:[],pax:[],byType:{}};
    byRoute[k].times.push(f.totalMinutes);
    byRoute[k].pax.push(parseInt(f.pax)||0);
    // Sched: prefer direct Takeflite sched times over estimate
    const sm = (f.schedOff&&f.schedOn) ? calcMin(f.schedOff,f.schedOn) : f._schedDurMins;
    if(sm&&sm>5&&sm<300) byRoute[k].sched.push(sm);
    // Per-type breakdown (only known AKS aircraft)
    const type = getAcType(f.tailNumber);
    if(type) {
      if(!byRoute[k].byType[type]) byRoute[k].byType[type]=[];
      byRoute[k].byType[type].push(f.totalMinutes);
    }
  });

  // ── Daily utilization ─────────────────────────────────────────────────────────
  const byDate = {};
  all.forEach(f=>{
    if(!byDate[f.date]) byDate[f.date]={legs:0,mins:0,pax:0,tails:new Set(),pilots:new Set()};
    byDate[f.date].legs++;
    byDate[f.date].mins+=f.totalMinutes;
    byDate[f.date].pax+=parseInt(f.pax)||0;
    byDate[f.date].tails.add(f.tailNumber);
    byDate[f.date].pilots.add(f.pilotName);
  });
  const days = Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0]));
  const dayVals = Object.values(byDate);

  // ── Pilot stats ───────────────────────────────────────────────────────────────
  const byPilot = {};
  all.forEach(f=>{
    const p=f.pilotName||'?';
    if(!byPilot[p]) byPilot[p]={legs:0,mins:0,pax:0,routes:new Set(),tails:new Set()};
    byPilot[p].legs++;
    byPilot[p].mins+=f.totalMinutes;
    byPilot[p].pax+=parseInt(f.pax)||0;
    byPilot[p].routes.add(`${f.origin}→${f.destination}`);
    byPilot[p].tails.add(f.tailNumber);
  });

  // ── Tail stats ────────────────────────────────────────────────────────────────
  const byTail = {};
  all.forEach(f=>{
    const t=f.tailNumber||'?';
    if(!byTail[t]) byTail[t]={legs:0,mins:0,routes:new Set()};
    byTail[t].legs++;
    byTail[t].mins+=f.totalMinutes;
    byTail[t].routes.add(`${f.origin}→${f.destination}`);
  });

  return {
    totalLegs: all.length,
    totalMins: all.reduce((s,f)=>s+f.totalMinutes,0),
    totalPax: all.reduce((s,f)=>s+(parseInt(f.pax)||0),0),
    dateRange: {start:days[0]?.[0], end:days[days.length-1]?.[0]},
    avgLegsPerDay: avg(dayVals.map(d=>d.legs)),
    avgHrsPerDay:  avg(dayVals.map(d=>d.mins))/60,
    busiestDay: days.sort((a,b)=>b[1].legs-a[1].legs)[0],
    turnEvents,
    turnByLoc: Object.entries(turnByLoc),
    turnByLocAKS: Object.entries(turnByLocAKS)
      .filter(([,t])=>t.length>=3),
    byRoute: Object.entries(byRoute)
      .filter(([,d])=>d.times.length>=3)
      .map(([k,d])=>({route:k,orig:d.orig,dest:d.dest,
        avg:avg(d.times),med:med(d.times),min:Math.min(...d.times),max:Math.max(...d.times),
        n:d.times.length, avgPax:parseFloat((d.pax.reduce((s,n)=>s+n,0)/d.pax.length).toFixed(1)),
        totalPax:d.pax.reduce((s,n)=>s+n,0),
        schedAvg: d.sched.length>=1 ? (()=>{
            const s=[...d.sched].sort((a,b)=>a-b);
            return s[Math.floor(s.length/2)];
          })() : (routeAvgs?.byRoute?.[k]?.schedAvg||null),
        byType: d.byType||{},
        schedN:   routeAvgs?.byRoute?.[k]?.schedN || d.sched.length}))
      .sort((a,b)=>b.n-a.n),
    byPilot: Object.entries(byPilot)
      .map(([name,d])=>({name,legs:d.legs,mins:d.mins,pax:d.pax,
        routes:d.routes.size,tails:d.tails.size,avgLegMins:Math.round(d.mins/d.legs)}))
      .sort((a,b)=>b.mins-a.mins),
    byTail: Object.entries(byTail)
      .map(([tail,d])=>({tail,legs:d.legs,mins:d.mins,routes:d.routes.size,avgLegMins:Math.round(d.mins/d.legs)}))
      .sort((a,b)=>b.mins-a.mins),
    dailyLegs: days.map(([date,d])=>({date,legs:d.legs,mins:d.mins,pax:d.pax,tails:[...d.tails].length})),
  };
}

function StatsScreen({ fleetData, routeAvgs }) {
  const [tab, setTab]       = useState("overview");
  const [routeFilter, setRouteFilter] = useState("");
  const [routeSort, setRouteSort] = useState({col:"n",dir:-1}); // default: most flights first
  const [expandedRoute, setExpandedRoute] = useState(null);
  const [colWidths, setColWidths] = useState({route:150,avg:52,sched:52,diff:48,med:48,min:44,max:48,n:50,avgPax:44});
  const dragRef = useRef(null);
  const [locFilter, setLocFilter] = useState("all");

  const noData = !fleetData||!Object.keys(fleetData).length;
  if(noData) return (
    <div>
      <div style={S.ct}>OPERATIONS STATS</div>
      <div style={{...S.card,textAlign:"center",padding:40,color:"#7a9ab8"}}>
        <div style={{fontSize:32,marginBottom:12}}>📊</div>
        <div style={{fontSize:13,fontWeight:700,marginBottom:6}}>No Data</div>
        <div style={{fontSize:11,lineHeight:1.6}}>Import fleet data first on the IMPORT tab</div>
      </div>
    </div>
  );

  const stats = useMemo(()=>computeStats(fleetData, routeAvgs), [fleetData, routeAvgs]);
  if(!stats) return null;

  const fmtMins = m => m==null?"—":`${Math.floor(m/60)?Math.floor(m/60)+'h ':''}${m%60}m`;
  const pct = (n,t) => t ? `${(n/t*100).toFixed(0)}%` : "—";

  const TABS = [["overview","OVERVIEW"],["routes","ROUTES"],["turns","TURN TIMES"],["pilots","PILOTS"],["tails","TAILS"],["daily","DAILY"]];

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:700,letterSpacing:"0.1em",color:"#e0e8f0"}}>OPERATIONS STATS</div>
      <div style={{fontSize:9,color:"#6a8aa8"}}>{stats.dateRange.start} → {stats.dateRange.end}</div>
    </div>

    {/* Tab bar */}
    <div style={{display:"flex",gap:3,marginBottom:14,flexWrap:"wrap"}}>
      {TABS.map(([k,l])=>(
        <button key={k} onClick={()=>setTab(k)} style={{padding:"5px 10px",borderRadius:4,
          border:`1px solid ${tab===k?"#4a9eff":"#1e2730"}`,
          background:tab===k?"rgba(74,158,255,0.1)":"transparent",
          color:tab===k?"#4a9eff":"#7a9ab8",fontSize:9,fontWeight:700,cursor:"pointer",
          fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.08em"}}>
          {l}
        </button>
      ))}
    </div>

    {/* ── OVERVIEW ── */}
    {tab==="overview"&&<div>
      {/* Fleet totals */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
        {[
          ["TOTAL LEGS",   stats.totalLegs.toLocaleString(),         "#e0e8f0"],
          ["TOTAL BLOCK",  `${(stats.totalMins/60).toFixed(0)}h`,    "#4a9eff"],
          ["TOTAL PAX",    stats.totalPax.toLocaleString(),           SC.green],
          ["AVG LEGS/DAY", stats.avgLegsPerDay,                       "#b8c8d8"],
          ["AVG HRS/DAY",  `${stats.avgHrsPerDay.toFixed(1)}h`,       "#b8c8d8"],
          ["AVG PAX/DAY",  Math.round(stats.totalPax/(stats.dailyLegs.length||1)), "#b8c8d8"],
        ].map(([l,v,c])=>(
          <div key={l} style={{background:"#0a1118",borderRadius:8,padding:"12px 10px",textAlign:"center",border:"1px solid #1e2730"}}>
            <div style={{fontSize:20,fontWeight:700,color:c}}>{v}</div>
            <div style={{fontSize:8,color:"#7a9ab8",marginTop:3,letterSpacing:"0.08em"}}>{l}</div>
          </div>
        ))}
      </div>

      {/* Busiest day */}
      {stats.busiestDay&&<div style={{...S.card,marginBottom:14,padding:"12px 14px"}}>
        <div style={{fontSize:9,fontWeight:700,color:"#7a9ab8",letterSpacing:"0.1em",marginBottom:6}}>BUSIEST DAY</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#e0e8f0"}}>{stats.busiestDay[0]}</div>
          <div style={{display:"flex",gap:16,fontSize:11}}>
            <span><span style={{color:"#4a9eff",fontWeight:700}}>{stats.busiestDay[1].legs}</span> <span style={{color:"#7a9ab8"}}>legs</span></span>
            <span><span style={{color:SC.green,fontWeight:700}}>{(stats.busiestDay[1].mins/60).toFixed(1)}h</span> <span style={{color:"#7a9ab8"}}>block</span></span>
            <span><span style={{color:"#ffd740",fontWeight:700}}>{stats.busiestDay[1].pax}</span> <span style={{color:"#7a9ab8"}}>pax</span></span>
          </div>
        </div>
      </div>}

      {/* Top routes quick view */}
      <div style={{fontSize:9,fontWeight:700,color:"#7a9ab8",letterSpacing:"0.1em",marginBottom:6}}>TOP ROUTES BY FREQUENCY</div>
      <div style={{background:"#0a0e14",borderRadius:6,border:"1px solid #1e2730",overflow:"hidden",marginBottom:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 50px 50px 50px 45px",gap:4,
          padding:"5px 10px",borderBottom:"1px solid #1e2730",fontSize:8,fontWeight:700,color:"#7a9ab8"}}>
          <span>ROUTE</span><span style={{textAlign:"right"}}>AVG</span><span style={{textAlign:"right"}}>AVG PAX</span><span style={{textAlign:"right"}}>TOTAL PAX</span><span style={{textAlign:"right"}}>N</span>
        </div>
        {stats.byRoute.slice(0,10).map((r,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 50px 50px 50px 45px",gap:4,
            padding:"5px 10px",borderBottom:i<9?"1px solid #0d1117":"none",fontSize:10,
            background:i%2===0?"#08101e":"#122030",cursor:"default"}} onMouseEnter={e=>e.currentTarget.style.background="#1a3048"} onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"#08101e":"#122030"}>
            <span style={{color:"#b8c8d8"}}>{r.route}</span>
            <span style={{color:SC.green,fontWeight:700,textAlign:"right"}}>{r.avg}m</span>
            <span style={{color:"#7a9ab8",textAlign:"right"}}>{r.avgPax}</span>
            <span style={{color:"#7a9ab8",textAlign:"right"}}>{r.totalPax}</span>
            <span style={{color:"#6a8aa8",textAlign:"right"}}>{r.n}</span>
          </div>
        ))}
      </div>

      {/* Top turn times quick view */}
      <div style={{fontSize:9,fontWeight:700,color:"#7a9ab8",letterSpacing:"0.1em",marginBottom:6}}>AVERAGE TURN TIMES BY LOCATION</div>
      <div style={{background:"#0a0e14",borderRadius:6,border:"1px solid #1e2730",overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 55px 55px 55px 45px",gap:4,
          padding:"5px 10px",borderBottom:"1px solid #1e2730",fontSize:8,fontWeight:700,color:"#7a9ab8"}}>
          <span>LOCATION</span><span style={{textAlign:"right"}}>AVG</span><span style={{textAlign:"right"}}>MEDIAN</span><span style={{textAlign:"right"}}>MIN</span><span style={{textAlign:"right"}}>N</span>
        </div>
        {stats.turnByLoc.map((t,i)=>{
          const col = t.avg>60?SC.orange:t.avg>30?"#ffd740":SC.green;
          return <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 55px 55px 55px 45px",gap:4,
            padding:"5px 10px",borderBottom:i<stats.turnByLoc.length-1?"1px solid #0d1117":"none",fontSize:10,
            background:i%2===0?"#08101e":"#122030",cursor:"default"}} onMouseEnter={e=>e.currentTarget.style.background="#1a3048"} onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"#08101e":"#122030"}>
            <span style={{color:"#b8c8d8",fontWeight:700}}>{t.loc}</span>
            <span style={{color:col,fontWeight:700,textAlign:"right"}}>{t.avg}m</span>
            <span style={{color:"#7a9ab8",textAlign:"right"}}>{t.med}m</span>
            <span style={{color:"#6a8aa8",textAlign:"right"}}>{t.min}m</span>
            <span style={{color:"#6a8aa8",textAlign:"right"}}>{t.n}</span>
          </div>;
        })}
      </div>
    </div>}

    {/* ── ROUTES ── */}
    {tab==="routes"&&(()=>{
      const avg = arr => arr.length ? Math.round(arr.reduce((s,v)=>s+v,0)/arr.length) : null;
      const med = arr => { if(!arr.length) return null; const s=[...arr].sort((a,b)=>a-b); return s[Math.floor(s.length/2)]; };

      // All types present across all routes
      const allTypes = [...new Set(stats.byRoute.flatMap(r=>Object.keys(r.byType||{})))].sort();
      const TYPE_COLORS = {'PC-12':'#4a9eff','Garret TT':'#ffd740','EX Caravan':'#5aaa8a','Amphib Caravan':'#aa7adf','C206 Amphib':'#8888ff','Beaver':'#ff8844','Other':'#7a9ab8'};

      const COLS = [
        {key:"route",  label:"ROUTE",   w:150, align:"left",  val:r=>r.route},
        {key:"avg",    label:"AVG",     w:52,  align:"right", val:r=>r.avg,          color:SC.green},
        {key:"sched",  label:"SCHED",   w:52,  align:"right", val:r=>r.schedAvg||0,  color:"#4a9eff"},
        {key:"diff",   label:"DIFF",    w:48,  align:"right", val:r=>r.schedAvg?r.avg-r.schedAvg:null},
        {key:"med",    label:"MED",     w:48,  align:"right", val:r=>r.med},
        {key:"min",    label:"MIN",     w:44,  align:"right", val:r=>r.min},
        {key:"max",    label:"MAX",     w:48,  align:"right", val:r=>r.max},
        {key:"n",      label:"LEGS",    w:50,  align:"right", val:r=>r.n},
        {key:"avgPax", label:"PAX",     w:44,  align:"right", val:r=>r.avgPax},
      ];

      const startResize = (e, key) => {
        e.preventDefault();
        const startX = e.clientX;
        const startW = colWidths[key];
        const onMove = ev => setColWidths(p=>({...p,[key]:Math.max(40,startW+(ev.clientX-startX))}));
        const onUp   = () => { window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); };
        window.addEventListener('mousemove',onMove);
        window.addEventListener('mouseup',onUp);
      };

      const gridCols = COLS.map(c=>`${colWidths[c.key]}px`).join(' ');

      const sortFn = (a,b) => {
        const va = COLS.find(c=>c.key===routeSort.col)?.val(a)??0;
        const vb = COLS.find(c=>c.key===routeSort.col)?.val(b)??0;
        if(routeSort.col==="route") return routeSort.dir*(String(va).localeCompare(String(vb)));
        return routeSort.dir*((va||0)-(vb||0));
      };

      const SortHdr = ({col,label,align,color,ckey})=>{
        const active=routeSort.col===col;
        return <div style={{display:"flex",alignItems:"center",justifyContent:align==="right"?"flex-end":"space-between",
          position:"relative",paddingRight:8}}>
          <span onClick={()=>setRouteSort(s=>({col,dir:s.col===col?-s.dir:-1}))}
            style={{cursor:"pointer",userSelect:"none",flex:1,textAlign:align,
              color:active?(color||"#e0e8f0"):(color||"#7a9ab8"),
              display:"flex",alignItems:"center",gap:2,justifyContent:align==="right"?"flex-end":"flex-start"}}>
            {label}
            {active?<span style={{fontSize:7}}>{routeSort.dir===-1?"▼":"▲"}</span>:<span style={{fontSize:7,opacity:0.3}}>⇅</span>}
          </span>
          {/* Resize handle */}
          <div onMouseDown={e=>startResize(e,ckey)}
            style={{position:"absolute",right:0,top:0,bottom:0,width:6,
              cursor:"col-resize",background:"transparent",zIndex:2}}
            title="Drag to resize"/>
        </div>;
      };

      const filtered = stats.byRoute
        .filter(r=>!routeFilter||r.route.toLowerCase().includes(routeFilter.toLowerCase()))
        .sort(sortFn);

      return <div>
        <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
          <input value={routeFilter} onChange={e=>setRouteFilter(e.target.value)}
            placeholder="Filter routes (e.g. Juneau, Ketchikan)..."
            style={{...S.inp,fontSize:11,flex:1}}/>
          <button onClick={()=>{
            const rows=[["Route","Avg","Sched","Diff","Med","Min","Max","Legs","Avg Pax",
              ...allTypes.map(t=>t+" Avg"),...allTypes.map(t=>t+" Legs")]];
            filtered.forEach(r=>{
              const row=[r.route,r.avg,r.schedAvg||"",r.schedAvg?r.avg-r.schedAvg:"",r.med,r.min,r.max,r.n,r.avgPax];
              allTypes.forEach(t=>row.push(r.byType?.[t]?.length?Math.round(r.byType[t].reduce((s,v)=>s+v,0)/r.byType[t].length):""));
              allTypes.forEach(t=>row.push(r.byType?.[t]?.length||""));
              rows.push(row);
            });
            const csv=rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(",")).join("\n");
            const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
            a.download="route_stats.csv";a.click();
          }} style={{...S.btn("ghost"),padding:"6px 12px",fontSize:9,flexShrink:0}}>📥 CSV</button>
        </div>
        <div style={{fontSize:9,color:"#7a9ab0",marginBottom:6}}>
          {filtered.length} routes · drag column edges to resize · click headers to sort · click row for aircraft type breakdown
        </div>
        <div style={{background:"#080c12",borderRadius:6,border:"1px solid #1e2730",overflowX:"auto",userSelect:"none"}}>
          {/* Header */}
          <div style={{display:"grid",gridTemplateColumns:gridCols,
            borderBottom:"2px solid #1e2730",fontSize:9,fontWeight:700,
            background:"#0a0e14"}}>
            {COLS.map(c=>(
              <div key={c.key} style={{padding:"7px 8px",borderRight:"1px solid #1a2530",overflow:"hidden"}}>
                <SortHdr col={c.key} ckey={c.key} label={c.label} align={c.align} color={c.color}/>
              </div>
            ))}
          </div>
          {/* Rows */}
          {filtered.map((r,i)=>{
            const diff = r.schedAvg!=null ? r.avg-r.schedAvg : null;
            const diffCol = diff==null?"#3a4a5a":Math.abs(diff)<=2?"#7a9ab0":diff<0?SC.green:SC.orange;
            const isExpanded = expandedRoute===r.route;
            const typeEntries = Object.entries(r.byType||{}).filter(([,v])=>v.length>=2).sort((a,b)=>avg(a[1])-avg(b[1]));
            return <div key={i}>
              {/* Main row */}
              <div style={{display:"grid",gridTemplateColumns:gridCols,
                borderBottom:"1px solid #111820",
                background:isExpanded?"#0c1520":i%2===0?"#08101e":"#122030",
                fontSize:10,cursor:"pointer",transition:"background 0.1s"}}
                onClick={()=>setExpandedRoute(isExpanded?null:r.route)}
                onMouseEnter={e=>{if(!isExpanded)e.currentTarget.style.background="#0e1620"}}
                onMouseLeave={e=>{if(!isExpanded)e.currentTarget.style.background=i%2===0?"#08101e":"#122030"}}>
                <div style={{padding:"6px 8px",borderRight:"1px solid #1a2530",overflow:"hidden",
                  display:"flex",alignItems:"center",gap:5}}>
                  <span style={{color:isExpanded?"#4a9eff":"#c0d0e0",fontWeight:700}}>{r.route}</span>
                  {typeEntries.length>1&&<span style={{fontSize:9,color:"#5a8aaa",fontWeight:600,background:"rgba(74,158,255,0.1)",padding:"1px 5px",borderRadius:3,border:"1px solid rgba(74,158,255,0.2)"}}>▾ {typeEntries.length} types</span>}
                </div>
                <div style={{padding:"6px 8px",textAlign:"right",color:SC.green,fontWeight:700,borderRight:"1px solid #0f1820"}}>{r.avg}m</div>
                <div style={{padding:"6px 8px",textAlign:"right",color:"#4a9eff",fontWeight:600,borderRight:"1px solid #0f1820"}}>{r.schedAvg?`${r.schedAvg}m`:"—"}</div>
                <div style={{padding:"6px 8px",textAlign:"right",fontWeight:diff&&Math.abs(diff)>2?700:400,color:diffCol,borderRight:"1px solid #0f1820"}}>
                  {diff==null?"—":diff===0?"=":diff>0?`+${diff}m`:`${diff}m`}
                </div>
                <div style={{padding:"6px 8px",textAlign:"right",color:"#8aaac8",borderRight:"1px solid #0f1820"}}>{r.med}m</div>
                <div style={{padding:"6px 8px",textAlign:"right",color:"#6a8aa8",borderRight:"1px solid #0f1820"}}>{r.min}m</div>
                <div style={{padding:"6px 8px",textAlign:"right",color:"#6a8aa8",borderRight:"1px solid #0f1820"}}>{r.max}m</div>
                <div style={{padding:"6px 8px",textAlign:"right",color:"#9abacb",fontWeight:600,borderRight:"1px solid #0f1820"}}>{r.n}</div>
                <div style={{padding:"6px 8px",textAlign:"right",color:"#8aaac8"}}>{r.avgPax}</div>
              </div>
              {/* Aircraft type breakdown — expandable */}
              {isExpanded&&<div style={{background:"#0a0e14",borderBottom:"2px solid #1e2730",padding:"8px 12px"}}>
                <div style={{fontSize:9,color:"#7a9ab0",marginBottom:6,fontWeight:700,letterSpacing:"0.08em"}}>
                  AIRCRAFT TYPE BREAKDOWN — {r.route}
                </div>
                {/* Type rows */}
                <div style={{display:"grid",gridTemplateColumns:"160px 56px 56px 56px 50px 44px 44px 50px",
                  gap:0,fontSize:9,borderRadius:4,overflow:"hidden",border:"1px solid #1a2530"}}>
                  {/* Sub-header */}
                  {["TYPE","AVG","MED","SCHED DIFF","LEGS","MIN","MAX","vs OVERALL"].map((h,hi)=>(
                    <div key={h} style={{padding:"4px 8px",background:"#060a0e",
                      borderRight:hi<7?"1px solid #1a2530":"none",
                      fontSize:8,fontWeight:700,color:"#7a9ab0",letterSpacing:"0.06em",
                      textAlign:hi===0?"left":"right"}}>{h}</div>
                  ))}
                  {typeEntries.map(([type,times],ti)=>{
                    const typeAvg=Math.round(times.reduce((s,v)=>s+v,0)/times.length);
                    const typeMed=med(times);
                    const vOverall=typeAvg-r.avg;
                    const col=TYPE_COLORS[type]||"#7a9ab8";
                    return <React.Fragment key={type}>
                      <div style={{padding:"5px 8px",background:ti%2===0?"#08101e":"#122030",
                        borderRight:"1px solid #1a2530",display:"flex",alignItems:"center",gap:5}}>
                        <span style={{width:8,height:8,borderRadius:2,background:col,flexShrink:0,display:"inline-block"}}/>
                        <span style={{color:col,fontWeight:700}}>{type}</span>
                      </div>
                      <div style={{padding:"5px 8px",background:ti%2===0?"#08101e":"#122030",
                        textAlign:"right",color:col,fontWeight:700,borderRight:"1px solid #1a2530"}}>{typeAvg}m</div>
                      <div style={{padding:"5px 8px",background:ti%2===0?"#08101e":"#122030",
                        textAlign:"right",color:"#7a9ab8",borderRight:"1px solid #1a2530"}}>{typeMed}m</div>
                      <div style={{padding:"5px 8px",background:ti%2===0?"#08101e":"#122030",
                        textAlign:"right",color:r.schedAvg?(typeAvg<r.schedAvg?SC.green:SC.orange):"#3a5060",
                        borderRight:"1px solid #1a2530"}}>
                        {r.schedAvg?`${typeAvg>r.schedAvg?"+":""}${typeAvg-r.schedAvg}m`:"—"}
                      </div>
                      <div style={{padding:"5px 8px",background:ti%2===0?"#08101e":"#122030",
                        textAlign:"right",color:"#9abacb",fontWeight:600,borderRight:"1px solid #1a2530"}}>{times.length}</div>
                      <div style={{padding:"5px 8px",background:ti%2===0?"#08101e":"#122030",
                        textAlign:"right",color:"#6a8aa8",borderRight:"1px solid #1a2530"}}>{Math.min(...times)}m</div>
                      <div style={{padding:"5px 8px",background:ti%2===0?"#08101e":"#122030",
                        textAlign:"right",color:"#6a8aa8",borderRight:"1px solid #1a2530"}}>{Math.max(...times)}m</div>
                      <div style={{padding:"5px 8px",background:ti%2===0?"#08101e":"#122030",
                        textAlign:"right",fontWeight:700,
                        color:vOverall===0?"#7a9ab0":vOverall<0?SC.green:SC.orange}}>
                        {vOverall===0?"—":vOverall>0?`+${vOverall}m`:`${vOverall}m`}
                      </div>
                    </React.Fragment>;
                  })}
                  {typeEntries.length===0&&<div style={{gridColumn:"1/-1",padding:"10px",
                    color:"#3a5060",fontSize:9,textAlign:"center"}}>
                    Not enough data (need ≥2 flights per type)
                  </div>}
                </div>
                {/* Visual bar comparison */}
                {typeEntries.length>1&&<div style={{marginTop:8}}>
                  {typeEntries.map(([type,times])=>{
                    const typeAvg=Math.round(times.reduce((s,v)=>s+v,0)/times.length);
                    const maxAvg=Math.max(...typeEntries.map(([,v])=>Math.round(v.reduce((s,a)=>s+a,0)/v.length)));
                    const col=TYPE_COLORS[type]||"#7a9ab8";
                    return <div key={type} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <div style={{width:110,fontSize:9,color:col,fontWeight:700,flexShrink:0}}>{type}</div>
                      <div style={{flex:1,height:14,background:"#060a0e",borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${typeAvg/maxAvg*100}%`,
                          background:col,borderRadius:3,opacity:0.8,
                          display:"flex",alignItems:"center",paddingLeft:6}}>
                          <span style={{fontSize:8,color:"#080c12",fontWeight:700,whiteSpace:"nowrap"}}>{typeAvg}m</span>
                        </div>
                      </div>
                      <div style={{width:30,fontSize:9,color:"#7a9ab0",textAlign:"right",flexShrink:0}}>{times.length}×</div>
                    </div>;
                  })}
                </div>}
              </div>}
            </div>;
          })}
        </div>
      </div>;
    })()}

    {/* ── TURN TIMES ── */}
    {tab==="turns"&&(()=>{
      const avg=arr=>arr.length?Math.round(arr.reduce((s,n)=>s+n,0)/arr.length):0;
      const med=arr=>{const s=[...arr].sort((a,b)=>a-b);return s[Math.floor(s.length/2)]||0;};

      // Build AKS outstation table from turnByLocAKS
      const aksTable = (stats.turnByLocAKS||[]).map(([loc,times])=>{
        const under15=times.filter(t=>t<15).length;
        const over20=times.filter(t=>t>20).length;
        return {loc,avg:avg(times),med:med(times),min:Math.min(...times),max:Math.max(...times),n:times.length,
          pctUnder15:Math.round(under15/times.length*100),
          pctOver20:Math.round(over20/times.length*100)};
      }).sort((a,b)=>b.n-a.n);

      const totalAKS = aksTable.reduce((s,r)=>s+r.n,0);
      const totalUnder15 = aksTable.reduce((s,r)=>s+Math.round(r.pctUnder15*r.n/100),0);
      const totalOver20  = aksTable.reduce((s,r)=>s+Math.round(r.pctOver20*r.n/100),0);

      return <div>

// Maps ICAO to display name for weather labels
const WEATHER_STATIONS = {
  PAJN:"JNU", PAKT:"KTN", PASI:"SIT", PAHN:"HNS", PAGY:"SGY",
  PAGS:"GST", PAOH:"HNH", PAGN:"AGN", PATE:"TKE", PAEL:"ELV",
  PAPE:"PEL", PAFE:"KAE", PAKW:"KLW", PAWG:"WRG", PAPG:"PSG",
};
const ALL_ICAOS = Object.keys(WEATHER_STATIONS).join(',');

async function fetchMETARs() {
  const url = `https://aviationweather.gov/api/data/metar?ids=${ALL_ICAOS}&format=json&hours=2`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`Weather fetch failed: ${res.status}`);
  const data = await res.json();
  // Index by ICAO
  const out = {};
  data.forEach(m=>{
    out[m.icaoId] = {
      icao:     m.icaoId,
      name:     WEATHER_STATIONS[m.icaoId]||m.icaoId,
      cat:      m.flightCategory,   // VFR/MVFR/IFR/LIFR
      vis:      m.visib,
      wind:     m.wspd,
      gust:     m.wgst,
      wdir:     m.wdir,
      temp:     m.temp,
      altim:    m.altim,
      raw:      m.rawOb,
      clouds:   m.clouds||[],
      obsTime:  m.obsTime,
      ceiling:  (m.clouds||[]).filter(c=>c.cover==='BKN'||c.cover==='OVC')[0]?.base||null,
    };
  });
  return out;
}
