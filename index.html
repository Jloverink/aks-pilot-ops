}

function WarnPopup({flights,profile,onDismiss}) {
  const c=getCompliance(flights,profile.defaultDutyType);
  const mins=profile.defaultDutyType==="onDemand"?c.rolling24:c.todayMin;
  if(mins<300)return null;
  const color=mins>=480?"red":mins>=390?"orange":"yellow";
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:"#0d1117",borderRadius:12,padding:24,width:"100%",maxWidth:380,border:`2px solid ${SC[color]}`}}>
      <div style={{fontSize:48,textAlign:"center",marginBottom:10}}>{mins>=480?"🚫":"⚠️"}</div>
      <div style={{fontSize:22,fontWeight:700,color:SC[color],textAlign:"center",marginBottom:8,letterSpacing:"0.05em"}}>{mins>=480?"FLIGHT LIMIT REACHED":"FLIGHT TIME ALERT"}</div>
      <div style={{fontSize:20,color:"#b8c8d8",textAlign:"center",marginBottom:18,lineHeight:1.6}}>{mins>=480?"8:00 hrs reached — no further flight time.":`${fmtMin(mins)} of 8:00 used. ${fmtMin(480-mins)} remaining.`}</div>
      <div style={{height:10,borderRadius:5,background:"#1e2730",marginBottom:18,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${Math.min(mins/480*100,100)}%`,background:SC[color]}}/>
      </div>
      <button onClick={onDismiss} style={{...S.btn(color==="red"?"danger":"primary"),width:"100%",padding:14}}>ACKNOWLEDGED</button>
    </div>
  </div>;
}

// ── LEGACY SCREEN ─────────────────────────────────────────────────────────────
function LegacyScreen({ historyStats, historyProgress, onRebuildStats }) {
  const [tab, setTab]               = useState("overview");
  const [pilotSearch, setPilotSearch]= useState("");
  const [showAlumni, setShowAlumni] = useState(false);
  const [pilotSort, setPilotSort]   = useState("hours");
  const [selectedPilot, setSelectedPilot] = useState(null);
  const [hoveredYear, setHoveredYear]     = useState(null);
  const [rebuilding, setRebuilding]       = useState(false);
  const [rebuildStatus, setRebuildStatus] = useState(null);
  const [recordsTab, setRecordsTab]       = useState("pilots");
  const [routeSearch, setRouteSearch]     = useState("");
  const [selectedDay, setSelectedDay]     = useState(null);
  const [expandedTail, setExpandedTail]   = useState(null);

  const fmtH  = m  => m  ? `${(m/60).toFixed(1)}h`     : "—";
  const fmtHi = m  => m  ? `${Math.round(m/60).toLocaleString()}h` : "—";
  const fmtK  = n  => n >= 1000 ? `${(n/1000).toFixed(1)}k` : String(n||0);
  const MONTHS= ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const TODAY = new Date().toISOString().slice(0,10);

  const rebuildFromSupabase = async () => {
    setRebuilding(true); setRebuildStatus("Fetching rows from Supabase...");
    try {
      const PAGE = 1000; let allRows = [], offset = 0, done = false;
      while(!done) {
        const url = `${SUPA_URL}/rest/v1/aks_flights?apikey=${SUPA_KEY}&select=pilot,date,tail,origin,destination,flight_type,status,start_time,stop_time,sched_off,sched_on,block_mins,pax,landings,vfr_ifr,delay_code,fuel_uplift,is_ioe&order=date.asc`;
        const res = await fetch(url, {headers:{"Authorization":`Bearer ${SUPA_KEY}`,"Content-Type":"application/json","Range":`${offset}-${offset+PAGE-1}`,"Prefer":"count=exact"}});
        if(!res.ok && res.status!==206) throw new Error(`Supabase fetch failed: ${res.status}`);
        const rows = await res.json();
        allRows = allRows.concat(rows);
        const cr=res.headers.get('content-range'), total=cr?parseInt(cr.split('/')[1])||0:0;
        setRebuildStatus(`Fetched ${allRows.length.toLocaleString()}${total?` of ${total.toLocaleString()}`:""}...`);
        if(rows.length < PAGE) done = true; else offset += PAGE;
      }
      setRebuildStatus(`Computing stats from ${allRows.length.toLocaleString()} rows...`);
      const pilotFlights = {};
      await new Promise(r=>setTimeout(r,50));
      allRows.forEach(r=>{
        const pilot=r.pilot; if(!pilot) return;
        if(!pilotFlights[pilot]) pilotFlights[pilot]=[];
        pilotFlights[pilot].push({
          date:r.date, tailNumber:r.tail, origin:r.origin, destination:r.destination,
          trainingType:r.flight_type||'',
          _status: r.status==='completed'?'completed':r.block_mins>0?'completed':(r.status||'scheduled'),
          startTaxi:r.start_time||'', stopTaxi:r.stop_time||'',
          schedOff:r.sched_off||'', schedOn:r.sched_on||'',
          totalMinutes:r.block_mins||0, pax:String(r.pax||0),
          landings:r.landings||1, flightRules:r.vfr_ifr||'VFR',
          delayCode:r.delay_code||'', fuelUplift:r.fuel_uplift||0, _isIOE:r.is_ioe||false,
        });
      });
      setRebuildStatus("Saving stats...");
      await new Promise(r=>setTimeout(r,50));
      await onRebuildStats(pilotFlights);
      setRebuildStatus(`✓ Done — ${allRows.length.toLocaleString()} rows, ${Object.keys(pilotFlights).length} pilots`);
    } catch(e) { setRebuildStatus(`✗ Error: ${e.message}`); }
    setRebuilding(false);
  };

  if(historyProgress) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",gap:16}}>
      <div style={{fontSize:16,color:"#4a9eff",fontWeight:700}}>📡 SAVING TO SUPABASE</div>
      <div style={{width:300,height:8,background:"#1e2730",borderRadius:4,overflow:"hidden"}}>
        <div style={{height:"100%",background:"#4a9eff",borderRadius:4,width:`${Math.round(historyProgress.done/historyProgress.total*100)}%`,transition:"width 0.3s"}}/>
      </div>
      <div style={{fontSize:14,color:"#7a9ab8"}}>{historyProgress.done.toLocaleString()} / {historyProgress.total.toLocaleString()} rows</div>
    </div>
  );

  if(!historyStats) return (
    <div style={{padding:24,textAlign:"center",color:"#5a7a8a"}}>
      <div style={{fontSize:20,marginBottom:8}}>🗂 NO HISTORY DATA</div>
      <div style={{fontSize:14,marginBottom:16,lineHeight:1.6}}>Upload flight logs on the IMPORT screen, or rebuild from Supabase.</div>
      <button onClick={rebuildFromSupabase} disabled={rebuilding}
        style={{padding:"10px 20px",background:"rgba(74,158,255,0.15)",border:"1px solid rgba(74,158,255,0.4)",
        borderRadius:6,color:"#4a9eff",fontSize:14,fontWeight:700,cursor:rebuilding?"default":"pointer",fontFamily:"'JetBrains Mono',monospace"}}>
        {rebuilding?rebuildStatus:"📡 REBUILD FROM SUPABASE"}

  const TABS=[["overview","OVERVIEW"],["records","RECORDS"],["pilots","PILOTS"],["routes","ROUTES"],["fleet","FLEET"]];
  const allPilots   = Object.values(historyStats.byPilot||{});

  const liveDaysSince = (lf) => !lf ? 9999 : Math.floor((new Date(TODAY)-new Date(lf))/86400000);
  const activePilots= allPilots.filter(p=>liveDaysSince(p.lastFlight)<90).sort((a,b)=>b[sortKey]-a[sortKey]);

  const filtActive  = activePilots.filter(p=>!pilotSearch||p.fullName.toLowerCase().includes(pilotSearch.toLowerCase())||p.username.includes(pilotSearch.toLowerCase()));
  const filtAlumni  = alumni.filter(p=>!pilotSearch||p.fullName.toLowerCase().includes(pilotSearch.toLowerCase())||p.username.includes(pilotSearch.toLowerCase()));
  const maxYearLegs = Math.max(...Object.values(historyStats.byYear||{}).map(d=>d.legs),1);
  const maxMonthLegs= Math.max(...(historyStats.byMonth||[]).map(d=>d.legs),1);
  const filtRoutes  = (historyStats.routeStats||[]).filter(r=>!routeSearch||r.route.toLowerCase().includes(routeSearch.toLowerCase()));

  // ── Pilot modal ─────────────────────────────────────────────────────────────
  // ── Day drill-down modal ───────────────────────────────────────────────────
  const DayModal = ({date}) => {
    const detail = historyStats.topDaysDetail?.[date];

    if(!detail) return null;
    const iaTotal = detail.iaLegs||0;

    return <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.88)",
      zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
      onClick={()=>setSelectedDay(null)}>
      <div style={{background:"#0a0e14",border:"1px solid #2a3a4a",borderRadius:10,padding:20,
        maxWidth:540,width:"100%",maxHeight:"88vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <div style={{fontSize:20,fontWeight:700,color:"#e0e8f0"}}>{date}</div>
            <div style={{fontSize:13,color:"#5a7a8a"}}>{dayStats?.legs} legs · {dayStats?.pax} pax · {dayStats?.pilots} pilots</div>
          </div>
          <button onClick={()=>setSelectedDay(null)} style={{background:"none",border:"none",color:"#5a7a8a",fontSize:22,cursor:"pointer",lineHeight:1}}>×</button>
        </div>

        {/* Company breakdown */}
        {iaTotal > 0 && <div style={{background:"#060a0f",borderRadius:8,padding:"10px 14px",marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#5a7a8a",letterSpacing:"0.1em",marginBottom:8}}>COMPANY BREAKDOWN</div>
          <div style={{display:"flex",gap:12,marginBottom:8}}>
            {[
              {co:"Alaska Seaplanes",legs:detail.aksLegs,hrs:detail.aksHrs,c:"#4a9eff"},
              {co:"Island Air",legs:detail.iaLegs,hrs:detail.iaHrs,c:"#00b894"},
            ].filter(x=>x.legs>0).map(x=>(
              <div key={x.co} style={{flex:1,background:"#0a1018",borderRadius:6,padding:"8px 10px",textAlign:"center"}}>

          <div style={{height:8,background:"#1e2730",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${aksPct}%`,background:"#4a9eff",borderRadius:4}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#3a5060",marginTop:4}}>
            <span>AKS {aksPct}%</span>
            {iaTotal>0&&<span>Island Air {100-aksPct}%</span>}
          </div>
        </div>}

        {/* Per-tail breakdown */}
        <div style={{fontSize:11,fontWeight:700,color:"#5a7a8a",letterSpacing:"0.1em",marginBottom:8}}>TAILS THAT FLEW</div>

          <div style={{display:"grid",gridTemplateColumns:"80px 1fr 45px 50px 45px",gap:4,padding:"6px 10px",
            borderBottom:"1px solid #1e2730",fontSize:10,fontWeight:700,color:"#3a5060"}}>
            <span>TAIL</span><span>TYPE</span><span style={{textAlign:"right"}}>LEGS</span>
            <span style={{textAlign:"right"}}>HRS</span><span style={{textAlign:"right"}}>PAX</span>
          </div>
          {detail.tailArr.map((t,i)=>(
            <div key={t.tail} style={{display:"grid",gridTemplateColumns:"80px 1fr 45px 50px 45px",gap:4,
              padding:"5px 10px",fontSize:13,borderBottom:i<detail.tailArr.length-1?"1px solid #0d1117":"none",
              background:t.isIA?"rgba(0,184,148,0.04)":i%2===0?"#08101e":"#0a1220"}}>
              <span style={{color:t.isIA?"#00b894":"#4a9eff",fontFamily:"monospace",fontWeight:700}}>{t.tail}</span>
              <span style={{color:"#4a6070",fontSize:11}}>{t.desc}</span>

          Green = Island Air tails · Blue = Alaska Seaplanes tails
        </div>}
      </div>
    </div>;
  };

  const PilotModal = ({p}) => {

              {(p.byTailArr||[]).map((t,i)=>(

                  padding:"6px 12px",fontSize:14,

                  background:i%2===0?"#08101e":"#0a1220"}}>
                  <span style={{color:"#4a9eff",fontFamily:"monospace",fontWeight:700}}>{t.tail}</span>

              {(p.uniqueDests||[]).sort((a,b)=>(LOCATION_NAMES[a]||a).localeCompare(LOCATION_NAMES[b]||b)).map(d=>{

  function App() {
  const [screen,setScreen]=useState("fleet");
  const [winterMode,setWinterMode]=useState(false);
  const [screen2,setScreen2]=useState("crew");
  const winW = useWindowWidth();
  const isDesktop = winW >= DESKTOP;
  const [flights,setFlights]=useState([]);
  const [duties,setDuties]=useState([]);
  const [profile,setProfile]=useState({name:"",defaultDutyType:"scheduled"});
  const [fleetData,setFleetData]=useState({});
  const [delayData,setDelayData]=useState(null);
  const [nightCurrencyData,setNightCurrencyData]=useState(null);
  const [reconData,setReconData]=useState(null);
  const [spiderRows,setSpiderRows]=useState(null);
  const [routeAvgs,setRouteAvgs]=useState(null);
  const [qualsData,setQualsData]=useState(null);
  const {wx, wxError, wxAge} = useWeather();
  const [crewData,    setCrewData   ]=useState(null);
  const [crewSyncing, setCrewSyncing]=useState(false);
  const [crewError,   setCrewError  ]=useState(null);
  const [crewLastSync,setCrewLastSync]=useState(null);
  const [crewSource,  setCrewSource ]=useState("xlsx");
  const [editFlight,setEditFlight]=useState(null);
  const [dutyDate,setDutyDate]=useState(null);
  const [showProfile,setShowProfile]=useState(false);
  const [loaded,setLoaded]=useState(false);
  const [dismissed,setDismissed]=useState(new Set());
  const [autoSyncing,setAutoSyncing]=useState(false);
  const [lastAutoSync,setLastAutoSync]=useState(null);
  const [historyStats,setHistoryStats]=useState(null);
  const [historyUploading,setHistoryUploading]=useState(false);
  const [historyProgress,setHistoryProgress]=useState(null);

  useEffect(()=>{
    // Safety net: always load within 5 seconds no matter what
    const _startTime = Date.now();
    const fallbackTimer = setTimeout(()=>setLoaded(true), 5000);
    const _minDelay = (cb) => {
      const elapsed = Date.now() - _startTime;
      const remaining = Math.max(0, 2500 - elapsed);
      setTimeout(cb, remaining);
    };

    Promise.all([sget(SK.flights),sget(SK.profile),sget(SK.duties),sget(SK.fleet),sget(SK.crew),sget(SK.delays),sget(SK.nightCurrency),sget(SK.recon),sget(SK.spider),sget(SK.routes),sget(SK.quals)])
    .then(([f,p,d,fl,cr,dl,nc,rc,sp,ra,ql])=>{
      clearTimeout(fallbackTimer);
      try { setFlights(Array.isArray(f)?f:[]); } catch(e){}
      try { setProfile(p&&typeof p==="object"?p:{name:"",defaultDutyType:"scheduled"}); } catch(e){}
      try { setDuties(Array.isArray(d)?d:[]); } catch(e){}
      try {
        const patchedFleet = {};
        if(fl&&typeof fl==="object") Object.entries(fl).forEach(([u,pd])=>{
          patchedFleet[u] = {...pd, office: pilotCompany(u)};
        });
        setFleetData(patchedFleet);
      } catch(e){}
      try { if(cr){ setCrewData(cr.data||null); setCrewLastSync(cr.ts||null); setCrewSource(cr.source||'xlsx'); } } catch(e){}
      try { if(dl) setDelayData(dl); } catch(e){}
      try { if(nc) setNightCurrencyData(nc); } catch(e){}
      try { if(sp) setSpiderRows(sp); } catch(e){}
      try { if(ra) setRouteAvgs(ra); } catch(e){}
      try { if(ql) setQualsData(ql); } catch(e){}
      sget(SK.winterMode).then(v=>{ if(v) setWinterMode(!!v); }).catch(()=>{});
      sget(SK.historyStats).then(v=>{ if(v) setHistoryStats(v); }).catch(()=>{});
      _minDelay(()=>{
        setLoaded(true);
        try { if(!p?.name)setShowProfile(true); } catch(e){}
      });
    })
    .catch(err=>{
      clearTimeout(fallbackTimer);
      console.error('Storage load error:', err);
      _minDelay(()=>setLoaded(true));
    });
  },[]);

  // ── AUTO LIVE SYNC FROM AKS_FLIGHTS ────────────────────────────────────────
  // Fetches last 4 days from aks_flights every 30 min → rebuilds fleetData.
  // Keeps FLT/DUTY current automatically — no manual imports needed.
  useEffect(() => {
    if(!loaded) return;

    const runAutoSync = async () => {
      try {
        const today = new Date();
        const since = new Date(today); since.setDate(since.getDate()-2);
        const until = new Date(today); until.setDate(until.getDate()+2);
        const sinceStr = since.toISOString().slice(0,10);
        const untilStr = until.toISOString().slice(0,10);

        const PAGE=1000; let allRows=[], offset=0, done=false;
        while(!done) {
          const url=`${SUPA_URL}/rest/v1/aks_flights?apikey=${SUPA_KEY}`
            +`&select=pilot,date,tail,origin,destination,flight_type,status,`
            +`start_time,stop_time,sched_off,sched_on,block_mins,pax,landings,`
            +`vfr_ifr,delay_code,co_pilot,is_ioe`
            +`&date=gte.${sinceStr}&date=lte.${untilStr}&order=date.asc`;
          const res=await fetch(url,{headers:{"Authorization":`Bearer ${SUPA_KEY}`,"Content-Type":"application/json","Range":`${offset}-${offset+PAGE-1}`}});
          if(!res.ok&&res.status!==206) break;
          const rows=await res.json();
          allRows=allRows.concat(rows);
          if(rows.length<PAGE) done=true; else offset+=PAGE;
        }
        if(!allRows.length) return;

        const pilotFlights={};
        // Check airmen who receive co-pilot credit on training flights
        const CHECK_AIRMEN_SYNC = new Set(["danc","patrickf","greggh","seank"]);

        allRows.forEach(r=>{
          const pilot=r.pilot; if(!pilot) return;
          if(!pilotFlights[pilot]) pilotFlights[pilot]=[];
          const bm=r.block_mins||0, st=r.start_time||'', sp=r.stop_time||'';
          const status=r.status==='completed'?'completed':bm>0?'completed':st?'enroute':'scheduled';
          const flightObj = {
            id:`af_${r.date}_${pilot}_${r.sched_off||st||Math.random()}`,
            date:r.date, tailNumber:r.tail||'', origin:r.origin||'',
            destination:r.destination||'', pax:String(r.pax||0),
            startTaxi:st, stopTaxi:sp, schedOff:r.sched_off||'', schedOn:r.sched_on||'',
            totalMinutes:bm, landings:r.landings||1,
            flightRules:r.vfr_ifr||'VFR', delayCode:r.delay_code||'',
            trainingType:r.flight_type||'', notes:'', dutyType:'scheduled',
            _status:status, _isIOE:r.is_ioe||false,
            beginHobbs:'', endHobbs:'', hobbsDelta:null, grossWeight:'',
            nightLandings:0, ifCheck:false,
          };
          pilotFlights[pilot].push(flightObj);

          // Credit co-pilot time if they are a check airman on a training flight
          const cop = (r.co_pilot||'').trim().toLowerCase();
          const isTraining = (r.flight_type||'').toLowerCase().includes('train');
          if(cop && cop !== pilot && CHECK_AIRMEN_SYNC.has(cop) && isTraining && bm > 0) {
            if(!pilotFlights[cop]) pilotFlights[cop]=[];
            pilotFlights[cop].push({
              ...flightObj,
              id:`af_${r.date}_${cop}_cop_${r.sched_off||st||Math.random()}`,
              _isCoPilot: true,
            });
          }
        });

        const routeAvgs=computeRouteAverages(pilotFlights);
        const pilotMap={};
        Object.entries(pilotFlights).forEach(([u,rawFlights])=>{
          const flights=rawFlights.map(f=>{
            if(f._status!=='scheduled'||f.totalMinutes>0||(f.schedOff&&f.schedOn)) return f;
            const est=estimateLegMins(routeAvgs,f.tailNumber,f.origin,f.destination);
            return est?{...f,totalMinutes:est.avg,_estimated:true}:f;
          });
          pilotMap[u]={
            username:u, fullName:PILOT_NAME_MAP[u]||u, office:pilotCompany(u),
            flights, lastUpdated:new Date().toISOString(),
            completed:flights.filter(f=>f._status==='completed'),
            enroute:  flights.filter(f=>f._status==='enroute'),
            scheduled:flights.filter(f=>f._status==='scheduled'),
            compliance:computeFleetCompliance(flights),
          };
        });

        setFleetData(prev=>({...prev,...pilotMap}));
        setRouteAvgs(routeAvgs);
        console.log(`[AutoSync] ${allRows.length} rows, ${Object.keys(pilotMap).length} pilots — ${new Date().toLocaleTimeString()}`);
      } catch(e) {
        console.warn('[AutoSync] failed:', e.message);
      }
    };

    // Run immediately on load
    runAutoSync();

    // Supabase Realtime — instant update when aks_flights changes
    // Uses the Supabase Realtime websocket API directly (no client lib needed)
    let ws = null;
    let wsReady = false;
    const realtimeUrl = `wss://yulbmiwgdfozgrenfgfk.supabase.co/realtime/v1/websocket?apikey=${SUPA_KEY}&vsn=1.0.0`;
    try {
      ws = new WebSocket(realtimeUrl);
      ws.onopen = () => {
        wsReady = true;
        // Subscribe to aks_flights INSERT/UPDATE events
        ws.send(JSON.stringify({
          topic: "realtime:public:aks_flights",
          event: "phx_join",
          payload: { config: { broadcast: { self: false }, presence: { key: "" } } },
          ref: "1"
        }));
        console.log('[AutoSync] Realtime connected — instant updates active');
      };
      ws.onmessage = (msg) => {
        try {
          const data = JSON.parse(msg.data);
          // Heartbeat — respond to keep connection alive
          if(data.event === "heartbeat") {
            ws.send(JSON.stringify({topic:"phoenix",event:"heartbeat",payload:{},ref:"hb"}));
            return;
          }
          // Data change event — trigger sync
          if(data.event === "INSERT" || data.event === "UPDATE") {
            console.log('[AutoSync] Realtime event — refreshing...');
            runAutoSync();
          }
        } catch(e) {}
      };
      ws.onerror = () => console.warn('[AutoSync] Realtime WS error — falling back to polling');
      ws.onclose = () => { wsReady = false; };
    } catch(e) {
      console.warn('[AutoSync] WebSocket not available:', e.message);
    }

    // 30-min polling fallback (catches any missed realtime events)
    const interval = setInterval(runAutoSync, 30*60*1000);

    return () => {
      clearInterval(interval);
      if(ws && wsReady) try { ws.close(); } catch(e) {}
    };
  },[loaded]);

  const comp=getCompliance(flights,profile.defaultDutyType,duties);
  const curMins=profile.defaultDutyType==="onDemand"?comp.rolling24:comp.todayMin;
  const trigThresh=WARN_THRESHOLDS.filter(t=>curMins>=t).pop();
  const showWarn=trigThresh&&!dismissed.has(trigThresh);

  const saveFlight=useCallback(async(f)=>{
    setFlights(prev=>{const exists=prev.find(x=>x.id===f.id);const u=exists?prev.map(x=>x.id===f.id?f:x):[...prev,f];sset(SK.flights,u);return u;});
    setEditFlight(null);setScreen("home");
  },[]);

  const importFlights=useCallback(async(newF,newD=[])=>{
    setFlights(prev=>{
      if(!newF.length) return prev;

      const newDates = new Set(newF.map(f=>f.date));
      const newDatesSorted = [...newDates].sort();
      const minNewDate = newDatesSorted[0];
      const maxNewDate = newDatesSorted[newDatesSorted.length-1];

      // Keep all historical flights NOT covered by this import's date range
      // This protects Jan 1 → (minNewDate - 1) and (maxNewDate + 1) → future
      const historical = prev.filter(f=>!newDates.has(f.date));

      // Dedupe new flights by id
      const newById = {};
      newF.forEach(f=>{ newById[f.id]=f; });
      const fresh = Object.values(newById);

      const merged = [...historical, ...fresh]
        .sort((a,b)=>(a.date+(a.startTaxi||'')).localeCompare(b.date+(b.startTaxi||'')));

      const msg = `Import: ${newDates.size} days (${minNewDate}→${maxNewDate}), ${historical.length} historical preserved, ${fresh.length} fresh`;
      console.log(msg);
      // Safety check: never save FEWER flights than we started with (outside import window)
      if(merged.length < prev.length - fresh.length) {
        console.warn('Import safety: merged fewer than expected, aborting');
        return prev;
      }
      sset(SK.flights, merged);
      return merged;
    });
    // Duties: only update dates present in new duties, preserve everything else
    if(newD.length>0) setDuties(prev=>{
      const newDutyDates = new Set(newD.map(d=>d.date));
      const historical = prev.filter(d=>!newDutyDates.has(d.date));
      const merged = [...historical, ...newD].sort((a,b)=>a.date.localeCompare(b.date));
      sset(SK.duties, merged);
      return merged;
    });
    setScreen("home");
  },[]);

  const nightFileRef = useRef(null);

  const uploadNightXlsx = useCallback(async()=>{
    // Trigger file picker
    if(!nightFileRef.current) return;
    nightFileRef.current.click();
  },[]);

  const handleNightFile = useCallback(async(e)=>{
    const file = e.target.files[0]; if(!file) return;
    const XLSX = await loadXlsx();
    const buf  = await file.arrayBuffer();
    const wb   = XLSX.read(new Uint8Array(buf),{type:'array',cellDates:false,dateNF:'yyyy-mm-dd'});
    const csv  = XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]],{raw:false});
    const rows = csv.split("\n").map(r=>r.split(",").map(v=>v.trim().replace(/^"|"$/g,"")));
    // Format: col0=TF input, col1=Name "Last, First", col2=Date Completed, col3=Expires
    const parsed = [];
    const today_ = new Date(); today_.setHours(0,0,0,0);
    rows.slice(3).forEach(r=>{
      const raw = r[1]||""; if(!raw) return;
      // Name is "Last, First" → convert to "First Last"
      const nameParts = raw.split(",").map(s=>s.trim());
      const name = nameParts.length>=2 ? `${nameParts[1]} ${nameParts[0]}` : raw;
      const expires = r[3]||"";
      const expDate = parseDateInfo(expires);
      let status = "red";
      if(expDate) {
        const days = Math.round((expDate.date - today_)/86400000);
        status = days < 0 ? "red" : days <= 30 ? "orange" : days <= 60 ? "yellow" : "green";
      }
      parsed.push({ name, expires: expires||null, status, completed: r[2]||null });
    });
    setNightCurrencyData(parsed);
    await sset(SK.nightCurrency, parsed);
    e.target.value="";
  },[]);

  const importRecon=useCallback(async(result, parsedSpiderRows)=>{
    setReconData(result);
    await sset(SK.recon, result);
    if(parsedSpiderRows) {
      setSpiderRows(parsedSpiderRows);
      await sset(SK.spider, parsedSpiderRows);
    }
  },[]);

  const importDelays=useCallback(async(parsed)=>{
    setDelayData(parsed);
    await sset(SK.delays, parsed);
  },[]);

  const uploadQuals=useCallback(async(parsed)=>{
    setQualsData(parsed);
    await sset(SK.quals, parsed);
  },[]);

  const onRebuildStats = useCallback(async(pilotFlights) => {
    // Called by LegacyScreen after fetching all rows from aks_flights
    // Computes fresh stats from complete dataset and saves
    const hs = computeHistoryStats(pilotFlights);
    setHistoryStats(hs);
    await sset(SK.historyStats, hs);
  }, []);

  const onBulkHistoryComplete = useCallback(async(mergedPilotFlights, histStats) => {
    // Load existing stats and MERGE — so uploading one year doesn't wipe all others
    try {
      const existing = await sget(SK.historyStats);
      const merged   = mergeHistoryStats(existing, histStats);
      setHistoryStats(merged);
      await sset(SK.historyStats, merged);
    } catch(e) {
      // Fallback: just save new stats if merge fails
      setHistoryStats(histStats);
      await sset(SK.historyStats, histStats);
    }
  }, []);

  const importFleet=useCallback(async(pilotMap, newRouteAvgs)=>{
    const newFleet = {...fleetData, ...pilotMap};
    setFleetData(newFleet);
    await sset(SK.fleet, newFleet);
    if(newRouteAvgs) {
      setRouteAvgs(newRouteAvgs);
      await sset(SK.routes, newRouteAvgs);
    }
    setScreen("fleet");
  },[fleetData]);

  // Quick-import — defined AFTER importFleet to avoid temporal dead zone
  const handleQuickImport = useCallback(async(file)=>{
    if(!file) return;
    try {
      const XLSX = await loadXlsx();
      const buf  = await file.arrayBuffer();
      const wb   = XLSX.read(new Uint8Array(buf),{type:'array',cellDates:false});
      const pilotFlights = parseFlightLogExport(wb, XLSX.utils);
      const usernames    = Object.keys(pilotFlights).sort();
      const routeAvgs    = computeRouteAverages(pilotFlights);
      const pilotMap     = {};
      usernames.forEach(u=>{
        pilotMap[u]={username:u,fullName:PILOT_NAME_MAP[u]||u,office:pilotCompany(u),
          flights:pilotFlights[u],lastUpdated:new Date().toISOString()};
      });
      const newFleet = {...fleetData,...pilotMap};
      setFleetData(newFleet);
      await sset(SK.fleet, newFleet);
      if(routeAvgs){ setRouteAvgs(routeAvgs); await sset(SK.routes,routeAvgs); }
      // Compute + save history stats after every fleet import
      try {
        const hs = computeHistoryStats(pilotFlights);
        setHistoryStats(hs);
        await sset(SK.historyStats, hs);
      } catch(e){ console.warn('History stats compute failed:', e.message); }
      // Upsert to aks_flights (non-blocking)
      upsertFlightsBatch(pilotFlights, (done,total)=>{
        setHistoryProgress({done,total});
      }).then(n=>{ setHistoryProgress(null); console.log(`Upserted ${n} rows to aks_flights`); })
        .catch(e=>console.warn('aks_flights upsert failed:',e.message));
      setScreen('fleet');
    } catch(e){ console.error('Quick import failed:',e); }
  },[fleetData]);

  const updateDuty=useCallback(async(username,date,assignment)=>{
    setFleetData(prev=>{
      const pilot = prev[username];
      if(!pilot) return prev;
      const updated = {
        ...prev,
        [username]: {
          ...pilot,
          dutyAssignments: {
            ...(pilot.dutyAssignments||{}),
            [date]: assignment,
          }
        }
      };
      sset(SK.fleet, updated);
      return updated;
    });
  },[]);

  const syncCrew = useCallback(async()=>{
    setCrewSyncing(true); setCrewError(null);
    const base = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=`;
    try {
      const [pilotRes, kalininRes, airxRes] = await Promise.all([
        fetch(base + SHEET_GIDS.pilots),
        fetch(base + SHEET_GIDS.kalinin),
        fetch(base + SHEET_GIDS.airx),
      ]);
      const [pilotCSV, kalininCSV, airxCSV] = await Promise.all([
        pilotRes.text(), kalininRes.text(), airxRes.text()
      ]);
      const pilots  = parseCrewCSV(pilotCSV);
      const kalinin = parseKalininCSV(kalininCSV);
      const airx    = parseKalininCSV(airxCSV); // same structure
      const data    = { pilots, kalinin, airx };
      const ts      = new Date().toISOString();
      setCrewData(data); setCrewLastSync(ts); setCrewSource("sheets");
      await sset(SK.crew, { data, ts, source:"sheets" });
    } catch(e) {
      setCrewError("Could not fetch sheet — make sure it's shared as 'Anyone with link → Viewer'");
      console.error(e);
    }
    setCrewSyncing(false);
  },[]);

  const uploadCrewXlsx = useCallback(async(file)=>{
    setCrewSyncing(true); setCrewError(null);
    try {
      const XLSX = await loadXlsx();
      const buf  = await file.arrayBuffer();
      // cellDates:false + dateNF so dates come out as formatted strings "YYYY-MM-DD"
      const wb   = XLSX.read(new Uint8Array(buf), {type:'array', cellDates:false, dateNF:'yyyy-mm-dd'});

      const sheetNames = wb.SheetNames;
      // 0=Pilots, 1=Historical Pilots, 2=Kalinin Specials, 3=Air X Specials
      // 4=Historical Kalinin Specials, 5=Historical Air X Specials
      const toCSV = (sheet) => sheet ? XLSX.utils.sheet_to_csv(sheet, {raw:false, dateNF:'yyyy-mm-dd'}) : "";

      const pilots         = parseCrewCSV(toCSV(wb.Sheets[sheetNames[0]]));
      const historicalPilots = parseCrewCSV(toCSV(wb.Sheets[sheetNames[1]]), true);
      const kalinin        = parseKalininCSV(toCSV(wb.Sheets[sheetNames[2]]));
      const airx           = parseKalininCSV(toCSV(wb.Sheets[sheetNames[3]]));
      const kalininHist    = parseKalininCSV(toCSV(wb.Sheets[sheetNames[4]]));
      const airxHist       = parseKalininCSV(toCSV(wb.Sheets[sheetNames[5]]));

      const data = { pilots, historicalPilots, kalinin, airx, kalininHist, airxHist };
      const ts   = new Date().toISOString();
      setCrewData(data); setCrewLastSync(ts); setCrewSource("xlsx");
      await sset(SK.crew, { data, ts, source:"xlsx" });
    } catch(e) {
      setCrewError("Could not parse file — make sure it's the Pilot Status Board XLSX.");
      console.error(e);
    }
    setCrewSyncing(false);
  },[]);

  const deleteFlight=useCallback((id)=>{
    if(!confirm("Delete this flight?"))return;
    setFlights(prev=>{const u=prev.filter(f=>f.id!==id);sset(SK.flights,u);return u;});
  },[]);

  const saveDuty=useCallback(async(duty)=>{
    setDuties(prev=>{const u=[...prev.filter(d=>d.date!==duty.date),duty];sset(SK.duties,u);return u;});
    setDutyDate(null);
  },[]);

  const saveProfile=useCallback(async(p)=>{ setProfile(p);await sset(SK.profile,p);setShowProfile(false); },[]);

  const handleScanned=useCallback((newFlights,pilotName)=>{
    if(pilotName&&!profile.name){const np={...profile,name:pilotName};setProfile(np);sset(SK.profile,np);}
    importFlights(newFlights);
  },[profile,importFlights]);

  if(!loaded)return <div style={{...S.app,alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#080b0f",flexDirection:"column",gap:12}}><video autoPlay loop muted playsInline src="./beaver.mp4" style={{width:"580px",maxWidth:"92vw",borderRadius:10,display:"block"}}/><div style={{fontSize:14,color:"#e8edf2",letterSpacing:"0.2em",fontWeight:700}}>AKS PILOT OPS</div><div style={{width:200,height:2,background:"#1e2730",borderRadius:1,overflow:"hidden"}}><div style={{height:"100%",width:"100%",background:"#4a9eff",borderRadius:1,transition:"width 3s linear"}}/></div><div style={{fontSize:10,color:"#3a5060",letterSpacing:"0.2em"}}>LOADING...</div></div>;

  const renderScreen=(s=screen)=>{
    if(s==="new")     return <FlightForm initial={editFlight} profile={profile} onSave={saveFlight} onCancel={()=>{setEditFlight(null);setScreen("home");}}/>;
    if(s==="history") return <HistoryScreen flights={flights} duties={duties} onEdit={(f)=>{setEditFlight(f);setScreen("new");}} onDelete={deleteFlight}/>;
    if(s==="fleet")   return <FleetScreen fleetData={fleetData} onUpdateDuty={updateDuty} crewData={crewData} routeAvgs={routeAvgs} wx={wx} wxAge={wxAge} qualsData={qualsData} winterMode={winterMode} onQuickImport={handleQuickImport}/>;
    if(s==="payload") return <PayloadScreen/>;
    if(s==="fuel")    return <FuelScreen/>;
    if(s==="scan")    return <ScanScreen onFlightsScanned={handleScanned}/>;
    if(s==="crew")    return <CrewScreen crewData={crewData} onSync={syncCrew} onUploadXlsx={uploadCrewXlsx} syncing={crewSyncing} lastSync={crewLastSync} sheetError={crewError} sourceMode={crewSource}/>;
    if(s==="import")  return <ImportScreen onImport={importFlights} onImportFleet={importFleet} onUploadQuals={uploadQuals} onUploadCrew={uploadCrewXlsx} onBulkHistoryComplete={onBulkHistoryComplete} loaded={loaded}/>;
    if(s==="regs")    return <RegsScreen/>;
    if(s==="quals")   return <QualsScreen qualsData={qualsData} onUpload={uploadQuals} fleetData={fleetData}/>;
    if(s==="stats")   return <StatsScreen fleetData={fleetData} routeAvgs={routeAvgs}/>;
    if(s==="legacy")  return <LegacyScreen historyStats={historyStats} historyProgress={historyProgress} onRebuildStats={onRebuildStats}/>;
    if(s==="night")   return <NightScreen fleetData={fleetData} nightCurrencyData={nightCurrencyData} onUploadNightXlsx={uploadNightXlsx}/>;
    if(s==="tails")   return <TailsScreen fleetData={fleetData} delayData={delayData} onImportDelays={importDelays} routeAvgs={routeAvgs} wx={wx}/>;
    return <FleetScreen fleetData={fleetData} onUpdateDuty={updateDuty} crewData={crewData}/>;
  };

  // Fleet alert badge
  const fleetAlerts = Object.values(fleetData).filter(pd=>{
    const c=computeFleetCompliance(pd.flights);
    return c.status==="red"||c.status==="orange";
  }).length;
  const crewAlerts = (crewData?.pilots||[]).filter(p=>p.worstStatus==="red").length;

  // ── Shared nav button renderer ───────────────────────────────────────────────
  const NavBtn = ({item, active, onClick, vertical=false}) => (
    <button onClick={onClick} style={{
      display:"flex", flexDirection:"column", alignItems:"center",
      gap: vertical ? 4 : 2,
      padding: vertical ? "12px 8px" : "8px 1px 10px",
      cursor:"pointer", background:"none", border:"none",
      color: active ? "#ffffff" : "rgba(255,255,255,0.35)",
      transition:"color 0.15s", flex: vertical ? undefined : 1,
      width: vertical ? "100%" : undefined,
      borderLeft: vertical && active ? "2px solid #4a9eff" : vertical ? "2px solid transparent" : "none",
      borderBottom: !vertical && active ? "2px solid #4a9eff" : "none",
    }}>
      <div style={{position:"relative",display:"inline-block"}}>
        <span style={{fontSize: vertical ? 18 : 15, lineHeight:1,
          filter:active?"drop-shadow(0 0 6px #4a9eff99)":"none",
          opacity:active?1:0.55}}>{item.icon}</span>
        {item.id==="fleet"&&fleetAlerts>0&&<span style={{position:"absolute",top:-4,right:-6,background:SC.red,color:"#fff",borderRadius:"50%",width:12,height:12,fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{fleetAlerts}</span>}
        {item.id==="crew"&&crewAlerts>0&&<span style={{position:"absolute",top:-4,right:-6,background:SC.red,color:"#fff",borderRadius:"50%",width:12,height:12,fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{crewAlerts}</span>}
      </div>
      <span style={{
        fontSize: vertical ? 9 : 10, letterSpacing:"0.05em", textTransform:"uppercase", fontWeight:700,
        color: active ? "#4a9eff" : "rgba(255,255,255,0.45)",
      }}>{item.label}</span>
    </button>
  );

  const modals = <>
    <input ref={nightFileRef} type="file" accept=".xlsx,.xls" onChange={handleNightFile} style={{display:"none"}}/>
    {showProfile&&<ProfileModal profile={profile} onSave={saveProfile} onClose={()=>setShowProfile(false)}/>}
    {dutyDate&&<DutyModal date={dutyDate} initial={duties.find(d=>d.date===dutyDate)} onSave={saveDuty} onClose={()=>setDutyDate(null)}/>}
    {showWarn&&<WarnPopup flights={flights} profile={profile} onDismiss={()=>setDismissed(s=>new Set([...s,trigThresh]))}/>}
  </>;

  const globalStyle = <style>{`@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}body{background:#080b0f;}input[type="date"]::-webkit-calendar-picker-indicator,input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(0.5);}::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#1e2730;border-radius:2px;}.panel-scroll{overflow-y:auto;}`}</style>;

  // ── DESKTOP LAYOUT ────────────────────────────────────────────────────────────
  if(isDesktop) return <>
    {globalStyle}
    <div style={{display:"flex",height:"100vh",overflow:"hidden",fontFamily:"'JetBrains Mono',monospace",color:"#e8edf2",background:"#080b0f"}}>

      {/* Sidebar nav */}
      <div style={{width:100,background:"#0a0d12",borderRight:"1px solid #1e2730",display:"flex",flexDirection:"column",alignItems:"center",paddingTop:14,flexShrink:0,overflowY:"auto"}}>
